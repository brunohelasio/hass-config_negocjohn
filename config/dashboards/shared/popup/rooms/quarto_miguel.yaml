action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Quarto Miguel
    size: wide
    card_mod: !include ../../snippets/style_popup_center.yaml
    content:
      type: vertical-stack
      cards:
        - type: entities
          title: Iluminação
          show_header_toggle: false
          entities:
            - switch.quarto_miguel_switch_2
            - switch.quarto_miguel_2_switch_1
            - switch.quarto_miguel_2_switch_2
            - switch.quarto_miguel_2_switch_3
            - switch.quarto_miguel_switch_1
            - switch.quarto_miguel_switch_3
            - switch.suite_miguel_switch_1
            - switch.suite_miguel_switch_2
        - type: entities
          title: Clima / Extras
          show_header_toggle: false
          entities:
            - climate.ac_quarto_miguel
            - light.grupo_luzes_quarto_miguel
        - type: picture-entity
          entity: camera.qmi_camera
          camera_view: live
          show_name: false
          show_state: false
