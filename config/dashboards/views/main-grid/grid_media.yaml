#################################################
#           DESKTOP (min-width: 1441px)         #
#################################################
- type: grid
  title: Media
  view_layout:
    grid-area: media
    show:
      mediaquery: '(min-width: 1441px)'
  columns: 1
  cards:
    - type: custom:swipe-card
      parameters:
        pagination:
          type: bullets
          clickable: true
        roundLengths: true
        effect: slide
        speed: 600
        spaceBetween: 12
        threshold: 7
        autoHeight: false
        observer: true
        followFinger: true
        grabCursor: true
      cards:
        ########## SLIDE 1: ARTWORK FULLSCREEN ##########
        - type: custom:button-card
          entity: media_player.currently_playing
          name: ' '
          show_icon: false
          show_state: false
          show_name: false
          tap_action:
            action: call-service
            service: media_player.media_play_pause
            service_data:
              entity_id: media_player.currently_playing
            haptic: light
          hold_action:
            action: more-info
          state_display: >
            [[[
              if (entity && entity.state === 'playing') {
                const title = entity.attributes.media_title || '';
                const artist = entity.attributes.media_artist || '';
                return artist ? artist + ' — ' + title : title;
              }
              return '';
            ]]]
          styles:
            card:
              - border-radius: 5%
              - overflow: hidden
              - position: relative
              # --- CÓDIGO ORIGINAL COMENTADO (height:0 + padding-bottom:100% = hack que
              # impedia Swiper de medir altura corretamente na inicialização) ---
              # - height: 0
              # - padding-bottom: 100%
              # --- FIM CÓDIGO ORIGINAL ---
              - aspect-ratio: 1/1
              - background-color: rgba(115, 115, 115, 0.2)
              - background-size: cover
              - background-position: center
              - background-repeat: no-repeat
              - background-image: >
                  [[[
                    try {
                      if (entity && entity.attributes && entity.attributes.entity_picture) {
                        return 'linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 40%), url("' + entity.attributes.entity_picture + '")';
                      }
                    } catch(e) {}
                    return 'none';
                  ]]]
            state:
              - position: absolute
              - bottom: 8%
              - left: 5%
              - right: 5%
              - font-size: 0.9em
              - color: rgba(255,255,255,0.9)
              - text-shadow: 1px 1px 3px rgba(0,0,0,0.8)
              - white-space: nowrap
              - overflow: hidden
              - text-overflow: ellipsis
            name:
              - display: none

        ########## SLIDE 2: GRID DE BOTOES ##########
        # --- CÓDIGO ORIGINAL COMENTADO (blank-card fantasma que criava slide vazio) ---
        # - type: custom:button-card
        #   color_type: blank-card
        #   styles:
        #     card:
        #       - padding: 0
        #       - margin: 0
        #       - background: none
        #       - box-shadow: none
        #       - border: none
        #       - overflow: visible
        #   custom_fields:
        #     grid: |
        #       [[[ return '' ]]]
        #   card_mod:
        #     style: |
        #       ha-card {
        #         background: none !important;
        #         box-shadow: none !important;
        #         border: none !important;
        #         overflow: visible !important;
        #       }
        #       ha-card::before { content: none !important; }
        # --- FIM CÓDIGO ORIGINAL ---
        - type: grid
          columns: 2
          square: false
          cards:
            # Slot 1: Smart TV
            - type: custom:button-card
              entity: media_player.smart_tv_pro_2
              template:
                - base
                - media_premium
                - icon_tv
            # Slot 2: Echo Show
            - type: custom:button-card
              entity: media_player.echo_show
              template:
                - base
                - media_premium
                - icon_tv
            # Slot 3: Spotify
            - type: custom:button-card
              entity: media_player.spotifyplus_bruno_helasio
              template:
                - base
                - media_premium
                - icon_spotify
            # Slot 4: Echo Pop Office
            - type: custom:button-card
              entity: media_player.echo_pop_office
              template:
                - base
                - media_premium
                - icon_tv

