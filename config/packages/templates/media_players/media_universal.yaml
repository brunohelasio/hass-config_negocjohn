# --- CÓDIGO ORIGINAL COMENTADO (ngocjohn europeu + versão Brasil com blocos duplicados) ---
# Problema: dois blocos template: no mesmo arquivo → HA ignora o segundo silenciosamente
# Problema: media_player.spotify duplicado/fantasma na lista de children
# --- FIM CÓDIGO ORIGINAL ---
#
# media_player:
#   - platform: universal
#     name: Currently Playing
#     unique_id: currently_playing
#     children:
#       - media_player.smart_tv_pro_2
#       - media_player.echo_show
#       - media_player.spotifyplus_bruno_helasio
#       - media_player.spotify          # ← entidade incerta, pode causar erro
#
# template:                             # ← bloco 1 (select) — processado
#   - select: ...
#
# template:                             # ← bloco 2 (sensor) — IGNORADO pelo HA
#   - sensor: ...
# --- FIM CÓDIGO ORIGINAL ---

