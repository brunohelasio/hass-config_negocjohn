# OFFICE ROOM
grid_office_room:
  card:
    type: custom:button-card
    entity: light.grupo_luzes_office
    name: Office
    triggers_update:
      - sensor.time
      - sensor.office_active
      - sensor.roborock_s7_comodo_atual
      - vacuum.roborock_s7
    template:
      - rooms_base
      - icon_office
      # Status icons — igual ao botao Sala (exibem quando AC estiver ligado)
      - ac_status
      - vacuum_overlay
    double_tap_action: !include ../../shared/popup/rooms/office.yaml
    # hold_action:
    #   action: none
    hold_action:
      action: perform-action
      perform_action: light.turn_off
      data:
        entity_id: light.grupo_luzes_office
      haptic: success
    variables:
      light_entity: light.office_switch_3
      # --- ANTERIOR: active: '' (sem sensor) ---
      active: sensor.office_active
      # AC do office (restaurado sem _2)
      ac_entity: climate.ac_office
      # Motion: vazio ate sensor chegar
      motion: ''
      # Roborock overlay — cômodo mapeado para o Escritório/Office
      vacuum_rooms: 'Escritório'

# QUARTO CASAL
grid_quarto_casal:
  card:
    type: custom:button-card
    entity: light.grupo_quarto_casal
    name: Quarto Casal
    triggers_update:
      - sensor.time
      - sensor.quarto_casal_active
      - sensor.roborock_s7_comodo_atual
      - vacuum.roborock_s7
    template:
      - rooms_base
      - icon_double_bed
      - alexa_status
      - vacuum_overlay
    double_tap_action: !include ../../shared/popup/rooms/quarto_casal.yaml
    # hold_action:
    #   action: none
    hold_action:
      action: perform-action
      perform_action: light.turn_off
      data:
        entity_id: light.grupo_quarto_casal
      haptic: success
    variables:
      light_entity: light.qc_luz_principal
      # --- ANTERIOR: active: '' (sem sensor) ---
      active: sensor.quarto_casal_active
      # Alexa do Quarto Casal (Echo Pop) — alexa_status mostra icone quando tocando
      alexa_entity: media_player.echo_pop_quarto_casal
      # Roborock overlay — cômodos mapeados para o Quarto Casal (inclui suíte e closet)
      vacuum_rooms: 'Quarto Casal,Suite Casal,Closet'

# QUARTO MIGUEL
grid_quarto_miguel:
  card:
    type: custom:button-card
    entity: light.grupo_luzes_quarto_miguel
    name: Quarto Miguel
    # FIX C5.2: Adicionado triggers_update com sensor.time para atualizar timer
    # no state_display (mostra tempo desde acendimento). Sem sensor *_active por
    # enquanto — fallback para grupo entity. Quarto Miguel usa switches (nao lights).
    # NOTA: Grupo recriado pelo usuario (estava indisponivel) — agora funciona.
    triggers_update:
      - sensor.time
      - sensor.quarto_miguel_active
      - sensor.roborock_s7_comodo_atual
      - vacuum.roborock_s7
    template:
      - rooms_base
      - icon_double_bed
      # Status icons — igual ao botao Sala (exibem quando AC estiver ligado)
      - ac_status
      - vacuum_overlay
    tap_action:
      # action: call-service
      # service: homeassistant.toggle
      action: perform-action
      perform_action: homeassistant.toggle
      # --- CÓDIGO ORIGINAL COMENTADO PARA REFERÊNCIA ---
      # service_data:
      #   entity_id: switch.quarto_miguel_switch_2
      target:
        entity_id: light.quarto_miguel_switch_2
    double_tap_action: !include ../../shared/popup/rooms/quarto_miguel.yaml
    # hold_action:
    #   action: none
    hold_action:
      action: perform-action
      perform_action: light.turn_off
      data:
        entity_id: light.grupo_luzes_quarto_miguel
      haptic: success
    variables:
      # --- CÓDIGO ORIGINAL COMENTADO PARA REFERÊNCIA ---
      # light_entity: switch.quarto_miguel_switch_2
      light_entity: light.quarto_miguel_switch_2
      # --- ANTERIOR: active: '' (sem sensor) ---
      active: sensor.quarto_miguel_active
      # AC do quarto miguel (restaurado sem _2)
      ac_entity: climate.ac_quarto_miguel
      # Motion: vazio ate sensor chegar
      motion: ''
      # Roborock overlay — cômodos mapeados para o Quarto Miguel (inclui suíte)
      vacuum_rooms: 'Quarto Miguel,Suíte Miguel'

