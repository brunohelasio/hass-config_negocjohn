type: custom:stack-in-card
view_layout:
  grid-area: media
card_mod:
  style: |
    :host {
      height: 100% !important;
    }

    ha-card {
      /* Mantém dimensões originais do bloco Bento */
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: stretch !important;

      background: transparent !important;
      border: none !important;
      border-radius: 18px !important;
      box-shadow: none !important;
      overflow: hidden !important;

      /* Bloco transparente, sem vidro e sem borda */
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      --ha-card-glass-tint: transparent !important;
      --ha-card-backdrop-filter: none !important;
      --ha-card-glass-inset-shadow: none !important;
      --ha-card-background: transparent !important;
      --ha-card-border-width: 0 !important;
    }

    ha-card::before {
      display: none !important;
    }
cards: !include ../../shared/grid-cards/bento_media.yaml
