header_clock:
  template:
    - extra_styles
  show_icon: true
  icon: mdi:clock-outline
  show_name: true
  show_state: false
  show_label: true
  name: >
    [[[
      return states['sensor.time'].state;
    ]]]
  label: >
    [[[
      const event = new Date();
      const options = {weekday: 'short', day: 'numeric', month: 'short'};
      return event.toLocaleDateString('pt-BR', options);
    ]]]
  styles:
    grid:
      - grid-template-areas: |
          "i n"
          "i l"
      - grid-template-rows: min-content min-content
      - grid-template-columns: 0.5fr 1fr
    card:
      - padding: 0.3vw
      - background-color: 'rgba(115, 115, 115, 0.2)'
      - --button-card-ripple-color: none
      - box-shadow: none
      - color: '#97989c'
      - border-radius: var(--ha-card-border-radius, 12px)
      - overflow: visible
    icon:
      - width: 40%
      - height: auto
      - background: rgb(150 150 150 / 30%)
      - border-radius: 50%
      - padding: 8px
      - margin: 0
      - color: '#97989c'
      - opacity: 0.6
    name:
      - justify-self: start
      - font-size: 1rem
      - font-weight: 600
      - line-height: calc(100% + 5px)
      - letter-spacing: 0.06em
      - color: '#97989c'
    label:
      - justify-self: start
      - font-size: 0.75rem
      - color: '#97989c'
      - opacity: 0.7

header_weather:
  template:
    - extra_styles
  show_entity_picture: true
  show_name: true
  show_state: false
  show_label: true
  name: >
    [[[
      if (entity) {
        var temp = entity.attributes.temperature;
        return `${temp}°C`;
      }
      return '';
    ]]]
  label: >
    [[[
      if (entity) {
        var humidity = entity.attributes.humidity;
        return `${humidity}% 💧`;
      }
      return '';
    ]]]
  entity_picture: >
    [[[
      if (entity) {
        const weatherIcons = {
          "clear-night": "clear-night.svg",
          "cloudy": "cloudy.svg",
          "fog": { "above_horizon": "fog.svg", "below_horizon": "fog-night.svg" },
          "lightning": { "above_horizon": "lightning.svg", "below_horizon": "lightning-night.svg" },
          "lightning-rainy": { "above_horizon": "lightning.svg", "below_horizon": "lightning-night.svg" },
          "partlycloudy": { "above_horizon": "partly-cloudy-day.svg", "below_horizon": "partly-cloudy-night.svg" },
          "pouring": { "above_horizon": "pouring-day.svg", "below_horizon": "pouring-night.svg" },
          "rainy": { "above_horizon": "rainy-day.svg", "below_horizon": "rainy-night.svg" },
          "hail": { "above_horizon": "rainy-day.svg", "below_horizon": "rainy-night.svg" },
          "snowy": { "above_horizon": "snowy-day.svg", "below_horizon": "snowy-night.svg" },
          "snowy-rainy": { "above_horizon": "snowy-day.svg", "below_horizon": "snowy-night.svg" },
          "sunny": "sunny.svg",
          "windy": "windy.svg",
          "windy-variant": "windy-variant.svg",
        };

        const weather = entity.state.toLowerCase();
        const sunState = states['sun.sun'].state;

        if (weatherIcons[weather]) {
          return typeof weatherIcons[weather] === 'object'
            ? `/local/img/weather_svg/${weatherIcons[weather][sunState]}`
            : `/local/img/weather_svg/${weatherIcons[weather]}`;
        } else {
          return '';
        }
      }
    ]]]
  styles:
    grid:
      - grid-template-areas: |
          "i n"
          "i l"
      - grid-template-rows: min-content min-content
      - grid-template-columns: 0.5fr 1fr
    card:
      - padding: 0.3vw
      - background-color: 'rgba(115, 115, 115, 0.2)'
      - --button-card-ripple-color: none
      - box-shadow: none
      - color: '#97989c'
      - border-radius: var(--ha-card-border-radius, 12px)
      - overflow: visible
    img-cell:
      - display: inline-flex
      - place-items: center
      - position: relative
    icon:
      - width: 40%
      - height: auto
      - position: inherit
      - margin: 0
      - opacity: 0.9
    name:
      - justify-self: start
      - font-size: 1rem
      - font-weight: 600
      - line-height: calc(100% + 5px)
      - letter-spacing: 0.06em
      - color: '#97989c'
    label:
      - justify-self: start
      - font-size: 0.75rem
      - color: '#97989c'
      - opacity: 0.7
