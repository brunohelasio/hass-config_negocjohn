type: custom:layout-card
layout_type: custom:grid-layout
view_layout:
  grid-area: top_badges
layout:
  grid-template-columns: max-content max-content max-content minmax(0, 1fr) max-content
  align-items: center
  grid-gap: 8px
  margin: 0
  padding: 0 4px
  width: 100%
card_mod:
  style:
    .: |
      :host { width: 100% !important; }
      ha-card {
        background: transparent !important;
        box-shadow: none !important;
        border: none !important;
        padding: 0 !important;
        width: 100% !important;
      }
    $: |
      .card-content { padding: 0 !important; margin: 0 !important; }

cards:
  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    triggers_update:
      - input_select.hemma_expanded_row
      - light.sala_switch_1
      - light.sala_switch_2
      - light.cozinha_switch_1
      - light.cozinha_switch_2
      - light.lavabo_switch_1
      - light.corredor_switch_1
      - light.quarto_miguel_switch_1
      - light.quarto_miguel_switch_2
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.hemma_expanded_row
        option: >
          [[[ return states['input_select.hemma_expanded_row']?.state === 'lights' ? 'none' : 'lights'; ]]]
    hold_action: { action: none }
    variables:
      s: >
        [[[
          const e = ['light.sala_switch_1','light.sala_switch_2','light.cozinha_switch_1','light.cozinha_switch_2','light.lavabo_switch_1','light.corredor_switch_1','light.quarto_miguel_switch_1','light.quarto_miguel_switch_2'];
          const onE = e.filter(id => states[id]?.state === 'on');
          const exp = states['input_select.hemma_expanded_row']?.state || 'none';
          const chips = onE.map(id => ({ id, name: states[id]?.attributes?.friendly_name || id }));
          return {
            is_on: onE.length > 0,
            sub: onE.length === 0 ? 'All Off' : onE.length === e.length ? 'All On' : `${onE.length} On`,
            exp,
            chips
          };
        ]]]
    custom_fields:
      badge: >
        [[[
          const sub = variables?.s?.sub || 'All Off';
          return `<div class="badge-row">
            <ha-icon class="badge-icon" icon="mdi:lightbulb" style="color:#f7c600"></ha-icon>
            <div class="badge-texts">
              <div class="badge-title">Lights</div>
              <div class="badge-sub">${sub}</div>
            </div>
          </div>`;
        ]]]
      rail: >
        [[[
          if (variables?.s?.exp !== 'lights') return '';
          const chips = variables?.s?.chips || [];
          if (!chips.length) return `<div class="exp-rail"><div class="exp-chip exp-empty">No lights on</div></div>`;
          return `<div class="exp-rail">${chips.map(c => `<div class="exp-chip"><ha-icon icon="mdi:lightbulb-on" style="--mdc-icon-size:12px;color:#f7c600"></ha-icon><span>${c.name}</span></div>`).join('')}</div>`;
        ]]]
    extra_styles: &badge_css |
      .badge-row {
        display: grid;
        grid-template-columns: 18px auto;
        align-items: center;
        column-gap: 8px;
        min-width: 72px;
      }
      .badge-icon {
        --mdc-icon-size: 15px;
        justify-self: center;
        align-self: center;
      }
      .badge-texts {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        line-height: 1.08;
        gap: 2px;
      }
      .badge-title {
        font-size: 10px;
        font-weight: 600;
        color: var(--badge-title-color, rgba(255,255,255,0.92));
      }
      .badge-sub {
        font-size: 11px;
        font-weight: 600;
        color: var(--badge-sub-color, rgba(255,255,255,0.72));
      }
      .exp-rail {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        overflow-x: auto;
        max-width: min(56vw, 560px);
        white-space: nowrap;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(22, 22, 25, 0.88);
        border: 1px solid rgba(255,255,255,0.14);
      }
      .exp-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255,255,255,0.10);
        border: 1px solid rgba(255,255,255,0.10);
        font-size: 10px;
        font-weight: 600;
        color: rgba(255,255,255,0.88);
      }
      .exp-empty {
        color: rgba(255,255,255,0.56);
      }
    styles: &badge_visual
      card:
        - width: max-content
        - height: 48px
        - border-radius: 999px
        - padding: 0 12px
        - position: relative
        - overflow: visible
        - z-index: >
            [[[ return variables?.s?.exp === 'lights' || variables?.s?.exp === 'media' || variables?.s?.exp === 'climate' ? '4' : '1'; ]]]
        - background: >
            [[[ return variables?.s?.is_on ? 'rgba(255,255,255,0.90)' : 'rgba(36,33,30,0.82)'; ]]]
        - border: >
            [[[ return variables?.s?.is_on ? '1px solid rgba(255,255,255,0.42)' : '1px solid rgba(255,255,255,0.12)'; ]]]
        - box-shadow: none
        - --badge-title-color: >
            [[[ return variables?.s?.is_on ? 'rgba(0,0,0,0.86)' : 'rgba(255,255,255,0.92)'; ]]]
        - --badge-sub-color: >
            [[[ return variables?.s?.is_on ? 'rgba(0,0,0,0.58)' : 'rgba(255,255,255,0.72)'; ]]]
      custom_fields:
        badge: [display: flex, align-items: center, height: 100%]
        rail:
          - position: absolute
          - left: calc(100% + 8px)
          - top: 50%
          - transform: translateY(-50%)
          - z-index: 9
          - display: >
              [[[ return variables?.s?.exp === 'lights' ? 'inline-flex' : 'none'; ]]]
      grid: [grid-template-areas: '"badge"', grid-template-columns: 1fr, grid-template-rows: 1fr]

  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    triggers_update:
