# ─────────────────────────────────────────────────────────────────────────────
# POPUP FULLSCREEN — Sala de Estar
# Etapa 1 / Estrutura base com 6 blocos placeholder
#
# Usa browser_mod.popup com card_mod para forçar 100vw × 100vh.
# Substitui a abordagem de subview (abandonada — spinner infinito).
# Popup original (65vw) mantido íntegro em livingroom.yaml.
#
# Próximas etapas (aguardam autorização):
#   Etapa 2 → Bloco 1 Hero + Bloco 2 Luzes
#   Etapa 3 → Bloco 3 A/C
#   Etapa 4 → Bloco 4 Câmeras
#   Etapa 5 → Bloco 5 TV e Mídia
#   Etapa 6 → Bloco 6 Spotify
# ─────────────────────────────────────────────────────────────────────────────

action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: " "
    tag: sala_fullscreen
    dismissable: true
    style: >
      --popup-width: 100vw;
      --popup-max-width: 100vw;
      --popup-background-color: transparent;
      --mdc-theme-surface: transparent;
      --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.92);
    card_mod:
      style:
        ha-dialog$: |
          .mdc-dialog__container {
            padding: 0 !important;
            align-items: stretch !important;
            justify-content: stretch !important;
          }
          .mdc-dialog__surface {
            width: 100vw !important;
            max-width: 100vw !important;
            height: 100vh !important;
            max-height: 100vh !important;
            border-radius: 0 !important;
            background: linear-gradient(140deg, #0b1623 0%, #132035 55%, #0b1e30 100%) !important;
            box-shadow: none !important;
            overflow: hidden !important;
          }
          .mdc-dialog__title {
            display: none !important;
          }
          .mdc-dialog__content {
            padding: 0 !important;
            height: 100vh !important;
            max-height: 100vh !important;
            overflow: hidden !important;
          }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        padding: 12px
        grid-gap: 10px
        grid-template-columns: repeat(12, minmax(0, 1fr))
        grid-template-rows: 44vh 42vh
        grid-template-areas: |
          "hero hero hero hero hero lights lights lights lights ac ac ac"
          "cams cams cams cams media media media media spot spot spot spot"
        mediaquery:
          '(max-width: 800px)':
            padding: 8px
            grid-gap: 8px
            grid-template-columns: 1fr
            grid-template-rows: repeat(6, min-content)
            grid-template-areas: |
              "hero"
              "lights"
              "ac"
              "cams"
              "media"
              "spot"
          '(min-width: 801px) and (max-width: 1440px) and (orientation: portrait)':
            grid-template-columns: repeat(2, minmax(0, 1fr))
            grid-template-rows: repeat(3, min-content)
            grid-template-areas: |
              "hero lights"
              "ac cams"
              "media spot"

      cards:

        # ── BLOCO 1: Hero ────────────────────────────────────────────────────
        - type: custom:button-card
          view_layout:
            grid-area: hero
          entity: light.grupo_luzes_sala
          name: Hero
          label: "Imagem · Pills de status · Cortina"
          show_icon: false
          show_name: true
          show_label: true
          show_state: false
          tap_action:
            action: none
          card_mod:
            style: |
              ha-card {
                background: rgba(255,255,255,0.06) !important;
                backdrop-filter: blur(20px) saturate(1.35) !important;
                -webkit-backdrop-filter: blur(20px) saturate(1.35) !important;
                border: 1px solid rgba(255,255,255,0.10) !important;
                border-radius: 20px !important;
                box-shadow: 0 4px 24px rgba(0,0,0,0.28) !important;
                height: 100% !important;
                overflow: hidden !important;
              }
          styles:
            card:
              - padding: 20px
              - justify-content: flex-end
              - align-items: flex-start
              - flex-direction: column
            name:
              - color: rgba(255,255,255,0.90)
              - font-size: 22px
              - font-weight: "700"
              - justify-self: start
            label:
              - color: rgba(255,255,255,0.35)
              - font-size: 12px
              - justify-self: start

        # ── BLOCO 2: Luzes ───────────────────────────────────────────────────
