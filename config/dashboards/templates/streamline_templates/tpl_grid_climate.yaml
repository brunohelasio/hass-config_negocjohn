# ANTERIOR: AIR PURIFIER — template airpurifier acessa entity.attributes.purifier
# que nao existe no setup do usuario (sem Dyson/Xiaomi purifier).
# grid_air_purifier:
#   card:
#     type: custom:button-card
#     entity: sensor.home_climate
#     name: Humidity
#     tap_action: block
#     template:
#       - airpurifier
#     double_tap_action: !include ../../shared/popup/airpurifier.yaml
# NOVO: AC Sala — usa thermostat template adaptado
grid_air_purifier:
  card:
    type: custom:button-card
    entity: climate.sl_ar_condicionado
    name: AC Sala
    template:
      - base
    variables:
      state_on: >
        [[[
          return entity && ['cool','heat','fan_only','dry','heat_cool','auto'].indexOf(entity.state) !== -1;
        ]]]
    tap_action:
      action: toggle
    hold_action:
      action: more-info
  # THERMOSTAT
grid_thermostat:
  card:
    type: custom:button-card
    entity: sensor.home_climate
    name: Temperature
    template:
      - thermostat
    double_tap_action: !include ../../shared/popup/thermostat.yaml
    tap_action:
      action: call-service
      service: input_boolean.toggle
      service_data:
        entity_id: input_boolean.svg_temp_humid
