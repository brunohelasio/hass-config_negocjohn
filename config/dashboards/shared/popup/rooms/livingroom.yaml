action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Sala
    tag: sala_popup
    size: wide
    # ANTERIOR: --popup-width: 70vw; --popup-max-width: 1020px;
    # Popup era maior que a tela do tablet, cortando VR Pendente.
    # Reduzido width para 65vw e max-width para 920px; adicionado max-height: 88vh
    # para que o popup caiba na viewport do tablet sem scroll.
    style: >
      --popup-width: 65vw;
      --popup-max-width: 920px;
      --popup-background-color: rgba(8, 12, 20, 0.62);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
      --tablet-popup-content-padding: 0.5em 0.8em 0.8em 0.7em;
    card_mod:
      style:
        .: |
          ha-dialog {
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
          }
          ha-dialog::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(80, 150, 255, 0.12);
          }
        ha-dialog$: |
          .mdc-dialog__container {
            align-items: center !important;
            justify-content: center !important;
          }
          .mdc-dialog__surface {
            max-height: 88vh !important;
            overflow-y: auto !important;
          }
    # ANTERIOR layout 3 colunas (col_luzes | col_extra | col_camera):
    # content:
    #   type: custom:layout-card
    #   layout_type: custom:grid-layout
    #   layout:
    #     grid-template-columns: 0.9fr 0.9fr 1.6fr
    #     grid-template-areas: '"col_luzes col_extra col_camera"'
    #     grid-gap: 8px
    #     margin: 0
    #     padding: 0.5rem
    #     mediaquery:
    #       "(max-width: 800px)":
    #         grid-template-columns: 1fr
    #         grid-template-areas: |
    #           "col_luzes"
    #           "col_extra"
    #           "col_camera"
    #         padding: 0
    #   cards:
    #     - type: custom:layout-card
    #       layout_type: custom:grid-layout
    #       view_layout:
    #         grid-area: col_luzes
    #       layout:
    #         grid-template-columns: 1fr
    #         margin: 0
    #       cards: !include ../../columns/room_living_lights.yaml
    #     - type: custom:layout-card
    #       layout_type: custom:grid-layout
    #       view_layout:
    #         grid-area: col_extra
    #       layout:
    #         grid-template-columns: 1fr
    #         margin: 0
    #       cards: !include ../../columns/room_living_extras.yaml
    #     - type: custom:layout-card
    #       layout_type: custom:grid-layout
    #       view_layout:
    #         grid-area: col_camera
    #       layout:
    #         grid-template-columns: 1fr
    #         margin: 0
    #       cards: !include ../../columns/room_living_cameras.yaml
    # NOVO layout 2 colunas: col_buttons (luzes + divisor glassmorphism + extras) | col_camera
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        # ANTERIOR: 1fr 1.3fr (camera maior que botoes — causava scroll)
        # CORRIGIDO: 1.4fr 1fr (botoes ficam maiores para acomodar tudo sem scroll; cameras menores)
        grid-template-columns: 1.4fr 1fr
        grid-template-areas: '"col_buttons col_camera"'
        grid-gap: 10px
        margin: 0
        padding: 0.5rem
        mediaquery:
          "(max-width: 800px)":
            grid-template-columns: 1fr
            grid-template-areas: |
              "col_buttons"
              "col_camera"
            padding: 0
      cards:
        # ── Coluna 1: Iluminacao (topo) + Divisor Glassmorphism + Extras (baixo) ──
        - type: vertical-stack
          view_layout:
            grid-area: col_buttons
          cards:
            # --- Luzes ---
            - type: custom:layout-card
              layout_type: custom:grid-layout
              layout:
                grid-template-columns: 1fr
                margin: 0
              cards: !include ../../columns/room_living_lights.yaml

            # --- Divisor Glassmorphism ---
            - type: custom:button-card
              color_type: blank-card
              styles:
                card:
                  - height: 2px
                  - margin: 4px 8px
                  - background: >-
                      linear-gradient(90deg,
                      rgba(255,255,255,0) 0%,
                      rgba(255,255,255,0.12) 15%,
                      rgba(255,255,255,0.20) 50%,
                      rgba(255,255,255,0.12) 85%,
                      rgba(255,255,255,0) 100%)
                  - backdrop-filter: blur(8px)
                  - -webkit-backdrop-filter: blur(8px)
                  - border: none
                  - box-shadow: 0 0 6px rgba(62, 132, 255, 0.10)
                  - border-radius: 2px
                  - padding: 0
                  - min-height: auto

            # --- Extras (Midia / Clima) ---
            - type: custom:layout-card
              layout_type: custom:grid-layout
              layout:
                grid-template-columns: 1fr
                margin: 0
              cards: !include ../../columns/room_living_extras.yaml

        # ── Coluna 2: Cameras ──
        - type: custom:layout-card
          layout_type: custom:grid-layout
          view_layout:
            grid-area: col_camera
          layout:
            grid-template-columns: 1fr
            margin: 0
          cards: !include ../../columns/room_living_cameras.yaml
