icon: mdi:view-quilt
path: bento-lab
subview: false
theme: tablet
type: custom:grid-layout
card_mod:
  style: |
    hui-grid-layout {
      /* Trava a altura do dashboard exatamente no tamanho da sua tela física */
      height: 100vh !important;
      background: linear-gradient(140deg, #0b1623 0%, #132035 55%, #0b1e30 100%);
      padding-bottom: 24px; /* Evita que os cartões de baixo toquem a borda do monitor */
      box-sizing: border-box;
    }
layout:
  margin: 0
  padding: 12px
  grid-gap: 10px
  grid-template-columns: 56px repeat(12, minmax(0, 1fr))
  # PRIMEIRA LINHA: auto (Badges) | SEGUNDA E TERCEIRA: 1fr (Dividem o resto da tela em 50/50)
  grid-template-rows: auto 40vh 40vh
  grid-template-areas: |
    "sidebar top_badges top_badges top_badges top_badges top_badges top_badges top_badges top_badges top_badges top_badges top_badges top_badges"
    "sidebar welcome welcome welcome sala sala sala comodos comodos comodos comodos comodos comodos"
    "sidebar cameras cameras cameras cameras calendar calendar roborock roborock media media media media"

  mediaquery:
    '(max-width: 800px)':
      padding: 8px
      grid-gap: 8px
      grid-template-columns: 1fr
      grid-template-rows: repeat(9, min-content)
      grid-template-areas: |
        "sidebar"
        "top_badges"
        "welcome"
        "sala"
        "office"
        "cameras"
        "calendar"
        "roborock"
        "media"

cards:
  - !include main-grid/bento_sidebar.yaml
  - !include main-grid/bento_top_badges.yaml
  - !include main-grid/bento_welcome.yaml
  - !include main-grid/bento_sala.yaml
  - !include main-grid/bento_comodos.yaml
  - !include main-grid/bento_cameras.yaml
  - !include main-grid/bento_calendar.yaml
  - !include main-grid/bento_roborock.yaml
  - !include main-grid/bento_media.yaml