# NOVO: 4 botoes de AC usando tpl_popup_climate + icon_climate
# Motivo: streamline-cards originais usavam sensor.home_climate, cover.living_room_cover,
# cover.bedroom_shutters — entidades do setup europeu (ngocjohn) que nao existem aqui.
# Substitutos: entidades reais do usuario (climate.*).
# Uso de tpl_popup_climate: garante state_on correto para climate
# (cool/fan_only/dry/heat/heat_cool/auto) na cascata de heranca do button-card.
# icon_climate: SVG proprio do template (icone de ar-condicionado em azul quando ativo).

# AC 1 — Sala
- type: custom:button-card
  entity: climate.sl_ar_condicionado
  name: AC Sala
  show_icon: false
  template:
    - tpl_popup_climate
    - icon_climate

# AC 2 — Office
- type: custom:button-card
  entity: climate.ac_office
  name: AC Office
  show_icon: false
  template:
    - tpl_popup_climate
    - icon_climate

# AC 3 — Quarto Miguel
- type: custom:button-card
  entity: climate.ac_quarto_miguel
  name: AC Q.Miguel
  show_icon: false
  template:
    - tpl_popup_climate
    - icon_climate

# AC 4 — Quarto Casal (entidade a confirmar — placeholder visivel, sem acao ativa)
# Quando a entidade for confirmada, substituir:
#   entity: climate.ac_quarto_casal  (ou o entity_id real, formato: climate.<nome_do_ac>)
# e remover tap_action:none + styles.card.opacity para ativar o botao.
- type: custom:button-card
  name: AC Q.Casal
  show_icon: false
  template:
    - tpl_popup_climate
    - icon_climate
  # Placeholder sem entidade real confirmada — botao visivel mas sem acao
  tap_action:
    action: none
  styles:
    card:
      - opacity: '0.45'
      - cursor: default
