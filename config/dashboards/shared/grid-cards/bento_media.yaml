- type: custom:swipe-card
  card_mod:
    style: |
      ha-card {
        height: 100% !important;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }

      .swiper,
      .swiper-wrapper,
      .swiper-slide {
        height: 100% !important;
        min-height: 0 !important;
      }
  parameters:
    pagination:
      type: bullets
      clickable: true
    roundLengths: true
    effect: slide
    speed: 600
    spaceBetween: 12
    threshold: 7
    autoHeight: false
    observer: true
    followFinger: true
    grabCursor: true
  cards:
    # SLIDE 1 — artwork principal (estrutura original)
    - type: custom:button-card
      entity: sensor.media_focus_visuals
      name: ' '
      show_icon: false
      show_state: true
      show_name: false
      triggers_update:
        - sensor.media_focus_visuals
        - input_select.media_focus_player
        - media_player.android_tv_192_168_3_17
        - media_player.echo_show
        - media_player.spotifyplus_bruno_helasio
        - media_player.echo_pop_office
      tap_action:
        action: call-service
        service: script.media_focus_play_pause
        haptic: light
      hold_action:
        action: more-info
      state_display: >
        [[[
          if (entity && entity.attributes) {
            const title = entity.attributes.media_title || '';
            const artist = entity.attributes.media_artist || '';
            return (artist && artist !== 'Pronto para tocar') ? artist + ' — ' + title : title;
          }
          return 'Sistema de Áudio';
        ]]]
      custom_fields:
        artwork: >
          [[[
            if (entity && entity.attributes && entity.attributes.entity_picture) {
              return '<img src="' + entity.attributes.entity_picture + '" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;" />';
            }
            return '';
          ]]]
      styles:
        card:
          - height: 100%
          - min-height: 0
          - border-radius: 14px
          - overflow: hidden
          - padding: 0
          - background-color: rgba(115, 115, 115, 0.2)
        custom_fields:
          artwork:
            - position: absolute
            - top: 0
            - left: 0
            - width: 100%
            - height: 100%
            - z-index: 0
            - filter: >
                [[[
                  if (!entity || !entity.attributes || !entity.attributes.entity_picture) return 'none';
                  const pic = entity.attributes.entity_picture;
                  if (pic.includes('standby_art.jpg')) {
                    return 'none';
                  }
                  if (entity.state !== 'playing') {
                    return 'blur(4px) brightness(50%) grayscale(40%)';
                  }
                  return 'none';
                ]]]
            - transition: filter 0.4s ease
        state:
          - position: absolute
          - bottom: 8%
          - left: 5%
          - right: 5%
          - font-size: 0.9em
          - color: rgba(255,255,255,0.9)
          - text-shadow: 1px 1px 3px rgba(0,0,0,0.8)
          - white-space: nowrap
          - overflow: hidden
          - text-overflow: ellipsis
          - z-index: 1
        name:
          - display: none

    # SLIDE 2 — grid 2x2 (opção conservadora)
    - type: grid
      columns: 2
      square: false
      cards:
        - type: custom:button-card
          entity: media_player.android_tv_192_168_3_17
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.android_tv_192_168_3_17
            haptic: light
          hold_action:
            action: more-info

        - type: custom:button-card
          entity: media_player.echo_show
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.echo_show
            haptic: light
          hold_action:
            action: more-info
          styles:
            card:
              - background-image: >
                  [[[
                    if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                      return 'none !important';
                    }
                    return undefined;
                  ]]]
            custom_fields:
              artwork:
                - display: >
                    [[[
                      if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                        return 'none !important';
                      }
                      return undefined;
                    ]]]

        - type: custom:button-card
          entity: media_player.spotifyplus_bruno_helasio
          template:
            - base
            - media_premium
            - icon_spotify
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.spotifyplus_bruno_helasio
            haptic: light
          hold_action:
            action: more-info

        - type: custom:button-card
          entity: media_player.echo_pop_office
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.echo_pop_office
            haptic: light
          hold_action:
            action: more-info
          styles:
            card:
              - background-image: >
                  [[[
                    if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                      return 'none !important';
                    }
                    return undefined;
                  ]]]
            custom_fields:
              artwork:
                - display: >
                    [[[
                      if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                        return 'none !important';
                      }
                      return undefined;
                    ]]]
