# ─────────────────────────────────────────────────────────────────────────────
# SUBVIEW — Sala de Estar
# Etapa 1 / Estrutura base — v3
#
# MUDANÇA ARQUITETURAL vs v2:
#   v1/v2 usavam `type: custom:grid-layout` como tipo de VIEW.
#   O plugin não é registrado como view-type quando a subview carrega
#   lazily — resultado: spinner infinito.
#
#   v3 usa `type: panel` (padrão de todas as subviews do projeto) com
#   um `custom:layout-card` (layout_type: custom:grid-layout) como card
#   único, igual ao padrão já usado em bento_sala.yaml.
#
# ORIGINAL v1/v2 (mantido como comentário para rollback):
# title: Sala de Estar
# path: subview-sala
# subview: true
# theme: tablet
# type: custom:grid-layout        ← causava spinner
# card_mod: ...
# layout: ...
# cards: ...
# ─────────────────────────────────────────────────────────────────────────────

title: Sala de Estar
path: subview-sala
icon: mdi:sofa
subview: true
theme: tablet
type: panel

cards:
  - type: custom:layout-card
    layout_type: custom:grid-layout
    card_mod:
      style: |
        :host {
          display: block !important;
          height: 100% !important;
        }
        ha-card {
          # ORIGINAL: min-height: 100vh — não dá altura fixa ao grid div, align-content: center não funciona
          height: 100vh !important;
          background: linear-gradient(140deg, #0b1623 0%, #132035 55%, #0b1e30 100%) !important;
          border-radius: 0 !important;
          box-shadow: none !important;
          border: none !important;
          overflow: auto !important;
          box-sizing: border-box !important;
          --ha-card-background: transparent;
          --ha-card-border-width: 0;
          --ha-card-box-shadow: none;
        }
    layout: !include ./modules/sala/_layout.yaml
    cards: !include ./modules/sala/_cards.yaml
