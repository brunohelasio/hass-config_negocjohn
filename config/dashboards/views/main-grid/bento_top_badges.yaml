type: custom:layout-card
layout_type: custom:grid-layout
view_layout:
  grid-area: top_badges
layout:
  grid-template-columns: max-content max-content max-content minmax(0, 1fr) max-content
  align-items: center
  grid-gap: 8px
  margin: 0
  padding: 0 4px
  width: 100%
card_mod:
  style:
    .: |
      :host { width: 100% !important; }
      ha-card {
        background: transparent !important;
        box-shadow: none !important;
        border: none !important;
        padding: 0 !important;
        width: 100% !important;
      }
    $: |
      .card-content { padding: 0 !important; margin: 0 !important; }

cards:
  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    tap_action: { action: none }
    hold_action: { action: none }
    triggers_update:
      - light.sala_switch_1
      - light.sala_switch_2
      - light.cozinha_switch_1
      - light.cozinha_switch_2
      - light.lavabo_switch_1
      - light.corredor_switch_1
      - light.quarto_miguel_switch_1
      - light.quarto_miguel_switch_2
    custom_fields:
      badge: >
        [[[
          const e = ['light.sala_switch_1','light.sala_switch_2','light.cozinha_switch_1','light.cozinha_switch_2','light.lavabo_switch_1','light.corredor_switch_1','light.quarto_miguel_switch_1','light.quarto_miguel_switch_2'];
          const n = e.filter(id => states[id]?.state === 'on').length;
          const label = n === 0 ? 'All Off' : n === e.length ? 'All On' : `${n} On`;
          return `<div class="badge-wrap">
            <div class="badge-title">Lights</div>
            <ha-icon class="badge-icon" icon="mdi:lightbulb" style="color:#ffd700;"></ha-icon>
            <div class="badge-sub">${label}</div>
          </div>`;
        ]]]
    extra_styles: &badge_css |
      .badge-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-width: 74px;
        gap: 2px;
        line-height: 1.05;
      }
      .badge-title {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: .02em;
        color: var(--badge-title-color, rgba(255,255,255,0.92));
      }
      .badge-icon {
        --mdc-icon-size: 17px;
        color: var(--hemma-icon-color, rgba(255,255,255,0.85));
      }
      .badge-sub {
        font-size: 10px;
        font-weight: 500;
        color: var(--badge-sub-color, rgba(255,255,255,0.64));
      }
    styles: &badge_visual
      card:
        - width: max-content
        - height: 58px
        - border-radius: 999px
        - padding: 0 14px
        - background: rgba(36,33,30,0.82)
        - border: 1px solid rgba(255,255,255,0.12)
        - box-shadow: none
        - --badge-title-color: rgba(255,255,255,0.92)
        - --badge-sub-color: rgba(255,255,255,0.64)
        - --hemma-icon-color: rgba(255,255,255,0.86)
      custom_fields:
        badge: [display: flex, align-items: center, height: 100%]
      grid: [grid-template-areas: '"badge"', grid-template-columns: 1fr, grid-template-rows: 1fr]

  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    tap_action: { action: none }
    hold_action: { action: none }
    triggers_update:
      - media_player.smart_tv_pro_2
      - media_player.spotifyplus_bruno_helasio
      - media_player.echo_show
    custom_fields:
      badge: >
        [[[
          const e = ['media_player.smart_tv_pro_2','media_player.spotifyplus_bruno_helasio','media_player.echo_show'];
          const n = e.filter(id => ['playing','paused','on'].includes(states[id]?.state ?? '')).length;
          const label = n === 0 ? 'All Off' : `${n} Playing`;
          return `<div class="badge-wrap">
            <div class="badge-title">Media</div>
            <ha-icon class="badge-icon" icon="mdi:speaker-wireless" style="color:#9aa0a6;"></ha-icon>
            <div class="badge-sub">${label}</div>
          </div>`;
        ]]]
    extra_styles: *badge_css
    styles: *badge_visual

  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    tap_action: { action: none }
    hold_action: { action: none }
    triggers_update:
      - climate.sl_ar_condicionado
      - climate.ac_office
      - climate.ac_quarto_miguel
    custom_fields:
      badge: >
        [[[
          const e = ['climate.sl_ar_condicionado','climate.ac_office','climate.ac_quarto_miguel'];
          const n = e.filter(id => !['off','unavailable','unknown',''].includes(states[id]?.state ?? 'unknown')).length;
          const label = n === 0 ? 'Off' : `${n} On`;
          return `<div class="badge-wrap">
            <div class="badge-title">Climate</div>
            <ha-icon class="badge-icon" icon="mdi:fan" style="color:#56d89b;"></ha-icon>
            <div class="badge-sub">${label}</div>
          </div>`;
        ]]]
    extra_styles: *badge_css
    styles: *badge_visual

  - type: custom:button-card
    show_name: false
    show_state: false
    show_icon: false
    tap_action: { action: none }
    hold_action: { action: none }
    styles:
      card: [background: transparent, border: none, box-shadow: none, width: 1px, height: 1px, padding: 0]

  - type: custom:button-card
    view_layout:
      justify-self: end
    entity: person.bruno_helasio
    show_name: false
    show_state: false
    show_icon: false
    tap_action: { action: none }
    hold_action: { action: none }
    triggers_update:
      - person.bruno_helasio
    custom_fields:
      avatar: >
        [[[
          const pic = entity?.attributes?.entity_picture || '';
          return pic
            ? '<img src="' + pic + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>'
            : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;background:rgba(255,255,255,0.15);border-radius:50%;">B</div>';
        ]]]
    styles:
      card:
        - width: 40px
        - height: 40px
        - border-radius: 50%
        - background: rgba(255,255,255,0.12)
        - border: 1px solid rgba(255,255,255,0.24)
        - padding: 0
        - box-shadow: none
      custom_fields:
        avatar: [width: 100%, height: 100%, overflow: hidden, border-radius: 50%]
      grid: [grid-template-areas: '"avatar"', grid-template-columns: 1fr, grid-template-rows: 1fr]
