type: custom:stack-in-card
view_layout:
  grid-area: cameras
card_mod:
  style: |
    :host {
      height: 100% !important;
    }

    ha-card {
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      padding: 10px !important;
      gap: 8px !important;

      background: linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04)) !important;
      backdrop-filter: blur(18px) saturate(1.2) !important;
      -webkit-backdrop-filter: blur(18px) saturate(1.2) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;

      border-radius: 18px !important;
      overflow: hidden !important;

      --ha-card-glass-tint: transparent !important;
      --ha-card-backdrop-filter: none !important;
      --ha-card-glass-inset-shadow: none !important;
      --ha-card-background: transparent !important;
      --ha-card-border-width: 0 !important;
    }

    ha-card::before {
      display: none !important;
    }

    /* --- CÓDIGO ORIGINAL COMENTADO (v5-v11) ---
    ha-card > hui-conditional-card {
      flex: 1 1 auto !important;
      min-height: 0 !important;
    }
    ha-card > hui-horizontal-stack-card {
      flex: 0 0 auto !important;
      height: 110px !important;
      min-height: 110px !important;
      width: 100% !important;
    }
    ha-card > hui-grid-card {
      flex: 0 0 auto !important;
      width: 100% !important;
      max-width: 100% !important;
      min-width: 0 !important;
      box-sizing: border-box !important;
      overflow: hidden !important;
    }
    ha-card > hui-mod-card {
      flex: 0 0 auto !important;
      width: 100% !important;
      max-width: 100% !important;
      min-width: 0 !important;
      box-sizing: border-box !important;
      overflow: visible !important;
    }
       --- FIM CÓDIGO ORIGINAL --- */

    /* v12 — bloco único 2x2 dentro de mod-card ocupando todo o espaço. */
    ha-card > hui-mod-card {
      flex: 1 1 auto !important;
      width: 100% !important;
      max-width: 100% !important;
      min-width: 0 !important;
      min-height: 0 !important;
      box-sizing: border-box !important;
      overflow: hidden !important;
    }

    ha-card > hui-mod-card hui-grid-card {
      height: 100% !important;
      min-height: 0 !important;
    }

    /* v13.1 debug marker (temporário): confirma visualmente branch/commit carregado. */
    ha-card::after {
      content: "CAM v13.1" !important;
      position: absolute !important;
      top: 8px !important;
      right: 10px !important;
      z-index: 5 !important;
      font-size: 9px !important;
      font-weight: 700 !important;
      letter-spacing: 0.08em !important;
      color: rgba(147, 197, 253, 0.95) !important;
      background: rgba(15, 23, 42, 0.75) !important;
      border: 1px solid rgba(147, 197, 253, 0.45) !important;
      border-radius: 999px !important;
      padding: 2px 7px !important;
      pointer-events: none !important;
    }

    /* v12/v13 — mod-card ocupa toda a área útil do bloco cameras. */
    ha-card > hui-mod-card {
      flex: 1 1 auto !important;
      width: 100% !important;
      max-width: 100% !important;
      min-width: 0 !important;
      min-height: 0 !important;
      box-sizing: border-box !important;
      overflow: hidden !important;
    }

    ha-card > hui-mod-card hui-grid-card {
      height: 100% !important;
      min-height: 0 !important;
    }

    /* v13 — empilhamento vertical do preview ativo precisa herdar altura total. */
    ha-card > hui-mod-card hui-vertical-stack-card,
    ha-card > hui-mod-card hui-vertical-stack-card #root {
      height: 100% !important;
      min-height: 0 !important;
    }

cards: !include ../../shared/grid-cards/bento_cameras.yaml
