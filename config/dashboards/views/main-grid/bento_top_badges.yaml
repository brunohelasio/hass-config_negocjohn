type: custom:layout-card
layout_type: custom:grid-layout
view_layout:
  grid-area: top_badges
layout:
  grid-template-columns: max-content max-content max-content minmax(0, 1fr) max-content
  align-items: center
  grid-gap: 8px
  margin: 0
  padding: 0 4px
  width: 100%
card_mod:
  style:
    .: |
      :host { width: 100% !important; }
      ha-card {
        background: linear-gradient(160deg, rgba(15,20,35,0.58), rgba(20,24,33,0.42)) !important;
        box-shadow: 0 0 32px rgba(59,130,246,0.12), inset 0 1px 0 rgba(191,219,254,0.15), 0 8px 32px rgba(0,0,0,0.2) !important;
        border: 1px solid rgba(255,255,255,0.10) !important;
        padding: 0 !important;
        border-radius: 16px !important;
        overflow: hidden !important;
        backdrop-filter: blur(20px) saturate(1.35) !important;
        -webkit-backdrop-filter: blur(20px) saturate(1.35) !important;
        width: 100% !important;
      }
    $: |
      .card-content { padding: 0 !important;
        border-radius: 16px !important;
        overflow: hidden !important;
        backdrop-filter: blur(20px) saturate(1.35) !important;
        -webkit-backdrop-filter: blur(20px) saturate(1.35) !important; margin: 0 !important; }

cards:
  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    triggers_update:
      - input_select.hemma_expanded_row
      - light.sala_switch_1
      - light.sala_switch_2
      - light.cozinha_switch_1
      - light.cozinha_switch_2
      - light.lavabo_switch_1
      - light.corredor_switch_1
      - light.quarto_miguel_switch_1
      - light.quarto_miguel_switch_2
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.hemma_expanded_row
        option: >
          [[[ return states['input_select.hemma_expanded_row']?.state === 'lights' ? 'none' : 'lights'; ]]]
    hold_action: { action: none }
    variables:
      s: >
        [[[
          const fallback = ['light.sala_switch_1','light.sala_switch_2','light.cozinha_switch_1','light.cozinha_switch_2','light.lavabo_switch_1','light.corredor_switch_1','light.quarto_miguel_switch_1','light.quarto_miguel_switch_2'];
          const groupMembers = states['light.todas_as_luzes']?.attributes?.entity_id;
          const source = (Array.isArray(groupMembers) && groupMembers.length) ? groupMembers : fallback;
          const seen = new Set();
          const expandMembers = (ids) => ids.flatMap((id) => {
            if (!id || seen.has(id)) return [];
            seen.add(id);
            const st = states[id];
            if (!st) return [];
            const members = st.attributes?.entity_id;
            if (Array.isArray(members) && members.length) return expandMembers(members);
            return id.startsWith('light.') ? [id] : [];
          });
          const e = [...new Set(expandMembers(source))];
          const onE = e.filter(id => states[id]?.state === 'on');
          const exp = states['input_select.hemma_expanded_row']?.state || 'none';
          const chips = onE.map(id => ({
            id,
            name: states[id]?.attributes?.friendly_name || id,
            sub: states[id]?.attributes?.brightness != null
              ? `${Math.round((states[id].attributes.brightness / 255) * 100)}%`
              : 'On'
          }));
          return {
            is_on: onE.length > 0,
            sub: onE.length === 0 ? 'All Off' : onE.length === e.length ? 'All On' : `${onE.length} On`,
            exp,
            chips
          };
        ]]]
    custom_fields:
      badge: >
        [[[
          const sub = variables?.s?.sub || 'All Off';
          return `<div class="badge-row">
            <ha-icon class="badge-icon" icon="mdi:lightbulb" style="color:#f7c600"></ha-icon>
            <div class="badge-texts">
              <div class="badge-title">Lights</div>
              <div class="badge-sub">${sub}</div>
            </div>
          </div>`;
        ]]]
      rail: >
        [[[
          if (variables?.s?.exp !== 'lights') return '';
          const chips = variables?.s?.chips || [];
          if (!chips.length) return `<div class="exp-rail"><div class="exp-chip exp-empty">No lights on</div></div>`;
          return `<div class="exp-rail">${chips.map(c => `<div class="exp-chip"><ha-icon class="exp-chip-icon" icon="mdi:lightbulb-on" style="color:#f7c600"></ha-icon><div class="exp-chip-texts"><div class="exp-chip-title">${c.name}</div><div class="exp-chip-sub">${c.sub}</div></div></div>`).join('')}</div>`;
        ]]]
    extra_styles: &badge_css |
      .badge-row {
        display: grid;
        grid-template-columns: 18px auto;
        align-items: center;
        column-gap: 8px;
        min-width: 72px;
      }
      .badge-icon {
        --mdc-icon-size: 22px;
        justify-self: center;
        align-self: center;
      }
      .badge-texts {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        line-height: 1.08;
        gap: 2px;
      }
      .badge-title {
        font-size: 10px;
        font-weight: 600;
        color: var(--badge-title-color, rgba(255,255,255,0.92));
      }
      .badge-sub {
        font-size: 11px;
        font-weight: 600;
        color: var(--badge-sub-color, rgba(255,255,255,0.72));
      }
      .exp-rail {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        overflow-x: auto;
        max-width: min(56vw, 560px);
        white-space: nowrap;
        padding: 0;
        border: none;
        background: transparent;
      }
      .exp-chip {
        display: inline-grid;
        grid-template-columns: 22px auto;
        align-items: center;
        column-gap: 8px;
        height: 48px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(36,33,30,0.82);
        border: 1px solid rgba(255,255,255,0.12);
      }
      .exp-empty {
        display: inline-flex;
        align-items: center;
        height: 40px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(36,33,30,0.82);
        border: 1px solid rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.56);
      }
      .exp-chip-icon {
        --mdc-icon-size: 22px;
      }
      .exp-chip-texts {
        display: flex;
        flex-direction: column;
        gap: 2px;
        line-height: 1.08;
      }
      .exp-chip-title {
        font-size: 10px;
        font-weight: 600;
        color: rgba(255,255,255,0.92);
      }
      .exp-chip-sub {
        font-size: 11px;
        font-weight: 600;
        color: rgba(255,255,255,0.72);
      }
    styles: &badge_visual
      card:
        - width: max-content
        - height: 48px
        - border-radius: 999px
        - padding: 0 12px
        - position: relative
        - overflow: visible
        - z-index: >
            [[[ return variables?.s?.exp === 'lights' || variables?.s?.exp === 'media' || variables?.s?.exp === 'climate' ? '4' : '1'; ]]]
        - background: >
            [[[ return variables?.s?.is_on ? 'rgba(255,255,255,0.90)' : 'rgba(36,33,30,0.82)'; ]]]
        - border: >
            [[[ return variables?.s?.is_on ? '1px solid rgba(255,255,255,0.42)' : '1px solid rgba(255,255,255,0.12)'; ]]]
        - box-shadow: none
        - --badge-title-color: >
            [[[ return variables?.s?.is_on ? 'rgba(0,0,0,0.86)' : 'rgba(255,255,255,0.92)'; ]]]
        - --badge-sub-color: >
            [[[ return variables?.s?.is_on ? 'rgba(0,0,0,0.58)' : 'rgba(255,255,255,0.72)'; ]]]
      custom_fields:
        badge: [display: flex, align-items: center, height: 100%]
        rail:
          - position: absolute
          - left: calc(100% + 8px)
          - top: 50%
          - transform: translateY(-50%)
          - z-index: 9
          - display: >
              [[[ return variables?.s?.exp === 'lights' ? 'inline-flex' : 'none'; ]]]
      grid: [grid-template-areas: '"badge"', grid-template-columns: 1fr, grid-template-rows: 1fr]

  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    triggers_update:
      - input_select.hemma_expanded_row
      - media_player.smart_tv_pro_2
      - media_player.spotifyplus_bruno_helasio
      - media_player.echo_show
    tap_action:
