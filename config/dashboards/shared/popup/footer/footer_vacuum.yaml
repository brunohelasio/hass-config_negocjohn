# ==============================================================================
# NOVO: Estrutura original ngocjohn restaurada com entidades Roborock S7.
# Usa !include snippets (style_popup_center, style_popup_footer, popup_footer_layout)
# para manter visual identico ao screenshot original (Roidmi EVE Plus).
# ==============================================================================
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Roborock S7
    style: >
      --max-popup-column: 3;
    card_mod: !include ../../snippets/style_popup_center.yaml
    content:
      type: custom:mod-card
      card_mod: !include ../../snippets/style_popup_footer.yaml
      card:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout: !include ../../snippets/popup_footer_layout.yaml
        cards:

          # ================================================================
          # COLUNA 1 — SUMMARY
          # ================================================================
          - type: entities
            title: Summary
            show_header_toggle: false
            card_mod:
              class: header
            entities:
              - entity: vacuum.roborock_s7
                name: Roborock S7
                secondary_info: last-changed

              - entity: sensor.roborock_s7_vacuum_error
                name: Erro

              - entity: sensor.roborock_s7_status
                name: Status

              - entity: sensor.roborock_s7_comodo_atual
                name: Cômodo Atual

              - entity: binary_sensor.roborock_s7_mop_attached
                name: Mop Acoplado

              - entity: binary_sensor.roborock_s7_water_box_attached
                name: Caixa de Água

              - entity: binary_sensor.roborock_s7_water_shortage
                name: Falta de Água

              - entity: sensor.roborock_s7_bateria
                name: Bateria

              - type: divider

              - entity: select.roborock_s7_intensidade_do_mop
                name: Intensidade do Mop

              - entity: select.roborock_s7_modo_mop
                name: Modo do Mop

              # Botoes de controle (dentro de entities via hui-element, padrao ngocjohn)
              - type: custom:hui-element
                card_type: horizontal-stack
                cards:
                  - type: custom:button-card
                    entity: vacuum.roborock_s7
                    icon: mdi:play-pause
                    variables:
                      vacuum_action: |
                        [[[
                          if (entity) {
                            const service = entity.state === 'docked' || entity.state === 'paused'
                              ? 'vacuum.start'
                              : 'vacuum.pause';
                            return {
                              action: 'call-service',
                              service: service,
                              target: { entity_id: entity.entity_id },
                            };
                          } else {
                            return { action: 'none' };
                          }
                        ]]]
                    tap_action: '[[[ return variables.vacuum_action ]]]'
                    template: icon_only

                  - type: custom:button-card
                    entity: vacuum.roborock_s7
                    icon: mdi:battery-charging
                    tap_action:
                      action: call-service
                      service: vacuum.return_to_base
                      service_data:
                        entity_id: vacuum.roborock_s7
                    template: icon_only

                  - type: custom:button-card
                    icon: mdi:bell
                    tap_action:
                      action: none
                    template: icon_only

          # ================================================================
          # COLUNA 2 — MAP
          # ================================================================
          - type: entities
            title: Map
            show_header_toggle: false
            card_mod:
              class: header nopadding
            entities:
              - type: custom:hui-element
                card_type: custom:xiaomi-vacuum-map-card
                entity: vacuum.roborock_s7
                vacuum_platform: Roborock
                map_source:
                  camera: image.roborock_s7_map_0
                calibration_source:
                  camera: true
                map_locked: true

          # ================================================================
          # COLUNA 3 — SETTINGS
          # ================================================================
          - type: entities
            title: Settings
            show_header_toggle: false
            entities:
              - entity: number.roborock_s7_volume
                name: Volume

              - entity: switch.roborock_s7_nao_perturbe
                name: Não Perturbe

              - entity: time.roborock_s7_comecar_nao_perturbe
                name: Início NP

              - entity: time.roborock_s7_terminar_nao_perturbe
                name: Fim NP

              - entity: switch.roborock_s7_dock_luz_indicadora_de_status
                name: Luz Indicadora

              - entity: switch.roborock_s7_dock_bloqueio_infantil
                name: Bloqueio Infantil

              - type: divider

              - entity: sensor.roborock_s7_area_de_limpeza
                name: Área (Última)

              - entity: sensor.roborock_s7_tempo_de_limpeza
                name: Tempo (Última)

              - entity: sensor.roborock_s7_area_total_de_limpeza
                name: Área Total

              - entity: sensor.roborock_s7_tempo_total_de_limpeza
                name: Tempo Total

              - entity: sensor.roborock_s7_contagem_total_de_limpeza
                name: Nº de Limpezas
