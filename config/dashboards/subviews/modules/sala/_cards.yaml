# ── BLOCO 1: Hero ────────────────────────────────────────────────────
- type: custom:button-card
  view_layout:
    grid-area: hero
  entity: cover.cortina_sala
  name: Sala de Estar
  label: SALA
  show_icon: false
  show_name: true
  show_label: true
  show_state: false
  tap_action:
    action: none
  hold_action:
    action: more-info
  custom_fields:
    back_btn:
      card:
        type: custom:button-card
        name: Voltar
        show_icon: false
        show_name: true
        tap_action:
          action: navigate
          navigation_path: bento-lab
        styles:
          card:
            - padding: 8px 14px
            - border-radius: 999px
            - background: rgba(0,0,0,0.38)
            - border: 1px solid rgba(255,255,255,0.25)
            - box-shadow: none
          name:
            - color: rgba(255,255,255,0.92)
            - font-size: 14px
            - font-weight: 700
    chips_right: >
      [[[
        const temp = states['sensor.sl_sensor_temp_humid_temperatura']?.state ?? '—';
        const active = states['sensor.living_room_active']?.attributes;
        const lights = active?.lights_on_count ?? '—';
        const chip = (text, active=true) => `
          <span style="
            display:inline-flex;align-items:center;gap:6px;
            padding:8px 14px;border-radius:999px;
            font-size:14px;font-weight:700;
            border:1px solid ${active ? 'rgba(104,205,255,0.55)' : 'rgba(255,255,255,0.20)'};
            background:${active ? 'rgba(22,134,190,0.35)' : 'rgba(0,0,0,0.35)'};
            color:rgba(255,255,255,0.95);">
            ${text}
          </span>`;
        return `<div style="display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:nowrap;">${chip(`${lights} luzes`, true)}${chip(`${temp}°C`, true)}</div>`;
      ]]]
    curtain_bar: >
      [[[
        const c = states['cover.cortina_sala'];
        const pos = c?.attributes?.current_position ?? 0;
        const p = Math.max(0, Math.min(100, Number(pos)));
        const curtainIcon = `<ha-icon icon="mdi:curtains" style="width:34px;height:34px;color:rgba(255,255,255,0.96);display:block;"></ha-icon>`;
        return `<div style="
            width:100%;
            display:grid;
            grid-template-columns:auto 1fr auto;
            grid-template-rows:auto auto auto;
            column-gap:16px;
            row-gap:6px;
            align-items:center;">
            <div style="grid-row:1 / span 3;align-self:center;display:flex;align-items:center;justify-content:center;width:42px;height:42px;">${curtainIcon}</div>
            <div style="font-size:12px;letter-spacing:.14em;font-weight:600;color:rgba(255,255,255,.50);">CORTINA</div>
            <div style="grid-column:2;display:flex;align-items:end;gap:8px;">
              <span style="font-size:40px;line-height:1;font-weight:700;color:#fff;">${p}%</span>
              <span style="font-size:18px;line-height:1.2;color:rgba(255,255,255,.62)">abertura</span>
            </div>
            <div style="grid-column:3;grid-row:1 / span 3;display:flex;gap:10px;">
              <span style="padding:8px 14px;border-radius:13px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);font-size:14px;color:#fff;font-weight:600;white-space:nowrap;">Abrir</span>
              <span style="padding:8px 14px;border-radius:13px;background:rgba(22,134,190,0.45);border:1px solid rgba(104,205,255,0.55);font-size:14px;color:#fff;font-weight:700;white-space:nowrap;">Parar</span>
              <span style="padding:8px 14px;border-radius:13px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);font-size:14px;color:#fff;font-weight:600;white-space:nowrap;">Fechar</span>
            </div>
            <div style="grid-column:2;grid-column-end:3;height:8px;border-radius:999px;background:rgba(255,255,255,0.25);overflow:hidden;max-width:100%;">
              <div style="height:100%;width:${p}%;background:rgba(255,255,255,0.85);"></div>
            </div>
          </div>`;
      ]]]
  card_mod:
    style: |
      ha-card {
        background:
          linear-gradient(180deg, rgba(7,14,28,0.04) 0%, rgba(7,14,28,0.10) 58%, rgba(5,10,20,0.28) 100%),
          url('/local/images/sala_estar.jpg') center center / cover no-repeat !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        border: 1px solid rgba(255,255,255,0.12) !important;
        border-radius: 20px !important;
        box-shadow: 0 4px 24px rgba(0,0,0,0.28) !important;
        height: 100% !important;
        overflow: hidden !important;
      }
  styles:
    grid:
      - grid-template-areas: '"l chips_right back_btn" "n chips_right back_btn" ". . ." "curtain_bar curtain_bar curtain_bar"'
      - grid-template-columns: 1fr auto auto
      - grid-template-rows: min-content min-content 1fr min-content
      - column-gap: 16px
      - row-gap: 8px
    card:
      - padding: 14px 16px 14px 16px
      - position: relative
      - overflow: hidden
    label:
      - color: rgba(255,255,255,0.62)
      - font-size: 12px
      - letter-spacing: 0.2em
      - font-weight: 600
      - align-self: start
      - justify-self: start
      - text-transform: uppercase
    name:
      - color: rgba(255,255,255,0.96)
      - font-size: 44px
      - font-weight: "700"
      - align-self: start
      - justify-self: start
      - margin-top: -4px
    custom_fields:
      chips_right:
        - justify-self: end
        - align-self: start
        - margin-top: 2px
      back_btn:
        - justify-self: end
        - align-self: start
        - margin-top: 2px
      curtain_bar:
        - justify-self: stretch
        - align-self: end
        - width: auto
        - margin-left: 4px
        - margin-right: 4px
        - margin-top: 0px
        - padding: 14px 16px
        - border-radius: 22px
        - border: 1px solid rgba(255,255,255,0.18)
        - background: linear-gradient(90deg, rgba(18,24,38,0.56) 0%, rgba(15,21,35,0.48) 100%)
        - backdrop-filter: blur(10px) saturate(1.35)
        - -webkit-backdrop-filter: blur(10px) saturate(1.35)

- type: custom:button-card
  view_layout:
    grid-area: lights
  entity: light.grupo_luzes_sala
  show_icon: false
  show_name: false
  show_label: false
  show_state: false
  tap_action:
    action: none
  card_mod:
    style: |
      ha-card {
        background: linear-gradient(180deg, rgba(15,20,35,0.78) 0%, rgba(20,24,33,0.88) 100%) !important;
        border: 1px solid rgba(255,255,255,0.12) !important;
        border-radius: 20px !important;
        box-shadow: 0 0 24px rgba(62,132,255,0.22), 0 0 70px rgba(62,132,255,0.14) !important;
        height: 100% !important;
        overflow: hidden !important;
      }
  styles:
    grid:
      - grid-template-areas: |
          "title actions"
          "buttons buttons"
      - grid-template-columns: 1fr auto
      - grid-template-rows: min-content 1fr
      - column-gap: 12px
      - row-gap: 12px
    card:
      - padding: 16px
      - height: 100%
    custom_fields:
      title:
        - justify-self: start
        - align-self: start
      actions:
        - justify-self: end
        - align-self: start
      buttons:
        - align-self: stretch
        - height: 100%
        - margin-top: 2px
  custom_fields:
    title: >
      [[[
        return `<div style="font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:rgba(255,255,255,0.62);">Iluminação</div>`;
      ]]]
    actions:
      card:
        type: horizontal-stack
        cards:
          - type: custom:button-card
            name: "ON"
            show_icon: false
            show_name: true
            tap_action:
              action: call-service
              service: light.turn_on
              service_data:
                entity_id: light.grupo_luzes_sala
            styles:
              card:
                - width: 62px
                - padding: 8px 0
                - border-radius: 999px
                - background: rgba(22,134,190,0.38)
                - border: 1px solid rgba(104,205,255,0.55)
                - box-shadow: none
              name:
                - color: rgba(255,255,255,0.95)
                - font-size: 13px
                - font-weight: 700
          - type: custom:button-card
            name: "OFF"
            show_icon: false
            show_name: true
            tap_action:
              action: call-service
              service: light.turn_off
              service_data:
                entity_id: light.grupo_luzes_sala
            styles:
              card:
                - width: 62px
                - padding: 8px 0
                - border-radius: 999px
                - background: rgba(255,255,255,0.06)
                - border: 1px solid rgba(255,255,255,0.18)
                - box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03)
              name:
                - color: rgba(255,255,255,0.90)
                - font-size: 13px
                - font-weight: 700
    buttons:
      card:
        type: grid
        columns: 3
        square: true
        cards:
          - type: custom:button-card
            entity: light.sala_switch_2
            name: Luz Principal
            template: [tpl_popup_light, circle, icon_light_flush]
            variables:
              circle_input: >
                [[[
                  if (entity && entity.state === 'on') {
                    const brightness = entity.attributes.brightness;
                    return brightness != null ? Math.round(brightness / 2.54) : 100;
                  }
                  return ' ';
                ]]]
              circle_input_unit: '%'
            tap_action:
              action: toggle
          - type: custom:button-card
            entity: light.sl_leds_direito_e_esquerdo
            name: LEDs Sala
            template: [tpl_popup_light, icon_ledstrip]
            tap_action:
              action: toggle
          - type: custom:button-card
            entity: light.sala_2_switch_2
            name: VR Principal
            template: [tpl_popup_light, icon_light_flush]
            tap_action:
              action: toggle
          - type: custom:button-card
            entity: light.sala_2_switch_3
            name: VR Cristaleira
            template: [tpl_popup_light, icon_ledstrip]
            tap_action:
              action: toggle
          - type: custom:button-card
            entity: light.varanda_switch_1
            name: VR Gourmet
            template: [tpl_popup_light, icon_ledstrip]
            tap_action:
              action: toggle
          - type: custom:button-card
            entity: light.varanda_switch_2
            name: VR Pendente
            template: [tpl_popup_light, icon_pendant]
            tap_action:
              action: toggle

