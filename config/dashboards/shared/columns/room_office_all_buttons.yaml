# ── NOVO: Linha 3 com 5 colunas — PC + MacBook + Spotify + Ar Cond. + Cortina ──
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
      }
  cards:
    # 1. PC — switch.macbook (icone desktop)
    # Convenção: NUNCA usar mdi: icons — sempre usar icon_* templates de tpl_icons.yaml
    - type: custom:button-card
      entity: switch.macbook
      name: PC
      template:
        - base
        - icon_imac
      show_icon: false
      tap_action:
        action: toggle
        haptic: success
      double_tap_action:
        action: more-info
    # 2. MACBOOK — placeholder sem ação (visualização apenas)
    - type: custom:button-card
      name: MacBook
      template:
        - base
        # - icon_imac
      show_icon: false
      custom_fields:
        icon: >
          <svg viewBox="0 0 50 50">
            <rect x="8" y="10" width="34" height="22" rx="2" fill="none" stroke="var(--state-icon-color)" stroke-width="2.5"/>
            <rect x="12" y="14" width="26" height="14" rx="1" fill="var(--state-icon-color)" opacity="0.15"/>
            <path d="M4 34 h42 a2 2 0 0 1 2 2 v1 a2 2 0 0 1 -2 2 H4 a2 2 0 0 1 -2 -2 v-1 a2 2 0 0 1 2 -2z" fill="var(--state-icon-color)" opacity="0.6"/>
          </svg>
      styles:
        custom_fields:
          icon:
            - width: 80%
        card:
          - opacity: "0.45"
          - cursor: "default"
      tap_action:
        action: none
      hold_action:
        action: none
      double_tap_action:
        action: none
    # 3. SPOTIFY — compartilhado, mesma entidade em todos os comodos
    # hold_action abre popup Spotify dedicado do Office (com default_device: Echo Pop Office).
    - type: custom:button-card
      entity: media_player.spotifyplus_bruno_helasio
      name: Spotify
      template:
        - base
        - circle
        - loader
        - icon_spotify_color
      state_display: >
        [[[
          return entity && entity.state === 'off' ? ' ' : null;
        ]]]
      variables:
        state_on: >
          [[[ return entity && ['on', 'idle', 'playing', 'paused', 'standby'].indexOf(entity.state) !== -1; ]]]
        circle_input: >
          [[[
            if (entity && entity.attributes.volume_level !== undefined) {
              let volume = Math.round(entity.attributes.volume_level * 100)
              return volume === 0 && entity.state !== 'off'
                ? 1
                : volume
            }
          ]]]
        circle_input_unit: '%'
      tap_action:
        action: perform-action
        perform_action: spotifyplus.player_transfer_playback
        data:
          entity_id: media_player.spotifyplus_bruno_helasio
          device_name: "Echo Pop Office"
          play: true
          force_activate_device: true
        haptic: success
      double_tap_action:
        action: more-info
      hold_action: !include ../popup/media_spotify_office.yaml
    # 4. AR CONDICIONADO — climate.ac_office
    # Usa tpl_popup_climate (herda base, state_on correto para climate).
    - type: custom:button-card
      entity: climate.ac_office
      name: Ar Cond.
      template:
        - tpl_popup_climate
        - icon_climate
      show_icon: false
      tap_action:
        action: perform-action
        perform_action: climate.toggle
        target:
          entity_id: climate.ac_office
        haptic: success
      double_tap_action:
        action: more-info
      hold_action:
        action: more-info
    # 5. CORTINA — SVG inline (mesmo da Sala — icon_shade nao tem visual de persiana)
    # ANTERIOR: template icon_shade (nao corresponde visualmente a cortina/persiana)
    - type: custom:button-card
      name: Cortina
      template:
        - base
        # - icon_shade
      show_icon: false
      tap_action:
        action: none
      hold_action:
        action: none
      double_tap_action:
        action: none
      styles:
        card:
          - opacity: "0.35"
          - cursor: "default"
        custom_fields:
          icon:
            - width: 80%
            - fill: '#9da0a2'
      custom_fields:
        icon: >
          <svg viewBox="0 0 50 50">
            <g id="ram" opacity="0.6">
              <path d="M1.77,28.03c.78,0,1.41-.64,1.41-1.4s-.63-1.4-1.41-1.4-1.39,.62-1.39,1.4,.62,1.4,1.39,1.4Z"/>
              <path d="M1.77,18.34c.78,0,1.41-.64,1.41-1.4s-.63-1.39-1.41-1.39-1.39,.62-1.39,1.39,.62,1.4,1.39,1.4Z"/>
              <path d="M1.77,23.19c.78,0,1.41-.66,1.41-1.41s-.63-1.39-1.41-1.39-1.39,.62-1.39,1.39,.62,1.41,1.39,1.41Z"/>
              <path d="M1.77,34.92c-.85,0-1.55,.72-1.55,1.56v5.07c0,.85,.7,1.56,1.55,1.56s1.56-.71,1.56-1.56v-5.07c0-.85-.69-1.56-1.56-1.56Z"/>
              <path d="M1.77,8.65c.78,0,1.41-.65,1.41-1.41s-.63-1.39-1.41-1.39-1.39,.61-1.39,1.39,.62,1.41,1.39,1.41Z"/>
              <path d="M1.77,13.49c.78,0,1.41-.63,1.41-1.39s-.63-1.41-1.41-1.41-1.39,.62-1.39,1.41,.62,1.39,1.39,1.39Z"/>
              <path d="M1.77,32.86c.78,0,1.41-.64,1.41-1.39s-.63-1.39-1.41-1.39-1.39,.62-1.39,1.39,.62,1.39,1.39,1.39Z"/>
              <path d="M42.5,0H1.77C.8,0,0,.81,0,1.78s.8,1.78,1.77,1.78H42.5c.98,0,1.78-.8,1.78-1.78s-.8-1.78-1.78-1.78Z"/>
            </g>
            <g id="close">
              <path d="M41.08,6.05H7.56c-.97,0-1.59,.63-1.59,1.55v4.75c0,.94,.64,1.55,1.59,1.55H41.08c.99,0,1.59-.63,1.59-1.57V7.59c0-.93-.62-1.54-1.59-1.54Z"/>
              <path d="M41.08,25.46H7.56c-.95,0-1.59,.63-1.59,1.53v4.77c0,.93,.62,1.55,1.59,1.55H41.08c.99,0,1.59-.62,1.59-1.55v-4.78c0-.89-.6-1.51-1.59-1.51Z"/>
              <path d="M41.08,35.17H7.56c-.98,0-1.58,.61-1.58,1.55v4.73c0,.94,.6,1.56,1.57,1.56H41.06c.97,0,1.61-.62,1.61-1.56v-4.73c0-.95-.62-1.55-1.59-1.55Z"/>
              <path d="M41.1,15.76H7.56c-.95,0-1.59,.63-1.59,1.54v4.77c0,.91,.62,1.52,1.59,1.52H41.09c.96,0,1.58-.62,1.58-1.52v-4.79c0-.9-.62-1.52-1.58-1.52Z"/>
            </g>
          </svg>
