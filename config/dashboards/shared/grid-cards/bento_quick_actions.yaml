- type: vertical-stack
  cards:
    - type: markdown
      content: |
        <div style="font-size:10px;font-weight:700;letter-spacing:1.6px;color:rgba(255,255,255,0.34);text-transform:uppercase;padding:0 4px;">
          Ações rápidas
        </div>
      card_mod:
        style: |
          ha-card {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            margin: 0 !important;
            padding: 0 !important;
          }
          .card-content {
            padding: 0 !important;
            margin: 0 !important;
          }

    - type: horizontal-stack
      cards:
        - type: custom:button-card
          icon: mdi:lightbulb-off-outline
          name: Luzes Off
          tap_action:
            action: call-service
            service: homeassistant.turn_off
            data:
              entity_id: light.todas_as_luzes
          hold_action:
            action: none
          styles:
            card:
              - height: 56px
              - width: 100%
              - border-radius: 12px
              - background: rgba(255,255,255,0.06)
              - border: 1px solid rgba(255,255,255,0.10)
              - box-shadow: none
              - margin: 0
              - padding: 0 10px
            icon:
              - color: rgba(255,255,255,0.85)
              - width: 22px
            name:
              - color: rgba(255,255,255,0.82)
              - font-size: 12px
              - font-weight: 600
              - white-space: nowrap
              - overflow: hidden
              - text-overflow: ellipsis
        - type: custom:button-card
          icon: mdi:movie-roll
          name: Cinema
          tap_action:
            action: none
          hold_action:
