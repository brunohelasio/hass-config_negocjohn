          return `<div class="exp-rail">${chips.map(c => `<div class="exp-chip"><ha-icon icon="mdi:music-note" style="--mdc-icon-size:12px;color:#8fdbb9"></ha-icon><span>${c.name}</span></div>`).join('')}</div>`;
        ]]]
    extra_styles: *badge_css
    styles:
