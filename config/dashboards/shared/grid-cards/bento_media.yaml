- type: custom:swipe-card
  parameters:
    pagination:
      type: bullets
      clickable: true
    roundLengths: true
    effect: slide
    speed: 600
    spaceBetween: 12
    threshold: 7
    autoHeight: false
    observer: true
    followFinger: true
    grabCursor: true
  cards:
    ########## SLIDE 1: ARTWORK + BARRA TRANSLÚCIDA ORIGINAL ##########
    - !include ../snippets/media-slide-focus.yaml

    ########## SLIDE 2: GRID 2x2 ##########
    - type: grid
      columns: 2
      square: true
      cards:
        # Slot 1: Smart TV
        - type: custom:button-card
          entity: media_player.android_tv_192_168_3_17
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.android_tv_192_168_3_17
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml

        # Slot 2: Echo Show
        - type: custom:button-card
          entity: media_player.echo_show
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.echo_show
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml
          styles:
            card:
              - background-image: >
                  [[[
                    if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                      return 'none !important';
                    }
                    return undefined;
                  ]]]
            custom_fields:
              artwork:
                - display: >
                    [[[
                      if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                        return 'none !important';
                      }
                      return undefined;
                    ]]]

        # Slot 3: Spotify
        - type: custom:button-card
          entity: media_player.spotifyplus_bruno_helasio
          template:
            - base
            - media_premium
            - icon_spotify
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.spotifyplus_bruno_helasio
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml

        # Slot 4: Echo Pop Office
        - type: custom:button-card
          entity: media_player.echo_pop_office
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.echo_pop_office
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml
          styles:
            card:
              - background-image: >
                  [[[
                    if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                      return 'none !important';
                    }
                    return undefined;
                  ]]]
            custom_fields:
              artwork:
                - display: >
                    [[[
                      if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                        return 'none !important';
                      }
                      return undefined;
                    ]]]
