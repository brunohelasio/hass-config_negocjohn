#################################################
#                                               #
#            MOBILE BOTTOM NAV                  #
#                                               #
#################################################
- type: conditional
  view_layout:
    grid-area: mobile_nav
  conditions:
    - condition: screen
      media_query: '(max-width: 800px) and (min-height: 463px)'
  card:
    type: custom:stack-in-card
    card_mod:
      style:
        .: |
          :host {
            position: fixed !important;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 4;
          }
          ha-card {
            width: calc(100vw - 24px);
            margin: 0 auto 8px auto;
            border-radius: 18px;
            padding: 10px 8px 12px;
            background: rgba(17, 18, 24, 0.86) !important;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 8px 24px rgba(0,0,0,0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
          }
    cards:
      - type: custom:mod-card
        card_mod:
          style:
            hui-horizontal-stack-card$: |
              #root {
                gap: 8px !important;
                align-items: stretch !important;
              }
        card:
          type: horizontal-stack
          cards:
            - type: custom:button-card
              template:
                - icon_sticky_menu
              icon: mdi:home-outline
              tap_action:
                action: call-service
                service: input_select.select_option
                service_data:
                  entity_id: input_select.mobile_dashboard_tab
                  option: home
              styles:
                card:
                  - width: 100%
                icon:
                  - color: >
                      [[[
                        return states['input_select.mobile_dashboard_tab']?.state === 'home'
                          ? '#ffb300'
                          : '#ffffff';
                      ]]]

            - type: custom:button-card
              template:
                - icon_sticky_menu
              icon: mdi:door-open
              tap_action:
                action: call-service
                service: input_select.select_option
                service_data:
                  entity_id: input_select.mobile_dashboard_tab
                  option: comodos
              styles:
                card:
                  - width: 100%
                icon:
                  - color: >
                      [[[
                        return states['input_select.mobile_dashboard_tab']?.state === 'comodos'
                          ? '#ffb300'
                          : '#ffffff';
                      ]]]

            - type: custom:button-card
              template:
                - icon_sticky_menu
              icon: mdi:music-circle-outline
              tap_action:
                action: call-service
                service: input_select.select_option
                service_data:
                  entity_id: input_select.mobile_dashboard_tab
                  option: clima_midia
              styles:
                card:
                  - width: 100%
                icon:
                  - color: >
                      [[[
                        return states['input_select.mobile_dashboard_tab']?.state === 'clima_midia'
                          ? '#ffb300'
                          : '#ffffff';
                      ]]]
