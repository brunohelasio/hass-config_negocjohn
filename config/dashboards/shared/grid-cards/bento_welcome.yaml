# ─────────────────────────────────────────────────────────────────
# 1. SAUDAÇÃO + RELÓGIO (v9)
#    - Botão com grid de 2 colunas: [data+saudação] | [relógio]
#    - Relógio (HH:MM) ocupa as DUAS linhas (grid-row: 1 / span 2)
#    - Font 52px weight 300 — visual premium
#    - Atualiza via entity: sensor.time + triggers_update
# ─────────────────────────────────────────────────────────────────

# --- CÓDIGO ORIGINAL COMENTADO (v8 — type:markdown sem relógio) ---
# - type: markdown
#   content: >
#     {{ now().strftime('%A, %d %b') | upper }}
#
#     ## {% set h = now().hour %}{% if h < 12 %}Bom dia{% elif h < 18 %}Boa tarde{% else %}Boa noite{% endif %}, Bruno
#
#   card_mod:
#     style: |
#       ha-card {
#         background: transparent !important;
#         border: none !important;
#         box-shadow: none !important;
#         padding: 18px 18px 6px !important;
#       }
#       ha-markdown { padding: 0 !important; }
#       ha-markdown p:first-child {
#         font-size: 11px !important;
#         letter-spacing: 0.12em !important;
#         color: rgba(255,255,255,0.44) !important;
#         font-weight: 600 !important;
#         text-transform: uppercase !important;
#         margin: 0 0 4px !important;
#       }
#       ha-markdown h2 {
#         font-size: 26px !important;
#         font-weight: 700 !important;
#         color: white !important;
#         margin: 0 !important;
#         padding: 0 !important;
#         border: none !important;
#         line-height: 1.15 !important;
#       }
# --- FIM CÓDIGO ORIGINAL ---

- type: custom:button-card
  entity: sensor.time
  triggers_update:
    - sensor.time
  show_name: false
  show_icon: false
  show_state: false
  show_label: false
  tap_action:
    action: none
  custom_fields:
    date_line: >
      [[[
        var dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira',
                    'Quinta-feira','Sexta-feira','Sábado'];
        var meses = ['Jan','Fev','Mar','Abr','Mai','Jun',
                     'Jul','Ago','Set','Out','Nov','Dez'];
        var d = new Date();
        var s = dias[d.getDay()] + ', ' + d.getDate() + ' ' + meses[d.getMonth()];
        return '<div style="font-size:11px;letter-spacing:0.12em;'
             + 'color:rgba(255,255,255,0.44);font-weight:600;'
             + 'text-transform:uppercase;">' + s + '</div>';
      ]]]
    greet_line: >
      [[[
        var h = new Date().getHours();
        var g = (h < 12) ? 'Bom dia' : (h < 18 ? 'Boa tarde' : 'Boa noite');
        return '<div style="font-size:26px;font-weight:700;color:white;'
             + 'line-height:1.15;">' + g + ', Bruno</div>';
      ]]]
    clock: >
      [[[
        var d = new Date();
        var hh = String(d.getHours()).padStart(2, '0');
        var mm = String(d.getMinutes()).padStart(2, '0');
        return '<div style="font-size:52px;font-weight:300;line-height:1;'
             + 'color:white;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;">'
             + hh + ':' + mm + '</div>';
      ]]]
  styles:
    grid:
      - grid-template-areas: '"date_line clock" "greet_line clock"'
      - grid-template-columns: "1fr auto"
      - grid-template-rows: "auto auto"
      - column-gap: "14px"
      - row-gap: "4px"
      - align-items: "center"
    card:
      - background: "transparent"
      - border: "none"
      - box-shadow: "none"
      - padding: "18px 18px 6px"
      - cursor: "default"
    custom_fields:
      date_line:
        - justify-self: "start"
        - align-self: "end"
      greet_line:
        - justify-self: "start"
        - align-self: "start"
      clock:
        - grid-row: "1 / span 2"
        - justify-self: "end"
        - align-self: "center"


