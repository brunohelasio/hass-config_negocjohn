# Previous monolithic 3-column implementation kept in backup file:
# - config/dashboards/shared/popup/rooms/livingroom_complex_backup.yaml

action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Sala
    size: wide
    style: >
      --popup-max-width: calc(320px + 320px + 420px);
      --popup-background-color: rgba(8, 12, 20, 0.62);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
      --tablet-popup-content-padding: 0.8em 1em 1em 0.9em;
    card_mod:
      style:
        .: |
          ha-dialog {
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
          }
          ha-dialog .mdc-dialog__container {
            align-items: center !important;
          }
          ha-dialog::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(80, 150, 255, 0.12);
          }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: repeat(3, minmax(0, 1fr))
        grid-template-areas: 'col_luzes col_extra col_camera'
        justify-content: center
        align-content: center
        grid-gap: 1rem
        mediaquery:
          '(max-width: 1100px)':
            grid-template-columns: repeat(2, minmax(0, 1fr))
            grid-template-areas: |
              'col_luzes col_extra'
              'col_camera col_camera'
          '(max-width: 800px)':
            grid-template-columns: 1fr
            grid-template-areas: |
              'col_luzes'
              'col_extra'
              'col_camera'
      cards:
        - type: vertical-stack
          view_layout:
            grid-area: col_luzes
          cards: !include ../../columns/room-living-lights.yaml

        - type: vertical-stack
          view_layout:
            grid-area: col_extra
          cards: !include ../../columns/room-living-extras.yaml

        - type: vertical-stack
          view_layout:
            grid-area: col_camera
          cards: !include ../../columns/room-living-cameras.yaml
