# ─────────────────────────────────────────────────────────────────────────────
# POPUP FULLSCREEN — Sala de Estar
# Etapa 1 / Estrutura base com 6 blocos placeholder
#
# Histórico de tentativas:
#   v1: card_mod com .mdc-dialog__surface → mostrou 6 blocos mas não fullscreen
#   v2: initial_style: fullscreen + novo style → spinner (mudança não isolada)
#   v3: popup 98vw sem initial_style → não autorizado pelo usuário
#   v4: restaura v1 exatamente + initial_style: fullscreen → spinner (causa isolada)
#   v5 (esta): remove card_mod COMPLETAMENTE (seletores MDC mortos em HA 2026.3+
#              — wa-dialog substitui mdc-dialog; card_mod com .mdc-dialog__* trava
#              a animação do wa-dialog no frame 0, causando spinner infinito).
#              Usa --ha-dialog-* variables vivas + --ha-dialog-show-duration: 0ms.
#
# Causa-raiz confirmada: HA 2026.3+ migrou de MDC (mdc-dialog) para WebAwesome
# (wa-dialog). Qualquer card_mod injetando CSS em .mdc-dialog__surface /
# .mdc-dialog__content trava o wa-dialog show @keyframes no frame 0.
#
# Popup original (65vw) mantido íntegro em livingroom.yaml.
# ─────────────────────────────────────────────────────────────────────────────

# --- CÓDIGO ORIGINAL COMENTADO (v4 — card_mod com seletores MDC mortos) ---
# action: fire-dom-event
# browser_mod:
#   service: browser_mod.popup
#   data:
#     title: " "
#     tag: sala_fullscreen
#     dismissable: true
#     initial_style: fullscreen
#     style: >
#       --popup-width: 100vw;
#       --popup-max-width: 100vw;
#       --popup-background-color: transparent;
#       --mdc-theme-surface: transparent;              ← MORTO em HA 2026.3+
#       --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.92); ← MORTO em HA 2026.3+
#     card_mod:
#       style:
#         ha-dialog$: |
#           .mdc-dialog__container { ... }   ← MORTO — trava wa-dialog animation
#           .mdc-dialog__surface { ... }     ← MORTO — trava wa-dialog animation
#           .mdc-dialog__title { ... }       ← MORTO
#           .mdc-dialog__content { ... }     ← MORTO — height:100vh trava frame 0
# --- FIM CÓDIGO ORIGINAL ---

action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: " "
    tag: sala_fullscreen
    dismissable: true
    initial_style: fullscreen
    style: >
      --ha-dialog-surface-background: linear-gradient(140deg, #0b1623 0%, #132035 55%, #0b1e30 100%);
      --ha-dialog-show-duration: 0ms;
      --ha-dialog-hide-duration: 0ms;
      --ha-dialog-border-radius: 0px;
      --dialog-surface-margin-top: 0px;
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        padding: 12px
        grid-gap: 10px
        grid-template-columns: repeat(12, minmax(0, 1fr))
        grid-template-rows: 42vh 40vh
        grid-template-areas: |
          "hero hero hero hero hero lights lights lights lights ac ac ac"
          "cams cams cams cams media media media media spot spot spot spot"
        mediaquery:
          '(max-width: 800px)':
            padding: 8px
            grid-gap: 8px
            grid-template-columns: 1fr
            grid-template-rows: repeat(6, min-content)
            grid-template-areas: |
              "hero"
              "lights"
              "ac"
              "cams"
              "media"
              "spot"
          '(min-width: 801px) and (max-width: 1440px) and (orientation: portrait)':
            grid-template-columns: repeat(2, minmax(0, 1fr))
            grid-template-rows: repeat(3, min-content)
            grid-template-areas: |
              "hero lights"
              "ac cams"
              "media spot"

      cards:

        # ── BLOCO 1: Hero ────────────────────────────────────────────────────
        - type: custom:button-card
          view_layout:
            grid-area: hero
          entity: light.grupo_luzes_sala
          name: Hero
          label: "Imagem · Pills de status · Cortina"
          show_icon: false
          show_name: true
          show_label: true
          show_state: false
          tap_action:
            action: none
          card_mod:
            style: |
              ha-card {
                background: rgba(255,255,255,0.06) !important;
                backdrop-filter: blur(20px) saturate(1.35) !important;
                -webkit-backdrop-filter: blur(20px) saturate(1.35) !important;
                border: 1px solid rgba(255,255,255,0.10) !important;
                border-radius: 20px !important;
                box-shadow: 0 4px 24px rgba(0,0,0,0.28) !important;
                height: 100% !important;
                overflow: hidden !important;
              }
          styles:
            card:
              - padding: 20px
              - justify-content: flex-end
              - align-items: flex-start
              - flex-direction: column
            name:
              - color: rgba(255,255,255,0.90)
              - font-size: 22px
              - font-weight: "700"
              - justify-self: start
            label:
              - color: rgba(255,255,255,0.35)
              - font-size: 12px
              - justify-self: start

        # ── BLOCO 2: Luzes ───────────────────────────────────────────────────
        - type: custom:button-card
          view_layout:
            grid-area: lights
