- &movies_desktop
  type: grid
  title: Movies
  view_layout:
    grid-area: movies
    show:
      mediaquery: '(min-height: 463px)'
  columns: 1
  square: true
  cards:
    - type: custom:added-movie-card
      entity: sensor.tmdb_movies_yts_latest
      show_item_count: 10
# MOVIES em todos os formatos padronizados (exceto cover screen)
- <<: *movies_desktop
