# ═══════════════════════════════════════════════════════════════════
#  BENTO WELCOME — v7
#  Arquivo: config/dashboards/shared/grid-cards/bento_welcome.yaml
#
#  Mudanças v7:
#    [1] Porta Serviço: type:markdown (sem button-card, sem grid bug)
#        → alinhamento correto garantido pelo flexbox do HTML
#    [2] Weather: substituído por button-card compacto
#        → sem overflow, sem corte, controle total de altura
#        → temperatura grande + vento + curva SVG decorativa
#        → ocupa toda a base do bloco, sangra nas bordas
# ═══════════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────────────────────────
# 1. SAUDAÇÃO
# ─────────────────────────────────────────────────────────────────
- type: markdown
  content: >
    {{ now().strftime('%A, %d %b') | upper }}

    ## {% set h = now().hour %}{% if h < 12 %}Bom dia{% elif h < 18 %}Boa tarde{% else %}Boa noite{% endif %}, Bruno

  card_mod:
    style: |
      ha-card {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 18px 18px 6px !important;
      }
      ha-markdown { padding: 0 !important; }
      ha-markdown p:first-child {
        font-size: 11px !important;
        letter-spacing: 0.12em !important;
        color: rgba(255,255,255,0.44) !important;
        font-weight: 600 !important;
        text-transform: uppercase !important;
        margin: 0 0 4px !important;
      }
      ha-markdown h2 {
        font-size: 26px !important;
        font-weight: 700 !important;
        color: white !important;
        margin: 0 !important;
        padding: 0 !important;
        border: none !important;
        line-height: 1.15 !important;
      }


