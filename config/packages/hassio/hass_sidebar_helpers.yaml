#################################################
#                                               #
#   SIDEBAR HELPERS                             #
#   input_select e input_boolean para           #
#   controlar expand/collapse das badges        #
#   e menu mobile da sidebar                    #
#                                               #
#################################################

input_select:
  hemma_expanded_row:
    name: Sidebar Expanded Row
    icon: mdi:arrow-expand-vertical
    options:
      - none
      - lights
      - media
      - climate
      - presence
    initial: none
  bento_active_camera:
    name: Bento Active Camera
    icon: mdi:cctv
    options:
      - camera.sl_camera_2
      - camera.vr_camera_2
      - camera.cz_camera_2
      - camera.as_camera_2
    initial: camera.sl_camera_2

input_boolean:
  sidebar_compact:
    name: Sidebar Compact (Tablet)
    icon: mdi:view-column-outline
    initial: false
  menu_mobile:
    name: Sidebar Menu Mobile
    icon: mdi:menu
    initial: false
