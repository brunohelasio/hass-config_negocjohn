action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Lavabo
    size: normal
    style: >
      --popup-width: 520px;
      --popup-max-width: 520px;
      --popup-background-color: rgba(8, 12, 20, 0.62);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
      --tablet-popup-content-padding: 0.8em 1em 1em 0.9em;
    card_mod:
      style:
        .: |
          ha-dialog {
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
          }
          ha-dialog .mdc-dialog__container {
            align-items: center !important;
          }
          ha-dialog::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(80, 150, 255, 0.12);
          }
    content:
      type: vertical-stack
      cards:
        - type: grid
          columns: 3
          square: false
          cards:
            - type: custom:button-card
              entity: light.lavabo_switch_2
              name: Luz principal
              template:
                - tpl_popup_light
                - icon_light_flush
              styles:
                card:
                  - height: 150px
            - type: custom:button-card
              entity: light.lavabo_switch_1
              name: Luz parede
              template:
                - tpl_popup_light
                - icon_light_flush
              styles:
                card:
                  - height: 150px
            - type: custom:button-card
              entity: light.lavabo_switch_3
              name: Luz espelho
              template:
                - tpl_popup_light
                - icon_light_flush
              styles:
                card:
                  - height: 150px
