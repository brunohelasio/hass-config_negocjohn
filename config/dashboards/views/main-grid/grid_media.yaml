# NOVO: Bloco media SEM conditionals — renderiza direto, sem depender de select.conditional_media
# Cards mostram estado real das entidades (playing/idle/off).
# Quando o usuario criar select.conditional_media no HA, pode descomentar a versao acima
# e comentar esta para voltar ao comportamento de 1 card por vez (carrossel).
# PS5 (switch.ps5_015_power) AGUARDANDO — entidade ficando indisponivel
- type: grid
  title: Media
  view_layout:
    grid-area: media
    show:
      mediaquery: '(min-width: 1441px)'
  columns: 2
  square: true
  cards:
    # TV SALA — Smart TV Pro 2
    - type: custom:button-card
      entity: media_player.smart_tv_pro_2
      name: ' '
      template:
        - conditional_media
        - icon_tv
    # SPOTIFY
    - type: custom:button-card
      entity: media_player.spotifyplus_bruno_helasio
      name: ' '
      double_tap_action: !include ../../shared/popup/media_spotify_sala.yaml
      template:
        - currently_playing
    # ECHO SHOW (Sala)
    - type: custom:button-card
      entity: media_player.echo_show
      name: 'Echo Show'
      template:
        - conditional_media
        - icon_homepod
    # ECHO POP OFFICE
    - type: custom:button-card
      entity: media_player.echo_pop_office
      name: 'Echo Office'
      template:
        - conditional_media
        - icon_homepod
    # ECHO POP QUARTO CASAL
    - type: custom:button-card
      entity: media_player.echo_pop_quarto_casal
      name: 'Echo Q.Casal'
      template:
        - conditional_media
        - icon_homepod
    # ECHO POP MARINA
    - type: custom:button-card
      entity: media_player.echo_pop_marina
      name: 'Echo Marina'
      template:
        - conditional_media
        - icon_homepod

