action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Sala
    tag: sala_popup
    size: wide
    # ANTERIOR: --popup-width: 70vw; --popup-max-width: 1020px;
    # Popup era maior que a tela do tablet, cortando VR Pendente.
    # Reduzido width para 65vw e max-width para 920px; adicionado max-height: 88vh
    # para que o popup caiba na viewport do tablet sem scroll.
    style: >
      --popup-width: 55vw;
      --popup-max-width: 850px;
      --popup-background-color: rgba(15, 20, 35, 0.75);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
      --tablet-popup-content-padding: 0.4em 0.6em 0.6em 0.5em;
    card_mod:
      style:
        .: |
          ha-dialog {
            /* ORIGINAL negocjohn: backdrop-filter: blur(5px); */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
          }
          ha-dialog::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(80, 150, 255, 0.12);
          }
        ha-dialog$: |
          .mdc-dialog__container {
            align-items: center !important;
            justify-content: center !important;
          }
          .mdc-dialog__surface {
            /* ANTERIOR: sem width explicito — popup usava tamanho default do browser_mod */
            width: 55vw !important;
            max-width: 850px !important;
            max-height: 88vh !important;
            overflow-y: auto !important;
          }
