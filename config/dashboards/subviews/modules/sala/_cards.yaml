# NOVO (Etapa 3): bloco A/C migrado para padrão custom:button-card
# Shell glass idêntico aos blocos media/spot. custom_fields para title, power,
# temperatura, chips de modo HVAC e botões de ventilação/swing.
- type: custom:button-card
  view_layout:
    grid-area: ac
  entity: climate.sl_ar_condicionado
  show_icon: false
  show_name: false
  show_label: false
  show_state: false
  tap_action:
    action: none
  hold_action: !include ../../../../shared/popup/thermostat.yaml
  triggers_update:
    - climate.sl_ar_condicionado
    - sensor.sl_sensor_temp_humid_temperatura
    - sensor.sl_sensor_temp_humid_umidade
  card_mod:
    style: |
      ha-card {
        background: rgba(255,255,255,0.06) !important;
        backdrop-filter: blur(20px) saturate(1.35) !important;
        -webkit-backdrop-filter: blur(20px) saturate(1.35) !important;
        border: 1px solid rgba(255,255,255,0.10) !important;
        border-radius: 20px !important;
        box-shadow: 0 4px 24px rgba(0,0,0,0.28) !important;
        height: 100% !important;
        overflow: hidden !important;
      }
  styles:
    grid:
      - grid-template-areas: '"title power" "temp temp" "mode mode" "fan fan"'
      - grid-template-columns: 1fr auto
      - grid-template-rows: min-content min-content min-content 1fr
      - column-gap: 12px
      - row-gap: 10px
    card:
      - padding: 16px
      - height: 100%
    custom_fields:
      title:
        - justify-self: start
        - align-self: center
      power:
        - justify-self: end
        - align-self: center
      temp:
        - justify-self: stretch
        - align-self: start
      mode:
        - justify-self: stretch
        - align-self: start
      fan:
        - justify-self: stretch
        - align-self: end
  custom_fields:
    title: >
      [[[
        return `<div style="font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:rgba(255,255,255,0.62);">Ar Condicionado</div>`;
      ]]]
    power:
      card:
        type: custom:button-card
        entity: climate.sl_ar_condicionado
        show_icon: true
        icon: mdi:power
        show_name: false
        show_state: false
        tap_action:
          action: call-service
          service: climate.toggle
          service_data:
            entity_id: climate.sl_ar_condicionado
        styles:
          card:
            - width: 36px
            - height: 36px
            - border-radius: 50%
            - padding: 0
            - background: >
                [[[
                  const s = entity?.state;
                  return s && s !== 'off' && s !== 'unavailable' && s !== 'unknown'
                    ? 'rgba(22,134,190,0.38)'
                    : 'rgba(255,255,255,0.06)';
                ]]]
            - border: >
                [[[
                  const s = entity?.state;
                  return s && s !== 'off' && s !== 'unavailable' && s !== 'unknown'
                    ? '1px solid rgba(104,205,255,0.55)'
                    : '1px solid rgba(255,255,255,0.18)';
                ]]]
          icon:
            - width: 18px
            - height: 18px
            - color: >
                [[[
                  const s = entity?.state;
                  return s && s !== 'off' && s !== 'unavailable' && s !== 'unknown'
                    ? 'rgba(104,205,255,0.95)'
                    : 'rgba(255,255,255,0.45)';
                ]]]
    temp: >
      [[[
        const setpoint = entity?.attributes?.temperature;
        const currentTemp = states['sensor.sl_sensor_temp_humid_temperatura']?.state;
        const humidity = states['sensor.sl_sensor_temp_humid_umidade']?.state;
        const acOn = entity?.state && entity.state !== 'off' && entity.state !== 'unavailable' && entity.state !== 'unknown';
        const setStr = setpoint != null ? `${setpoint}°` : '—';
        const curStr = currentTemp && !['unknown','unavailable'].includes(currentTemp) ? `${currentTemp}°C` : '—';
        const humStr = humidity && !['unknown','unavailable'].includes(humidity) ? `${humidity}%` : '';
        return `<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:2px;">
          <span style="font-size:34px;font-weight:700;line-height:1;color:${acOn ? 'rgba(104,205,255,0.95)' : 'rgba(255,255,255,0.35)'};">${setStr}</span>
          <div style="display:flex;flex-direction:column;gap:2px;">
            <span style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.72);">${curStr}</span>
            ${humStr ? `<span style="font-size:11px;color:rgba(255,255,255,0.40);">${humStr} umidade</span>` : ''}
          </div>
        </div>`;
      ]]]
    mode:
      card:
        type: horizontal-stack
        cards:
          - type: custom:button-card
            entity: climate.sl_ar_condicionado
            name: "OFF"
            show_icon: false
            show_state: false
            tap_action:
              action: call-service
              service: climate.set_hvac_mode
              service_data:
                entity_id: climate.sl_ar_condicionado
                hvac_mode: "off"
            styles:
              card:
                - border-radius: 999px
                - padding: 6px 10px
                - background: >
                    [[[
                      return entity?.state === 'off'
                        ? 'rgba(255,255,255,0.18)'
                        : 'rgba(255,255,255,0.05)';
                    ]]]
                - border: >
                    [[[
                      return entity?.state === 'off'
                        ? '1px solid rgba(255,255,255,0.45)'
                        : '1px solid rgba(255,255,255,0.12)';
                    ]]]
              name:
                - font-size: 12px
                - font-weight: 700
                - color: >
                    [[[
                      return entity?.state === 'off'
                        ? 'rgba(255,255,255,0.95)'
                        : 'rgba(255,255,255,0.40)';
                    ]]]
          - type: custom:button-card
            entity: climate.sl_ar_condicionado
            name: "Cool"
            show_icon: false
            show_state: false
            tap_action:
              action: call-service
              service: climate.set_hvac_mode
              service_data:
                entity_id: climate.sl_ar_condicionado
                hvac_mode: cool
            styles:
              card:
                - border-radius: 999px
                - padding: 6px 10px
                - background: >
                    [[[
                      return entity?.state === 'cool'
                        ? 'rgba(22,134,190,0.38)'
                        : 'rgba(255,255,255,0.05)';
                    ]]]
                - border: >
                    [[[
                      return entity?.state === 'cool'
                        ? '1px solid rgba(104,205,255,0.55)'
                        : '1px solid rgba(255,255,255,0.12)';
                    ]]]
              name:
                - font-size: 12px
                - font-weight: 700
                - color: >
                    [[[
                      return entity?.state === 'cool'
                        ? 'rgba(104,205,255,0.95)'
                        : 'rgba(255,255,255,0.40)';
                    ]]]
          - type: custom:button-card
            entity: climate.sl_ar_condicionado
            name: "Fan"
            show_icon: false
            show_state: false
            tap_action:
              action: call-service
              service: climate.set_hvac_mode
              service_data:
                entity_id: climate.sl_ar_condicionado
                hvac_mode: fan_only
            styles:
              card:
                - border-radius: 999px
                - padding: 6px 10px
                - background: >
                    [[[
                      return entity?.state === 'fan_only'
                        ? 'rgba(22,134,190,0.38)'
                        : 'rgba(255,255,255,0.05)';
                    ]]]
                - border: >
                    [[[
                      return entity?.state === 'fan_only'
                        ? '1px solid rgba(104,205,255,0.55)'
                        : '1px solid rgba(255,255,255,0.12)';
                    ]]]
              name:
                - font-size: 12px
                - font-weight: 700
                - color: >
                    [[[
                      return entity?.state === 'fan_only'
                        ? 'rgba(104,205,255,0.95)'
                        : 'rgba(255,255,255,0.40)';
