# Coluna de cameras — Sala / Varanda
# ANTERIOR: aspect_ratio: 16:9 (cameras muito grandes, causava scroll no popup)
# CORRIGIDO: aspect_ratio: 3:2 (cameras menores para caber no popup sem scroll)
# ANTERIOR: camera_view: live (imagens não apareciam em alguns dispositivos)
# FIX: camera_view: auto — tenta live primeiro, fallback para still image
- type: picture-entity
  # ANTERIOR: entity: camera.sl_camera (entity not found)
  entity: camera.sl_camera_2
  camera_view: auto
  aspect_ratio: 3:2
  show_name: false
  show_state: false
  card_mod:
    style: |
      ha-card {
        margin-bottom: 8px;
      }

- type: picture-entity
  # ANTERIOR: entity: camera.vr_camera (entity not found)
  entity: camera.vr_camera_2
  camera_view: auto
  aspect_ratio: 3:2
  show_name: false
  show_state: false
