#################################################
#                                               #
#    NOVO: SWIPE-CARD MEDIA COM ENTIDADES REAIS #
#                                               #
#    Slide 1: Artwork fullscreen (condicional)  #
#    Slide 2: Grid de botoes dos players        #
#                                               #
#    IMPORTANTE: Os valores de 'state:' nos     #
#    conditional cards devem corresponder ao     #
#    friendly_name EXATO da entidade no HA.     #
#    Se nao corresponderem, ajuste manualmente. #
#                                               #
#################################################

#################################################
#           DESKTOP (min-width: 1441px)         #
#################################################
- type: grid
  title: Media
  view_layout:
    grid-area: media
    show:
      mediaquery: '(min-width: 1441px)'
  columns: 1
  # square: true  # REMOVIDO — square:true no grid externo forcava o container inteiro a ser quadrado, cortando o Slide 2
  cards:
    - type: custom:swipe-card
      parameters: !include ../../shared/snippets/main-grid-swipe-params.yaml
      cards:
        ########## SLIDE 1: ARTWORK FULLSCREEN ##########
        # ORIGINAL COMENTADO — conditional cards dependiam de select.conditional_media
        # cujo estado retornava nomes com whitespace (indentacao do Jinja2 macro),
        # causando match falho e Slide 1 sempre vazio.
        # - type: horizontal-stack
        #   cards:
        #     - type: conditional
        #       conditions:
        #         - entity: select.conditional_media
        #           state: Smart TV Pro 2
        #       card:
        #         type: custom:button-card
        #         entity: media_player.smart_tv_pro_2
        #         ...
        # FIX: Card unico usando media_player.currently_playing (universal media player)
        # que herda automaticamente entity_picture do child ativo.
        # ANTERIOR: usava template conditional_media que continha JavaScript de DOM navigation
        # (this.getRootNode().host) e acesso a entity.attributes.data. Quando
        # media_player.currently_playing esta off/unavailable, o JS lancava excecao
        # causando o erro vermelho de button-card.
        # - type: custom:button-card
        #   entity: media_player.currently_playing
        #   name: ' '
        #   template:
        #     - conditional_media
        #     - progress_bar
        #     - icon_play_pause
        # NOVO: usa template media (mais simples) que exibe artwork sem JS complexo.
        # O template media usa apenas CSS background-image para o artwork e nao
        # acessa entity.attributes.data nem faz navegacao DOM. Quando a entidade
        # esta off/unavailable, as variaveis media_off/entity_picture do base_media
        # retornam graciosamente sem lancar excecoes, exibindo fundo cinza neutro.
        - type: custom:button-card
          entity: media_player.currently_playing
          name: ' '
          template:
            - media
            - progress_bar
            - icon_play_pause
          tap_action:
            action: call-service
            service: media_player.media_play_pause
            service_data:
              entity_id: media_player.currently_playing
            haptic: light
          hold_action:
            action: more-info

        ########## SLIDE 2: GRID DE BOTOES ##########
        # ANTERIOR: sem square: false — aspect-ratio do Slide 1 forcava altura quadrada,
        # cortando os botoes inferiores do grid 2x2.
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:button-card
              entity: media_player.smart_tv_pro_2
              template:
                - base
                - media_premium
                - icon_tv
            # ANTERIOR: icon_homepod causava erro — dependia de variables.vibrant_data
            # (sensor de cores vibrantes que nao existe no setup).
            # - type: custom:button-card
            #   entity: media_player.echo_show
            #   template:
            #     - base
            #     - media_premium
            #     - icon_homepod
            # NOVO: usa icon_tv (genericamente funcional, sem dependencias externas)
            - type: custom:button-card
              entity: media_player.echo_show
              template:
                - base
                - media_premium
                - icon_tv
            - type: custom:button-card
              entity: media_player.spotifyplus_bruno_helasio
              template:
                - base
                - media_premium
                - icon_spotify
            - type: custom:button-card
              entity: media_player.spotify
              template:
                - base
                - media_premium
                - icon_spotify

#################################################
#      TABLET/PHONE (max-width: 1440px)         #
#################################################
- type: grid
  title: Media
  view_layout:
    grid-area: media
    show:
      mediaquery: '(min-height: 463px) and (max-width: 1440px)'
  columns: 1
  cards:
    - type: custom:swipe-card
      parameters: !include ../../shared/snippets/main-grid-swipe-params.yaml
      cards:
        ########## SLIDE 1: ARTWORK FULLSCREEN ##########
        # FIX: Card unico usando media_player.currently_playing
        # ANTERIOR: usava template conditional_media (mesmo problema que Desktop)
        # - type: custom:button-card
        #   entity: media_player.currently_playing
        #   name: ' '
        #   template:
        #     - conditional_media
        #     - progress_bar
        #     - icon_play_pause
        # NOVO: usa template media (mais simples, sem JS de DOM navigation)
        - type: custom:button-card
          entity: media_player.currently_playing
          name: ' '
          template:
            - media
            - progress_bar
            - icon_play_pause
          tap_action:
            action: call-service
            service: media_player.media_play_pause
            service_data:
              entity_id: media_player.currently_playing
            haptic: light
          hold_action:
            action: more-info

        ########## SLIDE 2: GRID DE BOTOES ##########
        # ANTERIOR: sem square: false — botoes inferiores eram cortados
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:button-card
              entity: media_player.smart_tv_pro_2
              template:
                - base
                - media_premium
                - icon_tv
            # ANTERIOR: icon_homepod causava erro — dependia de variables.vibrant_data
            # - type: custom:button-card
            #   entity: media_player.echo_show
            #   template:
            #     - base
            #     - media_premium
            #     - icon_homepod
            # NOVO: usa icon_tv (sem dependencias externas)
            - type: custom:button-card
              entity: media_player.echo_show
              template:
                - base
                - media_premium
                - icon_tv
            - type: custom:button-card
              entity: media_player.spotifyplus_bruno_helasio
              template:
                - base
                - media_premium
                - icon_spotify
            - type: custom:button-card
              entity: media_player.spotify
              template:
                - base
                - media_premium
                - icon_spotify
