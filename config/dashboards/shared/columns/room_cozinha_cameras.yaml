# Coluna de cameras — Cozinha
# Replicado do modelo base: room_living_cameras.yaml (Sala)
# camera_view: auto — tenta live primeiro, fallback para still image
# Cozinha possui 2 cameras: cz_camera + as_camera (area de servico)
- type: picture-entity
  entity: camera.cz_camera
  camera_view: auto
  aspect_ratio: 3:2
  show_name: false
  show_state: false
  card_mod:
    style: |
      ha-card {
        margin-bottom: 8px;
      }

- type: picture-entity
  entity: camera.as_camera
  camera_view: auto
  aspect_ratio: 3:2
  show_name: false
  show_state: false
