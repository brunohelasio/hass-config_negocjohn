#                                               #
#    NOVO: RECONSTRUÍDO DO ZERO — 2026-04-02    #
#                                               #
#    Slide 1: Artwork fullscreen (JS inline)    #
#    Slide 2: Grid 2x2 player buttons           #
#                                               #
#    SEM templates media/conditional_media       #
#    SEM aspect_ratio hacks                      #
#    Background-image via JS direto no card      #
#                                               #
