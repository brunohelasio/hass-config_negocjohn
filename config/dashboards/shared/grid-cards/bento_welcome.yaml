# --- CÓDIGO COMENTADO (v8 — toggle pill iOS) ---
# Substituida por v9: 2 cadeados (trancar + destrancar) por pedido do usuario.
# Razao: slider "Slide to answer" real requer drag gesture complexo, nao
# disponivel como card oficial. Fallback autorizado: 2 botoes de cadeado.
# - type: custom:button-card
#   entity: lock.sl_fechadura_operate_lock
#   ... (toggle pill completo comentado)
# --- FIM CÓDIGO COMENTADO ---

# v9 — Porta Principal com 2 cadeados (trancar / destrancar)
#   - Cadeado 1 (lock): destaca verde quando trancada, pressionavel para trancar
#   - Cadeado 2 (lock-open): destaca laranja quando destrancada, pressionavel para destrancar
#   - Card inteiro sem tap_action (evita double-action). Cada cadeado tem sua
#     propria acao via custom_field com onclick inline.
- type: custom:button-card
  entity: lock.sl_fechadura_operate_lock
  show_name: true
  show_icon: true
  show_label: true
  show_state: false
  icon: mdi:door-closed
  name: "Porta Principal"
  label: >
    [[[
      if (entity.state === 'locked')   return 'Trancada';
      if (entity.state === 'unlocked') return 'Destrancada';
      return entity.state;
    ]]]
  tap_action:
    action: none
  hold_action:
    action: none
  custom_fields:
    lock_buttons: >
      [[[
        var locked = entity.state === 'locked';
        var cardEl = this;
        // IDs unicos para cada cadeado — clique chama hass.callService diretamente
        // via onclick inline (stopPropagation evita acionar o card inteiro).
        var lockActive = locked
          ? 'background:rgba(34,197,94,0.22);border:1px solid rgba(34,197,94,0.60);'
          : 'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);';
        var lockIconColor = locked ? '#22c55e' : 'rgba(255,255,255,0.40)';
        var unlockActive = !locked
          ? 'background:rgba(251,146,60,0.22);border:1px solid rgba(251,146,60,0.60);'
          : 'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);';
        var unlockIconColor = !locked ? '#fb923c' : 'rgba(255,255,255,0.40)';
        var btnBase = 'width:38px;height:38px;border-radius:12px;'
                    + 'display:flex;align-items:center;justify-content:center;'
                    + 'cursor:pointer;transition:all 0.2s;pointer-events:auto;';
        var lockClick = "event.stopPropagation();"
          + "var ev=new Event('hass-call-service',{bubbles:true,composed:true});"
          + "ev.detail={domain:'lock',service:'lock',serviceData:{entity_id:'lock.sl_fechadura_operate_lock'}};"
          + "this.dispatchEvent(ev);";
        var unlockClick = "event.stopPropagation();"
          + "var ev=new Event('hass-call-service',{bubbles:true,composed:true});"
          + "ev.detail={domain:'lock',service:'unlock',serviceData:{entity_id:'lock.sl_fechadura_operate_lock'}};"
          + "this.dispatchEvent(ev);";
        return '<div style="display:flex;gap:6px;">'
             +   '<div onclick="' + lockClick + '" style="' + btnBase + lockActive + '">'
             +     '<ha-icon icon="mdi:lock" style="--mdc-icon-size:20px;color:' + lockIconColor + ';"></ha-icon>'
             +   '</div>'
             +   '<div onclick="' + unlockClick + '" style="' + btnBase + unlockActive + '">'
             +     '<ha-icon icon="mdi:lock-open-variant" style="--mdc-icon-size:20px;color:' + unlockIconColor + ';"></ha-icon>'
             +   '</div>'
             + '</div>';
      ]]]
  state_styles:
    locked:
      icon:
        - color: "rgba(52,211,153,0.80)"
    unlocked:
      icon:
        - color: "rgba(248,113,113,0.80)"
  styles:
    grid:
      - grid-template-areas: '"i n lock_buttons" "i l lock_buttons"'
      - grid-template-columns: "30px 1fr auto"
      - grid-template-rows: "auto auto"
      - column-gap: "10px"
      - align-items: "center"
    card:
      - padding: "8px 14px 8px 18px"
      - cursor: "default"
    name:
      - font-size: "15px"
      - font-weight: "600"
      - color: "rgba(255,255,255,0.92)"
      - text-align: "left"
      - justify-self: "start"
      - align-self: "end"
    label:
      - font-size: "12px"
      - color: "rgba(255,255,255,0.40)"
      - text-align: "left"
      - justify-self: "start"
      - align-self: "start"
    icon:
      - width: "24px"
      - align-self: "center"
    custom_fields:
      lock_buttons:
        - align-self: "center"
        - justify-self: "end"
  card_mod:
    style: |
      ha-card {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        height: auto !important;
      }
      .name, .label { text-align: left !important; }


