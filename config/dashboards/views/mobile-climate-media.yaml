title: Climate/Media
path: mobile-climate-media
icon: mdi:music-circle
subview: false
theme: tablet
type: custom:grid-layout
layout:
  margin: 0
  padding: 0
  grid-gap: 0.9rem
  grid-template-columns: 14px 1fr 14px
  grid-template-rows: fit-content(100%) fit-content(100%) min-content
  grid-template-areas: |
    ". climate ."
    ". media ."
    ". nav ."
cards:
  - type: grid
    title: Climate
    view_layout:
      grid-area: climate
    columns: 1
    square: false
    cards: !include ../shared/grid-cards/climate-status.yaml

  - type: grid
    title: Media
    view_layout:
      grid-area: media
    columns: 1
    cards: !include ../shared/grid-cards/mobile-media.yaml

  - type: custom:mod-card
    view_layout:
      grid-area: nav
    card_mod:
      style: |
        ha-card {
          background: none;
          box-shadow: none;
          border: none;
          min-height: 90px;
        }
    card: !include ../shared/mobile-bottom-nav.yaml
