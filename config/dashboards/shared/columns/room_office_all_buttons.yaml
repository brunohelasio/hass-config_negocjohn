# ══════════════════════════════════════════════════════════════════════════
# LAYOUT 5 COLUNAS — Office (popup)
# Replicado do modelo base: room_living_all_buttons.yaml (Sala)
# Secao 1: Luzes (titulo + toggle all + 3 botoes em 5 colunas)
# Secao 2: Midia & Clima (titulo + MacBook + Spotify + AC + 2 blanks)
#
# Entidades confirmadas:
#   - light.office_switch_3 (Luz central)
#   - light.office_switch_2 (Luz ambiente)
#   - light.office_switch_1 (Luz estante)
#   - Grupo: light.grupo_luzes_office
#   - Camera: camera.of_camera
#   - AC: climate.ac_office
#   - PC: switch.macbook
#   - Spotify: media_player.spotifyplus_bruno_helasio (compartilhado)
# ══════════════════════════════════════════════════════════════════════════

# ── Titulo: Luzes + toggle all lights ──
- type: custom:button-card
  entity: light.grupo_luzes_office
  name: Luzes
  show_state: false
  show_icon: true
  icon: mdi:lightbulb-group-outline
  tap_action:
    action: toggle
    haptic: success
  styles:
    card:
      - background: none
      - box-shadow: none
      - border: none
      - padding: 0 4px
      - height: 30px
      - min-height: 30px
    grid:
      - grid-template-areas: '"n i"'
      - grid-template-columns: 1fr auto
    name:
      - font-size: 11px
      - color: rgba(255,255,255,0.5)
      - text-transform: uppercase
      - letter-spacing: 1.5px
      - justify-self: start
      - font-weight: 500
    img_cell:
      - justify-self: end
      - width: 24px
    icon:
      - width: 24px
      - color: >
          [[[
            return entity.state === 'on' ? '#f0c040' : 'rgba(255,255,255,0.25)';
          ]]]

# ── Linha 1: 3 botoes de iluminacao + 2 blanks ──
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
      }
  cards:
    - type: custom:button-card
      entity: light.office_switch_3
      name: Luz Central
      template:
        - tpl_popup_light
        - icon_light_flush
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.office_switch_2
      name: Luz Ambiente
      template:
        - tpl_popup_light
        - icon_light_flush
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.office_switch_1
      name: Luz Estante
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    # BLANK 1-2 — iguala 3 botoes a grid de 5 colunas
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'

# ── Divisor Glassmorphism ──
- type: custom:button-card
  color_type: blank-card
  styles:
    card:
      - height: 2px
      - margin: 4px 8px
      - background: >-
          linear-gradient(90deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.12) 15%,
          rgba(255,255,255,0.20) 50%,
          rgba(255,255,255,0.12) 85%,
          rgba(255,255,255,0) 100%)
      - backdrop-filter: blur(8px)
      - -webkit-backdrop-filter: blur(8px)
      - border: none
      - box-shadow: 0 0 6px rgba(62, 132, 255, 0.10)
      - border-radius: 2px
      - padding: 0
      - min-height: auto

# ── Titulo: Midia & Clima ──
- type: custom:button-card
  name: "Mídia & Clima"
  show_state: false
  show_icon: false
  tap_action:
    action: none
  styles:
    card:
      - background: none
      - box-shadow: none
      - border: none
      - padding: 0 4px
      - height: 30px
      - min-height: 30px
    grid:
      - grid-template-areas: '"n"'
      - grid-template-columns: 1fr
    name:
      - font-size: 11px
      - color: rgba(255,255,255,0.5)
      - text-transform: uppercase
      - letter-spacing: 1.5px
      - justify-self: start
      - font-weight: 500

# ── Linha 3: MacBook + Spotify + AC + 2 blanks ──
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
      }
  cards:
    # MACBOOK — switch.macbook (PC no lugar da TV)
    - type: custom:button-card
      entity: switch.macbook
      name: MacBook
      template:
        - base
      icon: mdi:laptop
      show_icon: true
      tap_action:
        action: toggle
        haptic: success
      double_tap_action:
        action: more-info
    # SPOTIFY — compartilhado, mesma entidade em todos os comodos
    - type: custom:button-card
      entity: media_player.spotifyplus_bruno_helasio
      name: Spotify
      template:
        - base
        - circle
        - loader
        - icon_spotify_color
      state_display: >
        [[[
          return entity && entity.state === 'off' ? ' ' : null;
        ]]]
      variables:
        state_on: >
          [[[ return entity && ['on', 'idle', 'playing', 'paused', 'standby'].indexOf(entity.state) !== -1; ]]]
        circle_input: >
          [[[
            if (entity && entity.attributes.volume_level !== undefined) {
              let volume = Math.round(entity.attributes.volume_level * 100)
              return volume === 0 && entity.state !== 'off'
                ? 1
                : volume
            }
          ]]]
        circle_input_unit: '%'
      tap_action:
        action: perform-action
        perform_action: media_player.media_play_pause
        target:
          entity_id: media_player.spotifyplus_bruno_helasio
        haptic: success
      double_tap_action:
        action: more-info
      hold_action: !include ../popup/media_spotify.yaml
    # AR CONDICIONADO — Office tem AC
    - type: custom:button-card
      entity: climate.ac_office
      name: Ar Cond.
      template:
        - base
        - icon_climate
      show_icon: false
      variables:
        state_on: >
          [[[ return entity && ['cool', 'fan_only', 'dry', 'heat', 'heat_cool', 'auto'].indexOf(entity.state) !== -1; ]]]
      styles:
        card:
          - background-color: >
              [[[
                if (entity && ['cool', 'fan_only', 'dry', 'heat', 'heat_cool', 'auto'].includes(entity.state)) {
                  return 'rgba(250, 250, 250, 0.75)';
                }
                return 'rgba(115, 115, 115, 0.2)';
              ]]]
          - color: >
              [[[
                if (entity && ['cool', 'fan_only', 'dry', 'heat', 'heat_cool', 'auto'].includes(entity.state)) {
                  return '#4b5254';
                }
                return '#97989c';
              ]]]
      tap_action:
        action: perform-action
        perform_action: climate.toggle
        target:
          entity_id: climate.ac_office
        haptic: success
      double_tap_action:
        action: more-info
      hold_action:
        action: more-info
    # BLANK 1-2
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'
