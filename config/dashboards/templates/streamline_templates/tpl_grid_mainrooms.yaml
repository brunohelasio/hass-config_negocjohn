  # LIVING ROOM GRID
grid_living_room:
  card:
    type: custom:button-card
    # entity: light.living_room_group
    entity: light.grupo_luzes_sala
    # entity: light.sala_switch_2
    name: Sala
    # triggers_update com sensor.time para atualizar o timer de tempo no state_display
    # (mostra "1 light · 2h" etc). Necessario para atualizacao periodica a cada minuto.
    # Inclui sensor.living_room_active para re-renderizar quando contagem de luzes muda.
    # ANTERIOR: triggers_update: sensor.time
    triggers_update:
      - sensor.time
      - sensor.living_room_active
    double_tap_action: !include ../../shared/popup/rooms/livingroom.yaml
    # double_tap_action:
    #   action: fire-dom-event
    #   browser_mod:
    #     service: popup
    #     data:
    #       title: Sala
    #       content:
    #         type: markdown
    #         content: |
    #           ## Popup de teste (Lounge)
    #           Se abriu no duplo toque, a ação está funcionando.
    #           Próximo passo: recolocar o conteúdo completo do `livingroom.yaml`.
    # hold_action: !include ../../shared/honeycomb/living.yaml
    # hold_action:
    #   action: none
    hold_action: !include ../../shared/popup/rooms/livingroom.yaml
    template:
      - rooms_base
      # REMOVIDO: circle nao faz parte do comportamento original do botao principal.
      # Mantido apenas nos botoes de luz do popup (Luz Principal) e midia (TV/Spotify).
      # - circle
      - icon_couch_lamp
      - motion
      - ac_status
      - media_status
      # REMOVIDO: lights_status (icone de lampada) — retirado a pedido do usuario.
      # O status de luzes continua visivel no state_display (ex: "2 lights · 1h").
      # - lights_status
    variables:
      # light_entity: light.living_room_group
      light_entity: light.sala_switch_2
      # ORIGINAL: active: sensor.living_room_active (vazio)
      active: sensor.living_room_active
      # Motion: vazio ate o sensor de presenca chegar.
      # Quando instalar o sensor, trocar por: motion: binary_sensor.motion_sala
      # O template motion tem protecao interna e nao quebra com string vazia.
      motion: ''
      # AC da sala
      ac_entity: climate.sl_ar_condicionado_2
      # TV/Media da sala
      media_entity: media_player.smart_tv_pro_2
      # REMOVIDO: circle_input nao e mais necessario no botao principal (sem circle).
      # circle_input: >
      #   [[[
      #     if (entity && entity.state === 'on') {
      #       const brightness = entity.attributes.brightness;
      #       return brightness != null
      #         ? Math.round(brightness / 2.54)
      #         : 100;
      #     }
      #     return ' ';
      #   ]]]
      # circle_input_unit: '%'
    # REMOVIDO: card_mod para esconder circle nao e mais necessario (circle removido).
    # card_mod:
    #   style: |
    #     #circle {
    #     {%- if not is_state('light.grupo_luzes_sala', 'on') -%}
    #       display:none !important;
    #     {% endif %}
    #     }

