type: custom:stack-in-card
view_layout:
  grid-area: energy
card_mod:
  style: |
    :host {
      height: 100% !important;
    }

    ha-card {
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: space-between !important;
      position: relative !important;

      background: linear-gradient(160deg, rgba(96,165,250,0.22), rgba(59,130,246,0.08)) !important;
      backdrop-filter: blur(20px) saturate(1.35) !important;
      -webkit-backdrop-filter: blur(20px) saturate(1.35) !important;
      border: 1px solid rgba(147,197,253,0.34) !important;
      box-shadow: 0 0 32px rgba(59,130,246,0.12), inset 0 1px 0 rgba(191,219,254,0.15), 0 8px 32px rgba(0,0,0,0.2) !important;

      border-radius: 18px !important;
      overflow: hidden !important;

      --ha-card-glass-tint: transparent !important;
      --ha-card-backdrop-filter: none !important;
      --ha-card-glass-inset-shadow: none !important;
      --ha-card-background: transparent !important;
      --ha-card-border-width: 0 !important;
    }

    ha-card::before {
      display: none !important;
    }

    ha-card::after {
      content: '' !important;
      position: absolute !important;
      left: 0 !important;
      bottom: 0 !important;
      height: 86px !important;
      width: calc(100% + 14px) !important;
      margin-left: -7px !important;
      pointer-events: none !important;
      z-index: 1 !important;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 360 90' preserveAspectRatio='none'><defs><linearGradient id='line' x1='0' y1='0' x2='1' y2='0'><stop offset='0%25' stop-color='%236FB8FF'/><stop offset='100%25' stop-color='%2382D6FF'/></linearGradient></defs><path d='M0 58 C28 54, 36 36, 58 34 C80 32, 88 56, 110 58 C134 60, 146 22, 170 20 C196 18, 206 50, 228 52 C252 54, 268 34, 294 28 C322 22, 338 26, 360 24' fill='none' stroke='url(%23line)' stroke-width='4' stroke-linecap='round'/></svg>") !important;
      background-size: 100% 100% !important;
      background-repeat: no-repeat !important;
    }

cards: !include ../../shared/grid-cards/bento_energy.yaml
