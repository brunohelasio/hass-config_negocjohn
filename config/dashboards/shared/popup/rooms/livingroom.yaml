    # Removido porque o tema tablet.yaml agora tem uix-dialog com --ha-dialog-width-md
    # que le --popup-width do style: e dimensiona o popup nativamente via HA.
    # O blur, scrim, centering e glow agora sao gerenciados pelo uix-dialog do tema.
