#################################################
#                                               #
#    MEDIA GRID v2 — 2026-04-05                 #
#                                               #
#    Slide 1: Artwork fullscreen via            #
#             sensor.media_focus_visuals        #
#    Slide 2: Grid 2x2 com tap_action que       #
#             define o player em foco           #
#                                               #
#    SEM media_player.currently_playing         #
#    SEM group.conditional_media                #
#    SEM group.device_players                   #
#    input_select como unica fonte de verdade   #
#                                               #
#################################################

#################################################
#           DESKTOP (min-width: 1441px)         #
#################################################
- type: grid
  title: Media
  view_layout:
    grid-area: media
    show:
      mediaquery: '(min-width: 1441px)'
  columns: 1
  cards:
    - type: custom:swipe-card
      parameters:
        pagination:
          type: bullets
          clickable: true
        roundLengths: true
        effect: slide
        speed: 600
        spaceBetween: 12
        threshold: 7
        autoHeight: false
        observer: true
        followFinger: true
        grabCursor: true
      cards:
        ########## SLIDE 1: ARTWORK + CONTROL BAR ##########
        - !include ../../shared/snippets/media-slide-focus.yaml

        ########## SLIDE 2: GRID 2x2 ##########
        - type: grid
          columns: 2
          square: false
          cards:
            # Slot 1: Smart TV
            - type: custom:button-card
              entity: media_player.android_tv_192_168_3_17
              template:
                - base
                - media_premium
                - icon_tv
              tap_action:
                action: call-service
                service: input_select.select_option
                service_data:
                  entity_id: input_select.media_focus_player
                  option: media_player.android_tv_192_168_3_17
                haptic: light
              hold_action:
                action: fire-dom-event
                browser_mod:
                  service: browser_mod.popup
                  data: !include ../../shared/popup/media_all_players.yaml

            # Slot 2: Echo Show
            - type: custom:button-card
              entity: media_player.echo_show
              template:
                - base
                - media_premium
                - icon_tv
              tap_action:
                action: call-service
                service: input_select.select_option
                service_data:
                  entity_id: input_select.media_focus_player
                  option: media_player.echo_show
                haptic: light
              hold_action:
                action: fire-dom-event
                browser_mod:
                  service: browser_mod.popup
                  data: !include ../../shared/popup/media_all_players.yaml
              # Esconde duplicidade DE MODO SEGURO (preserva o template nativo se retornar undefined)
              styles:
                card:
                  - background-image: >
                      [[[
                        if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                          return 'none !important';
                        }
                        return undefined;
                      ]]]
                custom_fields:
                  artwork:
                    - display: >
                        [[[
                          if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                            return 'none !important';
                          }
                          return undefined;
                        ]]]

            # Slot 3: Spotify
            - type: custom:button-card
              entity: media_player.spotifyplus_bruno_helasio
              template:
                - base
                - media_premium
                - icon_spotify
              tap_action:
                action: call-service
                service: input_select.select_option
                service_data:
                  entity_id: input_select.media_focus_player
                  option: media_player.spotifyplus_bruno_helasio
                haptic: light
              hold_action:
                action: fire-dom-event
                browser_mod:
                  service: browser_mod.popup
                  data: !include ../../shared/popup/media_all_players.yaml

            # Slot 4: Echo Pop Office
            - type: custom:button-card
              entity: media_player.echo_pop_office
              template:
                - base
                - media_premium
                - icon_tv
              tap_action:
                action: call-service
                service: input_select.select_option
                service_data:
                  entity_id: input_select.media_focus_player
                  option: media_player.echo_pop_office
                haptic: light
              hold_action:
                action: fire-dom-event
                browser_mod:
                  service: browser_mod.popup
                  data: !include ../../shared/popup/media_all_players.yaml
              # Esconde duplicidade DE MODO SEGURO (preserva o template nativo se retornar undefined)
              styles:
                card:
                  - background-image: >
                      [[[
                        if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                          return 'none !important';
                        }
                        return undefined;
                      ]]]
                custom_fields:
                  artwork:
                    - display: >
                        [[[
                          if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                            return 'none !important';
                          }
                          return undefined;
                        ]]]

- type: conditional
  conditions:
    - condition: screen
      media_query: '(max-width: 800px) and (min-height: 463px)'
    - condition: state
      entity: input_select.mobile_dashboard_tab
      state: clima_midia
  card:
    type: grid
    title: Media
    view_layout:
      grid-area: media
    columns: 1
    cards:
      - type: custom:swipe-card
        parameters:
          pagination:
            type: bullets
            clickable: true
          roundLengths: true
          effect: slide
          speed: 600
          spaceBetween: 12
          threshold: 7
          autoHeight: false
          observer: true
          followFinger: true
          grabCursor: true
        cards:
          - type: custom:button-card
            entity: input_select.media_focus_player
            name: ' '
            show_icon: false
            show_state: true
            show_name: false
            aspect_ratio: 1/1
            triggers_update:
              - input_select.media_focus_player
              - media_player.android_tv_192_168_3_17
              - media_player.echo_show
              - media_player.spotifyplus_bruno_helasio
              - media_player.echo_pop_office
            tap_action:
              action: call-service
              service: script.media_focus_play_pause
              haptic: light
            hold_action:
              action: more-info
            state_display: >
              [[[
                try {
                  const focusId = states['input_select.media_focus_player'].state;
                  const player = states[focusId];
                  if (player && player.state === 'playing') {
                    const title = player.attributes.media_title || '';
                    const artist = player.attributes.media_artist || '';
                    return artist ? artist + ' — ' + title : title;
                  }
                } catch(e) {}
                return '';
              ]]]
            custom_fields:
              artwork: >
                [[[
                  try {
                    const focusId = states['input_select.media_focus_player'].state;
                    const player = states[focusId];
                    const pic = player?.attributes?.entity_picture;
                    if (pic) {
                      return '<img src="' + pic
                        + '" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;" />';
                    }
                  } catch(e) {}
                  return '';
                ]]]
            styles:
              card:
                - border-radius: 5%
                - overflow: hidden
                - padding: 0
                - background-color: rgba(115, 115, 115, 0.2)
                - background-size: cover
                - background-position: center
                - background-repeat: no-repeat
              custom_fields:
                artwork:
                  - position: absolute
                  - top: 0
                  - left: 0
                  - width: 100%
                  - height: 100%
                  - z-index: 0
              state:
                - position: absolute
                - bottom: 8%
                - left: 5%
                - right: 5%
                - font-size: 0.9em
                - color: rgba(255,255,255,0.9)
                - text-shadow: 1px 1px 3px rgba(0,0,0,0.8)
                - white-space: nowrap
                - overflow: hidden
                - text-overflow: ellipsis
                - z-index: 1
              name:
                - display: none
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                entity: media_player.android_tv_192_168_3_17
                template:
                  - base
                  - media_premium
                  - icon_tv
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.media_focus_player
                    option: media_player.android_tv_192_168_3_17
                  haptic: light
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data: !include ../../shared/popup/media_all_players.yaml
              - type: custom:button-card
                entity: media_player.echo_show
                template:
                  - base
                  - media_premium
                  - icon_tv
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.media_focus_player
                    option: media_player.echo_show
                  haptic: light
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data: !include ../../shared/popup/media_all_players.yaml
              - type: custom:button-card
                entity: media_player.spotifyplus_bruno_helasio
                template:
                  - base
                  - media_premium
                  - icon_spotify
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.media_focus_player
                    option: media_player.spotifyplus_bruno_helasio
                  haptic: light
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data: !include ../../shared/popup/media_all_players.yaml
              - type: custom:button-card
                entity: media_player.echo_pop_office
                template:
                  - base
                  - media_premium
                  - icon_tv
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.media_focus_player
                    option: media_player.echo_pop_office
                  haptic: light
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data: !include ../../shared/popup/media_all_players.yaml

