          const onE = e.filter(id => ['playing','paused','on'].includes(states[id]?.state ?? ''));
          const exp = states['input_select.hemma_expanded_row']?.state || 'none';
          const chips = onE.map(id => ({
            id,
            name: states[id]?.attributes?.friendly_name || id,
