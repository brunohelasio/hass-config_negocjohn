type: custom:layout-card
layout_type: custom:grid-layout
view_layout:
  grid-area: top_badges
layout:
  grid-template-columns: max-content max-content max-content minmax(0, 1fr) max-content
  align-items: center
  grid-gap: 8px
  margin: 0
  padding: 0 4px
  width: 100%
card_mod:
  style:
    .: |
      :host { width: 100% !important; }
      ha-card {
        background: transparent !important;
        box-shadow: none !important;
        border: none !important;
        padding: 0 !important;
        width: 100% !important;
      }
    $: |
      .card-content { padding: 0 !important; margin: 0 !important; }

cards:
  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    tap_action: { action: none }
    hold_action: { action: none }
    triggers_update:
      - light.sala_switch_1
      - light.sala_switch_2
      - light.cozinha_switch_1
      - light.cozinha_switch_2
      - light.lavabo_switch_1
      - light.corredor_switch_1
      - light.quarto_miguel_switch_1
      - light.quarto_miguel_switch_2
    variables:
      s: >
        [[[
          const e = ['light.sala_switch_1','light.sala_switch_2','light.cozinha_switch_1','light.cozinha_switch_2','light.lavabo_switch_1','light.corredor_switch_1','light.quarto_miguel_switch_1','light.quarto_miguel_switch_2'];
          const on = e.filter(id => states[id]?.state === 'on').length;
          return { is_on: on > 0, sub: on === 0 ? 'All Off' : on === e.length ? 'All On' : `${on} On` };
        ]]]
    custom_fields:
      badge: >
        [[[
          const sub = variables?.s?.sub || 'All Off';
          return `<div class="badge-row">
            <ha-icon class="badge-icon" icon="mdi:lightbulb" style="color:#f7c600"></ha-icon>
            <div class="badge-texts">
              <div class="badge-title">Lights</div>
              <div class="badge-sub">${sub}</div>
            </div>
          </div>`;
        ]]]
    extra_styles: &badge_css |
      .badge-row {
        display: grid;
        grid-template-columns: 18px auto;
        align-items: center;
        column-gap: 8px;
        min-width: 72px;
      }
      .badge-icon {
        --mdc-icon-size: 15px;
        justify-self: center;
        align-self: center;
      }
      .badge-texts {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        line-height: 1.08;
        gap: 2px;
      }
      .badge-title {
        font-size: 10px;
        font-weight: 600;
        color: var(--badge-title-color, rgba(255,255,255,0.92));
      }
      .badge-sub {
        font-size: 11px;
        font-weight: 600;
        color: var(--badge-sub-color, rgba(255,255,255,0.72));
      }
    styles: &badge_visual
      card:
        - width: max-content
        - height: 48px
        - border-radius: 999px
        - padding: 0 12px
        - background: >
            [[[
              return variables?.s?.is_on ? 'rgba(255,255,255,0.90)' : 'rgba(36,33,30,0.82)';
            ]]]
        - border: >
            [[[
              return variables?.s?.is_on ? '1px solid rgba(255,255,255,0.42)' : '1px solid rgba(255,255,255,0.12)';
            ]]]
        - box-shadow: none
        - --badge-title-color: >
            [[[
              return variables?.s?.is_on ? 'rgba(0,0,0,0.86)' : 'rgba(255,255,255,0.92)';
            ]]]
        - --badge-sub-color: >
            [[[
              return variables?.s?.is_on ? 'rgba(0,0,0,0.58)' : 'rgba(255,255,255,0.72)';
            ]]]
      custom_fields:
        badge: [display: flex, align-items: center, height: 100%]
      grid: [grid-template-areas: '"badge"', grid-template-columns: 1fr, grid-template-rows: 1fr]

  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    tap_action: { action: none }
    hold_action: { action: none }
    triggers_update:
      - media_player.smart_tv_pro_2
      - media_player.spotifyplus_bruno_helasio
      - media_player.echo_show
    variables:
      s: >
        [[[
          const e = ['media_player.smart_tv_pro_2','media_player.spotifyplus_bruno_helasio','media_player.echo_show'];
          const on = e.filter(id => ['playing','paused','on'].includes(states[id]?.state ?? '')).length;
          return { is_on: on > 0, sub: on === 0 ? 'All Off' : `${on} On` };
        ]]]
    custom_fields:
      badge: >
        [[[
          const sub = variables?.s?.sub || 'All Off';
          return `<div class="badge-row">
            <ha-icon class="badge-icon" icon="mdi:speaker-wireless" style="color:#9aa0a6"></ha-icon>
            <div class="badge-texts">
              <div class="badge-title">Media</div>
              <div class="badge-sub">${sub}</div>
            </div>
          </div>`;
        ]]]
    extra_styles: *badge_css
    styles: *badge_visual

  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    tap_action: { action: none }
    hold_action: { action: none }
    triggers_update:
      - climate.sl_ar_condicionado
      - climate.ac_office
      - climate.ac_quarto_miguel
    variables:
      s: >
        [[[
          const e = ['climate.sl_ar_condicionado','climate.ac_office','climate.ac_quarto_miguel'];
          const on = e.filter(id => !['off','unavailable','unknown',''].includes(states[id]?.state ?? 'unknown')).length;
          return { is_on: on > 0, sub: on === 0 ? 'Off' : `${on} On` };
        ]]]
    custom_fields:
      badge: >
        [[[
          const sub = variables?.s?.sub || 'Off';
          return `<div class="badge-row">
            <ha-icon class="badge-icon" icon="mdi:fan" style="color:#56d89b"></ha-icon>
            <div class="badge-texts">
              <div class="badge-title">Climate</div>
              <div class="badge-sub">${sub}</div>
            </div>
          </div>`;
        ]]]
    extra_styles: *badge_css
    styles: *badge_visual

  - type: custom:button-card
    show_name: false
    show_state: false
    show_icon: false
    tap_action: { action: none }
    hold_action: { action: none }
    styles:
      card: [background: transparent, border: none, box-shadow: none, width: 1px, height: 1px, padding: 0]

  - type: custom:button-card
    view_layout:
      justify-self: end
    entity: person.bruno_helasio
    show_name: false
    show_state: false
    show_icon: false
    tap_action: { action: none }
    hold_action: { action: none }
    triggers_update:
      - person.bruno_helasio
    custom_fields:
      avatar: >
        [[[
          const pic = entity?.attributes?.entity_picture || '';
          return pic
            ? '<img src="' + pic + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>'
            : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;background:rgba(255,255,255,0.15);border-radius:50%;">B</div>';
        ]]]
    styles:
      card:
        - width: 40px
        - height: 40px
        - border-radius: 50%
        - background: rgba(255,255,255,0.12)
        - border: 1px solid rgba(255,255,255,0.24)
        - padding: 0
        - box-shadow: none
      custom_fields:
        avatar: [width: 100%, height: 100%, overflow: hidden, border-radius: 50%]
      grid: [grid-template-areas: '"avatar"', grid-template-columns: 1fr, grid-template-rows: 1fr]
