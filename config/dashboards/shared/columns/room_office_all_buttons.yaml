# ══════════════════════════════════════════════════════════════════════════
# LAYOUT 5 COLUNAS — Office (popup)
# Replicado do modelo base: room_living_all_buttons.yaml (Sala)
# Secao 1: Luzes (titulo + toggle all + 3 botoes em 5 colunas)
# Secao 2: Midia & Clima (titulo + MacBook + Spotify + AC + 2 blanks)
#
# Entidades confirmadas:
#   - light.office_switch_3 (Luz central)
#   - light.office_switch_2 (Luz ambiente)
#   - light.office_switch_1 (Luz estante)
#   - Grupo: light.grupo_luzes_office
#   - Camera: camera.of_camera
#   - AC: climate.ac_office
#   - PC: switch.macbook
#   - Spotify: media_player.spotifyplus_bruno_helasio (compartilhado)
# ══════════════════════════════════════════════════════════════════════════

# ── Titulo: Luzes + toggle all lights ──
# FIX C4.1: Adicionado indicador visual ON/OFF (custom_field)
- type: custom:button-card
  entity: light.grupo_luzes_office
  triggers_update:
    - light.grupo_luzes_office
  name: Luzes
  show_state: false
  show_icon: true
  icon: mdi:lightbulb-group-outline
  tap_action:
    action: toggle
    haptic: success
  # ANTERIOR: custom_fields com JS template para ON/OFF badge (nao atualizava em browser_mod popup)
  # FIX: state: section nativa do button-card com HTML estatico — mais reativo
  custom_fields:
    on_off: |
      <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:8px;margin-right:4px">OFF</span>
  state:
    - value: 'on'
      custom_fields:
        on_off: |
          <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:#fff;background:#3b82f6;padding:1px 6px;border-radius:8px;margin-right:4px">ON</span>
      styles:
        icon:
          - color: '#f0c040'
    - value: 'off'
      custom_fields:
        on_off: |
          <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:8px;margin-right:4px">OFF</span>
      styles:
        icon:
          - color: 'rgba(255,255,255,0.25)'
  styles:
    card:
      - background: none
      - box-shadow: none
      - border: none
      - padding: 0 4px
      - height: 30px
      - min-height: 30px
    grid:
      - grid-template-areas: '"n on_off i"'
      - grid-template-columns: 1fr auto auto
    name:
      - font-size: 11px
      - color: rgba(255,255,255,0.5)
      - text-transform: uppercase
      - letter-spacing: 1.5px
      - justify-self: start
      - font-weight: 500
    custom_fields:
      on_off:
        - justify-self: end
        - align-self: center
    img_cell:
      - justify-self: end
      - width: 24px
    icon:
      - width: 24px
      - color: 'rgba(255,255,255,0.25)'

