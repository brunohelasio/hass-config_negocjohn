# ── NOVO: Linha 1 com 5 colunas — 3 luzes + 2 blanks (mesma estrutura da Sala) ──
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
      }
  cards:
    - type: custom:button-card
      entity: light.office_switch_3
      name: "OF - Luz central"
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.office_switch_2
      name: "OF - Luz ambiente"
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.office_switch_1
      name: "OF - Luz estante"
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    # BLANK 1-2
    - type: custom:button-card
      color_type: blank-card
    - type: custom:button-card
      color_type: blank-card

# ── Divisor Glassmorphism ──
- type: custom:button-card
  color_type: blank-card
  styles:
    card:
      - height: 2px
      - margin: 4px 8px
      - background: >-
          linear-gradient(90deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.12) 15%,
          rgba(255,255,255,0.20) 50%,
          rgba(255,255,255,0.12) 85%,
          rgba(255,255,255,0) 100%)
      - backdrop-filter: blur(8px)
      - -webkit-backdrop-filter: blur(8px)
      - border: none
      - box-shadow: 0 0 6px rgba(62, 132, 255, 0.10)
      - border-radius: 2px
      - padding: 0
      - min-height: auto

# ── Titulo: Midia & Clima ──
