#             border: 0 !important;
#             background-color: transparent !important;
#           }
# --- FIM CÓDIGO ORIGINAL ---
# NOVO: custom:spotifyplus-card (thlucas1/spotifyplus_card)
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Spotify — Office
    tag: spotify_office
    style: >
      --popup-max-width: min(500px, 90vw);
    card_mod: !include ../snippets/style_popup_complete.yaml
    content:
      type: custom:spotifyplus-card
      entity_id: media_player.spotifyplus_bruno_helasio
      playerDefaultDeviceName: Echo Pop Office
      card_mod:
        style: |
          ha-card {
            --ha-card-border-width: 0;
            background: transparent;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 12px;
          }
