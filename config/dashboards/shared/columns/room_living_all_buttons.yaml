# ══════════════════════════════════════════════════════════════════════════
# LAYOUT 5 COLUNAS — Sala (popup)
# Secao 1: Luzes (titulo + toggle all + 7 botoes em 5 colunas)
# Secao 2: Midia & Clima (titulo + temperatura + 6 botoes em 5 colunas)
# ══════════════════════════════════════════════════════════════════════════

# ── Titulo: Luzes + toggle all lights ──
# FIX C4.1: Adicionado indicador visual ON/OFF (custom_field)
- type: custom:button-card
  entity: light.grupo_luzes_sala
  name: Luzes
  show_state: false
  show_icon: true
  icon: mdi:lightbulb-group-outline
  tap_action:
    action: toggle
    haptic: success
  custom_fields:
    on_off: >
      [[[
        const isOn = entity.state === 'on';
        const color = isOn ? '#3b82f6' : 'rgba(255,255,255,0.2)';
        const text = isOn ? 'ON' : 'OFF';
        return `<span style="
          font-size: 9px;
          font-weight: 600;
          letter-spacing: 0.5px;
          color: ${isOn ? '#fff' : 'rgba(255,255,255,0.4)'};
          background: ${color};
          padding: 1px 6px;
          border-radius: 8px;
          margin-right: 4px;
        ">${text}</span>`;
      ]]]
  styles:
    card:
      - background: none
      - box-shadow: none
      - border: none
      - padding: 0 4px
      - height: 30px
      - min-height: 30px
    grid:
      - grid-template-areas: '"n on_off i"'
      - grid-template-columns: 1fr auto auto
    name:
      - font-size: 11px
      - color: rgba(255,255,255,0.5)
      - text-transform: uppercase
      - letter-spacing: 1.5px
      - justify-self: start
      - font-weight: 500
    custom_fields:
      on_off:
        - justify-self: end
        - align-self: center
    img_cell:
      - justify-self: end
      - width: 24px
    icon:
      - width: 24px
      - color: >
          [[[
            return entity.state === 'on' ? '#f0c040' : 'rgba(255,255,255,0.25)';
          ]]]

# ── Linha 1: 5 botoes de iluminacao ──
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
        grid-template-columns: repeat(5, 98px) !important;
      }
  cards:
    - type: custom:button-card
      entity: light.sala_switch_2
      name: Luz Principal
      template:
        - tpl_popup_light
        - circle
        - icon_light_flush
      tap_action:
        action: toggle
        haptic: success
      variables:
        circle_input: >
          [[[
            if (entity && entity.state === 'on') {
              const brightness = entity.attributes.brightness;
              return brightness != null
                ? Math.round(brightness / 2.54)
                : 100;
            }
            return ' ';
          ]]]
        circle_input_unit: '%'
    - type: custom:button-card
      entity: light.sala_switch_1
      name: LED Direito
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.sala_switch_3
      name: LED Esquerdo
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.sala_2_switch_2
      name: VR Principal
      template:
        - tpl_popup_light
        - icon_light_flush
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.sala_2_switch_3
      name: VR Cristaleira
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success

# ── Linha 2: 2 botoes de iluminacao varanda + 3 blanks ──
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
        grid-template-columns: repeat(5, 98px) !important;
      }
  cards:
    - type: custom:button-card
      entity: light.varanda_switch_1
      name: VR Gourmet
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.varanda_switch_2
      name: VR Pendente
      template:
        - tpl_popup_light
        - icon_pendant
      tap_action:
        action: toggle
        haptic: success
    # BLANK 1-3 — iguala 2 botoes a grid de 5 colunas
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'

# ── Divisor Glassmorphism ──
- type: custom:button-card
  color_type: blank-card
  styles:
    card:
      - height: 2px
      - margin: 4px 8px
      - background: >-
          linear-gradient(90deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.12) 15%,
          rgba(255,255,255,0.20) 50%,
          rgba(255,255,255,0.12) 85%,
          rgba(255,255,255,0) 100%)
      - backdrop-filter: blur(8px)
      - -webkit-backdrop-filter: blur(8px)
      - border: none
      - box-shadow: 0 0 6px rgba(62, 132, 255, 0.10)
      - border-radius: 2px
      - padding: 0
      - min-height: auto

# ── Titulo: Midia & Clima + temperatura ──
- type: custom:button-card
  entity: sensor.sl_sensor_temp_humid_temperatura
  name: "Mídia & Clima"
  show_state: true
  show_icon: false
  tap_action:
    action: none
  state_display: >
    [[[
      if (entity && entity.state && entity.state !== 'unavailable') {
        return entity.state + '°C';
      }
      return '';
    ]]]
  styles:
    card:
      - background: none
      - box-shadow: none
      - border: none
      - padding: 0 4px
      - height: 30px
      - min-height: 30px
    grid:
      - grid-template-areas: '"n s"'
      - grid-template-columns: 1fr auto
    name:
      - font-size: 11px
      - color: rgba(255,255,255,0.5)
      - text-transform: uppercase
      - letter-spacing: 1.5px
      - justify-self: start
      - font-weight: 500
    state:
      - font-size: 11px
      - color: rgba(255,255,255,0.35)
      - justify-self: end

# ── Linha 3: 4 botoes de midia + 1 blank ──
# ANTERIOR: 5 botoes (TV, Spotify, PS5, Pioneer, Cortina) — Cortina movida para linha 4 (clima)
# Para restaurar: mover Cortina de volta para ca e remover o blank card abaixo
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
        grid-template-columns: repeat(5, 98px) !important;
      }
  cards:
    # TV — usa template mediaplayer (original ngocjohn)
    - type: custom:button-card
      entity: media_player.smart_tv_pro_2
      name: Smart TV
      template:
        - mediaplayer
      tap_action:
        action: toggle
        haptic: success
      double_tap_action:
        action: more-info
      hold_action: !include ../popup/rooms/smart_tv_remote.yaml
    # SPOTIFY — entity = spotifyplus_bruno_helasio (integracao SpotifyPlus)
    # RESTAURADO: templates originais com icon_spotify_color (barras saltando).
    # state_display e state_on restaurados do mediaplayer pattern.
    # ANTERIOR: usava icon_spotify (hybrid verde, entity_picture bg, state_display PT-BR) — desativado.
    - type: custom:button-card
      entity: media_player.spotifyplus_bruno_helasio
      name: Spotify
      template:
        - base
        - circle
        - loader
        - icon_spotify_color
        # - icon_spotify
      state_display: >
        [[[
          return entity && entity.state === 'off' ? ' ' : null;
        ]]]
      variables:
        state_on: >
          [[[ return entity && ['on', 'idle', 'playing', 'paused', 'standby'].indexOf(entity.state) !== -1; ]]]
        circle_input: >
          [[[
            if (entity && entity.attributes.volume_level !== undefined) {
              let volume = Math.round(entity.attributes.volume_level * 100)
              return volume === 0 && entity.state !== 'off'
                ? 1
                : volume
            }
          ]]]
        circle_input_unit: '%'
      tap_action:
        action: perform-action
        perform_action: media_player.media_play_pause
        target:
          entity_id: media_player.spotifyplus_bruno_helasio
        haptic: success
      double_tap_action:
        action: more-info
      hold_action: !include ../popup/media_spotify.yaml
    # PS5
    - type: custom:button-card
      name: PS5
      template:
        - base
        - icon_playstation
      show_icon: false
      tap_action:
        action: none
      hold_action:
        action: none
      double_tap_action:
        action: none
      styles:
        card:
          - opacity: "0.45"
          - cursor: "default"
    # PIONEER — SVG inline de receiver
    - type: custom:button-card
      name: Pioneer
      template:
        - base
      show_icon: false
      tap_action:
        action: none
      hold_action:
        action: none
      double_tap_action:
        action: none
      styles:
        card:
          - opacity: "0.45"
          - cursor: "default"
        custom_fields:
          icon:
            - width: 80%
            - fill: '#9da0a2'
      custom_fields:
        icon: >
          <svg viewBox="0 0 50 50">
            <rect x="1" y="10" width="48" height="30" rx="2.5"/>
            <rect x="5" y="14" width="22" height="10" rx="1.5" fill="#202628" opacity="0.9"/>
            <circle cx="39" cy="19" r="5" fill="#202628" opacity="0.9"/>
            <rect x="5" y="28" width="40" height="1.5" rx=".75" opacity=".3"/>
            <rect x="5" y="31.5" width="40" height="1.5" rx=".75" opacity=".3"/>
            <rect x="5" y="35" width="40" height="1.5" rx=".75" opacity=".3"/>
          </svg>
    # BLANK — iguala 4 botoes a grid de 5 colunas (posicao anterior da Cortina)
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'

# ── Linha 4: 2 botoes de clima + 3 blanks ──
