# ── NOVO: Linha 1 com 3 colunas e botoes padrao 98px ──
- type: grid
  columns: 3
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
        grid-template-columns: repeat(3, 98px) !important;
      }
  cards:
    - type: custom:button-card
      entity: light.cozinha_switch_2
      name: Luz Principal 1
      template:
        - tpl_popup_light
        - icon_light_flush
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.cozinha_switch_3
      name: Luz Principal 2
      template:
        - tpl_popup_light
        - icon_light_flush
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.cozinha_switch_1
      name: Área Serviço
      template:
        - tpl_popup_light
        - icon_light_flush
      tap_action:
        action: toggle
        haptic: success

# ── Divisor Glassmorphism ──
- type: custom:button-card
  color_type: blank-card
  styles:
    card:
      - height: 2px
      - margin: 4px 8px
      - background: >-
          linear-gradient(90deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.12) 15%,
          rgba(255,255,255,0.20) 50%,
          rgba(255,255,255,0.12) 85%,
          rgba(255,255,255,0) 100%)
      - backdrop-filter: blur(8px)
      - -webkit-backdrop-filter: blur(8px)
      - border: none
      - box-shadow: 0 0 6px rgba(62, 132, 255, 0.10)
      - border-radius: 2px
      - padding: 0
      - min-height: auto

# ── Titulo: Eletrodomésticos ──
- type: custom:button-card
  name: "Eletrodomésticos"
  show_state: false
  show_icon: false
  tap_action:
    action: none
  styles:
    card:
      - background: none
      - box-shadow: none
      - border: none
      - padding: 0 4px
      - height: 30px
      - min-height: 30px
    grid:
      - grid-template-areas: '"n"'
      - grid-template-columns: 1fr
    name:
      - font-size: 11px
      - color: rgba(255,255,255,0.5)
      - text-transform: uppercase
      - letter-spacing: 1.5px
      - justify-self: start
      - font-weight: 500

