- type: vertical-stack
  view_layout:
    grid-area: cams
  card_mod:
    style: |
      .: |
        #root {
          gap: 0 !important;
        }
        #root > * {
          margin: 0 !important;
        }
  cards:
    - type: custom:button-card
      show_icon: false
      show_name: false
      show_label: false
      show_state: false
      tap_action:
        action: none
      card_mod:
        style: |
          ha-card {
            background: linear-gradient(180deg, rgba(15,20,35,0.78) 0%, rgba(20,24,33,0.88) 100%) !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            border-radius: 20px !important;
            box-shadow: 0 0 24px rgba(62,132,255,0.18), 0 0 60px rgba(62,132,255,0.10) !important;
            height: 100% !important;
            overflow: hidden !important;
          }
      styles:
        grid:
          - grid-template-areas: |
              "eyebrow live"
              "title live"
              "cam_main cam_main"
          - grid-template-columns: 1fr auto
          - grid-template-rows: min-content min-content minmax(120px, 1fr)
          - row-gap: 8px
          - column-gap: 8px
        card:
          - padding: 12px
          - height: 100%
        custom_fields:
          eyebrow:
            - justify-self: start
            - align-self: start
          title:
            - justify-self: start
            - align-self: start
          live:
            - justify-self: end
            - align-self: start
          cam_main:
            - align-self: stretch
            - min-height: 0
      custom_fields:
        eyebrow: >
          [[[
            return `<div style="font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:rgba(255,255,255,0.55);">Câmeras</div>`;
          ]]]
        title: >
          [[[
            return `<div style="font-size:20px;font-weight:700;line-height:1.1;color:rgba(255,255,255,0.96);">Sala e varanda</div>`;
          ]]]
        live:
          card:
            type: custom:button-card
            name: Live
            show_icon: false
            styles:
              card:
                - padding: 8px 12px
                - border-radius: 999px
                - background: rgba(12,90,132,0.42)
                - border: 1px solid rgba(102,211,255,0.45)
              name:
                - color: rgba(255,255,255,0.95)
                - font-size: 14px
                - font-weight: 700
        cam_main:
          card:
            type: vertical-stack
            # ETAPA 2: card_mod adicionado para fixar altura e evitar salto ao alternar câmera.
            # Sem isso, o vertical-stack encolhe para altura zero quando o conditional inativo
            # colapsa, causando um salto visual no layout.
            # ORIGINAL: sem card_mod (altura seguia o conditional ativo — causava salto)
            card_mod:
              style: |
                .: |
                  #root {
                    height: 100% !important;
                    min-height: 180px;
                  }
                  #root > * {
                    height: 100% !important;
                    flex: 1 !important;
                  }
            cards:
              - type: conditional
                conditions:
                  - entity: input_select.bento_active_camera
                    state: camera.sl_camera_2
                card:
                  type: picture-elements
                  camera_image: camera.sl_camera_2
                  camera_view: live
                  elements:
                    - type: image
                      entity: camera.sl_camera_2
                      camera_image: camera.sl_camera_2
                      camera_view: live
                      style:
                        left: 50%
                        top: 50%
                        width: 100%
                        transform: translate(-50%, -50%)
                      tap_action:
                        action: more-info
                    - type: image
                      entity: camera.vr_camera_2
                      camera_image: camera.vr_camera_2
                      camera_view: live
                      style:
                        right: 12px
                        bottom: 12px
                        width: 32%
                        transform: none
                        border-radius: 10px
                        border: 1px solid rgba(255,255,255,0.35)
                        box-shadow: 0 6px 14px rgba(0,0,0,0.45)
                        z-index: 3
                      tap_action:
                        action: call-service
                        service: input_select.select_option
                        service_data:
                          entity_id: input_select.bento_active_camera
                          option: camera.vr_camera_2
                  card_mod:
                    style: |
                      ha-card {
                        border-radius: 16px !important;
                        overflow: hidden !important;
                        border: 1px solid rgba(255,255,255,0.12) !important;
                        height: 100% !important;
                      }
              - type: conditional
                conditions:
                  - entity: input_select.bento_active_camera
                    state: camera.vr_camera_2
                card:
                  type: picture-elements
                  camera_image: camera.vr_camera_2
                  camera_view: live
                  elements:
                    - type: image
                      entity: camera.vr_camera_2
                      camera_image: camera.vr_camera_2
                      camera_view: live
                      style:
                        left: 50%
                        top: 50%
                        width: 100%
                        transform: translate(-50%, -50%)
