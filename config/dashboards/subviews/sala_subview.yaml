# ─────────────────────────────────────────────────────────────────────────────
# SUBVIEW — Sala de Estar
# Etapa 1 / Estrutura base com 6 blocos placeholder
# v2: placeholders sem JavaScript (custom:button-card com nome/label estáticos)
#     para garantir renderização imediata sem spinner.
#
# Próximas etapas (aguardam autorização):
#   Etapa 2 → Bloco 1 Hero + Bloco 2 Luzes
#   Etapa 3 → Bloco 3 A/C (thermostat nativo)
#   Etapa 4 → Bloco 4 Câmeras
#   Etapa 5 → Bloco 5 TV e Mídia
#   Etapa 6 → Bloco 6 Spotify
#   Etapa 7 → já registrado em ui-lovelace-main.yaml
#   Etapa 8 → já configurado double_tap_action em bento_sala.yaml
# ─────────────────────────────────────────────────────────────────────────────

title: Sala de Estar
path: subview-sala
icon: mdi:sofa
subview: true
theme: tablet
type: custom:grid-layout

card_mod:
  style: |
    hui-grid-layout {
      height: 100vh !important;
      background: linear-gradient(140deg, #0b1623 0%, #132035 55%, #0b1e30 100%);
      padding-bottom: 8px;
      box-sizing: border-box;
    }

layout:
  margin: 0
  padding: 12px
  grid-gap: 10px
  grid-template-columns: repeat(12, minmax(0, 1fr))
  grid-template-rows: 44vh 42vh
  grid-template-areas: |
    "hero hero hero hero hero lights lights lights lights ac ac ac"
    "cams cams cams cams media media media media spot spot spot spot"

  mediaquery:
    '(max-width: 800px)':
      padding: 8px
      grid-gap: 8px
      grid-template-columns: 1fr
      grid-template-rows: repeat(6, min-content)
      grid-template-areas: |
        "hero"
        "lights"
        "ac"
        "cams"
        "media"
        "spot"

    '(min-width: 801px) and (max-width: 1440px) and (orientation: portrait)':
      grid-template-columns: repeat(2, minmax(0, 1fr))
      grid-template-rows: repeat(3, min-content)
      grid-template-areas: |
        "hero lights"
        "ac cams"
        "media spot"

cards:

  # ── BLOCO 1: Hero ───────────────────────────────────────────────────────────
  - type: custom:button-card
    view_layout:
      grid-area: hero
    entity: light.grupo_luzes_sala
    name: Hero
    label: "Imagem · Pills de status · Cortina"
    show_icon: false
    show_name: true
    show_label: true
    show_state: false
    tap_action:
      action: none
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.06) !important;
          backdrop-filter: blur(20px) saturate(1.35) !important;
          -webkit-backdrop-filter: blur(20px) saturate(1.35) !important;
          border: 1px solid rgba(255,255,255,0.10) !important;
          border-radius: 20px !important;
          box-shadow: 0 4px 24px rgba(0,0,0,0.28) !important;
          height: 100% !important;
          overflow: hidden !important;
        }
    styles:
      card:
        - padding: 20px
        - justify-content: flex-end
        - align-items: flex-start
        - flex-direction: column
      name:
        - color: rgba(255,255,255,0.90)
        - font-size: 22px
        - font-weight: "700"
        - justify-self: start
      label:
        - color: rgba(255,255,255,0.35)
        - font-size: 12px
        - justify-self: start

