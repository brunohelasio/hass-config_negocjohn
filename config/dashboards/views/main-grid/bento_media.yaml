type: custom:stack-in-card
view_layout:
  grid-area: media
card_mod:
  style: |
    :host {
      height: 100% !important;
    }

    ha-card {
      /* Mantém dimensões originais do bloco Bento */
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: stretch !important;

      background: transparent !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      overflow: visible !important;

      /* 3. O SEU Vidro Perfeito */
      background: linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04)) !important;
      backdrop-filter: blur(18px) saturate(1.2) !important;
      -webkit-backdrop-filter: blur(18px) saturate(1.2) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;

      /* 4. Força o arredondamento e IMPEDE que o conteúdo vaze e deixe quadrado */
      border-radius: 18px !important;
      overflow: hidden !important;

      /* 5. Desliga a interferência do tema nos filhos */
      --ha-card-glass-tint: transparent !important;
      --ha-card-backdrop-filter: none !important;
      --ha-card-glass-inset-shadow: none !important;
      --ha-card-background: transparent !important;
      --ha-card-border-width: 0 !important;
    }

    ha-card::before {
      display: none !important;
    }
cards: !include ../../shared/grid-cards/bento_media.yaml
