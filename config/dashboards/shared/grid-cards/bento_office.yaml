- type: custom:layout-card
  layout_type: custom:grid-layout
  layout:
    grid-template-columns: repeat(3, minmax(0, 1fr))
    grid-template-rows: repeat(2, minmax(160px, 1fr))
    grid-gap: 10px
  card_mod:
    style: |
      ha-card {
        background: transparent !important;
        box-shadow: none !important;
        border: none !important;
        padding: 0 !important;
      }
  cards:
    - &office_tile
      type: markdown
      content: "## 🍽️ Cozinha\n2 luzes"
      card_mod:
        # --- CÓDIGO ORIGINAL COMENTADO (frosted glass unilateral, border-radius 0) ---
        # style: |
        #   ha-card {
        #     background: linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
        #     backdrop-filter: blur(18px) saturate(1.2);
        #     -webkit-backdrop-filter: blur(18px) saturate(1.2);
        #     border-right: 1px solid rgba(255,255,255,0.08);
        #     border-radius: 0;
        #     border-top: none;
        #     border-bottom: none;
        #     border-left: none;
        #     box-shadow: none;
        #     height: 100%;
        #     overflow: hidden;
        #     aspect-ratio: unset;
        #     padding: 0;
        #   }
        # --- FIM CÓDIGO ORIGINAL ---
        style: |
          ha-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            height: 100%;
            overflow: hidden;
            aspect-ratio: unset;
            padding: 0;
          }
    - <<: *office_tile
      content: "## 🛁 Lavabo\nApagado"
    - <<: *office_tile
      content: "## 🚪 Corredor\n3 luzes"
    - <<: *office_tile
      content: "## 🛏️ Q. Casal\nApagado"
    - <<: *office_tile
      content: "## 🛏️ Q. Marina\n1 luz"
    - <<: *office_tile
      content: "## 🛏️ Q. Miguel\nApagado"
