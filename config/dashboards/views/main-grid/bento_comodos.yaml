type: custom:layout-card
layout_type: custom:grid-layout
view_layout:
  grid-area: comodos
layout:
  grid-template-columns: 1fr
  grid-template-rows: 1fr
  margin: 0
  padding: 0
card_mod:
  style: |
    :host { 
      height: 100% !important; 
      display: block !important; /* A PEÇA CHAVE PARA DESTRAVAR A ALTURA DO LAYOUT-CARD */
    }
    #root { 
      height: 100% !important; 
    }
    #root > * { 
      height: 100% !important; 
    }
cards:
  - !include ../../shared/grid-cards/bento_comodos_matriz.yaml