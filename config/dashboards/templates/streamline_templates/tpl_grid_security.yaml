# FRONT DOOR (lock.sl_fechadura_operate_lock)
grid_front_door:
  card:
    type: custom:button-card
    # entity: lock.nuki_neklanka_byt_lock  # entidade antiga
    entity: lock.sl_fechadura_operate_lock
    name: Front door
    tap_action:
      action: block
    template:
      - front_door
      - icon_lock
      - loader

# CAMERAS (abre popup com 8 cameras do apartamento)
# FIX: usa icon_cctv do tpl_icons.yaml (SVG do repositorio) em vez de mdi:cctv
grid_cameras_button:
  card:
    type: custom:button-card
    name: Cameras
    tap_action: !include ../../shared/popup/cameras_user.yaml
    hold_action:
      action: none
    template:
      - base
      - icon_cctv
    show_icon: false
    variables:
      state_on: false

# DOORS (placeholder — sem sensores de porta ainda)
# FIX: usa icon_contact_sensor do tpl_icons.yaml em vez de mdi:door
grid_contact_sensors:
  card:
    type: custom:button-card
    name: Doors
    tap_action:
      action: none
    hold_action:
      action: none
    template:
      - base
      - icon_contact_sensor
    show_icon: false
    variables:
      state_on: false
    styles:
      card:
        - opacity: '0.45'
        - cursor: default

# SENSORS (placeholder — sem sensores de presenca ainda)
# FIX: usa icon_motion do tpl_icons.yaml em vez de mdi:motion-sensor
grid_motion_sensors:
  card:
    type: custom:button-card
    name: Sensors
    tap_action:
      action: none
    hold_action:
      action: none
    template:
      - base
      - icon_motion
    show_icon: false
    variables:
      state_on: false
    styles:
      card:
        - opacity: '0.45'
        - cursor: default
