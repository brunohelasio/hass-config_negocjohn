#################################################
#                                               #
#                     SECURITY                  #
#                                               #
#################################################
- type: grid
  title: Security
  view_layout:
    grid-area: security
    show:
      mediaquery: '(min-width: 801px) and (min-height: 463px)'
  columns: 2
  cards: !include ../../shared/grid-cards/security-status.yaml

- type: conditional
  view_layout:
    grid-area: security
  conditions:
    - condition: screen
      media_query: '(max-width: 800px) and (min-height: 463px)'
    - condition: state
      entity: input_select.mobile_dashboard_tab
      state: home
  card:
    type: grid
    title: Security
    columns: 2
    cards: !include ../../shared/grid-cards/security-status.yaml
