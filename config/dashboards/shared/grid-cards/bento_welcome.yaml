# ═══════════════════════════════════════════════════════════════════
#  BENTO WELCOME — Conteúdo interno
#  Arquivo: config/dashboards/shared/grid-cards/bento_welcome.yaml
#
#  Incluído por: views/main-grid/bento_welcome.yaml (container stack-in-card)
#
#  Estrutura (espelha o React WelcomeCard):
#    Seção 1 — Saudação (data + nome)
#    Seção 2 — Portas (2 locks com estado)
#    Seção 3 — Clima (temp + previsão horária)
#
#  Dependências:
#    • card_mod        (já em uso no seu setup)
#    • custom:button-card
#    • Entidade: weather.casa  (ou equivalente)
#    • Entidades: lock.porta_principal, lock.porta_servico
# ═══════════════════════════════════════════════════════════════════

# ── SEÇÃO 1: Saudação ─────────────────────────────────────────────
# Renderiza:  "QUARTA, 15 ABR"   (label pequeno)
#             "Boa tarde, Bruno" (título)
#
# Tradução React:
#   <div style={{...label, fontSize:"9px"}}>Quarta, 15 Abr</div>
#   <div style={{fontSize:"17px", fontWeight:"700"}}>Boa tarde, Bruno</div>
# ─────────────────────────────────────────────────────────────────

- type: custom:button-card
  entity: ""
  show_name: false
  show_icon: false
  show_state: false

  # Jinja: dia da semana + data + saudação por hora
  label: >
    [[[
      const now = new Date();
      const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
      const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      const diaSemana = dias[now.getDay()].toUpperCase();
      const dia = now.getDate();
      const mes = meses[now.getMonth()].toUpperCase();
      const hora = now.getHours();
      const saudacao = hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';
      return `<span style="font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.44);font-weight:600;display:block;margin-bottom:6px;">${diaSemana}, ${dia} ${mes}</span><span style="font-size:17px;font-weight:700;line-height:1.12;">${saudacao}, Bruno</span>`;
    ]]]
  show_label: true

  card_mod:
    style: |
      ha-card {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 14px 18px 0 !important;
        height: auto !important;
      }
      .label {
        text-align: left;
        line-height: 1.3;
      }

# ── SEÇÃO 2: Portas ───────────────────────────────────────────────
# Renderiza 2 linhas:
#   🔒  Porta Principal    [mini-slider]
#   🔒  Porta Serviço      [mini-slider]
#
# Tradução React:
#   locks.map({ label, locked, icon: DoorClosed }) →
#     <span>icon + nome</span> + <MiniSlider on={locked} />
#
# No HA: cada lock é um button-card com estado trancado/aberto
#   - icon muda via state_styles
#   - pseudo-elemento ::after simula o mini-slider via card_mod
# ─────────────────────────────────────────────────────────────────

- type: horizontal-stack
  cards:

    # Porta Principal
    - type: custom:button-card
      entity: lock.sl_fechadura_operate_lock
      show_name: true
      name: "Porta Principal"
      show_icon: true
      icon: mdi:door-closed-lock
      show_state: false

      # Mini-slider iOS: thumb branco que desliza
      # posição left:26px = locked, left:2px = unlocked
      card_mod:
        style: |
          ha-card {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 4px 18px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            height: auto !important;
          }

          /* Container do slider (criado via ::after do card) */
          ha-card::after {
            content: '';
            display: block;
            width: 48px;
            height: 24px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.08) 100%);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow:
              inset 0 1px 0 rgba(255,255,255,0.14),
              inset 0 -1px 0 rgba(255,255,255,0.03);
            position: relative;
            flex-shrink: 0;
          }

          /* Thumb branco do slider */
          /* Posição controlada por variável CSS --thumb-x */
          ha-card::before {
            content: '';
            position: absolute;
            right: 20px;   /* Posição fixa; ver nota abaixo sobre estado */
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(229,231,235,0.96));
            border: 1px solid rgba(255,255,255,0.36);
            box-shadow: 0 2px 5px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.8);
            z-index: 2;
          }

      styles:
        card:
          - padding: "4px 18px"
          - flex-direction: "row"
          - align-items: "center"
          - justify-content: "space-between"
        name:
          - font-size: "12px"
          - color: "rgba(255,255,255,0.92)"
          - font-weight: "500"
        icon:
          - color: "rgba(255,255,255,0.72)"
          - width: "13px"

      # Estado do lock muda cor do icon
      state_styles:
        locked:
          icon:
            - color: "rgba(52,211,153,0.9)"   # verde = trancado
        unlocked:
          icon:
            - color: "rgba(248,113,113,0.9)"  # vermelho = aberto

      tap_action:
        action: toggle

    # Porta Serviço
    - type: custom:button-card
      entity: lock.porta_servico      # <-- ajustar
      show_name: true
      name: "Porta Serviço"
      show_icon: true
      icon: mdi:door-closed-lock
      show_state: false

      card_mod:
        style: |
          ha-card {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 4px 18px !important;
            height: auto !important;
          }
          ha-card::after {
            content: '';
            display: block;
            width: 48px;
            height: 24px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.08) 100%);
            border: 1px solid rgba(255,255,255,0.12);
            flex-shrink: 0;
          }
          ha-card::before {
            content: '';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(229,231,235,0.96));
            border: 1px solid rgba(255,255,255,0.36);
            box-shadow: 0 2px 5px rgba(0,0,0,0.22);
            z-index: 2;
          }

      styles:
        card:
          - padding: "4px 18px"
          - flex-direction: "row"
          - align-items: "center"
          - justify-content: "space-between"
        name:
          - font-size: "12px"
          - color: "rgba(255,255,255,0.92)"
          - font-weight: "500"
        icon:
          - color: "rgba(255,255,255,0.72)"
          - width: "13px"

      state_styles:
        locked:
          icon:
            - color: "rgba(52,211,153,0.9)"
        unlocked:
          icon:
            - color: "rgba(248,113,113,0.9)"

      tap_action:
        action: toggle

# ── SEÇÃO 3: Clima ────────────────────────────────────────────────
# Renderiza:
#   "23° / 28°"  (temp atual / máxima)
#   "Northwest, 24 km/h"
#   Curva SVG decorativa (estática — impossível dinâmica sem apexcharts)
#   Previsão horária: 5 slots (hora + ícone + temp)
#
# Tradução React:
#   <span style={{fontSize:"36px", fontWeight:"300"}}>23°</span>
#   <span style={{opacity:.52}}> / 28°</span>
#   <svg>...curva de temperatura...</svg>
#   forecast.map({time, temp, icon}) → div col por slot
#
# No HA: button-card com custom_fields para cada slot horário
#   + curva SVG estática embutida como custom_field
#   + dados puxados de weather.casa via JS template
# ─────────────────────────────────────────────────────────────────

- type: custom:button-card
  entity: weather.casa                # <-- ajustar (sua entidade de clima)
  show_name: false
  show_icon: false
  show_state: false

  custom_fields:

    # Temperatura principal + wind
    temp_header:
      card:
        type: custom:button-card
        entity: weather.forecast_casa
        show_name: false
        show_icon: false
        show_state: false
        label: >
          [[[
            const t = entity.attributes.temperature;
            const tMax = entity.attributes.forecast?.[0]?.temperature ?? '—';
            const wind = entity.attributes.wind_speed ?? '—';
            const windDir = entity.attributes.wind_bearing_text ?? entity.attributes.wind_bearing ?? '';
            return `<div style="display:flex;align-items:flex-start;gap:4px;">
              <span style="font-size:36px;font-weight:300;line-height:0.95;">${t}°</span>
              <span style="font-size:15px;color:rgba(255,255,255,.52);padding-top:9px;">/ ${tMax}°</span>
            </div>
            <div style="font-size:9px;color:rgba(255,255,255,.42);margin-top:2px;">${windDir}, ${wind} km/h</div>`;
          ]]]
        show_label: true
        styles:
          card:
            - background: "transparent"
            - border: "none"
            - box-shadow: "none"
            - padding: "0"
            - height: "auto"
          label:
            - text-align: "left"

    # Curva SVG decorativa estática
    # (representa graficamente a progressão de temp ao longo do dia)
    # Para curva dinâmica: substituir por custom:apexcharts-card
    curva_svg:
      card:
        type: custom:button-card
        entity: ""
        show_name: false
        show_icon: false
        label: >
          [[[
            return `<svg viewBox="0 0 280 50" width="100%" height="100%"
              preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="wfill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
                  <stop offset="100%" stop-color="rgba(255,255,255,0.01)"/>
                </linearGradient>
              </defs>
              <path d="M0 35 C20 36,38 34,56 31 C76 27,94 29,112 23
                       C132 17,150 9,168 4 C188 0,204 3,220 9
                       C238 15,252 23,268 31 C272 33,276 35,280 37
                       L280 50 L0 50 Z"
                    fill="url(#wfill)"/>
              <path d="M0 35 C20 36,38 34,56 31 C76 27,94 29,112 23
                       C132 17,150 9,168 4 C188 0,204 3,220 9
                       C238 15,252 23,268 31 C272 33,276 35,280 37"
                    fill="none" stroke="#f59e0b" stroke-width="2"
                    stroke-linecap="round"/>
            </svg>`;
          ]]]
        show_label: true
        styles:
          card:
            - background: "transparent"
            - border: "none"
            - box-shadow: "none"
            - padding: "0"
            - height: "50px"
            - overflow: "visible"
          label:
            - width: "100%"
            - height: "50px"
            - padding: "0"

    # Previsão horária — 5 slots
    # Cada slot: hora + ícone MDI + temperatura
    # Puxado do forecast[0..4] da entidade weather
    forecast_row:
      card:
        type: custom:button-card
        entity: weather.casa          # <-- ajustar
        show_name: false
        show_icon: false
        show_state: false
        label: >
          [[[
            const fc = entity.attributes.forecast ?? [];
            // Mapeia condition → ícone MDI simples
            const iconMap = {
              'sunny': '☀️', 'clear-night': '🌙',
              'partlycloudy': '⛅', 'cloudy': '☁️',
              'rainy': '🌧️', 'pouring': '🌧️',
              'snowy': '❄️', 'windy': '💨',
              'fog': '🌫️', 'hail': '🌨️',
              'lightning': '⚡', 'lightning-rainy': '⛈️',
            };
            const slots = fc.slice(0, 5).map(f => {
              const d = new Date(f.datetime);
              const hora = d.getHours().toString().padStart(2,'0') + ':00';
              const icon = iconMap[f.condition] ?? '🌤️';
              const temp = Math.round(f.temperature);
              return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <span style="font-size:13px;">${icon}</span>
                <span style="font-size:11px;font-weight:700;">${temp}°</span>
                <span style="font-size:8px;color:rgba(255,255,255,.44);">${hora}</span>
              </div>`;
            });
            return `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:100%;">${slots.join('')}</div>`;
          ]]]
        show_label: true
        styles:
          card:
            - background: "transparent"
            - border: "none"
            - box-shadow: "none"
            - padding: "0"
            - height: "auto"
          label:
            - width: "100%"
            - text-align: "left"

  # Layout interno: header topo + curva + previsão na base
  # Espelha o gridTemplateRows: "auto minmax(0,1fr)" do React
  card_mod:
    style: |
      ha-card {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 8px 0 0 !important;
        height: 100% !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: flex-end !important;
        overflow: hidden !important;
      }

  styles:
    card:
      - padding: "8px 18px 12px"
      - display: "flex"
      - flex-direction: "column"
      - gap: "4px"
      - justify-content: "flex-end"
      - flex: "1"
    custom_fields:
      temp_header:
        - padding: "0"
        - margin-bottom: "4px"
      curva_svg:
        - margin: "4px -18px 0"   # sangra até as bordas do card
        - width: "calc(100% + 36px)"
      forecast_row:
        - padding: "8px 0 0"
