# NOVO: Cameras do apartamento do usuario (WiFi)
# 4 cameras: Sala, Varanda, Cozinha, Area de Servico
# Grid: camera_view: auto (polling, nao live) — melhor para cameras WiFi no grid principal
# Hold_action: abre popup cameras_user.yaml (todas as 8 cameras)

# CAM SALA
grid_cam_sala:
  card:
    type: custom:button-card
    entity: camera.sl_camera_2
    name: ' '
    hold_action: !include ../../shared/popup/cameras_user.yaml
    template:
      - camera
      - loader
    styles:
      card:
        - background-position: center

