- type: custom:swipe-card
  parameters:
    pagination:
      type: bullets
      clickable: true
    roundLengths: true
    effect: slide
    speed: 600
    spaceBetween: 12
    threshold: 7
    autoHeight: false
    observer: true
    followFinger: true
    grabCursor: true
  cards:
    - type: custom:button-card
      entity: input_select.media_focus_player
      name: ' '
      show_icon: false
      show_state: true
      show_name: false
      aspect_ratio: 1/1
      triggers_update:
        - input_select.media_focus_player
        - media_player.android_tv_192_168_3_17
        - media_player.echo_show
        - media_player.spotifyplus_bruno_helasio
        - media_player.echo_pop_office
      tap_action:
        action: call-service
        service: script.media_focus_play_pause
        haptic: light
      hold_action:
        action: more-info
      state_display: >
        [[[
          try {
            const focusId = states['input_select.media_focus_player'].state;
            const player = states[focusId];
            if (player && player.state === 'playing') {
              const title = player.attributes.media_title || '';
              const artist = player.attributes.media_artist || '';
              return artist ? artist + ' — ' + title : title;
            }
          } catch(e) {}
          return '';
        ]]]
      custom_fields:
        artwork: >
          [[[
            try {
              const focusId = states['input_select.media_focus_player'].state;
              const player = states[focusId];
              const pic = player?.attributes?.entity_picture;
              if (pic) {
                return '<img src="' + pic
                  + '" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;" />';
              }
            } catch(e) {}
            return '';
          ]]]
      styles:
        card:
          - border-radius: 5%
          - overflow: hidden
          - padding: 0
          - background-color: rgba(115, 115, 115, 0.2)
          - background-size: cover
          - background-position: center
          - background-repeat: no-repeat
        custom_fields:
          artwork:
            - position: absolute
            - top: 0
            - left: 0
            - width: 100%
            - height: 100%
            - z-index: 0
        state:
          - position: absolute
          - bottom: 8%
          - left: 5%
          - right: 5%
          - font-size: 0.9em
          - color: rgba(255,255,255,0.9)
          - text-shadow: 1px 1px 3px rgba(0,0,0,0.8)
          - white-space: nowrap
          - overflow: hidden
          - text-overflow: ellipsis
          - z-index: 1
        name:
          - display: none

    - type: grid
      columns: 2
      square: false
      cards:
        - type: custom:button-card
          entity: media_player.android_tv_192_168_3_17
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.android_tv_192_168_3_17
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml

        - type: custom:button-card
          entity: media_player.echo_show
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.echo_show
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml

        - type: custom:button-card
          entity: media_player.spotifyplus_bruno_helasio
          template:
            - base
            - media_premium
            - icon_spotify
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.spotifyplus_bruno_helasio
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml

        - type: custom:button-card
          entity: media_player.echo_pop_office
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.echo_pop_office
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml
