            aspect_ratio: '16:9'
            name: "⬅ Toque na imagem para voltar à Grelha"
            show_name: true
            show_state: false
            tap_action:
              action: call-service
              service: input_text.set_value
              data:
                entity_id: input_text.camera_selecionada
                value: 'grid'
            card_mod:
              style: |
                ha-card { background: rgba(0,0,0,0.5) !important; border-radius: 24px !important; border: 1px solid rgba(255,255,255,0.15) !important; overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,0.6) !important; margin: 0 auto; max-width: 90%; cursor: pointer; }

