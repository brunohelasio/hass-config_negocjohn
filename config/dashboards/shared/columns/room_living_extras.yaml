# Coluna de midia e clima — Sala
# UNIFICADO: todos os 8 botoes (7 + blank) em um unico grid para igualar
# espacamento vertical com a coluna de luzes (que tambem e um unico grid).
# O divisor foi removido — ele quebrava a coluna em 3 cards separados
# e causava gaps diferentes entre as rows.
# CORRIGIDO: square: true (era false — causava espacamento diferente da col luzes)
- type: grid
  columns: 2
  square: true
  cards:
    # ── Midia ──
    # TV — ORIGINAL: SVG inline placeholder (desativado)
    # - type: custom:button-card
