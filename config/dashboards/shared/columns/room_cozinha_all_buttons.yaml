# ══════════════════════════════════════════════════════════════════════════
# LAYOUT 5 COLUNAS — Cozinha (popup)
# Replicado do modelo base: room_living_all_buttons.yaml (Sala)
# Secao 1: Luzes (titulo + toggle all + 3 botoes em 5 colunas)
# Secao 2: Eletrodomesticos (titulo + 3 placeholders + 2 blanks)
#
# Entidades confirmadas:
#   - light.cozinha_switch_2 (Luz principal 1)
#   - light.cozinha_switch_3 (Luz principal 2)
#   - light.cozinha_switch_1 (Area de servico)
#   - Camera: camera.cz_camera + camera.as_camera
#   - Eletrodomesticos: placeholders (airfryer, lava-louca, lava-roupa)
# ══════════════════════════════════════════════════════════════════════════

# ── Titulo: Luzes + toggle all lights ──
- type: custom:button-card
  entity: light.grupo_luzes_cozinha
  name: Luzes
  show_state: false
  show_icon: true
  icon: mdi:lightbulb-group-outline
  tap_action:
    action: toggle
    haptic: success
  styles:
    card:
      - background: none
      - box-shadow: none
      - border: none
      - padding: 0 4px
      - height: 30px
      - min-height: 30px
    grid:
      - grid-template-areas: '"n i"'
      - grid-template-columns: 1fr auto
    name:
      - font-size: 11px
      - color: rgba(255,255,255,0.5)
      - text-transform: uppercase
      - letter-spacing: 1.5px
      - justify-self: start
      - font-weight: 500
    img_cell:
      - justify-self: end
      - width: 24px
    icon:
      - width: 24px
      - color: >
          [[[
            return entity.state === 'on' ? '#f0c040' : 'rgba(255,255,255,0.25)';
          ]]]

