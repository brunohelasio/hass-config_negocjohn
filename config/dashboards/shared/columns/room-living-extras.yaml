# Previous version kept for reference:
# - used plain mdi icons to bypass template dependency issues.
# - now restored to tpl_icons-based placeholders (without entity-bound templates that crash).

- type: grid
  columns: 2
  square: true
  cards:
    - type: custom:button-card
      name: Smart TV
      template:
        - base
        - icon_shieldtv
      show_icon: false
      tap_action: { action: none }
      hold_action: { action: none }
      double_tap_action: { action: none }
      styles:
        card:
          - opacity: '0.60'
          - cursor: default

    - type: custom:button-card
      name: Spotify
      template:
        - base
        - icon_spotify
      show_icon: false
      tap_action: { action: none }
      hold_action: { action: none }
      double_tap_action: { action: none }
      styles:
        card:
          - opacity: '0.60'
          - cursor: default

    - type: custom:button-card
      name: PS5
      template:
        - base
        - icon_playstation
      show_icon: false
