type: custom:button-card
entity: light.grupo_luzes_office
name: Office
triggers_update:
  - switch.macbook
  - climate.ac_office
  - media_player.echo_pop_office
  - person.bruno_helasio
template:
  - rooms_base
  - icon_office

variables:
  state: "[[[ return entity.state; ]]]"
  state_on: >
    [[[ 
      return ['on', 'home', 'active', 'yes'].indexOf(!entity || entity.state) !== -1; 
    ]]]
  light_entity: light.office_switch_3
  active: sensor.office_active

tap_action:
  action: perform-action
  perform_action: light.toggle
  data:
    entity_id: light.office_switch_3
double_tap_action: !include ../../shared/popup/rooms/office.yaml
hold_action:
  action: perform-action
  perform_action: light.turn_off
  data:
    entity_id: light.grupo_luzes_office

styles:
  card:
    - border: "none !important"
    - box-shadow: "none !important"
    - padding: "16px !important"
    - overflow: "visible !important"
  grid:
    - grid-template-areas: '"icon temp dots" "n n dots" "s s dots"'
    - grid-template-columns: "min-content 1fr min-content"
    - grid-template-rows: "0.78fr min-content min-content"
  name:
    - justify-self: "start"
    - align-self: "end"
    - font-size: "15px"
    - font-weight: "700"
    - margin-bottom: "4px !important"
    - color: >
        [[[ return variables.state_on ? 'black' : 'white'; ]]]
  state:
    - justify-self: "start"
    - align-self: "end"
    - font-size: "11px"
    - font-weight: "500"
    - margin-bottom: "2px !important"
    - color: >
        [[[ return variables.state_on ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.4)'; ]]]
  custom_fields:
    icon:
      - justify-self: "start"
      - align-self: "start"
      - width: "65px !important"
      - height: "65px !important"
      - margin-top: "0px !important"
    temp:
      - justify-self: "start"
      - align-self: "start"
      - margin-left: "12px"
      - margin-top: "4px"
    dots:
      - justify-self: "end"
      - align-self: "start"

custom_fields:
  temp: >
    [[[
      const firstValid = (ids) => {
        for (const id of ids) {
          const e = states[id];
          if (e && !['unknown','unavailable','none',''].includes((e.state || '').toLowerCase())) return e;
        }
        return null;
      };
      const t = firstValid(['sensor.temperatura_office', 'sensor.office_temperatura', 'sensor.of_temperatura']);
      const h = firstValid(['sensor.umidade_office', 'sensor.office_umidade', 'sensor.of_umidade']);
      if (!t) return '';
      const color = variables.state_on ? 'rgba(0,0,0,0.8)' : 'rgba(255,255,255,0.9)';
      const subColor = variables.state_on ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.5)';
      return `
        <div style="display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1;">
          <span style="font-size: 13px; font-weight: 700; color: ${color};">${t.state}°</span>
          <span style="font-size: 11px; color: ${subColor};">${h ? h.state + '%' : ''}</span>
        </div>
      `;
    ]]]

  dots: >
    [[[
      const home = states['person.bruno_helasio']?.state === 'home';
      const pcOn = states['switch.macbook']?.state === 'on';
      const acOn = !['off','unavailable','unknown',''].includes(states['climate.ac_office']?.state ?? 'off');
      const alexaOn = ['playing','on','paused','idle'].includes(states['media_player.echo_pop_office']?.state ?? '');
      const baseBg = variables.state_on ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.08)';
      const baseColor = variables.state_on ? 'rgba(0,0,0,0.45)' : 'rgba(255,255,255,0.6)';
      const renderDot = (icon, active, activeColor) => `
        <div style="width: 30px; height: 30px; border-radius: 50%; background: ${active ? activeColor + '22' : baseBg}; border: 1px solid ${active ? activeColor + '55' : 'transparent'}; display: flex; justify-content: center; align-items: center; color: ${active ? activeColor : baseColor};">
          <ha-icon icon="${icon}" style="width: 18px; height: 18px; display: flex; color: ${active ? activeColor : baseColor};"></ha-icon>
        </div>
      `;
      return `
        <div style="display: flex; flex-direction: column; gap: 6px;">
          ${renderDot('mdi:account', home, '#60a5fa')}
          ${renderDot('mdi:desktop-classic', pcOn, '#a78bfa')}
          ${renderDot('mdi:snowflake', acOn, '#4facfe')}
          ${renderDot('mdi:speaker-wireless', alexaOn, '#ff9900')}
        </div>
      `;
    ]]]
