# Motivo: custom:layout-card usado diretamente como content do browser_mod.popup
# NAO funciona — popup nao abria. TODOS os footer popups que funcionam (System,
# Network, Server, Updates) usam custom:mod-card como wrapper do layout-card.
# O mod-card fornece isolamento de erros: se um card filho falha (ex: map card
# nao instalado), o mod-card captura o erro e o popup ainda abre.
# Sem o wrapper, o erro propaga e impede o popup de renderizar.
