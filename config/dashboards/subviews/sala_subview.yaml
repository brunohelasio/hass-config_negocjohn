# ─────────────────────────────────────────────────────────────────────────────
# SUBVIEW — Sala de Estar
# Etapa 1 / Estrutura base com 6 blocos placeholder
# Nenhum bloco tem lógica funcional ainda — apenas visual para validação.
#
# Próximas etapas (aguardam autorização):
#   Etapa 2 → Bloco 1 Hero + Bloco 2 Luzes
#   Etapa 3 → Bloco 3 A/C (thermostat nativo)
#   Etapa 4 → Bloco 4 Câmeras
#   Etapa 5 → Bloco 5 TV e Mídia
#   Etapa 6 → Bloco 6 Spotify
#   Etapa 7 → Registrar no ui-lovelace-main.yaml
#   Etapa 8 → Alterar double_tap_action em bento_sala.yaml
#
# Para registrar esta subview (Etapa 7), adicionar em ui-lovelace-main.yaml:
#   - !include subviews/sala_subview.yaml
# ─────────────────────────────────────────────────────────────────────────────

title: Sala de Estar
path: subview-sala
icon: mdi:sofa
subview: true
theme: tablet
type: custom:grid-layout

card_mod:
  style: |
    hui-grid-layout {
      height: 100vh !important;
      background: linear-gradient(140deg, #0b1623 0%, #132035 55%, #0b1e30 100%);
      padding-bottom: 8px;
      box-sizing: border-box;
    }

layout:
  margin: 0
  padding: 12px
  grid-gap: 10px
  # 12 colunas iguais — hero ocupa 5, luzes 4, a/c 3 (linha 1)
  #                     câmeras 4, mídia 4, spotify 4 (linha 2)
  grid-template-columns: repeat(12, minmax(0, 1fr))
  grid-template-rows: 44vh 42vh
  grid-template-areas: |
    "hero hero hero hero hero lights lights lights lights ac ac ac"
    "cams cams cams cams media media media media spot spot spot spot"

  mediaquery:
    # ── Mobile (≤800px): empilhado verticalmente ───────────────────
    '(max-width: 800px)':
      padding: 8px
      grid-gap: 8px
      grid-template-columns: 1fr
      grid-template-rows: repeat(6, min-content)
      grid-template-areas: |
        "hero"
        "lights"
        "ac"
        "cams"
        "media"
        "spot"

    # ── Portrait tablet (801–1440px portrait): 2 colunas ──────────
    '(min-width: 801px) and (max-width: 1440px) and (orientation: portrait)':
      grid-template-columns: repeat(2, minmax(0, 1fr))
      grid-template-rows: repeat(3, min-content)
      grid-template-areas: |
        "hero lights"
        "ac cams"
        "media spot"

cards:

  # ── BLOCO 1: Hero / Imagem da Sala ──────────────────────────────────────────
  # Etapa 2: imagem sala_estar.jpg + overlay + pills + botão Voltar + cortina
  - type: custom:button-card
    view_layout:
      grid-area: hero
    show_icon: false
    show_name: false
    tap_action:
      action: none
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%) !important;
          backdrop-filter: blur(20px) saturate(1.35) !important;
          -webkit-backdrop-filter: blur(20px) saturate(1.35) !important;
          border: 1px solid rgba(255,255,255,0.10) !important;
          border-radius: 20px !important;
          box-shadow: 0 4px 24px rgba(0,0,0,0.28), inset 0 1px 0 rgba(191,219,254,0.08) !important;
          height: 100% !important;
          overflow: hidden !important;
          box-sizing: border-box;
        }
    custom_fields:
      content: >
        [[[
          return `<div style="height:100%;min-height:160px;display:flex;flex-direction:column;justify-content:flex-end;padding:18px 20px 20px;">
            <div style="font-size:10px;font-weight:700;letter-spacing:0.10em;color:rgba(255,255,255,0.40);text-transform:uppercase;margin-bottom:6px;">Sala de Estar</div>
            <div style="font-size:26px;font-weight:700;color:rgba(255,255,255,0.90);line-height:1.1;margin-bottom:6px;">Hero</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.32);line-height:1.5;">
              Imagem de fundo · Pills de status<br>Botão Voltar · Painel Cortina
            </div>
          </div>`;
        ]]]
    styles:
      card:
        - height: 100%
        - padding: 0
      custom_fields:
        content:
          - height: 100%
          - display: block

  # ── BLOCO 2: Luzes ──────────────────────────────────────────────────────────
  # Etapa 2: header ON/OFF + 7 botões (Sala 3 + Varanda 4) com templates existentes
