- type: grid
  columns: 2
  square: false
  cards:

    - &cam_tile
      type: custom:button-card
      entity: camera.sl_camera_2
      triggers_update:
        - camera.sl_camera_2
      name: Sala
      show_name: true
      show_icon: false
      show_label: false
      show_state: false
      tap_action:
        action: more-info
      styles:
        card:
          - background-color: "#1b2535"
          - background-image: >
              [[[
                var p = entity && entity.attributes && entity.attributes.entity_picture;
                return p ? 'url(' + p + ')' : 'none';
              ]]]
          - background-size: "cover"
          - background-position: "center"
          - background-repeat: "no-repeat"
          - border-radius: "12px"
          - border: "1px solid rgba(255,255,255,0.06)"
          - box-shadow: "none"
          - height: "100%"
          - width: "100%"
          - padding: "0"
          - overflow: "hidden"
          - cursor: "pointer"
        grid:
          - grid-template-areas: '"n"'
          - grid-template-rows: "1fr"
          - grid-template-columns: "1fr"
        name:
          - align-self: "end"
          - justify-self: "stretch"
          - width: "100%"
          - padding: "16px 10px 8px"
          - box-sizing: "border-box"
          - background: "linear-gradient(to top, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.35) 60%, rgba(0,0,0,0) 100%)"
          - font-size: "12px"
          - font-weight: "500"
          - color: "rgba(255,255,255,0.92)"
          - text-align: "left"

    - <<: *cam_tile
      entity: camera.vr_camera_2
      triggers_update:
        - camera.vr_camera_2
      name: Varanda

    - <<: *cam_tile
      entity: camera.cz_camera_2
      triggers_update:
        - camera.cz_camera_2
      name: Cozinha

    - <<: *cam_tile
      entity: camera.as_camera_2
      triggers_update:
        - camera.as_camera_2
      name: Área

  card_mod:
    style: |
      /* v4: grid ocupa 100% da célula (welcome/cameras estica no bento_main) */
      ha-card {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 10px !important;
        height: 100% !important;
      }
      #root {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        grid-template-rows: 1fr 1fr !important;
        gap: 8px !important;
        height: 100% !important;
      }
