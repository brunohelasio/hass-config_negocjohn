#################################################
#                                               #
#                  HEADER                       #
#                                               #
#################################################
- type: horizontal-stack
  view_layout:
    grid-area: header
    show:
      mediaquery: '(min-height: 463px)'
  cards:
    - type: custom:button-card
      entity: sensor.time
      template:
        - header_clock
      tap_action: !include ../../shared/popup/calendar.yaml

    - type: custom:button-card
      entity: weather.forecast_casa
      tap_action: !include ../../shared/popup/popup_weather.yaml
      template:
        - header_weather
