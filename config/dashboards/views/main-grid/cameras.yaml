#################################################
#                                               #
#                  CAMERAS                      #
#                                               #
#################################################

- type: grid
  # ANTERIOR: title: Cameras
  title: Câmeras
  view_layout:
    # ANTERIOR: grid-area: cameras
    grid-area: cameras_big
    show:
      mediaquery: '(min-width: 801px) and (min-height: 463px)'
  columns: 2
  square: false
  cards: !include ../../shared/grid-cards/cameras.yaml

- type: conditional
  view_layout:
    # ANTERIOR: grid-area: cameras
    grid-area: cameras_big
  conditions:
    - condition: screen
      media_query: '(max-width: 800px) and (min-height: 463px)'
    - condition: state
      entity: input_select.mobile_dashboard_tab
      state: home
  card:
    type: grid
    # ANTERIOR: title: Cameras
    title: Câmeras
    columns: 2
    square: false
    cards: !include ../../shared/grid-cards/cameras.yaml
