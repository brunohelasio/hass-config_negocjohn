# NOVO: sidebar com badges interativas (luzes/midia/clima/pessoas)
# Usa sidebar_template — nao precisa de entity (tudo via JS/states)
- type: custom:button-card
  entity: sensor.time
  template:
    - sidebar_template
  view_layout:
    grid-area: sidebar
    show:
      mediaquery: '(min-width: 801px) and (max-width: 1440px) and (orientation: landscape)'
