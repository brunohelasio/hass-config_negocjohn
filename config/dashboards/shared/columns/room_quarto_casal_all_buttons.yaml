# ══════════════════════════════════════════════════════════════════════════
# LAYOUT 5 COLUNAS — Quarto Casal (popup)
# Replicado do modelo base: room_living_all_buttons.yaml (Sala)
# Secao 1: Luzes (titulo + toggle all + 7 botoes em 5 colunas)
# Secao 2: Midia & Clima (titulo + 2 botoes midia + 3 blanks)
#
# Entidades confirmadas:
#   - light.qc_luz_principal
#   - light.quarto_casal_switch_1
#   - light.quarto_casal_2_switch_2
#   - light.quarto_casal_switch_2
#   - light.quarto_casal_2_switch_3
#   - light.suite_casal_switch_1
#   - light.suite_casal_switch_2
#   - Grupo: light.grupo_quarto_casal
#   - Camera: camera.camera_quarto_casal
#   - Spotify: media_player.spotifyplus_bruno_helasio (compartilhado)
#   - AC: nao possui (placeholder desabilitado)
# ══════════════════════════════════════════════════════════════════════════

# ── Titulo: Luzes + toggle all lights ──
# FIX C4.1: Adicionado indicador visual ON/OFF (custom_field)
- type: custom:button-card
  entity: light.grupo_quarto_casal
  triggers_update:
    - light.grupo_quarto_casal
  name: Luzes
  show_state: false
  show_icon: false
  # show_icon: true
  # icon: mdi:lightbulb-group-outline
  tap_action:
    action: toggle
    haptic: success
  # ANTERIOR: custom_fields com JS template para ON/OFF badge (nao atualizava em browser_mod popup)
  # FIX: state: section nativa do button-card com HTML estatico — mais reativo
  custom_fields:
    on_off: |
      <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:8px;margin-right:4px">OFF</span>
  state:
    - value: 'on'
      custom_fields:
        on_off: |
          <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:#fff;background:#3b82f6;padding:1px 6px;border-radius:8px;margin-right:4px">ON</span>
      styles:
        icon:
          - color: '#f0c040'
    - value: 'off'
      custom_fields:
        on_off: |
          <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:8px;margin-right:4px">OFF</span>
      styles:
        icon:
          - color: 'rgba(255,255,255,0.25)'
  styles:
    card:
      - background: none
      - box-shadow: none
      - border: none
      - padding: 0 4px
      - height: 30px
      - min-height: 30px
    grid:
      - grid-template-areas: '"n on_off i"'
      - grid-template-columns: 1fr auto auto
    name:
      - font-size: 11px
      - color: rgba(255,255,255,0.5)
      - text-transform: uppercase
      - letter-spacing: 1.5px
      - justify-self: start
      - font-weight: 500
    custom_fields:
      on_off:
        - justify-self: end
        - align-self: center
    img_cell:
      - justify-self: end
      - width: 24px
    icon:
      - width: 24px
      - color: 'rgba(255,255,255,0.25)'

# ── Linha 1: 5 botoes de iluminacao ──
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
        grid-template-columns: repeat(5, 98px) !important;
      }
  cards:
    - type: custom:button-card
      entity: light.qc_luz_principal
      name: "QC - Luz principal"
      template:
        - tpl_popup_light
        # - icon_light_flush
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.quarto_casal_switch_1
      name: "QC - Luzes quadros"
      template:
        - tpl_popup_light
        - icon_light_flush
        # - icon_light_recessed
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.quarto_casal_2_switch_2
      name: "QC - Luz sanca"
      template:
        - tpl_popup_light
        # - icon_light_flush
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.quarto_casal_switch_2
      name: "QC - Luzes closet"
      template:
        - tpl_popup_light
        - icon_light_flush
        # - icon_light_recessed
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.quarto_casal_2_switch_3
      name: "QC - Luz cortineiro"
      template:
        - tpl_popup_light
        # - icon_light_flush
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success

# ── Linha 2: 2 botoes de iluminacao suite + 3 blanks ──
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
        grid-template-columns: repeat(5, 98px) !important;
      }
  cards:
    - type: custom:button-card
      entity: light.suite_casal_switch_1
      name: "QCS - Luz principal"
      template:
        - tpl_popup_light
        # - icon_light_flush
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.suite_casal_switch_2
      name: "QCS - Luz azul"
      template:
        - tpl_popup_light
        - icon_light_flush
        # - icon_light_recessed
      tap_action:
        action: toggle
        haptic: success
    # BLANK 1-3 — iguala 2 botoes a grid de 5 colunas
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'

# ── Divisor Glassmorphism ──
- type: custom:button-card
  color_type: blank-card
  styles:
    card:
      - height: 2px
      - margin: 4px 8px
      - background: >-
          linear-gradient(90deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.12) 15%,
          rgba(255,255,255,0.20) 50%,
          rgba(255,255,255,0.12) 85%,
          rgba(255,255,255,0) 100%)
      - backdrop-filter: blur(8px)
      - -webkit-backdrop-filter: blur(8px)
      - border: none
      - box-shadow: 0 0 6px rgba(62, 132, 255, 0.10)
      - border-radius: 2px
      - padding: 0
      - min-height: auto

# ── Titulo: Midia & Clima ──
- type: custom:button-card
  name: "Mídia & Clima"
  show_state: false
  show_icon: false
  tap_action:
    action: none
  styles:
    card:
      - background: none
      - box-shadow: none
      - border: none
      - padding: 0 4px
      - height: 30px
      - min-height: 30px
    grid:
      - grid-template-areas: '"n"'
      - grid-template-columns: 1fr
    name:
      - font-size: 11px
      - color: rgba(255,255,255,0.5)
      - text-transform: uppercase
      - letter-spacing: 1.5px
      - justify-self: start
      - font-weight: 500

# ── Linha 3: TV (placeholder) + Spotify + AC placeholder + 2 blanks ──
# ANTERIOR: Linha 3 tinha 5 colunas com Spotify + AC + 3 blanks (sem TV)
# - type: grid
#   columns: 5
#   square: false
#   card_mod:
#     style: |
#       #root {
#         gap: 4px !important;
#       }
#   cards:
#     # SPOTIFY — (sem TV)
#     ...
#     # AC — placeholder
#     ...
#     # BLANK 1-3

# NOVO: Linha 3 com TV placeholder adicionado + padrao 98px
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
        grid-template-columns: repeat(5, 98px) !important;
      }
  cards:
    # TV — placeholder com ícone LG inline (icon_tv nao renderiza sem entity/tv_screen)
    # ANTERIOR: template [base, icon_tv] — nao aparecia porque icon_tv depende de tv_screen
    - type: custom:button-card
      name: LG TV
      template:
        - base
        # - icon_tv
      show_icon: false
      tap_action:
        action: none
      hold_action:
        action: none
      double_tap_action:
        action: none
      styles:
        card:
          - opacity: "0.45"
          - cursor: "default"
        custom_fields:
          icon:
            - width: 95%
            - margin-left: 1%
            - margin-top: -5%
      custom_fields:
        icon: >
          <svg viewBox="0 0 50 50">
            <path fill="#9da0a2" d="M.303 11.082c-.063 0-.113.05-.113.111v27.615c0 .062.051.109.113.109h49.395c.063 0 .113-.047.113-.109V11.193c0-.062-.051-.111-.113-.111zm25.098 4.18c.241-.008.44.186.439.428v.846c0 .231-.183.42-.414.426l-.697.02c-.74.02-1.173.082-1.85.262-2.563.682-4.673 2.67-5.52 5.205-.301.9-.414 1.595-.414 2.578 0 1.401.307 2.625.945 3.799a8.09 8.09 0 0 0 6.227 4.191 12.45 12.45 0 0 0 2.244-.068c3.091-.549 5.599-2.842 6.396-5.84.097-.365.178-.864.223-1.25H27.67c-.235-.001-.426-.191-.426-.426v-.406-.406c0-.235.191-.425.426-.426h6.639c.241-.001.436.198.428.439l-.021.66c-.054 1.704-.496 3.245-1.34 4.658-1.621 2.714-4.379 4.463-7.5 4.752a10.84 10.84 0 0 1-1.92-.016c-3.83-.419-7.042-3.023-8.232-6.674-.155-.476-.277-.997-.363-1.547-.118-.749-.129-2.074-.018-2.793.179-1.154.5-2.155 1.006-3.127 1.191-2.289 3.202-3.992 5.664-4.797.884-.289 1.732-.434 2.727-.467zm-.834 4.453h.848c.236 0 .426.192.426.428V28.6h1.795c.236 0 .426.192.426.428v.846c0 .236-.19.428-.426.428h-3.068c-.236 0-.426-.192-.426-.428v-9.73c0-.236.19-.428.426-.428zm-3.129.004c.958 0 1.734.777 1.734 1.734s-.777 1.734-1.734 1.734-1.734-.777-1.734-1.734.777-1.734 1.734-1.734z"/>
          </svg>    # SPOTIFY — compartilhado, mesma entidade em todos os comodos
    # FIX C3: hold_action agora abre popup Spotify dedicado do Q.Casal (com default_device: Echo Pop Quarto Casal).
    # ANTERIOR: hold_action: !include ../popup/media_spotify.yaml (popup compartilhado sem device targeting)
    - type: custom:button-card
      entity: media_player.spotifyplus_bruno_helasio
      name: Spotify
      template:
        - base
        - circle
        - loader
        - icon_spotify_color
      state_display: >
        [[[
          return entity && entity.state === 'off' ? ' ' : null;
        ]]]
      variables:
        state_on: >
          [[[ return entity && ['on', 'idle', 'playing', 'paused', 'standby'].indexOf(entity.state) !== -1; ]]]
        circle_input: >
          [[[
            if (entity && entity.attributes.volume_level !== undefined) {
              let volume = Math.round(entity.attributes.volume_level * 100)
              return volume === 0 && entity.state !== 'off'
                ? 1
                : volume
            }
          ]]]
        circle_input_unit: '%'
      # --- CÓDIGO ANTERIOR: spotifyplus.player_media_play_pause (quebrado) ---
      # tap_action:
      #   action: call-service
      #   service: spotifyplus.player_media_play_pause
      #   service_data:
      #     entity_id: media_player.spotifyplus_bruno_helasio
      #     device_name: Echo Pop Quarto Casal
      #   haptic: success
      # ANTERIOR: media_player.media_play_pause (so funciona com device ja ativo)
      # FIX: spotifyplus.player_transfer_playback — transfere e inicia playback no Echo do Q.Casal
      tap_action:
        action: perform-action
        perform_action: spotifyplus.player_transfer_playback
        data:
          entity_id: media_player.spotifyplus_bruno_helasio
          device_name: "Echo Pop Quarto Casal"
          play: true
          force_activate_device: true
        haptic: success
      double_tap_action:
        action: more-info
      hold_action: !include ../popup/media_spotify_quarto_casal.yaml
    # AC — Quarto Casal nao possui AC (placeholder desabilitado)
    - type: custom:button-card
      name: Ar Cond.
      template:
        - base
        - icon_climate
      show_icon: false
      tap_action:
        action: none
      hold_action:
        action: none
      double_tap_action:
        action: none
      styles:
        card:
          - opacity: "0.35"
          - cursor: "default"
    # BLANK 1-2
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'
