            <ha-icon class="badge-icon" icon="mdi:speaker-wireless" style="color:#9aa0a6"></ha-icon>
            <div class="badge-texts">
              <div class="badge-title">Media</div>
              <div class="badge-sub">${sub}</div>
            </div>
          </div>`;
        ]]]
      rail: >
        [[[
