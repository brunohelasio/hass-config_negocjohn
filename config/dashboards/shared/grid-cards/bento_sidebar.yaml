- type: custom:layout-card
  layout_type: custom:grid-layout
  layout:
    grid-template-rows: auto 1fr auto
    height: 100%
    padding: 12px 0
  card_mod:
    style: |
      ha-card {
        --ios-blue: rgba(10, 132, 255, 0.30);
        --ios-blue-glow: rgba(10, 132, 255, 0.55);
        --glass-border: rgba(255, 255, 255, 0.20);
        height: 100%;
        border-radius: 24px;
        background: var(--ios-blue);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid var(--glass-border);
        border-top: 1px solid rgba(255, 255, 255, 0.38);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), 0 0 24px var(--ios-blue-glow), inset 0 1px 2px rgba(255, 255, 255, 0.35);
      }
  cards:
    - type: vertical-stack
      cards:
        - &nav_icon
          type: custom:button-card
          icon: mdi:home-outline
          show_name: false
          tap_action: { action: none }
          hold_action: { action: none }
          styles:
            card: [width: 38px, height: 38px, margin: 3px auto, border-radius: 12px, background: transparent, border: none, box-shadow: none, padding: 0]
            icon: [color: rgba(255,255,255,0.92), width: 19px]
        - <<: *nav_icon
          icon: mdi:music-note-outline
        - <<: *nav_icon
          icon: mdi:shield-outline
        - <<: *nav_icon
          icon: mdi:radar
        - <<: *nav_icon
          icon: mdi:robot-vacuum
        - <<: *nav_icon
          icon: mdi:wifi
        - <<: *nav_icon
          icon: mdi:refresh
        - <<: *nav_icon
          icon: mdi:download
        - <<: *nav_icon
          icon: mdi:cube-outline
    - type: custom:button-card
      show_name: false
      tap_action: { action: none }
      hold_action: { action: none }
      styles:
        card: [background: transparent, border: none, box-shadow: none]
    - type: vertical-stack
      cards:
        - <<: *nav_icon
          icon: mdi:monitor-dashboard
        - <<: *nav_icon
          icon: mdi:power
