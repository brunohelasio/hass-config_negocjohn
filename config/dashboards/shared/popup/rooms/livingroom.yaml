action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Sala
    size: wide
    style: >
      --popup-width: 76vw;
      --popup-max-width: 1180px;
      --popup-background-color: rgba(8, 12, 20, 0.62);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
      --tablet-popup-content-padding: 0.8em 1em 1em 0.9em;
    card_mod:
      style:
        .: |
          ha-dialog {
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
          }
          ha-dialog::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(80, 150, 255, 0.12);
          }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 18vw 18vw 36vw
        grid-template-areas: '"col_luzes col_extra col_camera"'
        justify-content: center
        align-content: center
        grid-gap: 1.5vw
        mediaquery:
          "(max-width: 800px)":
            grid-template-columns: 1fr
            grid-template-areas: |
              "col_luzes"
              "col_extra"
              "col_camera"
      cards:
        # ======================================================================
        # COLUNA 1 — ILUMINACAO
        # ======================================================================
        - type: vertical-stack
          view_layout:
            grid-area: col_luzes
          cards:
            - type: grid
              columns: 2
              square: true
              cards:
                - type: custom:button-card
                  entity: light.sala_switch_2
                  name: Luz Principal
                  template:
                    - tpl_popup_light
                    - icon_light_flush
                - type: custom:button-card
                  entity: light.sala_switch_1
                  name: LED Direito
                  template:
                    - tpl_popup_light
                    - icon_ledstrip
                - type: custom:button-card
                  entity: light.sala_switch_3
                  name: LED Esquerdo
                  template:
                    - tpl_popup_light
                    - icon_ledstrip
                - type: custom:button-card
                  entity: light.sala_2_switch_2
                  name: VR Principal
                  template:
                    - tpl_popup_light
                    - icon_light_flush
                - type: custom:button-card
                  entity: light.sala_2_switch_3
                  name: VR Cristaleira
                  template:
                    - tpl_popup_light
                    - icon_ledstrip
                - type: custom:button-card
                  entity: light.varanda_switch_1
                  name: VR Gourmet
                  template:
                    - tpl_popup_light
                    - icon_ledstrip
                - type: custom:button-card
                  entity: light.varanda_switch_2
                  name: VR Pendente
                  template:
                    - tpl_popup_light
                    - icon_pendant

        # ======================================================================
        # COLUNA 2 — MIDIA / EXTRAS
        # ======================================================================
        - type: vertical-stack
          view_layout:
            grid-area: col_extra
          cards:
            - type: grid
              columns: 2
              square: true
              cards:
                # TV — SVG inline (template icon_tv exige entity)
                - type: custom:button-card
                  name: Smart TV
                  template:
                    - base
                  show_icon: false
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.60"
                      - cursor: "default"
                    custom_fields:
                      icon:
                        - width: 87%
                        - margin-top: -8%
                        - fill: '#9da0a2'
                  custom_fields:
                    icon: >
                      <svg viewBox="0 0 50 50">
                        <path opacity="0.5" d="m 26.2,14 h -2 v 10 h 2 V 14 m 4.8,2.2 -1.4,1.4 a 7,7 0 0 1 2.6,5.4 7,7 0 0 1 -7,7 7,7 0 0 1 -4.4,-12.4 l -1.4,-1.4 a 9,9 0 0 0 -1,12.7 c 3.2,3.8 8.9,4.2 12.7,1 a 9,9 0 0 0 3.2,-6.9 c 0,-2.6 -1.2,-5.1 -3.2,-6.8 z"/>
                        <path d="M46 9.2v27.5H4.1V9.2H46m2.4-2.4H1.6v32.3h46.7c.1 0 .1-32.3.1-32.3zM11.9 43.2h26.3c.6 0 1.1-.4 1.1-1v-.3c0-.6-.4-1.1-1-1.1H11.9c-.6 0-1.1.4-1.1 1v.3a1.11 1.11 0 0 0 1.1 1.1z"/>
                      </svg>

                # SPOTIFY — template estatico, funciona sem entity
                - type: custom:button-card
                  name: Spotify
                  template:
                    - base
                    - icon_spotify
                  show_icon: false
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.60"
                      - cursor: "default"

                # PS5 — template estatico, funciona sem entity
                - type: custom:button-card
                  name: PS5
                  template:
                    - base
                    - icon_playstation
                  show_icon: false
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.45"
                      - cursor: "default"

                # PIONEER — SVG inline de receiver
                - type: custom:button-card
                  name: Pioneer
                  template:
                    - base
                  show_icon: false
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.45"
                      - cursor: "default"
                    custom_fields:
                      icon:
                        - width: 80%
                        - fill: '#9da0a2'
                  custom_fields:
                    icon: >
                      <svg viewBox="0 0 50 50">
                        <rect x="1" y="10" width="48" height="30" rx="2.5"/>
                        <rect x="5" y="14" width="22" height="10" rx="1.5" fill="#202628" opacity="0.9"/>
                        <circle cx="39" cy="19" r="5" fill="#202628" opacity="0.9"/>
                        <rect x="5" y="28" width="40" height="1.5" rx=".75" opacity=".3"/>
                        <rect x="5" y="31.5" width="40" height="1.5" rx=".75" opacity=".3"/>
                        <rect x="5" y="35" width="40" height="1.5" rx=".75" opacity=".3"/>
                      </svg>

            - type: custom:button-card
              color_type: blank-card
              styles:
                card:
                  - height: 1px
                  - margin: 4px 12px
                  - background: >
                      linear-gradient(90deg,rgba(255,255,255,0) 0%,rgba(255,255,255,0.15) 50%,rgba(255,255,255,0) 100%)

            - type: grid
              columns: 2
              square: true
              cards:
                # CORTINA — SVG inline (template icon_cover exige entity)
                - type: custom:button-card
                  name: Cortina
                  template:
                    - base
                  show_icon: false
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.35"
                      - cursor: "default"
                    custom_fields:
                      icon:
                        - width: 80%
                        - fill: '#9da0a2'
                  custom_fields:
                    icon: >
                      <svg viewBox="0 0 50 50">
                        <g id="ram" opacity="0.6">
                          <path d="M1.77,28.03c.78,0,1.41-.64,1.41-1.4s-.63-1.4-1.41-1.4-1.39,.62-1.39,1.4,.62,1.4,1.39,1.4Z"/>
                          <path d="M1.77,18.34c.78,0,1.41-.64,1.41-1.4s-.63-1.39-1.41-1.39-1.39,.62-1.39,1.39,.62,1.4,1.39,1.4Z"/>
                          <path d="M1.77,23.19c.78,0,1.41-.66,1.41-1.41s-.63-1.39-1.41-1.39-1.39,.62-1.39,1.39,.62,1.41,1.39,1.41Z"/>
                          <path d="M1.77,34.92c-.85,0-1.55,.72-1.55,1.56v5.07c0,.85,.7,1.56,1.55,1.56s1.56-.71,1.56-1.56v-5.07c0-.85-.69-1.56-1.56-1.56Z"/>
                          <path d="M1.77,8.65c.78,0,1.41-.65,1.41-1.41s-.63-1.39-1.41-1.39-1.39,.61-1.39,1.39,.62,1.41,1.39,1.41Z"/>
                          <path d="M1.77,13.49c.78,0,1.41-.63,1.41-1.39s-.63-1.41-1.41-1.41-1.39,.62-1.39,1.41,.62,1.39,1.39,1.39Z"/>
                          <path d="M1.77,32.86c.78,0,1.41-.64,1.41-1.39s-.63-1.39-1.41-1.39-1.39,.62-1.39,1.39,.62,1.39,1.39,1.39Z"/>
                          <path d="M42.5,0H1.77C.8,0,0,.81,0,1.78s.8,1.78,1.77,1.78H42.5c.98,0,1.78-.8,1.78-1.78s-.8-1.78-1.78-1.78Z"/>
                        </g>
                        <g id="close">
                          <path d="M41.08,6.05H7.56c-.97,0-1.59,.63-1.59,1.55v4.75c0,.94,.64,1.55,1.59,1.55H41.08c.99,0,1.59-.63,1.59-1.57V7.59c0-.93-.62-1.54-1.59-1.54Z"/>
                          <path d="M41.08,25.46H7.56c-.95,0-1.59,.63-1.59,1.53v4.77c0,.93,.62,1.55,1.59,1.55H41.08c.99,0,1.59-.62,1.59-1.55v-4.78c0-.89-.6-1.51-1.59-1.51Z"/>
                          <path d="M41.08,35.17H7.56c-.98,0-1.58,.61-1.58,1.55v4.73c0,.94,.6,1.56,1.57,1.56H41.06c.97,0,1.61-.62,1.61-1.56v-4.73c0-.95-.62-1.55-1.59-1.55Z"/>
                          <path d="M41.1,15.76H7.56c-.95,0-1.59,.63-1.59,1.54v4.77c0,.91,.62,1.52,1.59,1.52H41.09c.96,0,1.58-.62,1.58-1.52v-4.79c0-.9-.62-1.52-1.58-1.52Z"/>
                        </g>
                      </svg>

                # AR CONDICIONADO — template estatico
                - type: custom:button-card
                  name: Ar Condicionado
                  template:
                    - base
                    - icon_climate
                  show_icon: false
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.35"
                      - cursor: "default"

        # ======================================================================
        # COLUNA 3 — CAMERAS
        # ======================================================================
        - type: vertical-stack
          view_layout:
            grid-area: col_camera
          cards:
            - type: picture-entity
              entity: camera.sl_camera
              camera_view: live
              show_name: false
              show_state: false
            - type: picture-entity
              entity: camera.vr_camera
              camera_view: live
              show_name: false
              show_state: false
