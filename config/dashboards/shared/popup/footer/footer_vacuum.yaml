# ANTERIOR (mantido comentado):
# popup antigo do aspirador com layout Roborock S7 específico deste repositório.
# action: fire-dom-event
# browser_mod:
#   service: browser_mod.popup
#   data:
#     title: " "
#     size: wide
#     style: >
#       --popup-background-color: transparent;
#       --mdc-dialog-min-width: 1100px !important;
#       --mdc-dialog-max-width: 1100px !important;

action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: " "
    size: wide
    style: >
      --popup-background-color: transparent !important;
      --ha-dialog-background-color: transparent !important;
      --mdc-theme-surface: transparent !important;
      --mdc-dialog-min-width: 92vw !important;
      --mdc-dialog-max-width: 92vw !important;
    popup_styles:
      - style: all
        styles: |
          ha-dialog {
            --ha-dialog-surface-background: transparent;
            --ha-card-background: transparent;
            --ha-dialog-scrim-backdrop-filter: blur(24px) saturate(100%);
            --mdc-dialog-scrim-color: rgba(0,0,0,0.55);
            --dialog-surface-margin-top: auto;
          }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      card_mod:
        style: |
          ha-card {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
          }
      layout:
        grid-template-columns: 1fr
        grid-template-areas: '"main"'
      cards:
        # ======================================================================
        # ESTADO 1: A GRELHA GERAL (Snapshot 'auto' para salvar RAM/CPU)
        # ======================================================================
        - type: conditional
          conditions:
            - entity: input_text.camera_selecionada
              state_not: 'cam_1'
            - entity: input_text.camera_selecionada
              state_not: 'cam_2'
            - entity: input_text.camera_selecionada
              state_not: 'cam_3'
            - entity: input_text.camera_selecionada
              state_not: 'cam_4'
            - entity: input_text.camera_selecionada
              state_not: 'cam_5'
            - entity: input_text.camera_selecionada
              state_not: 'cam_6'
            - entity: input_text.camera_selecionada
              state_not: 'cam_7'
            - entity: input_text.camera_selecionada
              state_not: 'cam_8'
          card:
            type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: 1fr 1fr 1fr
              grid-template-areas: |
                "cam1 cam2 cam3"
                "cam4 cam5 cam6"
                "cam7 cam8 ."
              grid-gap: 2vw
              mediaquery:
                "(max-width: 800px)":
                  grid-template-columns: 1fr
                  grid-template-areas: |
                    "cam1"
                    "cam2"
                    "cam3"
                    "cam4"
                    "cam5"
                    "cam6"
                    "cam7"
                    "cam8"
                  grid-gap: 4vw
            cards:
              # --- CÂMERA 1 ---
              - type: picture-entity
                view_layout: { grid-area: cam1 }
                entity: camera.sl_camera
                camera_view: auto
                aspect_ratio: '16:9'
                show_name: true
                name: "Sala"
                show_state: false
                card_mod:
                  style: |
                    ha-card { background: rgba(0,0,0,0.3) !important; border-radius: 16px !important; border: 1px solid rgba(255,255,255,0.10) !important; overflow: hidden; cursor: pointer; }
                tap_action:
                  action: call-service
                  service: input_text.set_value
                  data:
                    entity_id: input_text.camera_selecionada
                    value: 'cam_1'

              # --- CÂMERA 2 ---
              - type: picture-entity
