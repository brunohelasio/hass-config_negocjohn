# --- CÓDIGO ANTERIOR COMENTADO (commit 46b5fd0 — margens assimétricas, hero sem filtro/timer, corredor linha separada) ---
# Ver histórico git para versão completa anterior.
# Alterações aplicadas neste commit:
#   Fix 1:  avatar badges — width:100% no layout-card (empurra avatar para extremo direito)
#   Fix 2:  TV/AC — margin:0 8px simétrico (respiro entre botões sem alterar padding externo)
#   Fix 3:  AC controls — condicional (só aparece quando ligado, igual TV)
#   Fix 4:  AC tap_action — climate.turn_off/turn_on explícito (climate.toggle não suportado)
#   Fix 5:  hero ícone — 65px + filter grayscale quando luzes off (igual bento_cozinha)
#   Fix 6:  hero "Sala" — 15px, alinhado à esquerda na sua própria linha (abaixo do ícone)
#   Fix 7:  hero status de luzes — vazio quando off; mini badge icon+count+timer quando on
#   Fix 8:  hero dots direita — reativos (TV/AC/Alexa mudam cor quando ativos)
#   Fix 9:  corredor+cortina — mesma linha; corredor esq, cortina dir, sem botão Parar
#   Fix 10: TV/AC — ícone na mesma linha do nome (grid 3 colunas)
# --- FIM CÓDIGO ANTERIOR ---

- type: custom:layout-card
  layout_type: custom:grid-layout
  layout:
    grid-template-columns: repeat(2, minmax(0, 1fr))
    # Fix 9: 3 linhas — hero / tv+ac / corredor+curtain (era 4 linhas com corredor separado)
    grid-template-rows: 136px minmax(110px, 1fr) 54px
    grid-template-areas: |
      "hero hero"
      "tv ac"
      "corredor curtain"
    column-gap: 20px
    row-gap: 10px
    height: 100%
    margin: 0
    padding: 12px 14px 12px 14px
  cards:

    # ── Hero ─────────────────────────────────────────────────────────
    - type: custom:button-card
      view_layout:
        grid-area: hero
      entity: light.grupo_luzes_sala
      # Fix 6: native name field para "Sala" (15px, posição própria no grid)
      show_icon: false
      show_name: true
      show_state: false
      name: Sala
      # Fix 7+8: triggers_update abrange luzes, sensores, mídia, clima, presença e timer
      triggers_update:
        - light.sala_switch_1
        - light.sala_switch_2
        - sensor.living_room_active
        - sensor.sl_sensor_temp_humid_temperatura
        - media_player.smart_tv_pro_2
        - climate.sl_ar_condicionado
        - media_player.echo_show
        - person.bruno_helasio
        - sensor.time
      # Fix 5a: tap aciona só luz principal (não grupo)
      tap_action:
        action: perform-action
        perform_action: light.toggle
        target:
          entity_id: light.sala_switch_2
      double_tap_action: !include ../../shared/popup/rooms/livingroom.yaml
      hold_action:
        action: perform-action
        perform_action: light.turn_off
        data:
          entity_id: light.grupo_luzes_sala
      custom_fields:
        # Fix 5: ícone 65px com grayscale quando luzes off (igual bento_cozinha/icon_couch_lamp)
        icon: >
          [[[
            const on = entity?.state === 'on';
            const f = on ? 'none' : 'grayscale(1) contrast(0.4) brightness(0.8)';
            return '<svg viewBox="0 0 4.8 4.8" xmlns="http://www.w3.org/2000/svg" style="width:65px;height:65px;filter:' + f + ';display:block;">'
              + '<path d="M.78 2.565H.69V.87C.69.75.75.51.975.51v.098C.78.608.78.855.78.871v1.695" fill="#666"/>'
              + '<path d="M1.62.525a.81.81 0 0 0-.188-.09L1.313.052C1.298 0 1.171-.008 1.021.037s-.255.128-.24.18l.128.397S.811.786.804.846c-.022.12.045.472.045.472l1.05-.315c-.007-.007-.172-.39-.278-.48" fill="#94989b"/>'
              + '<path d="M1.89.998c.03.105-.188.263-.472.345-.292.09-.547.075-.57-.03-.03-.105.188-.263.472-.345.285-.09.547-.075.57.03" fill="#ffe62e"/>'
              + '<path d="M4.447 3.053a.15.15 0 0 1-.15.15H.502a.15.15 0 0 1-.15-.15v-.975a.15.15 0 0 1 .15-.15h3.803a.15.15 0 0 1 .15.15v.975z" fill="#42ade2"/>'
              + '<path d="M4.447 3.053a.15.15 0 0 1-.15.15H.502a.15.15 0 0 1-.15-.15v-.975a.15.15 0 0 1 .15-.15h3.803a.15.15 0 0 1 .15.15v.975z" fill="#428bc1" opacity=".5"/>'
              + '<path d="M3.375 3.203H.352V2.047s.6.69 3.022 1.155" fill="#428bc1"/>'
              + '<path d="M4.672 2.288c0-.135-.098-.24-.225-.24-.12 0-.217.105-.217.24v.93c0 .135.098.24.217.24.12 0 .225-.105.225-.24v-.93" fill="#42ade2"/>'
              + '<path fill="#8a8e92" d="M.457 4.485H.75V4.8H.457z"/>'
              + '<path d="M3.375 4.485H.3c-.165 0-.3-.142-.3-.322s.135-.322.3-.322h3.075v.645m0-.646H.3c-.165 0-.3-.142-.3-.322s.135-.322.3-.322h3.075v.645" fill="#428bc1"/>'
              + '<path fill="#8a8e92" d="M4.05 4.485h.292V4.8H4.05z"/>'
              + '<path d="M1.425 3.84H4.5c.165 0 .3.142.3.322s-.135.322-.3.322H1.425v-.645" fill="#428bc1"/>'
              + '<path d="M1.425 3.203H4.5c.165 0 .3.142.3.322s-.135.322-.3.322H1.425v-.645" fill="#428bc1"/>'
              + '<path d="M.57 2.288c0-.135-.098-.24-.217-.24-.12 0-.217.105-.217.24v.93c0 .135.098.24.217.24.12 0 .217-.105.217-.24v-.93" fill="#42ade2"/>'
              + '<path d="M4.53 1.965s-.217.187-.255.285c-.075.21-.022.667 0 .892.007.037.037.142.037.142s-.255-.068-.345-.083c-.172-.022-.51.015-.682 0-.075-.007-.3-.06-.3-.06s.195-.09.232-.15c.12-.186.143-.666.158-.891v-.128s.165.052.225.06c.165.015.51-.015.675-.03.06 0 .255-.037.255-.037" fill="#c7e755"/>'
              + '</svg>';
          ]]]
        temp: >
          [[[
            const t = states['sensor.sl_sensor_temp_humid_temperatura'];
            const temp = t && t.state && !['unknown','unavailable'].includes(t.state) ? `${t.state}°` : '—';
            // Fix P3: umidade vem de sensor separado (atributo humidity inexistente no sensor de temp)
            // ANTERIOR: t?.attributes?.humidity != null ? `${t.attributes.humidity}%` : ''
            const h = states['sensor.sl_sensor_temp_humid_umidade'];
            const hum = h && !['unknown','unavailable'].includes(h.state) ? `${h.state}%` : '';
            return `<div style="display:flex;flex-direction:column;gap:3px;">
              <span style="font-size:13px;font-weight:700;color:rgba(255,255,255,0.9);">${temp}</span>
              <span style="font-size:11px;color:rgba(255,255,255,0.52);">${hum}</span>
            </div>`;
          ]]]
        # Fix 7: vazio quando off; mini badge icon+count+timer quando on
        lights: >
          [[[
            const raw = states['sensor.living_room_active']?.state;
            const n = raw != null ? Number(raw) : NaN;
            let count;
            if (!Number.isNaN(n) && n > 0) {
              count = n;
            } else {
              const ids = ['light.sala_switch_1','light.sala_switch_2'];
              count = ids.filter(id => states[id]?.state === 'on').length;
            }
            if (count === 0) return '';
            const ms = Date.now() - Date.parse(entity?.last_changed ?? '');
            const m = Math.floor(ms / 60000);
            const h = Math.floor(m / 60);
            const d = Math.floor(h / 24);
            const timeStr = d > 0 ? `${d}d` : h > 0 ? `${h}h` : m > 0 ? `${m}m` : '<1m';
            return `<div style="display:flex;align-items:center;gap:4px;">
              <ha-icon icon="mdi:lightbulb-on" style="width:11px;height:11px;color:#fbbf24;display:flex;"></ha-icon>
              <span style="font-size:10px;font-weight:600;color:#fbbf24;">${count} · ${timeStr}</span>
            </div>`;
          ]]]
        # Fix 8: dots reativos — mudam cor quando TV/AC/Alexa/pessoa ativos
        right: >
          [[[
            const tvOn  = ['on','playing','paused','idle'].includes(states['media_player.smart_tv_pro_2']?.state ?? '');
            const acOn  = !['off','unavailable','unknown',''].includes(states['climate.sl_ar_condicionado']?.state ?? 'off');
            const alexa = ['playing','on','paused'].includes(states['media_player.echo_show']?.state ?? '');
            const home  = states['person.bruno_helasio']?.state === 'home';
            const dot = (icon, active, color) =>
              `<div style="width:26px;height:26px;border-radius:50%;background:${active?color+'22':'rgba(255,255,255,0.08)'};border:1px solid ${active?color+'55':'rgba(255,255,255,0.12)'};display:flex;align-items:center;justify-content:center;">` +
              `<ha-icon icon="${icon}" style="width:14px;height:14px;color:${active?color:'rgba(255,255,255,0.35)'};display:flex;"></ha-icon></div>`;
            return `<div style="display:flex;flex-direction:column;gap:5px;padding-top:2px;">
              ${dot('mdi:account',          home,  '#60a5fa')}
              ${dot('mdi:television-classic', tvOn,  '#a78bfa')}
              ${dot('mdi:snowflake',          acOn,  '#4facfe')}
              ${dot('mdi:speaker-wireless',   alexa, '#ff9900')}
            </div>`;
          ]]]
      styles:
        card:
          - background: transparent
          - border: none
          - box-shadow: none
          - padding: 0
          - margin: 0
          - height: 100%
        # Fix 6: "n" (native name) na própria linha, alinhado à esquerda; ícone+temp em cima
        grid:
          - grid-template-areas: '"icon temp right" "n n right" "lights lights right"'
          - grid-template-columns: auto 1fr auto
          # Fix P5: auto auto 1fr — ícone+temp no topo, nome embaixo imediato, lights preenche o resto
          # ANTERIOR: 1fr auto auto — empurrava nome+lights para borda inferior causando corte
          - grid-template-rows: auto auto 1fr
        name:
          - justify-self: start
          - align-self: end
          - font-size: 15px
          - font-weight: 700
          - color: white
          - margin-bottom: 2px
        custom_fields:
          icon:
            - justify-self: start
            - align-self: start
          temp:
            - justify-self: start
            - align-self: start
            - margin-left: 10px
            - margin-top: 4px
          lights:
            - justify-self: start
            # Fix P5: align-self:start — badge aparece logo abaixo do nome (anterior: end colava na borda)
            - align-self: start
          right:
            - justify-self: end
            - align-self: start
            - margin-right: 2px

    # ── TV ───────────────────────────────────────────────────────────
    - type: custom:button-card
      view_layout:
        grid-area: tv
      entity: media_player.smart_tv_pro_2
      icon: mdi:television-classic
      name: TV
      show_icon: true
      show_name: true
      show_state: true
      show_label: true
      triggers_update:
        - media_player.smart_tv_pro_2
      state_display: >
        [[[ return !entity || entity.state === 'off' ? 'Desligada' : 'Ligada'; ]]]
      label: >
        [[[ return entity && entity.state !== 'off' ? 'Controle rápido' : 'Toque para ligar'; ]]]
      tap_action:
        action: toggle
      hold_action:
        action: more-info
      custom_fields:
        toggle_vis: >
          [[[
            const on = entity && entity.state !== 'off';
            return `<div style="width:36px;height:20px;border-radius:10px;position:relative;background:${on?'linear-gradient(180deg,rgba(167,139,250,0.95)0%,rgba(167,139,250,0.65)100%)':'linear-gradient(180deg,rgba(255,255,255,0.20)0%,rgba(255,255,255,0.10)100%)'};">
              <div style="position:absolute;top:2px;left:${on?'18px':'2px'};width:16px;height:16px;border-radius:50%;background:white;"></div>
            </div>`;
          ]]]
        # Fix 5b: +/− só quando TV ligada
        controls: >
          [[[
            const on = entity && entity.state !== 'off';
            if (!on) return '';
            return `<div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
              <div style="width:24px;height:24px;border-radius:8px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.78);font-size:14px;font-weight:700;">+</div>
              <div style="width:24px;height:24px;border-radius:8px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.78);font-size:14px;font-weight:700;">−</div>
            </div>`;
          ]]]
      styles:
        card:
          - background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.10) 55%, rgba(255,255,255,0.08) 100%)
          - border: 1px solid rgba(255,255,255,0.14)
          - border-radius: 18px
          - padding: 16px
          # Fix P7: margin removido — margin em ha-card (shadow DOM) não afeta item de grid host
          # ANTERIOR: - margin: 0 8px (causava também overflow com height:100%)
          - height: 100%
          - box-shadow: none
        # Fix 10: ícone e nome na mesma linha (3 colunas)
        grid:
          - grid-template-areas: '"i n toggle_vis" "s s controls" "l l controls"'
          - grid-template-columns: auto 1fr auto
          - grid-template-rows: auto 1fr auto
          - row-gap: 6px
        icon:
          - width: 20px
          - color: rgba(255,255,255,0.82)
          - align-self: center
        name:
          - font-size: 12px
          - font-weight: 700
          - justify-self: start
          - align-self: center
          - margin-left: 6px
        state:
          - font-size: 11px
          - color: rgba(255,255,255,0.82)
          - justify-self: start
        label:
          - font-size: 9px
          - color: rgba(255,255,255,0.38)
          - justify-self: start
        custom_fields:
          toggle_vis:
            - justify-self: end
            - align-self: start
          controls:
            - justify-self: end
            - align-self: end

    # ── A/C ──────────────────────────────────────────────────────────
    - type: custom:button-card
      view_layout:
        grid-area: ac
      entity: climate.sl_ar_condicionado
      icon: mdi:snowflake
      name: A/C
      show_icon: true
      show_name: true
      show_state: true
      show_label: true
      triggers_update:
        - climate.sl_ar_condicionado
      state_display: >
        [[[
          // Fix P8: lista explícita de estados ativos (anterior: !== 'off' incluía 'unavailable')
          const active = ['cool','heat','fan_only','dry','heat_cool','auto'];
          if (!entity || !active.includes(entity.state)) return 'Desligado';
          const temp = entity.attributes?.temperature ?? '—';
          return `${temp}° · ${entity.state}`;
        ]]]
      label: >
        [[[
          // Fix P8: ANTERIOR: entity && entity.state !== 'off' ? ... : ...
          const active = ['cool','heat','fan_only','dry','heat_cool','auto'];
          return active.includes(entity?.state) ? 'Controle rápido' : 'Toque para ligar';
        ]]]
      # Fix 4: turn_off/turn_on explícito — climate.toggle não suportado pela integração
      tap_action:
        action: perform-action
        # Fix P8: lista explícita — ANTERIOR: !== 'off' avaliava 'unavailable' como ligado
        perform_action: "[[[ const on=['cool','heat','fan_only','dry','heat_cool','auto'].includes(entity?.state); return on?'climate.turn_off':'climate.turn_on'; ]]]"
        target:
          entity_id: climate.sl_ar_condicionado
        haptic: success
      hold_action:
        action: more-info
      custom_fields:
        toggle_vis: >
          [[[
            // Fix P8: lista explícita — ANTERIOR: entity && entity.state !== 'off'
            const on = ['cool','heat','fan_only','dry','heat_cool','auto'].includes(entity?.state);
            return `<div style="width:36px;height:20px;border-radius:10px;position:relative;background:${on?'linear-gradient(180deg,rgba(79,172,254,0.95)0%,rgba(79,172,254,0.65)100%)':'linear-gradient(180deg,rgba(255,255,255,0.20)0%,rgba(255,255,255,0.10)100%)'};">
              <div style="position:absolute;top:2px;left:${on?'18px':'2px'};width:16px;height:16px;border-radius:50%;background:white;"></div>
            </div>`;
          ]]]
        # Fix 3: +/− só quando AC ligado (era sempre visível)
        controls: >
          [[[
            // Fix P8: lista explícita — ANTERIOR: entity && entity.state !== 'off'
            const on = ['cool','heat','fan_only','dry','heat_cool','auto'].includes(entity?.state);
            if (!on) return '';
            return `<div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
              <div style="width:24px;height:24px;border-radius:8px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.78);font-size:14px;font-weight:700;">+</div>
              <div style="width:24px;height:24px;border-radius:8px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.78);font-size:14px;font-weight:700;">−</div>
            </div>`;
          ]]]
      styles:
        card:
          - background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.10) 55%, rgba(255,255,255,0.08) 100%)
          - border: 1px solid rgba(255,255,255,0.14)
          - border-radius: 18px
          - padding: 16px
          # Fix P7: margin removido — margin em ha-card (shadow DOM) não afeta item de grid host
          # ANTERIOR: - margin: 0 8px (causava também overflow com height:100%)
          - height: 100%
          - box-shadow: none
        # Fix 10: ícone e nome na mesma linha (3 colunas)
        grid:
          - grid-template-areas: '"i n toggle_vis" "s s controls" "l l controls"'
          - grid-template-columns: auto 1fr auto
          - grid-template-rows: auto 1fr auto
          - row-gap: 6px
        icon:
          - width: 20px
          - color: rgba(255,255,255,0.82)
          - align-self: center
        name:
          - font-size: 12px
          - font-weight: 700
          - justify-self: start
          - align-self: center
          - margin-left: 6px
        state:
          - font-size: 11px
          - color: rgba(255,255,255,0.82)
          - justify-self: start
        label:
          - font-size: 9px
          - color: rgba(255,255,255,0.38)
          - justify-self: start
        custom_fields:
          toggle_vis:
            - justify-self: end
            - align-self: start
          controls:
            - justify-self: end
            - align-self: end

    # ── Corredor (Fix 9: mesma linha que cortina, coluna esquerda) ────
    - type: custom:button-card
      view_layout:
        grid-area: corredor
      entity: light.corredor_switch_1
      show_icon: false
      show_name: false
      show_state: false
      triggers_update:
        - light.corredor_switch_1
      tap_action:
        action: toggle
      custom_fields:
        left: >
          [[[
            const on = entity?.state === 'on';
            return `<div style="display:flex;align-items:center;gap:8px;">
              <ha-icon icon="mdi:lightbulb-outline" style="width:14px;height:14px;color:${on?'#fbbf24':'rgba(255,255,255,0.55)'};"></ha-icon>
              <div>
                <div style="font-size:11px;font-weight:700;color:white;line-height:1.1;">Corredor</div>
                <div style="font-size:9px;color:rgba(255,255,255,0.45);line-height:1.2;">${on?'Ligado':'Desligado'}</div>
              </div>
            </div>`;
          ]]]
        right: >
          [[[
            const on = entity?.state === 'on';
            return `<div style="width:34px;height:18px;border-radius:9px;position:relative;background:${on?'linear-gradient(180deg,rgba(251,191,36,0.95)0%,rgba(251,191,36,0.65)100%)':'linear-gradient(180deg,rgba(255,255,255,0.20)0%,rgba(255,255,255,0.10)100%)'};">
              <div style="position:absolute;top:1px;left:${on?'17px':'1px'};width:16px;height:16px;border-radius:50%;background:white;"></div>
            </div>`;
          ]]]
      styles:
        card:
          - background: transparent
          - border: none
          - box-shadow: none
          - padding: 0
          - height: 100%
        grid:
          - grid-template-areas: '"left right"'
          - grid-template-columns: 1fr auto
          - grid-template-rows: 1fr
        custom_fields:
          left:
            - justify-self: start
            - align-self: center
          right:
            - justify-self: end
            - align-self: center

    # ── Cortina (Fix 9: coluna direita; sem botão Parar — espaço reduzido) ─
    - type: custom:layout-card
      layout_type: custom:grid-layout
      view_layout:
        grid-area: curtain
      layout:
        grid-template-columns: 1fr auto auto
        align-items: center
        grid-gap: 5px
        margin: 0
        padding: 0
        height: 100%
      card_mod:
        style:
          .: |
            ha-card {
              background: transparent !important;
              border: none !important;
              box-shadow: none !important;
              padding: 0 !important;
              /* Fix P9: garantir preenchimento da linha de 54px; min-height:0 remove default do HA */
              height: 100% !important;
              min-height: 0 !important;
            }
          $: |
            .card-content { padding: 0 !important; }
      cards:
        - type: custom:button-card
          entity: cover.cortina_sala
          show_icon: false
          show_name: false
          show_state: false
          tap_action: { action: none }
          triggers_update:
            - cover.cortina_sala
          custom_fields:
            info: >
              [[[
                let st = '';
                if (entity) {
                  if (entity.state === 'open') st = 'Aberta';
                  else if (entity.state === 'closed') st = 'Fechada';
                  else if (entity.attributes?.current_position != null) st = `${entity.attributes.current_position}%`;
                }
                return `<div style="display:flex;align-items:center;gap:6px;">
                  <ha-icon icon="mdi:blinds" style="width:12px;height:12px;color:rgba(255,255,255,0.72);"></ha-icon>
                  <div>
                    <div style="font-size:11px;font-weight:700;color:white;line-height:1.1;">Cortina</div>
                    ${st ? `<div style="font-size:9px;color:rgba(255,255,255,0.45);line-height:1.2;">${st}</div>` : ''}
                  </div>
                </div>`;
              ]]]
          styles:
            card: [background: transparent, border: none, box-shadow: none, padding: 0, height: 100%]
            grid: [grid-template-areas: '"info"', grid-template-columns: 1fr, grid-template-rows: 1fr]
            custom_fields:
              info: [justify-self: start, align-self: center]

        - type: custom:button-card
          show_icon: false
          show_name: true
          name: Abrir
          tap_action:
            action: perform-action
