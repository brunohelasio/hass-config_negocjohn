- type: grid
  title: Rooms
  view_layout:
    grid-area: devices
    show:
      # ANTERIOR: mediaquery: '(min-width: 801px) and (min-height: 463px)'
      mediaquery: '(max-width: 0px)'
  columns: 2
  cards: !include ../../shared/grid-cards/common-rooms.yaml

- type: conditional
  view_layout:
    grid-area: devices
  conditions:
    - condition: screen
      # ANTERIOR: media_query: '(max-width: 800px) and (min-height: 463px)'
      media_query: '(max-width: 0px)'
    - condition: state
      entity: input_select.mobile_dashboard_tab
      state: comodos
  card:
    type: grid
    title: Rooms
    columns: 2
    cards: !include ../../shared/grid-cards/common-rooms.yaml
