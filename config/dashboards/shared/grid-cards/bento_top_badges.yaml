# NOVO v2: 3 button-cards separados (Luzes/Mídia/Clima) com vidro fosco/branco quando ativo
#   + avatar 40px com align-self:center para corrigir oval
#   + triggers_update separados por domínio (sem monolito de todos os estados)
- type: custom:layout-card
  layout_type: custom:grid-layout
  layout:
    # FIX C: removida coluna do spacer fantasma; avatar ocupa a 4ª coluna (1fr) com justify-self:end
    # ANTERIOR: max-content max-content max-content 1fr max-content
    grid-template-columns: max-content max-content max-content 1fr
    align-items: center
    grid-gap: 8px
    margin: 0
    padding: 0 4px
  card_mod:
    style:
      .: |
        ha-card {
          background: transparent !important;
          box-shadow: none !important;
          border: none !important;
          padding: 0 !important;
        }
      $: |
        /* FIX C: zerando padding padrão do .card-content que causava espaço extra abaixo das badges */
        .card-content {
          padding: 0 !important;
          margin: 0 !important;
        }
  cards:

    # ── badge Luzes ──────────────────────────────────────────────
    - type: custom:button-card
      show_icon: false
      show_name: false
      show_state: false
      tap_action: { action: none }
      hold_action: { action: none }
      triggers_update:
        - light.sala_switch_1
        - light.sala_switch_2
        - light.cozinha_switch_1
        - light.cozinha_switch_2
        - light.lavabo_switch_1
        - light.corredor_switch_1
        - light.quarto_miguel_switch_1
        - light.quarto_miguel_switch_2
      variables:
        ls: >
          [[[
            const e = ['light.sala_switch_1','light.sala_switch_2','light.cozinha_switch_1','light.cozinha_switch_2','light.lavabo_switch_1','light.corredor_switch_1','light.quarto_miguel_switch_1','light.quarto_miguel_switch_2'];
            const n = e.filter(id => states[id]?.state === 'on').length;
            return { a: n > 0, lbl: n === 0 ? 'Off' : n === e.length ? 'All On' : n + ' On' };
          ]]]
      custom_fields:
        badge: >
          [[[
            const e = ['light.sala_switch_1','light.sala_switch_2','light.cozinha_switch_1','light.cozinha_switch_2','light.lavabo_switch_1','light.corredor_switch_1','light.quarto_miguel_switch_1','light.quarto_miguel_switch_2'];
            const n = e.filter(id => states[id]?.state === 'on').length;
            const a = n > 0;
            const lbl = n === 0 ? 'Off' : n === e.length ? 'All On' : n + ' On';
            const ic = a ? '#92400e' : 'rgba(255,255,255,0.52)';
            const lc = a ? 'rgba(0,0,0,0.52)' : 'rgba(255,255,255,0.52)';
            const cc = a ? 'rgba(0,0,0,0.85)' : 'rgba(255,255,255,0.9)';
            const svg = '<path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5C17.61 10.48 18 9.29 18 8A6 6 0 1 0 6 8c0 1.29.39 2.48 1.09 3.5.76.76 1.23 1.52 1.41 2.5"/>';
            return '<div style="display:inline-flex;align-items:center;gap:5px;white-space:nowrap;">'
              + '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="' + ic + '" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;flex-shrink:0;">' + svg + '</svg>'
              + '<span style="font-size:9px;font-weight:600;color:' + lc + ';letter-spacing:0.09em;">LUZES</span>'
              + '<span style="font-size:11px;font-weight:700;color:' + cc + ';">' + lbl + '</span>'
              + '</div>';
          ]]]
      styles:
        card:
          - height: 46px
          - border-radius: 999px
          - padding: 0 14px
          - background: "[[[ return variables.ls?.a ? 'rgba(250,250,250,0.82)' : 'rgba(0,0,0,0.22)'; ]]]"
          - border: "[[[ return variables.ls?.a ? '1px solid rgba(255,255,255,0.35)' : '1px solid rgba(255,255,255,0.14)'; ]]]"
          - backdrop-filter: "[[[ return variables.ls?.a ? 'none' : 'blur(16px) saturate(1.2)'; ]]]"
          - -webkit-backdrop-filter: "[[[ return variables.ls?.a ? 'none' : 'blur(16px) saturate(1.2)'; ]]]"
          - box-shadow: none
        custom_fields:
          badge: [display: flex, align-items: center, height: 100%]
        grid: [grid-template-areas: '"badge"', grid-template-columns: 1fr, grid-template-rows: 1fr]

    # ── badge Mídia ──────────────────────────────────────────────
    - type: custom:button-card
      show_icon: false
      show_name: false
      show_state: false
      tap_action: { action: none }
      hold_action: { action: none }
      triggers_update:
        - media_player.smart_tv_pro_2
        - media_player.spotifyplus_bruno_helasio
        - media_player.echo_show
      variables:
        ms: >
          [[[
            const e = ['media_player.smart_tv_pro_2','media_player.spotifyplus_bruno_helasio','media_player.echo_show'];
            const n = e.filter(id => ['playing','paused','on'].includes(states[id]?.state ?? '')).length;
            return { a: n > 0, lbl: n === 0 ? 'Off' : n + ' On' };
          ]]]
      custom_fields:
        badge: >
          [[[
            const e = ['media_player.smart_tv_pro_2','media_player.spotifyplus_bruno_helasio','media_player.echo_show'];
            const n = e.filter(id => ['playing','paused','on'].includes(states[id]?.state ?? '')).length;
            const a = n > 0;
            const lbl = n === 0 ? 'Off' : n + ' On';
            const ic = a ? '#166534' : 'rgba(255,255,255,0.52)';
            const lc = a ? 'rgba(0,0,0,0.52)' : 'rgba(255,255,255,0.52)';
            const cc = a ? 'rgba(0,0,0,0.85)' : 'rgba(255,255,255,0.9)';
            const svg = '<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>';
            return '<div style="display:inline-flex;align-items:center;gap:5px;white-space:nowrap;">'
              + '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="' + ic + '" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;flex-shrink:0;">' + svg + '</svg>'
              + '<span style="font-size:9px;font-weight:600;color:' + lc + ';letter-spacing:0.09em;">MÍDIA</span>'
              + '<span style="font-size:11px;font-weight:700;color:' + cc + ';">' + lbl + '</span>'
              + '</div>';
          ]]]
      styles:
        card:
          - height: 46px
          - border-radius: 999px
          - padding: 0 14px
          - background: "[[[ return variables.ms?.a ? 'rgba(250,250,250,0.82)' : 'rgba(0,0,0,0.22)'; ]]]"
          - border: "[[[ return variables.ms?.a ? '1px solid rgba(255,255,255,0.35)' : '1px solid rgba(255,255,255,0.14)'; ]]]"
          - backdrop-filter: "[[[ return variables.ms?.a ? 'none' : 'blur(16px) saturate(1.2)'; ]]]"
          - -webkit-backdrop-filter: "[[[ return variables.ms?.a ? 'none' : 'blur(16px) saturate(1.2)'; ]]]"
          - box-shadow: none
        custom_fields:
          badge: [display: flex, align-items: center, height: 100%]
        grid: [grid-template-areas: '"badge"', grid-template-columns: 1fr, grid-template-rows: 1fr]

    # ── badge Clima ──────────────────────────────────────────────
    - type: custom:button-card
      show_icon: false
      show_name: false
      show_state: false
      tap_action: { action: none }
      hold_action: { action: none }
      triggers_update:
        - climate.sl_ar_condicionado
        - climate.ac_office
        - climate.ac_quarto_miguel
      variables:
        cs: >
          [[[
            const e = ['climate.sl_ar_condicionado','climate.ac_office','climate.ac_quarto_miguel'];
            const n = e.filter(id => !['off','unavailable','unknown',''].includes(states[id]?.state ?? 'unknown')).length;
            return { a: n > 0, lbl: n === 0 ? 'Off' : n + ' On' };
          ]]]
      custom_fields:
        badge: >
          [[[
            const e = ['climate.sl_ar_condicionado','climate.ac_office','climate.ac_quarto_miguel'];
            const n = e.filter(id => !['off','unavailable','unknown',''].includes(states[id]?.state ?? 'unknown')).length;
            const a = n > 0;
            const lbl = n === 0 ? 'Off' : n + ' On';
            const ic = a ? '#075985' : 'rgba(255,255,255,0.52)';
            const lc = a ? 'rgba(0,0,0,0.52)' : 'rgba(255,255,255,0.52)';
            const cc = a ? 'rgba(0,0,0,0.85)' : 'rgba(255,255,255,0.9)';
            const svg = '<path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>';
            return '<div style="display:inline-flex;align-items:center;gap:5px;white-space:nowrap;">'
              + '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="' + ic + '" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;flex-shrink:0;">' + svg + '</svg>'
              + '<span style="font-size:9px;font-weight:600;color:' + lc + ';letter-spacing:0.09em;">CLIMA</span>'
              + '<span style="font-size:11px;font-weight:700;color:' + cc + ';">' + lbl + '</span>'
              + '</div>';
          ]]]
      styles:
        card:
          - height: 46px
          - border-radius: 999px
          - padding: 0 14px
          - background: "[[[ return variables.cs?.a ? 'rgba(250,250,250,0.82)' : 'rgba(0,0,0,0.22)'; ]]]"
          - border: "[[[ return variables.cs?.a ? '1px solid rgba(255,255,255,0.35)' : '1px solid rgba(255,255,255,0.14)'; ]]]"
          - backdrop-filter: "[[[ return variables.cs?.a ? 'none' : 'blur(16px) saturate(1.2)'; ]]]"
          - -webkit-backdrop-filter: "[[[ return variables.cs?.a ? 'none' : 'blur(16px) saturate(1.2)'; ]]]"
          - box-shadow: none
        custom_fields:
          badge: [display: flex, align-items: center, height: 100%]
        grid: [grid-template-areas: '"badge"', grid-template-columns: 1fr, grid-template-rows: 1fr]

    # ── espaçador REMOVIDO ───────────────────────────────────────
    # FIX D: card de espaçador herdava estilos globais do tema e criava barra fosca visual
    # ANTERIOR:
    # - type: custom:button-card
    #   show_icon: false
    #   show_name: false
    #   tap_action: { action: none }
    #   hold_action: { action: none }
    #   styles:
    #     card: [background: transparent, border: none, box-shadow: none]
    # Grid agora usa 4 colunas (max-content x3 + 1fr); avatar vai na coluna 4 com justify-self:end

    # ── avatar de presença (46px, align-self:center corrige oval) ─
    - type: custom:button-card
      entity: person.bruno_helasio
      show_name: false
      show_state: false
      show_icon: false
      tap_action: { action: none }
      hold_action: { action: none }
      triggers_update:
        - person.bruno_helasio
      custom_fields:
        avatar: >
          [[[
            const pic = entity?.attributes?.entity_picture || '';
            return pic
              ? '<img src="' + pic + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>'
              : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;background:rgba(255,255,255,0.15);border-radius:50%;">B</div>';
          ]]]
      styles:
        card:
          - justify-self: end
          - align-self: center
          - width: 46px
          - height: 46px
          - border-radius: 50%
          - background: rgba(255,255,255,0.12)
          - border: "1px solid rgba(255,255,255,0.24)"
          - padding: 0
          - box-shadow: none
        custom_fields:
          avatar: [width: 100%, height: 100%, overflow: hidden, border-radius: 50%]
        grid: [grid-template-areas: '"avatar"', grid-template-columns: 1fr, grid-template-rows: 1fr]
