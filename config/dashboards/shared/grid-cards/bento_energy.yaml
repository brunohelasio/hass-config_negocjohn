- type: vertical-stack
  cards:
    - type: custom:button-card
      entity: input_select.periodo_energia_dashboard
      show_icon: false
      show_name: false
      show_state: false
      tap_action:
        action: none
      triggers_update:
        - input_select.periodo_energia_dashboard
        - sensor.energia_total_casa_periodo_atual
      custom_fields:
        header: |
          [[[ return '<div style="font-size:11px;font-weight:700;letter-spacing:0.14em;color:rgba(255,255,255,0.46);text-transform:uppercase;">Energia</div>'; ]]]
        value: |
          [[[ 
            const v = states['sensor.energia_total_casa_periodo_atual']?.state;
            const num = (v !== undefined && v !== null && !['unknown','unavailable','none'].includes(v)) ? Number(v).toFixed(2) : '0.00';
            const p = states['input_select.periodo_energia_dashboard']?.state || 'Diário';
            return `<div style="font-size:22px;font-weight:700;color:rgba(255,255,255,0.96);">${p} · ${num} kWh</div>`;
          ]]]
        subtitle: |
          [[[ return '<div style="font-size:13px;color:rgba(255,255,255,0.56);">Consumo estimado (tendência)</div>'; ]]]
        selector:
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                name: Diário
                show_icon: false
                show_state: false
                entity: input_select.periodo_energia_dashboard
                tap_action:
                  action: perform-action
                  perform_action: input_select.select_option
                  data:
                    entity_id: input_select.periodo_energia_dashboard
                    option: Diário
                styles:
                  card:
                    - height: 24px
                    - border-radius: 999px
                    - background: >
                        [[[
                          const a = states['input_select.periodo_energia_dashboard']?.state === 'Diário';
                          return a ? 'rgba(255,255,255,0.84)' : 'rgba(0,0,0,0.18)';
                        ]]]
                    - border: >
                        [[[
                          const a = states['input_select.periodo_energia_dashboard']?.state === 'Diário';
                          return a ? '1px solid rgba(255,255,255,0.42)' : '1px solid rgba(255,255,255,0.16)';
                        ]]]
                    - box-shadow: none
                    - padding: 0 8px
                  name:
                    - color: >
                        [[[
                          const a = states['input_select.periodo_energia_dashboard']?.state === 'Diário';
                          return a ? 'rgba(0,0,0,0.82)' : 'rgba(255,255,255,0.78)';
                        ]]]
                    - font-size: 10px
                    - font-weight: 700

              - type: custom:button-card
                name: Semanal
                show_icon: false
                show_state: false
                entity: input_select.periodo_energia_dashboard
                tap_action:
                  action: perform-action
                  perform_action: input_select.select_option
                  data:
                    entity_id: input_select.periodo_energia_dashboard
                    option: Semanal
                styles:
                  card:
                    - height: 24px
                    - border-radius: 999px
                    - background: >
                        [[[
                          const a = states['input_select.periodo_energia_dashboard']?.state === 'Semanal';
                          return a ? 'rgba(255,255,255,0.84)' : 'rgba(0,0,0,0.18)';
                        ]]]
                    - border: >
                        [[[
                          const a = states['input_select.periodo_energia_dashboard']?.state === 'Semanal';
                          return a ? '1px solid rgba(255,255,255,0.42)' : '1px solid rgba(255,255,255,0.16)';
                        ]]]
                    - box-shadow: none
                    - padding: 0 8px
                  name:
                    - color: >
                        [[[
                          const a = states['input_select.periodo_energia_dashboard']?.state === 'Semanal';
                          return a ? 'rgba(0,0,0,0.82)' : 'rgba(255,255,255,0.78)';
                        ]]]
                    - font-size: 10px
                    - font-weight: 700

              - type: custom:button-card
                name: Mensal
                show_icon: false
                show_state: false
                entity: input_select.periodo_energia_dashboard
                tap_action:
                  action: perform-action
                  perform_action: input_select.select_option
                  data:
                    entity_id: input_select.periodo_energia_dashboard
                    option: Mensal
                styles:
                  card:
                    - height: 24px
                    - border-radius: 999px
                    - background: >
                        [[[
                          const a = states['input_select.periodo_energia_dashboard']?.state === 'Mensal';
                          return a ? 'rgba(255,255,255,0.84)' : 'rgba(0,0,0,0.18)';
                        ]]]
                    - border: >
                        [[[
                          const a = states['input_select.periodo_energia_dashboard']?.state === 'Mensal';
                          return a ? '1px solid rgba(255,255,255,0.42)' : '1px solid rgba(255,255,255,0.16)';
                        ]]]
                    - box-shadow: none
                    - padding: 0 8px
                  name:
                    - color: >
                        [[[
                          const a = states['input_select.periodo_energia_dashboard']?.state === 'Mensal';
                          return a ? 'rgba(0,0,0,0.82)' : 'rgba(255,255,255,0.78)';
                        ]]]
                    - font-size: 10px
                    - font-weight: 700
      styles:
        grid:
          - grid-template-areas: '"header selector" "value selector" "subtitle selector"'
          - grid-template-columns: 1fr max-content
          - grid-template-rows: min-content min-content min-content
          - column-gap: 10px
          - row-gap: 4px
        card:
          - background: transparent
          - border: none
          - box-shadow: none
          - padding: 12px 14px 2px
        custom_fields:
          header:
            - justify-self: start
          value:
            - justify-self: start
          subtitle:
            - justify-self: start
          selector:
            - justify-self: end
            - align-self: start

    - type: vertical-stack
      cards:
        - type: conditional
          conditions:
            - entity: input_select.periodo_energia_dashboard
              state: Diário
          card:
            type: custom:apexcharts-card
            graph_span: 24h
            span:
              start: day
            update_interval: 2min
            header:
              show: false
            show:
              loading: false
              last_updated: false
              legend_value: false
            yaxis:
              - id: energia
                decimals: 1
            apex_config:
              chart:
                height: 120
                toolbar:
                  show: false
              grid:
                borderColor: "rgba(255,255,255,0.12)"
                strokeDashArray: 2
              xaxis:
                labels:
                  show: true
                  style:
                    colors: "rgba(255,255,255,0.45)"
                    fontSize: 10px
              yaxis:
                labels:
                  show: true
                  style:
                    colors: "rgba(255,255,255,0.45)"
                    fontSize: 10px
              dataLabels:
                enabled: false
              markers:
                size: 3
                strokeWidth: 0
            series:
              - entity: sensor.energia_total_casa_diaria
                name: kWh
                yaxis_id: energia
                type: area
                curve: smooth
                stroke_width: 3
                color: '#6FB8FF'
                opacity: 0.22
                show:
                  extremas: true
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  border: none !important;
                  box-shadow: none !important;
                  margin-top: -2px;
                  padding: 0 6px 0 2px;
                }

        - type: conditional
          conditions:
            - entity: input_select.periodo_energia_dashboard
              state: Semanal
          card:
            type: custom:apexcharts-card
            graph_span: 7d
            span:
              end: day
            update_interval: 15min
            header:
              show: false
            show:
              loading: false
              last_updated: false
              legend_value: false
            yaxis:
              - id: energia
                decimals: 1
            apex_config:
              chart:
                height: 120
                toolbar:
                  show: false
              grid:
                borderColor: "rgba(255,255,255,0.12)"
                strokeDashArray: 2
              xaxis:
                labels:
                  show: true
                  style:
                    colors: "rgba(255,255,255,0.45)"
                    fontSize: 10px
              yaxis:
                labels:
                  show: true
                  style:
                    colors: "rgba(255,255,255,0.45)"
                    fontSize: 10px
              dataLabels:
                enabled: false
              markers:
                size: 3
                strokeWidth: 0
            series:
              - entity: sensor.energia_total_casa_semanal
                name: kWh
                yaxis_id: energia
                type: area
                curve: smooth
                stroke_width: 3
                color: '#6FB8FF'
                opacity: 0.22
                group_by:
                  func: max
                  duration: 1d
                show:
                  extremas: true
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  border: none !important;
                  box-shadow: none !important;
                  margin-top: -2px;
                  padding: 0 6px 0 2px;
                }

        - type: conditional
          conditions:
            - entity: input_select.periodo_energia_dashboard
              state: Mensal
          card:
            type: custom:apexcharts-card
            graph_span: 30d
            span:
              end: day
            update_interval: 30min
            header:
              show: false
            show:
              loading: false
              last_updated: false
              legend_value: false
            yaxis:
              - id: energia
                decimals: 1
            apex_config:
              chart:
                height: 120
                toolbar:
                  show: false
              grid:
                borderColor: "rgba(255,255,255,0.12)"
                strokeDashArray: 2
              xaxis:
                labels:
                  show: true
                  style:
                    colors: "rgba(255,255,255,0.45)"
                    fontSize: 10px
              yaxis:
                labels:
                  show: true
                  style:
                    colors: "rgba(255,255,255,0.45)"
                    fontSize: 10px
              dataLabels:
                enabled: false
              markers:
                size: 3
                strokeWidth: 0
            series:
              - entity: sensor.energia_total_casa_mensal
                name: kWh
                yaxis_id: energia
                type: area
                curve: smooth
                stroke_width: 3
                color: '#6FB8FF'
                opacity: 0.22
                group_by:
                  func: max
                  duration: 1d
                show:
                  extremas: true
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  border: none !important;
                  box-shadow: none !important;
                  margin-top: -2px;
                  padding: 0 6px 0 2px;
                }
