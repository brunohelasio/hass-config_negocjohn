            <div style="font-size:10px;font-weight:700;letter-spacing:0.10em;color:rgba(255,255,255,0.40);text-transform:uppercase;">Iluminação</div>
            <div style="font-size:22px;font-weight:700;color:rgba(255,255,255,0.90);">Luzes</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.32);line-height:1.5;">
              3 botões Sala · 4 botões Varanda<br>light.grupo_luzes_sala
