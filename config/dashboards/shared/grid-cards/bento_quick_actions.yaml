- type: custom:layout-card
  layout_type: custom:grid-layout
  layout:
    grid-template-columns: 1fr auto
    align-items: end
    column-gap: 12px
    margin: 0
    padding: 0
  card_mod:
    style: |
      ha-card {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        height: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }
  cards:
    - type: markdown
      content: |
        <div style="display:flex;flex-direction:column;line-height:1.12;">
          <span style="font-size:11px;font-weight:700;letter-spacing:0.14em;color:rgba(255,255,255,0.46);text-transform:uppercase;">Ações</span>
          <span style="font-size:11px;font-weight:700;letter-spacing:0.14em;color:rgba(255,255,255,0.46);text-transform:uppercase;">rápidas</span>
        </div>
      card_mod:
        style: |
          ha-card {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 56px !important;
            overflow: visible !important;
            display: flex !important;
            align-items: flex-start !important;
            justify-content: flex-start !important;
          }
          ha-markdown {
            padding: 0 !important;
            width: 100% !important;
            overflow: visible !important;
          }

    - type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-auto-flow: column
        grid-auto-columns: 52px
        grid-column-gap: 8px
        align-items: end
      cards:
        - type: custom:button-card
          icon: mdi:lightbulb-off-outline
          show_name: false
          tap_action:
            action: call-service
            service: homeassistant.turn_off
            data:
              entity_id: light.todas_as_luzes
          hold_action:
            action: none
          styles: &quick_icon_styles
            card:
              - width: 52px
              - height: 52px
              - border-radius: 14px
              - background: rgba(255,255,255,0.10)
              - border: 1px solid rgba(255,255,255,0.18)
              - backdrop-filter: blur(14px) saturate(1.15)
              - -webkit-backdrop-filter: blur(14px) saturate(1.15)
              - box-shadow: none
              - margin: 0
              - padding: 0
            icon:
              - color: rgba(255,255,255,0.92)
              - width: 22px

        - type: custom:button-card
          icon: mdi:movie-roll
          show_name: false
          tap_action:
            action: none
          hold_action:
            action: none
          styles: *quick_icon_styles

        - type: custom:button-card
          icon: mdi:laptop
          show_name: false
          tap_action:
            action: none
          hold_action:
            action: none
          styles: *quick_icon_styles

        - type: custom:button-card
          icon: mdi:sofa-outline
          show_name: false
          tap_action:
            action: none
          hold_action:
            action: none
          styles: *quick_icon_styles
