- type: custom:button-card
  entity: sensor.time
  triggers_update:
    - sensor.time
  show_name: false
  show_icon: false
  show_state: false
  show_label: false
  tap_action:
    action: none
  custom_fields:
    date_line: >
      [[[
        var dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira',
                    'Quinta-feira','Sexta-feira','Sábado'];
        var meses = ['Jan','Fev','Mar','Abr','Mai','Jun',
                     'Jul','Ago','Set','Out','Nov','Dez'];
        var d = new Date();
        var s = dias[d.getDay()] + ', ' + d.getDate() + ' ' + meses[d.getMonth()];
        return '<div style="font-size:11px;letter-spacing:0.12em;'
             + 'color:rgba(255,255,255,0.44);font-weight:600;'
             + 'text-transform:uppercase;">' + s + '</div>';
      ]]]
    greet_line: >
      [[[
        var h = new Date().getHours();
        var g = (h < 12) ? 'Bom dia' : (h < 18 ? 'Boa tarde' : 'Boa noite');
        return '<div style="font-size:26px;font-weight:700;color:white;'
             + 'line-height:1.2;">' + g + ', Bruno</div>';
      ]]]
    clock: >
      [[[
        var d = new Date();
        var hh = String(d.getHours()).padStart(2, '0');
        var mm = String(d.getMinutes()).padStart(2, '0');
        return '<div style="font-size:78px;font-weight:200;line-height:1;'
             + 'color:white;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;">'
             + hh + ':' + mm + '</div>';
      ]]]
  styles:
    grid:
      - grid-template-areas: '"date_line" "greet_line" "clock"'
      - grid-template-columns: "1fr"
      - grid-template-rows: "auto auto auto"
      - row-gap: "6px"
    card:
      - background: "transparent"
      - border: "none"
      - box-shadow: "none"
      - padding: "18px 18px 6px"
      - cursor: "default"
    custom_fields:
      date_line:
        - justify-self: "start"
      greet_line:
        - justify-self: "start"
      clock:
        - justify-self: "start"


