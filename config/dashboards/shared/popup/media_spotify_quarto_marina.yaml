# --- NOVO (call-service — compatível com browser_mod 2.10.2 + HA 2026.4.0) ---
action: call-service
service: browser_mod.popup
data:
  title: Spotify — Quarto Marina
  tag: spotify_quarto_marina
  style: >
    --popup-max-width: min(500px, 90vw);
  card_mod: !include ../snippets/style_popup_complete.yaml
  content:
    type: custom:spotifyplus-card
    # FIX: parametros corretos conforme documentacao thlucas1:
    # entity (nao entity_id), deviceDefaultId (nao playerDefaultDeviceName)
    entity: media_player.spotifyplus_bruno_helasio
    deviceDefaultId: Echo Pop Marina
    playerBackgroundImageSize: "cover"
    deviceControlByName: true
    sections:
      - player
      - devices
      - userpresets
    card_mod:
      style: |
        ha-card {
          --ha-card-border-width: 0;
          background: transparent;
          max-height: 70vh;
          overflow-y: auto;
          border-radius: 12px;
        }
        /* FIX: centralizar artwork no popup */
        .player-background,
        .player-background img,
        .player-section .thumbnail,
        .player-section .thumbnail img {
          object-fit: cover !important;
          object-position: center center !important;
          background-position: center center !important;
          background-size: cover !important;
        }
