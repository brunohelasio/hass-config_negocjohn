# 4. TEMPO AGORA — v12
#    - Icone animado SVG grande (/local/svg/weather/*.svg, 64px)
#    - Coluna esquerda: icone + temp + sensacao (alinhamento vertical central)
#    - Coluna direita: grid 2-col (icone 18px | texto) — 4 atributos alinhados
#      verticalmente (Umid / Vento / Nascer / Por)
#    - Mapeamento HA state -> SVG file via sun.sun (day/night)
- type: custom:button-card
  entity: weather.forecast_casa
  triggers_update:
    - weather.forecast_casa
    - sun.sun
  show_name: false
  show_icon: false
  show_state: false
  show_label: true
  label: >
    [[[
      var state = entity.state;
      var attrs = entity.attributes || {};
      var tempInt = Math.round(parseFloat(attrs.temperature) || 0);
      var apparent = attrs.apparent_temperature;
      var apparentTxt = (apparent !== undefined && apparent !== null)
        ? Math.round(parseFloat(apparent)) + '°C'
        : '--°C';
      var humid = (attrs.humidity !== undefined && attrs.humidity !== null)
        ? Math.round(parseFloat(attrs.humidity)) + '%'
        : '--%';
      var wind = (attrs.wind_speed !== undefined && attrs.wind_speed !== null)
        ? Math.round(parseFloat(attrs.wind_speed)) + ' km/h'
        : '-- km/h';
      var sun = states['sun.sun'];
      var isDay = sun && sun.state === 'above_horizon';
      // HA weather state -> SVG filename (meteocons em /local/svg/weather/)
      var svgMap = {
        'sunny': isDay ? 'clear-day' : 'clear-night',
        'clear-night': 'clear-night',
        'partlycloudy': isDay ? 'partly-cloudy-day' : 'partly-cloudy-night',
        'cloudy': 'cloudy',
        'rainy': 'rain',
        'pouring': 'rain',
        'lightning': 'rain',
        'lightning-rainy': 'rain',
        'snowy': 'snow',
        'snowy-rainy': 'sleet',
        'fog': 'fog',
        'windy': 'wind',
        'windy-variant': 'wind'
      };
      var svgFile = svgMap[state] || 'cloudy';
      var svgUrl = '/local/svg/weather/' + svgFile + '.svg';
      function fmt(iso){
        if (!iso) return '--:--';
        var d = new Date(iso);
        if (isNaN(d.getTime())) return '--:--';
        var h = String(d.getHours()).padStart(2,'0');
        var m = String(d.getMinutes()).padStart(2,'0');
        return h + ':' + m;
      }
      var rising = sun && sun.attributes ? fmt(sun.attributes.next_rising) : '--:--';
      var setting = sun && sun.attributes ? fmt(sun.attributes.next_setting) : '--:--';
      var iconCell = 'justify-self:center;align-self:center;display:flex;';
      var iconStyle = '--mdc-icon-size:16px;';
      var labelStyle = 'color:rgba(255,255,255,0.42);font-size:10px;'
                     + 'text-transform:uppercase;letter-spacing:1.2px;'
                     + 'font-weight:600;';
      var valStyle = 'color:rgba(255,255,255,0.88);font-size:11px;'
                   + 'font-weight:500;text-align:right;justify-self:end;';
      function attrRow(icon, color, label, val){
        return '<div style="' + iconCell + '">'
             +   '<ha-icon icon="' + icon + '" style="' + iconStyle
             +     'color:' + color + ';"></ha-icon>'
             + '</div>'
             + '<div style="' + labelStyle + '">' + label + '</div>'
             + '<div style="' + valStyle + '">' + val + '</div>';
      }
      return '<div style="font-size:10px;font-weight:700;letter-spacing:2px;'
           + 'color:rgba(255,255,255,0.30);text-transform:uppercase;'
           + 'margin-bottom:12px;">TEMPO AGORA</div>'
           + '<div style="display:grid;grid-template-columns:1fr 1.15fr;gap:14px;'
           +   'align-items:center;">'
           // --- COLUNA ESQUERDA: SVG animado + temp + sensacao ---
           +   '<div style="display:flex;align-items:center;gap:12px;">'
           +     '<img src="' + svgUrl + '" alt="' + state + '" '
           +       'style="width:64px;height:64px;flex-shrink:0;display:block;"/>'
           +     '<div>'
           +       '<div style="font-size:32px;font-weight:200;line-height:1;'
           +         'color:rgba(255,255,255,0.95);">' + tempInt + '°C</div>'
           +       '<div style="font-size:11px;color:rgba(255,255,255,0.50);'
           +         'margin-top:5px;">Sensação ' + apparentTxt + '</div>'
           +     '</div>'
           +   '</div>'
           // --- COLUNA DIREITA: grid 3-col (icone | label | valor) ---
           +   '<div style="display:grid;grid-template-columns:20px auto 1fr;'
           +     'row-gap:5px;column-gap:8px;align-items:center;">'
           +     attrRow('mdi:water-percent',     '#60a5fa', 'Umid',   humid)
           +     attrRow('mdi:weather-windy',     '#7dd3fc', 'Vento',  wind)
           +     attrRow('mdi:weather-sunset-up', '#fb923c', 'Nascer', rising)
           +     attrRow('mdi:weather-sunset-down','#f97316','Pôr',    setting)
           +   '</div>'
           + '</div>';
    ]]]
  tap_action: !include ../popup/popup_weather.yaml
  styles:
    card:
      - background: "transparent"
      - border: "none"
      - box-shadow: "none"
      # Padding-bottom maior para deixar respiro acima da curva ::after (56px).
      - padding: "14px 18px 68px"
      - height: "auto"
      - cursor: "pointer"
      - position: "relative"
      - z-index: "2"
    label:
      - width: "100%"
      - text-align: "left"
      - padding: "0"
