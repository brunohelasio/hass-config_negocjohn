#################################################
#                                               #
#                  MAIN ROOMS                   #
#                                               #
#################################################
- type: grid
  # ANTERIOR: title: Masters
  title: Cômodos
  view_layout:
    # ANTERIOR: grid-area: mainrooms
    grid-area: rooms_grid
    show:
      mediaquery: '(min-width: 801px) and (min-height: 463px)'
  columns: 3
  cards: !include ../../shared/grid-cards/rooms-bento.yaml

- type: conditional
  view_layout:
    # ANTERIOR: grid-area: mainrooms
    grid-area: rooms_grid
  conditions:
    - condition: screen
      media_query: '(max-width: 800px) and (min-height: 463px)'
    - condition: state
      entity: input_select.mobile_dashboard_tab
      state: comodos
  card:
    type: grid
    # ANTERIOR: title: Masters
    title: Cômodos
    columns: 3
    cards: !include ../../shared/grid-cards/rooms-bento.yaml
