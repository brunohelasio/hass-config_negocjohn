# v11 — REFACTOR DEFINITIVO: layout determinístico (topo + trilha mini)
# Objetivo: ocupar harmonicamente o bloco sem bleed/corte lateral.
# Estratégia:
#   1) Um único card de topo flexível (conditional).
#   2) Miniaturas em grid 4 colunas com padding lateral dedicado.
#   3) Estado ativo com realce interno (inset) — sem glow externo recortável.
#   4) Nenhuma remoção de histórico: versões anteriores mantidas comentadas.
# ─────────────────────────────────────────────────────────────────

