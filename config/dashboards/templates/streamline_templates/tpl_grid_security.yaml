# FRONT DOOR (lock.sl_fechadura_operate_lock)
grid_front_door:
  card:
    type: custom:button-card
    # entity: lock.nuki_neklanka_byt_lock  # entidade antiga
    entity: lock.sl_fechadura_operate_lock
    name: Front door
    tap_action:
      action: block
    template:
      - front_door
      - icon_lock
      - loader

# CAMERAS (abre popup com 8 cameras do apartamento)
grid_cameras_button:
  card:
    type: custom:button-card
    name: Cameras
    icon: mdi:cctv
    show_icon: true
    template:
      - base
    variables:
      state_on: true
    tap_action: !include ../../shared/popup/cameras_user.yaml
    hold_action:
      action: none
    styles:
      icon:
        - color: rgba(255, 255, 255, 0.6)
        - width: 24px

# DOORS (placeholder — sem sensores de porta ainda)
grid_contact_sensors:
  card:
    type: custom:button-card
    name: Doors
    icon: mdi:door
    show_icon: true
    template:
      - base
    tap_action:
      action: none
    hold_action:
      action: none
    variables:
      state_on: false
    styles:
      card:
        - opacity: '0.45'
        - cursor: default
      icon:
        - color: rgba(255, 255, 255, 0.4)
        - width: 24px

# SENSORS (placeholder — sem sensores de presenca ainda)
grid_motion_sensors:
  card:
    type: custom:button-card
    name: Sensors
    icon: mdi:motion-sensor
    show_icon: true
    template:
      - base
    tap_action:
      action: none
    hold_action:
      action: none
    variables:
      state_on: false
    styles:
      card:
        - opacity: '0.45'
        - cursor: default
      icon:
        - color: rgba(255, 255, 255, 0.4)
        - width: 24px
