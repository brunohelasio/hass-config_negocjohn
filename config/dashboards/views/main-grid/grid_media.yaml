#################################################
#                                               #
#    NOVO: SWIPE-CARD MEDIA COM ENTIDADES REAIS #
#                                               #
#    Slide 1: Artwork fullscreen (condicional)  #
#    Slide 2: Grid de botoes dos players        #
#                                               #
#    IMPORTANTE: Os valores de 'state:' nos     #
#    conditional cards devem corresponder ao     #
#    friendly_name EXATO da entidade no HA.     #
#    Se nao corresponderem, ajuste manualmente. #
#                                               #
#################################################

#################################################
#           DESKTOP (min-width: 1441px)         #
#################################################
- type: grid
  title: Media
  view_layout:
    grid-area: media
    show:
      mediaquery: '(min-width: 1441px)'
  columns: 1
  square: true
  cards:
    - type: custom:swipe-card
      parameters: !include ../../shared/snippets/main-grid-swipe-params.yaml
      cards:
        ########## SLIDE 1: ARTWORK CONDICIONAL ##########
        - type: horizontal-stack
          cards:
            # TV - TCL Smart TV Pro 2
            - type: conditional
              conditions:
                - entity: select.conditional_media
                  state: Smart TV Pro 2
              card: &TV_CARD
                type: custom:button-card
                entity: media_player.smart_tv_pro_2
                name: ' '
                template:
                  - conditional_media
                  - progress_bar
                  - icon_tv
            # Alexa - Echo Show
            - type: conditional
              conditions:
                - entity: select.conditional_media
                  state: Echo Show
              card: &ECHO_CARD
                type: custom:button-card
                entity: media_player.echo_show
                name: ' '
                template:
                  - conditional_media
                  - progress_bar
            # SpotifyPlus
            - type: conditional
              conditions:
                - entity: select.conditional_media
                  state: Spotifyplus Bruno Helasio
              card: &SPOTIFYPLUS_CARD
                type: custom:button-card
                entity: media_player.spotifyplus_bruno_helasio
                name: ' '
                template:
                  - currently_playing
            # Spotify nativo
            - type: conditional
              conditions:
                - entity: select.conditional_media
                  state: Spotify Bruno Helasio
              card: &SPOTIFY_CARD
                type: custom:button-card
                entity: media_player.spotify
                name: ' '
                template:
                  - currently_playing
            # Fallback: Recently added (nenhum player ativo)
            - type: conditional
              conditions:
                - entity: select.conditional_media
                  state: Recently added
              card:
                type: custom:button-card
                entity: media_player.smart_tv_pro_2
                name: 'Media'
                template:
                  - conditional_media

        ########## SLIDE 2: GRID DE BOTOES ##########
        - type: grid
          columns: 2
          square: true
          cards:
            - type: custom:button-card
              entity: media_player.smart_tv_pro_2
              template:
                - mediaplayer
                - icon_tv
            - type: custom:button-card
              entity: media_player.echo_show
              template:
                - mediaplayer
            - type: custom:button-card
              entity: media_player.spotifyplus_bruno_helasio
              template:
                - mediaplayer
                - icon_spotify
            - type: custom:button-card
              entity: media_player.spotify
              template:
                - mediaplayer
                - icon_spotify_color

#################################################
#      TABLET/PHONE (max-width: 1440px)         #
#################################################
- type: grid
  title: Media
  view_layout:
    grid-area: media
    show:
      mediaquery: '(min-height: 463px) and (max-width: 1440px)'
  columns: 1
  cards:
    - type: custom:swipe-card
      parameters: !include ../../shared/snippets/main-grid-swipe-params.yaml
      cards:
        ########## SLIDE 1: ARTWORK CONDICIONAL ##########
        - type: horizontal-stack
          cards:
            # TV - TCL Smart TV Pro 2
            - type: conditional
              conditions:
                - entity: select.conditional_media
                  state: Smart TV Pro 2
              card: *TV_CARD
            # Alexa - Echo Show
            - type: conditional
              conditions:
                - entity: select.conditional_media
                  state: Echo Show
              card: *ECHO_CARD
            # SpotifyPlus
            - type: conditional
              conditions:
                - entity: select.conditional_media
                  state: Spotifyplus Bruno Helasio
              card: *SPOTIFYPLUS_CARD
            # Spotify nativo
            - type: conditional
              conditions:
                - entity: select.conditional_media
                  state: Spotify Bruno Helasio
              card: *SPOTIFY_CARD
            # Fallback
            - type: conditional
              conditions:
                - entity: select.conditional_media
                  state: Recently added
              card:
                type: custom:button-card
                entity: media_player.smart_tv_pro_2
                name: 'Media'
                template:
                  - conditional_media

        ########## SLIDE 2: GRID DE BOTOES ##########
        - type: grid
          columns: 2
          square: true
          cards:
            - type: custom:button-card
              entity: media_player.smart_tv_pro_2
              template:
                - mediaplayer
                - icon_tv
            - type: custom:button-card
              entity: media_player.echo_show
              template:
                - mediaplayer
            - type: custom:button-card
              entity: media_player.spotifyplus_bruno_helasio
              template:
                - mediaplayer
                - icon_spotify
            - type: custom:button-card
              entity: media_player.spotify
              template:
                - mediaplayer
                - icon_spotify_color
