# CLIMATE STATUS AND TEMPERATURES
##########################################

# Superior esquerdo — Umidade (estilo original com grafico)
- type: custom:button-card
  entity: sensor.home_climate
  name: Humidade
  tap_action:
    action: none
  template:
    - airpurifier

# Superior direito — Temperatura (estilo original com grafico)
- type: custom:button-card
  entity: sensor.home_climate
  name: Temperatura
  template:
    - thermostat
  tap_action:
    action: call-service
    service: input_boolean.toggle
    service_data:
      entity_id: input_boolean.svg_temp_humid
  double_tap_action: !include ../popup/thermostat.yaml

# Inferior esquerdo — Ar da sala
- type: custom:button-card
  entity: climate.sl_ar_condicionado
  name: AC Sala
  show_icon: false
  template:
    - tpl_popup_climate
    - icon_climate
  tap_action:
    action: perform-action
    perform_action: climate.toggle
    target:
      entity_id: climate.sl_ar_condicionado
    haptic: success
  double_tap_action:
    action: more-info
  hold_action:
    action: more-info

# Inferior direito — Cortina (icone visivel, inativo)
- type: custom:button-card
  name: Cortina Sala
  show_icon: false
  template:
    - base
    - icon_shade
  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none
  styles:
    card:
      - opacity: '0.45'
      - cursor: default
