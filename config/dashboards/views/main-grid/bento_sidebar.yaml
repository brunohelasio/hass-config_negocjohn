# FIX 11: substituído type:grid por custom:stack-in-card — padrão usado por todos os outros
# blocos bento (bento_cozinha, bento_sala, etc.) onde backdrop-filter funciona de forma confiável.
type: custom:stack-in-card
view_layout:
  grid-area: sidebar
card_mod:
  style: |
    :host {
      height: 100% !important;
      margin: 0 !important;
      display: block !important;
    }
    ha-card {
      height: 100% !important;
      margin: 0 !important;
      display: block !important;
      padding: 0 !important;
      background: linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04)) !important;
      backdrop-filter: blur(18px) saturate(1.2) !important;
      -webkit-backdrop-filter: blur(18px) saturate(1.2) !important;
      border: 1px solid rgba(255,255,255,0.10) !important;
      border-radius: 16px !important;
      overflow: hidden !important;
      --ha-card-backdrop-filter: none !important;
      --ha-card-background: transparent !important;
      --ha-card-border-width: 0 !important;
    }
    ha-card::before {
      display: none !important;
    }
cards:
  - !include ../../shared/grid-cards/bento_sidebar.yaml
