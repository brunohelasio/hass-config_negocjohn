    # NOVO layout 2 colunas: col_buttons (4-3-4-2 grid) | col_camera
    # Botoes organizados em 4 linhas: 4 luzes | 3 luzes | 4 midia | 2 clima
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        # ANTERIOR (4 colunas): grid-template-columns: 1.4fr 1fr
        # ANTERIOR (5 colunas): grid-template-columns: 1.6fr 1fr
        grid-template-columns: 1.4fr 1.0fr
        grid-template-areas: '"col_buttons col_camera"'
        grid-gap: 10px
        margin: 0
        padding: 0.5rem
        mediaquery:
          "(max-width: 800px)":
            grid-template-columns: 1fr
            grid-template-areas: |
              "col_buttons"
              "col_camera"
            padding: 0
      cards:
        # ── Coluna 1: Todos os botoes em layout 4-3-4-2 ──
        - type: vertical-stack
          view_layout:
            grid-area: col_buttons
          cards: !include ../../columns/room_living_all_buttons.yaml

        # ── Coluna 2: Cameras ──
        - type: custom:layout-card
          layout_type: custom:grid-layout
          view_layout:
            grid-area: col_camera
          layout:
            grid-template-columns: 1fr
            margin: 0
          cards: !include ../../columns/room_living_cameras.yaml
