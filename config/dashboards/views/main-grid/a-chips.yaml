#################################################
#                                               #
#             CHIPS MIN 1441px                  #
#                                               #
#################################################
- type: horizontal-stack
  view_layout:
    grid-area: chips
    show:
      mediaquery: '(min-width: 1441px)'
  cards:
    - *lights
    - *media
    - *presence
