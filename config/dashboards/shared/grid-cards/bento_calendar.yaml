- type: custom:button-card
  show_name: false
  show_icon: false
  show_state: false
  tap_action:
    action: fire-dom-event
    browser_mod:
      service: browser_mod.popup
      data:
        title: Agenda Mensal
        size: wide
        content:
          type: calendar
          entities:
            - calendar.brunohelasio_gmail_com
            - calendar.familia
            - calendar.feriados_no_brasil
          initial_view: dayGridMonth
  custom_fields:
    header: |
      [[[
        return '<div style="font-size:11px;font-weight:700;letter-spacing:0.14em;color:rgba(255,255,255,0.46);text-transform:uppercase;">Agenda</div>';
      ]]]
    events:
      card:
        type: custom:calendar-card-pro
        background_color: transparent
        refresh_interval: 5
        refresh_on_navigate: true
        entities:
          - entity: calendar.brunohelasio_gmail_com
            color: "#7fdbe9"
          - entity: calendar.familia
            color: "#fdd835"
          - entity: calendar.birthdays
            color: "#ff6c92"
          - entity: calendar.feriados_no_brasil
            color: "#1DB954"
        days_to_show: 3
        compact_events_to_show: 3
        event_color: "rgba(255,255,255,0.92)"
        time_color: "rgba(255,255,255,0.72)"
        location_color: "rgba(255,255,255,0.50)"
        weekday_color: "rgba(255,255,255,0.50)"
        day_color: "rgba(255,255,255,0.92)"
        empty_day_color: "rgba(255,255,255,0.4)"
        day_separator_color: "rgba(255,255,255,0.08)"
        show_month: false
        show_location: false
        event_background_opacity: 0
        card_mod:
          style: |
            ha-card {
              background: transparent !important;
              border: none !important;
              box-shadow: none !important;
              padding: 0 !important;
            }
            .day-table {
              margin: 0 !important;
              width: 100% !important;
            }
            
            /* AJUSTE 1 e 2: Centraliza a data e esmaga o espaço vazio para puxar a linha */
            .date-column {
              text-align: center !important;
              min-width: 32px !important;
              width: 32px !important;
              padding-right: 8px !important;
            }
            
            /* AJUSTE 2: Puxa o texto do evento/empty-day para mais perto da linha azul */
            .event-column {
              padding-left: 8px !important;
            }

            /* Proíbe a quebra de linha apenas nas colunas corretas (mantendo o alinhamento à esquerda) */
            .event, .event-title, .summary, .empty-day {
              white-space: nowrap !important;
              text-align: left !important;
            }
  styles:
    grid:
      - grid-template-areas: '"header" "events"'
      - grid-template-columns: 1fr
      - grid-template-rows: min-content 1fr
      - row-gap: 12px
    card:
      - background: transparent
      - border: none
      - box-shadow: none
      - padding: 14px 16px 14px 14px
      - height: 100%
      - cursor: pointer
    custom_fields:
      header:
        - justify-self: start
        - align-self: start
      events:
        - align-self: start
        - justify-self: start
        - width: 100%
        - display: block
        - margin-left: -4px
