type: custom:stack-in-card
card_mod:
  style: |
    :host {
      height: 100% !important;
      margin: 0 !important;
      display: block !important;
    }
    /* #root — COMENTADO: não necessário. O overflow:hidden do ha-card clipa o excesso
       do quadrado aspect_ratio:1/1 (258px) para a altura da célula (235px).
       Não precisamos propagar height pelo #root.
    #root {
      height: 100% !important;
      flex: 1 !important;
    }
    */
    ha-card {
      height: 100% !important;
      margin: 0 !important;
      /* SIMPLIFICADO: display:block em vez de flex — com flex+justify-content:center o
         quadrado seria centralizado verticalmente (clipando 11px em cima E em baixo);
         com block, o quadrado começa no topo e só os 23px inferiores são clipados. */
      display: block !important;
      padding: 0px !important;
      
      /* O seu vidro validado */
      background: linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04)) !important;
      backdrop-filter: blur(18px) saturate(1.2) !important;
      -webkit-backdrop-filter: blur(18px) saturate(1.2) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 18px !important;
      overflow: hidden !important;
      
      --ha-card-backdrop-filter: none !important;
      --ha-card-background: transparent !important;
      --ha-card-border-width: 0 !important;
    }
    ha-card::before { display: none !important; }
cards:
  - !include ../../shared/grid-cards/bento_cozinha.yaml