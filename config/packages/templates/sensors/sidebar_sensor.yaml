#################################################
#                                               #
#            SIDEBAR SENSOR                     #
#                                               #
#################################################
template:
  - sensor:
      - unique_id: sidebar
        state: template
        attributes:
          time: >
            {% set hours = now().strftime('%H') %}
            {% set minutes = now().strftime('%M') %}
            <span class="time">
              {{ hours }}<span class="time-colon">:</span>{{ minutes }}
            </span>
          date: >
            <font color='#6a7377'><b>
            {% set days = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'] %}
            {% set months = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
            'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'] %}
              {{ days[now().weekday()] }}<br>
              {{ now().day }} {{ months[now().month-1] }}
            </b></font>
          greet: >
            <b>
            {% set time = now().hour %}
            {% if time <= 1 %} Boa noite {{'🌙'}}
            {% elif time <= 5 %} Boa noite {{'😴'}}
            {% elif time <= 7 %} Bom dia {{'🌅'}}
            {% elif time <= 9 %} Bom dia {{'☕'}}
            {% elif time <= 12 %} Bom dia {{'😊'}}
            {% elif time <= 13 %} Boa tarde {{'🍽️'}}
            {% elif time <= 17 %} Boa tarde {{'👋'}}
            {% elif time <= 19 %} Boa noite {{'🌆'}}
            {% elif time <= 22 %} Boa noite {{'😌'}}
            {% else %} Boa noite {{'🌙'}}
            {% endif %}
            </b>
          weather: >
            {% set entity = 'weather.forecast_casa' %}
            {% if not is_state(entity, 'unknown') %}
              {% set temp = state_attr(entity, 'temperature') | round %}
              {% set humidity = state_attr(entity, 'humidity') | round %}
              {{ temp }}° · {{ humidity }}%
            {% else %}
              Clima indisponível
            {% endif %}
