# Controle remoto Smart TV — popup browser_mod
# Usa custom:apple-tv-card (visual coeso, funciona com qualquer remote entity)
# tag: tv_remote — empilha sobre popup da Sala
#
# NOTA: Se os direcionais nao responderem, os nomes dos comandos podem precisar
# de ajuste conforme a integracao TCL (ex: KEY_UP em vez de up).
# Testar via Developer Tools > Services > remote.send_command
#
# ORIGINAL: grid de button-cards com remote_icon_arrow/remote_icon_only (feio e nao respondia)
# - type: vertical-stack
#   cards:
#     - type: custom:mushroom-media-player-card ...
#     - type: grid (columns: 3, d-pad com remote.send_command)
#     - type: grid (columns: 3, volume)
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: 'Smart TV Remote'
    tag: tv_remote
    style: >
      --popup-background-color: rgba(21,25,35,1);
    card_mod:
      style:
        .: |
          :host {
            --ha-card-border-radius: 12px !important;
          }
          @media (max-width: 450px), (max-height: 500px) {
            ha-dialog {
              --mdc-dialog-min-width: 100vw !important;
              --mdc-dialog-min-height: 100vh !important;
              --popup-border-radius: 0 !important;
            }
            ha-dialog>ha-dialog-header {
              display: block !important;
            }
          }
    content:
      type: custom:mod-card
      card_mod:
        style:
          .: |
            ha-dialog>ha-dialog-header {
              display: none;
            }
      card:
        type: custom:apple-tv-card
        background: 'linear-gradient(155deg, rgba(60,66,80,1) 0%, rgba(23,26,37,1) 42%, rgba(21,25,35,1) 100%)'
        entity: media_player.smart_tv_pro_2
        full_screen: true
        remote: remote.smart_tv_pro
