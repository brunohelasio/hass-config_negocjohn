    style: |
      ha-card {
        background: rgba(255,255,255,0.07);
        backdrop-filter: blur(20px) saturate(1.2);
        -webkit-backdrop-filter: blur(20px) saturate(1.2);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        height: 100%;
        overflow: hidden;
        aspect-ratio: unset;
        padding: 0;
      }
