# === BASE — 4 mini tabs (v9 — solução definitiva) ===
# Motivo da reescrita: v7/v8 usavam custom:button-card com HTML no slot label.
# Problema: height:100% dentro do label de button-card não cascateia (parent sem
# altura intrínseca), então <img position:absolute> resolvia para 0x0 → tabs
# invisíveis. Além disso, card_mod com display:grid no #root de hui-horizontal-
# stack-card piorava o caso por não bater exatamente no shadow-root.
#
# Solução v9:
#   1. type: grid columns:4 square:false — grid nativo do HA, 4 colunas iguais,
#      sem card_mod no container.
#   2. Cada tab = picture-entity nativo (camera_image cuida do token rotativo).
#   3. aspect-ratio: 16/11 via card_mod → altura derivada da largura, elimina
#      cascata de height:100%.
#   4. Estado ativo via Jinja em card_mod (reativo ao input_select).

