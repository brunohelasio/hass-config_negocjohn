- type: custom:button-card
  show_name: false
  show_icon: false
  show_state: false
  tap_action:
    action: none
  custom_fields:
    header: |
      [[[
        return '<div style="font-size:11px;font-weight:700;letter-spacing:0.14em;color:rgba(255,255,255,0.46);text-transform:uppercase;">Energia</div>';
      ]]]
    value: |
      [[[ return '<div style="font-size:22px;font-weight:700;color:rgba(255,255,255,0.96);">Consumo do dia · 18.4 kWh</div>'; ]]]
    subtitle: |
      [[[
        return '<div style="font-size:14px;color:rgba(255,255,255,0.56);">Bloco reservado para gráfico futuro</div>';
      ]]]
    chart: |
      [[[
        return `
          <svg viewBox="-24 0 408 90" preserveAspectRatio="none" width="100%" height="78" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#6FB8FF"/>
                <stop offset="100%" stop-color="#82D6FF"/>
              </linearGradient>
              <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="rgba(111,184,255,0.35)"/>
                <stop offset="100%" stop-color="rgba(111,184,255,0.02)"/>
              </linearGradient>
            </defs>
            <path d="M0 58 C28 54, 36 36, 58 34 C80 32, 88 56, 110 58 C134 60, 146 22, 170 20 C196 18, 206 50, 228 52 C252 54, 268 34, 294 28 C322 22, 338 26, 360 24"
                  fill="none" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
            <path d="M0 58 C28 54, 36 36, 58 34 C80 32, 88 56, 110 58 C134 60, 146 22, 170 20 C196 18, 206 50, 228 52 C252 54, 268 34, 294 28 C322 22, 338 26, 360 24 L360 90 L0 90 Z"
                  fill="url(#fill)"/>
          </svg>`;
      ]]]
  styles:
    grid:
      - grid-template-areas: '"header" "value" "subtitle" "chart"'
      - grid-template-columns: 1fr
      - grid-template-rows: min-content min-content min-content 1fr
      - row-gap: 4px
    card:
      - background: transparent
      - border: none
      - box-shadow: none
      - padding: 12px 14px 10px
      - height: 100%
    custom_fields:
      header:
        - justify-self: start
      value:
        - justify-self: start
      subtitle:
        - justify-self: start
      chart:
        - align-self: end
        - width: calc(100% + 64px)
        - margin-left: -32px
        - margin-right: -32px
