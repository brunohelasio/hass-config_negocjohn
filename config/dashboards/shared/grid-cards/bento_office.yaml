- type: custom:layout-card
  layout_type: custom:grid-layout
  layout:
    grid-template-columns: repeat(3, minmax(0, 1fr))
    grid-template-rows: repeat(2, minmax(160px, 1fr))
    grid-gap: 10px
  cards:
    - type: markdown
      content: "## 🍽️ Cozinha\n2 luzes"
      card_mod: &ios
        style: |
          ha-card {
            --ios-blue: rgba(10, 132, 255, 0.3);
            --ios-blue-glow: rgba(10, 132, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.2);
            height: 100%;
            border-radius: 24px;
            background: var(--ios-blue);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), 0 0 25px var(--ios-blue-glow), inset 0 1px 2px rgba(255, 255, 255, 0.4);
            color: #ffffff;
            transition: all 0.3s ease;
          }
          ha-card:hover {
            background: rgba(10, 132, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), 0 0 35px rgba(10, 132, 255, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.5);
          }
          ha-card:active {
            transform: translateY(1px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2), 0 0 15px var(--ios-blue-glow), inset 0 1px 2px rgba(255, 255, 255, 0.3);
          }
    - type: markdown
      content: "## 🛁 Lavabo\nApagado"
      card_mod: *ios
    - type: markdown
      content: "## 🚪 Corredor\n3 luzes"
      card_mod: *ios
    - type: markdown
      content: "## 🛏️ Q. Casal\nApagado"
      card_mod: *ios
    - type: markdown
      content: "## 🛏️ Q. Marina\n1 luz"
      card_mod: *ios
    - type: markdown
      content: "## 🛏️ Q. Miguel\nApagado"
      card_mod: *ios
