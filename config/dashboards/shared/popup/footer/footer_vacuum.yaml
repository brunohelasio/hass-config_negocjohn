# NOVO: Layout 3 colunas estilo ngocjohn (2026-04-02)
# Reproduz o layout visual do screenshot de referencia (Roidmi EVE Plus do ngocjohn).
# Usa custom:mod-card → custom:layout-card com !include snippets para:
#   - style_popup_center.yaml: centraliza o dialog verticalmente
#   - style_popup_footer.yaml: separadores entre colunas + estilos de entities cards
# Sizing: --popup-width: 1100px via pipeline uix-dialog do tema tablet.yaml
# Hardware de referencia: Galaxy Tab S6 Lite (2000x1200 landscape) — sem scroll vertical.
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Roborock S7
    tag: vacuum_popup
    style: >
      --popup-width: 1100px;
    card_mod: !include ../../snippets/style_popup_center.yaml  # centraliza o dialog verticalmente
    content:
      type: custom:mod-card
      card_mod: !include ../../snippets/style_popup_footer.yaml  # separadores entre colunas + estilos entities cards
      card:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 320px 1fr 340px
          grid-template-rows: 1fr
          grid-template-areas: '"summary map settings"'
          margin: 0
          padding: 0
          mediaquery:
            '(max-width: 800px)':
              grid-template-columns: 1fr
              grid-template-rows: auto auto auto
              grid-template-areas: |
                "summary"
                "map"
                "settings"
        cards:

          # ================================================================
          # COLUNA 1 — SUMMARY
          # 1 card entities com todos os itens de status + 3 botoes compactos
          # ================================================================
          - type: vertical-stack
            view_layout:
              grid-area: summary
            cards:
              - type: entities
                title: Summary
                card_mod:
                  class: header
                  style: |
                    ha-card {
                      background: transparent !important;
                      border: none !important;
                      box-shadow: none !important;
                    }
                    .card-content {
                      padding: 0 16px;
                      letter-spacing: normal;
                    }
                entities:
                  - entity: vacuum.roborock_s7
                    name: Roborock S7
                  - entity: sensor.roborock_s7_vacuum_error
                    name: Erro
                  - entity: sensor.roborock_s7_bateria
                    name: Bateria
                  - entity: binary_sensor.roborock_s7_water_box_attached
                    name: Caixa d'Água
                  - entity: binary_sensor.roborock_s7_mop_attached
                    name: Mop Acoplado
                  - entity: binary_sensor.roborock_s7_water_shortage
                    name: Falta de Água
                  - entity: sensor.roborock_s7_status
                    name: Estado
                  - entity: select.roborock_s7_intensidade_do_mop
                    name: Intensidade do Mop
                  - entity: select.roborock_s7_modo_mop
                    name: Modo do Mop

              - type: horizontal-stack
                cards:
                  - type: custom:button-card
                    entity: vacuum.roborock_s7
                    icon: mdi:play-pause
                    show_name: false
                    styles:
                      card:
                        - height: 50px
                        - border-radius: 12px
                        - background: rgba(255,255,255,0.07)
                        - box-shadow: none
                        - border: none
                        - aspect-ratio: unset
                      icon:
                        - color: rgba(255,255,255,0.70)
                    tap_action:
                      action: call-service
                      # smart toggle: se docked ou paused → start; caso contrario → pause
                      service: >
                        [[[ return entity.state === 'docked' || entity.state === 'paused' ? 'vacuum.start' : 'vacuum.pause'; ]]]
                      service_data:
                        entity_id: >
                          [[[ return entity.entity_id; ]]]
                  - type: custom:button-card
                    entity: vacuum.roborock_s7
                    icon: mdi:home-map-marker
                    show_name: false
                    styles:
                      card:
                        - height: 50px
                        - border-radius: 12px
                        - background: rgba(255,255,255,0.07)
                        - box-shadow: none
                        - border: none
                        - aspect-ratio: unset
                      icon:
                        - color: rgba(255,255,255,0.70)
                    tap_action:
                      action: call-service
                      service: vacuum.return_to_base
                      service_data:
                        entity_id: vacuum.roborock_s7
                  - type: custom:button-card
                    entity: vacuum.roborock_s7
                    icon: mdi:bell
                    show_name: false
                    styles:
                      card:
                        - height: 50px
                        - border-radius: 12px
                        - background: rgba(255,255,255,0.07)
                        - box-shadow: none
                        - border: none
                        - aspect-ratio: unset
                      icon:
                        - color: rgba(255,255,255,0.70)
                    tap_action:
                      action: more-info

          # ================================================================
          # COLUNA 2 — MAP
          # Card de primeiro nivel (nao dentro de entities) para renderizacao confiavel.
          # Entidade _custom criada pela integracao Roborock Custom Map (HACS).
          # ================================================================
          - type: custom:xiaomi-vacuum-map-card
            view_layout:
              grid-area: map
            entity: vacuum.roborock_s7
            vacuum_platform: Roborock
            map_source:
              camera: image.roborock_s7_map_0_custom
            calibration_source:
              camera: true
            map_locked: true
            map_modes:
              - template: vacuum_clean_segment  # limpeza por comodo
              - template: vacuum_clean_zone     # limpeza por zona
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  border: none !important;
                  box-shadow: none !important;
                  --map-card-primary-color: rgba(255,255,255,0.08);
                  --map-card-secondary-color: none;
                  --map-card-secondary-text-color: rgba(255,255,255,0.55);
                  --map-card-zoomer-background: transparent;
                  --map-card-predefined-rectangle-fill-color: none;
                  --map-card-predefined-rectangle-line-color: none;
                  --map-card-predefined-rectangle-line-color-selected: rgba(255,255,255,0.5);
                  --map-card-predefined-rectangle-fill-color-selected: rgba(42,124,194,0.1);
                  --map-card-predefined-rectangle-icon-background-color-selected: rgb(42,124,194);
                  --map-card-internal-big-radius: 0.6em !important;
                }
                div.map-wrapper {
                  padding: 1vw 0 0.5vw !important;
                }
                div.controls-wrapper {
                  padding-top: 0;
                  padding-bottom: 0;
                  letter-spacing: normal;
                  margin: 0;
                }
                div.tiles-wrapper, div.vacuum-controls, div.icons-wrapper {
                  display: none;
                }

          # ================================================================
          # COLUNA 3 — SETTINGS
          # 1 card entities fundindo configuracoes + estatisticas (com divider).
          # time.roborock_s7_comecar/terminar_nao_perturbe removidos para caber sem scroll.
          # ================================================================
          - type: entities
            view_layout:
              grid-area: settings
            title: Settings
            card_mod:
              class: header
              style: |
                ha-card {
                  background: transparent !important;
                  border: none !important;
                  box-shadow: none !important;
                }
                .card-content {
                  padding: 0 16px;
                  letter-spacing: normal;
                }
            entities:
              - entity: number.roborock_s7_volume
                name: Volume
              - entity: switch.roborock_s7_nao_perturbe
                name: Não Perturbe
              - entity: switch.roborock_s7_dock_luz_indicadora_de_status
                name: Luz Indicadora
              - entity: switch.roborock_s7_dock_bloqueio_infantil
                name: Bloqueio Infantil
              - type: divider
