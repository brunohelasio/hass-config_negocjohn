- type: custom:button-card
  show_name: false
  show_icon: false
  show_state: false
  tap_action:
    action: none
  custom_fields:
    header: |
      [[[
        return '<div style="font-size:11px;font-weight:700;letter-spacing:0.14em;color:rgba(255,255,255,0.46);text-transform:uppercase;">Energia</div>';
      ]]]
    value: |
      [[[ return '<div style="font-size:22px;font-weight:700;color:rgba(255,255,255,0.96);">Consumo do dia · 18.4 kWh</div>'; ]]]
    subtitle: |
      [[[
        return '<div style="font-size:14px;color:rgba(255,255,255,0.56);">Bloco reservado para gráfico futuro</div>';
      ]]]
    chart: |
      [[[ return ''; ]]]
  styles:
    grid:
      - grid-template-areas: '"header" "value" "subtitle"'
      - grid-template-columns: 1fr
      - grid-template-rows: min-content min-content min-content
      - row-gap: 4px
    card:
      - background: transparent
      - border: none
      - box-shadow: none
      - padding: 12px 14px 10px
      - height: 100%
    custom_fields:
      header:
        - justify-self: start
      value:
        - justify-self: start
      subtitle:
        - justify-self: start
      chart:
        - display: none
