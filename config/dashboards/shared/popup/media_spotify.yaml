# NOVO v5: Popup Spotify simplificado — custom:spotify-card unico com controles
# Adota o SpotifyPlus card como media player control principal (hold_action do botao Spotify).
# Descarta templates complexos de mushroom + mini-media-player + vibrant_color.
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Spotify
    tag: spotify
    style: >
      --popup-max-width: min(500px, 90vw);
    card_mod: !include ../snippets/style_popup_complete.yaml
    content:
      type: custom:spotify-card
      spotify_entity: media_player.spotifyplus_bruno_helasio
      limit: 10
      playlist_type: ''
      always_play_random_song: true
      display_style: list
      grid_covers_per_row: 3
      grid_show_title: true
      hide_warning: true
      hide_top_header: false
      hide_currently_playing: false
      hide_playback_controls: false
      card_mod:
        style: |
          ha-card {
            --ha-card-border-width: 0;
            background: transparent;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 12px;
          }
          #content {
            border: 0 !important;
            background-color: transparent !important;
          }
