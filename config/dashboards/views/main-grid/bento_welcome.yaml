type: custom:stack-in-card
view_layout:
  grid-area: welcome
card_mod:
  style: |
    /* 1. Faz o "envelope" do cartão esticar até o fundo da célula do grid */
    :host {
      height: 100% !important;
    }

    ha-card {
      /* 2. Faz o cartão acompanhar o envelope */
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: space-between !important;
      position: relative !important;  /* âncora para ::after — mantida para rollback rápido da curva */

      /* 3. Imagem de fundo + degradê horizontal esquerda→transparente (v11) */
      background:
        linear-gradient(
          to right,
          rgba(11, 22, 35, 0.96)  0%,
          rgba(11, 22, 35, 0.85) 30%,
          rgba(11, 22, 35, 0.40) 58%,
          rgba(11, 22, 35, 0.00) 78%
        ),
        url('/local/images/home_color.jpg') center / cover no-repeat !important;
      backdrop-filter: blur(20px) saturate(1.35) !important;
      -webkit-backdrop-filter: blur(20px) saturate(1.35) !important;
      border: 1px solid rgba(147,197,253,0.34) !important;
      box-shadow: 0 0 32px rgba(59,130,246,0.12), inset 0 1px 0 rgba(191,219,254,0.15), 0 8px 32px rgba(0,0,0,0.2) !important;

      /* 4. Força o arredondamento e IMPEDE que o conteúdo vaze e deixe quadrado */
      border-radius: 18px !important;
      overflow: hidden !important;

      /* 5. Desliga a interferência do tema nos filhos */
      --ha-card-glass-tint: transparent !important;
      --ha-card-backdrop-filter: none !important;
      --ha-card-glass-inset-shadow: none !important;
      --ha-card-background: transparent !important;
      --ha-card-border-width: 0 !important;
    }

    /* 🔴 A CORREÇÃO ENTRA AQUI: Força a div interna do stack-in-card a esticar 100%
        Isso permite que o margin-top: auto do cartão de clima funcione perfeitamente. */
    .card-content, ha-card > div {
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
    }

    ha-card::before {
      display: none !important;
    }

    /* [CURVA DESATIVADA v11 — comentar para reativar] */
    /*
    ha-card::after {
      content: '' !important;
      position: absolute !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      height: 56px !important;
      pointer-events: none !important;
      z-index: 1 !important;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 56' preserveAspectRatio='none'><defs><linearGradient id='f' x1='0' y1='0' x2='0' y2='1[...]");
      background-size: 100% 100% !important;
      background-repeat: no-repeat !important;
    }
    */
