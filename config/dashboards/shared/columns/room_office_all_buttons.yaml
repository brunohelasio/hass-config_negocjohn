# ── NOVO: Linha 3 com 3 colunas, PC (antes MacBook), AC corrigido (ac_office_2) ──
- type: grid
  columns: 3
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
        grid-template-columns: repeat(3, 98px) !important;
        justify-content: start !important;
      }
  cards:
    # PC — switch.macbook (renomeado de MacBook para PC, icone desktop)
    - type: custom:button-card
      entity: switch.macbook
      name: PC
      template:
        - base
      icon: mdi:desktop-tower-monitor
      show_icon: true
      tap_action:
        action: toggle
        haptic: success
      double_tap_action:
        action: more-info
    # SPOTIFY — compartilhado, mesma entidade em todos os comodos
    # FIX C3: hold_action agora abre popup Spotify dedicado do Office (com default_device: Echo Pop Office).
    # ANTERIOR: hold_action: !include ../popup/media_spotify.yaml (popup compartilhado sem device targeting)
    - type: custom:button-card
      entity: media_player.spotifyplus_bruno_helasio
      name: Spotify
      template:
        - base
        - circle
        - loader
        - icon_spotify_color
      state_display: >
        [[[
          return entity && entity.state === 'off' ? ' ' : null;
        ]]]
      variables:
        state_on: >
          [[[ return entity && ['on', 'idle', 'playing', 'paused', 'standby'].indexOf(entity.state) !== -1; ]]]
        circle_input: >
          [[[
            if (entity && entity.attributes.volume_level !== undefined) {
              let volume = Math.round(entity.attributes.volume_level * 100)
              return volume === 0 && entity.state !== 'off'
                ? 1
                : volume
            }
          ]]]
        circle_input_unit: '%'
      # --- CÓDIGO ANTERIOR: spotifyplus.player_media_play_pause (quebrado) ---
      # tap_action:
      #   action: call-service
      #   service: spotifyplus.player_media_play_pause
      #   service_data:
      #     entity_id: media_player.spotifyplus_bruno_helasio
      #     device_name: Echo Pop Office
      #   haptic: success
      # ANTERIOR: media_player.media_play_pause (so funciona com device ja ativo)
      # FIX: spotifyplus.player_transfer_playback — transfere e inicia playback no Echo do Office
      tap_action:
        action: perform-action
        perform_action: spotifyplus.player_transfer_playback
        data:
          entity_id: media_player.spotifyplus_bruno_helasio
          device_name: "Echo Pop Office"
          play: true
          force_activate_device: true
        haptic: success
      double_tap_action:
        action: more-info
      hold_action: !include ../popup/media_spotify_office.yaml
    # AR CONDICIONADO — Office (entidade restaurada: AC nao usa _2, cameras sim)
    # FIX C1.3: Agora usa tpl_popup_climate (herda base, state_on correto para climate).
    - type: custom:button-card
      entity: climate.ac_office
      name: Ar Cond.
      template:
        - tpl_popup_climate
        - icon_climate
      show_icon: false
      # ANTERIOR: variables.state_on e styles.card override — substituido por tpl_popup_climate
      # variables:
      #   state_on: >
      #     [[[ return entity && ['cool', 'fan_only', 'dry', 'heat', 'heat_cool', 'auto'].indexOf(entity.state) !== -1; ]]]
      # styles:
      #   card:
      #     - background-color: >
      #         [[[
      #           if (entity && ['cool', 'fan_only', 'dry', 'heat', 'heat_cool', 'auto'].includes(entity.state)) {
      #             return 'rgba(250, 250, 250, 0.75)';
      #           }
      #           return 'rgba(115, 115, 115, 0.2)';
      #         ]]]
      #     - color: >
      #         [[[
      #           if (entity && ['cool', 'fan_only', 'dry', 'heat', 'heat_cool', 'auto'].includes(entity.state)) {
      #             return '#4b5254';
      #           }
      #           return '#97989c';
      #         ]]]
      tap_action:
        action: perform-action
        perform_action: climate.toggle
        target:
          entity_id: climate.ac_office
        haptic: success
      double_tap_action:
        action: more-info
      hold_action:
        action: more-info
