- type: custom:layout-card
  layout_type: custom:grid-layout
  layout:
    grid-template-columns: minmax(0, 1.7fr) minmax(74px, 0.7fr)
    grid-template-rows: 130px minmax(134px, max-content) 96px
    grid-template-areas: |
      "hero hero"
      "tv tv"
      "ac ac"
    column-gap: 24px
    row-gap: 16px
    height: 100%
    margin: 0
    padding: 12px 14px 12px 14px
  cards:
    # ── Hero ─────────────────────────────────────────────────────────
    - type: custom:button-card
      view_layout:
        grid-area: hero
      entity: light.grupo_luzes_sala
      show_icon: false
      show_name: true
      show_state: false
      name: Sala
      variables:
        state_on: >
          [[[
            return entity?.state === 'on';
          ]]]
      triggers_update:
        - light.sala_switch_1
        - light.sala_switch_2
        - sensor.living_room_active
        - sensor.sl_sensor_temp_humid_temperatura
        - media_player.android_tv_192_168_3_17
        - climate.sl_ar_condicionado
        - media_player.echo_show
        - person.bruno_helasio
        - sensor.time
      tap_action:
        action: perform-action
        perform_action: light.toggle
        target:
          entity_id: light.sala_switch_2
      double_tap_action: !include ../../shared/popup/rooms/livingroom.yaml
      hold_action:
        action: perform-action
        perform_action: light.turn_off
        data:
          entity_id: light.grupo_luzes_sala
      custom_fields:
        icon: >
          [[[
            const on = entity?.state === 'on';
            const f = on ? 'none' : 'grayscale(1) contrast(0.4) brightness(0.8)';
            return '<svg viewBox="0 0 4.8 4.8" xmlns="http://www.w3.org/2000/svg" style="width:65px;height:65px;filter:' + f + ';display:block;">'
              + '<path d="M.78 2.565H.69V.87C.69.75.75.51.975.51v.098C.78.608.78.855.78.871v1.695" fill="#666"/>'
              + '<path d="M1.62.525a.81.81 0 0 0-.188-.09L1.313.052C1.298 0 1.171-.008 1.021.037s-.255.128-.24.18l.128.397S.811.786.804.846c-.022.12.045.472.045.472l1.05-.315c-.007-.007-.172-.39-.278-.48" fill="#94989b"/>'
              + '<path d="M1.89.998c.03.105-.188.263-.472.345-.292.09-.547.075-.57-.03-.03-.105.188-.263.472-.345.285-.09.547-.075.57.03" fill="#ffe62e"/>'
              + '<path d="M4.447 3.053a.15.15 0 0 1-.15.15H.502a.15.15 0 0 1-.15-.15v-.975a.15.15 0 0 1 .15-.15h3.803a.15.15 0 0 1 .15.15v.975z" fill="#42ade2"/>'
              + '<path d="M4.447 3.053a.15.15 0 0 1-.15.15H.502a.15.15 0 0 1-.15-.15v-.975a.15.15 0 0 1 .15-.15h3.803a.15.15 0 0 1 .15.15v.975z" fill="#428bc1" opacity=".5"/>'
              + '<path d="M3.375 3.203H.352V2.047s.6.69 3.022 1.155" fill="#428bc1"/>'
              + '<path d="M4.672 2.288c0-.135-.098-.24-.225-.24-.12 0-.217.105-.217.24v.93c0 .135.098.24.217.24.12 0 .225-.105.225-.24v-.93" fill="#42ade2"/>'
              + '<path fill="#8a8e92" d="M.457 4.485H.75V4.8H.457z"/>'
              + '<path d="M3.375 4.485H.3c-.165 0-.3-.142-.3-.322s.135-.322.3-.322h3.075v.645m0-.646H.3c-.165 0-.3-.142-.3-.322s.135-.322.3-.322h3.075v.645" fill="#428bc1"/>'
              + '<path fill="#8a8e92" d="M4.05 4.485h.292V4.8H4.05z"/>'
              + '<path d="M1.425 3.84H4.5c.165 0 .3.142.3.322s-.135.322-.3.322H1.425v-.645" fill="#428bc1"/>'
              + '<path d="M1.425 3.203H4.5c.165 0 .3.142.3.322s-.135.322-.3.322H1.425v-.645" fill="#428bc1"/>'
              + '<path d="M.57 2.288c0-.135-.098-.24-.217-.24-.12 0-.217.105-.217.24v.93c0 .135.098.24.217.24.12 0 .217-.105.217-.24v-.93" fill="#42ade2"/>'
              + '<path d="M4.53 1.965s-.217.187-.255.285c-.075.21-.022.667 0 .892.007.037.037.142.037.142s-.255-.068-.345-.083c-.172-.022-.51.015-.682 0-.075-.007-.3-.06-.3-.06s.195-.09.232-.15c.12-.186.143-.666.158-.891v-.128s.165.052.225.06c.165.015.51-.015.675-.03.06 0 .255-.037.255-.037" fill="#c7e755"/>'
              + '</svg>';
          ]]]
        temp: >
          [[[
            const t = states['sensor.sl_sensor_temp_humid_temperatura'];
            const temp = t && t.state && !['unknown','unavailable'].includes(t.state) ? `${t.state}°` : '—';
            const h = states['sensor.sl_sensor_temp_humid_umidade'];
            const hum = h && !['unknown','unavailable'].includes(h.state) ? `${h.state}%` : '';
            // const color = variables.state_on ? 'rgba(0,0,0,0.85)' : 'rgba(255,255,255,0.9)'; // ORIGINAL Opcao A (comentado)
            // const subColor = variables.state_on ? 'rgba(0,0,0,0.48)' : 'rgba(255,255,255,0.52)'; // ORIGINAL Opcao A (comentado)
            const salaOn = states['light.grupo_luzes_sala']?.state === 'on';
            const color = salaOn ? 'rgba(0,0,0,0.88)' : 'rgba(255,255,255,0.9)';
            const subColor = salaOn ? 'rgba(0,0,0,0.55)' : 'rgba(255,255,255,0.52)';
            return `<div style="display:flex;flex-direction:column;gap:3px;">
              <span style="font-size:13px;font-weight:700;color:${color};">${temp}</span>
              <span style="font-size:11px;color:${subColor};">${hum}</span>
            </div>`;
          ]]]
        lights: >
          [[[
            // BLOCO ORIGINAL COMENTADO (mantido para rollback rapido)
            // const raw = states['sensor.living_room_active']?.state;
            // const n = raw != null ? Number(raw) : NaN;
            // let count;
            // if (!Number.isNaN(n) && n > 0) {
            //   count = n;
            // } else {
            //   const ids = ['light.sala_switch_1','light.sala_switch_2'];
            //   count = ids.filter(id => states[id]?.state === 'on').length;
            // }
            // if (count === 0) return '';
            // const ms = Date.now() - Date.parse(entity?.last_changed ?? '');
            // const m = Math.floor(ms / 60000);
            // const h = Math.floor(m / 60);
            // const d = Math.floor(h / 24);
            // const timeStr = d > 0 ? `${d}d` : h > 0 ? `${h}h` : m > 0 ? `${m}m` : '<1m';
            // return `<div style="display:flex;align-items:center;gap:4px;">
            //   <ha-icon icon="mdi:lightbulb-on" style="width:11px;height:11px;color:#fbbf24;display:flex;"></ha-icon>
            //   <span style="font-size:10px;font-weight:600;color:#fbbf24;">${count} · ${timeStr}</span>
            // </div>`;

            // NOVA LOGICA (Opcao A): paridade com rooms_base sem alterar arquitetura da Sala
            const activeEntity = states['sensor.living_room_active'];
            const lightsOnCount = activeEntity?.attributes?.lights_on_count;
            const lightsOn = activeEntity?.attributes?.lights_on;
            let count = null;
            if (lightsOnCount != null && lightsOnCount !== '' && !isNaN(lightsOnCount)) {
              const parsed = parseInt(lightsOnCount, 10);
              if (!isNaN(parsed)) count = parsed;
            } else if (Array.isArray(lightsOn)) {
              count = lightsOn.length;
            } else if (typeof lightsOn === 'string' && lightsOn.startsWith('[')) {
              const matches = lightsOn.match(/'/g);
              if (matches) count = matches.length / 2;
            }

            const ids = entity?.attributes?.entity_id;
            if (count === null && Array.isArray(ids)) {
              count = ids.filter(id => states[id]?.state === 'on').length;
            }
            if (count === null) {
              const fallbackIds = ['light.sala_switch_1', 'light.sala_switch_2'];
              count = fallbackIds.filter(id => states[id]?.state === 'on').length;
            }
            if (!count || count <= 0) return '';

            const timeFmt = c => {
              const m = (c / 6e4), h = (c / 36e5), d = (c / 864e5);
              return m < 1 ? '<1m'
                   : m < 60 ? `${parseInt(m)}m`
                   : h < 24 ? `${parseInt(h)}h`
                   : `${parseInt(d)}d`;
            };

            let earliestOn = null;
            if (Array.isArray(ids)) {
              ids.forEach(id => {
                const s = states[id];
                if (s?.state === 'on' && s?.last_changed) {
                  const ts = Date.parse(s.last_changed);
                  if (!isNaN(ts) && (earliestOn === null || ts < earliestOn)) earliestOn = ts;
                }
              });
            }
            if (earliestOn === null && entity?.last_changed) {
              const ts = Date.parse(entity.last_changed);
              if (!isNaN(ts)) earliestOn = ts;
            }
            const elapsed = earliestOn !== null ? timeFmt(Date.now() - earliestOn) : '';

            const salaOn = states['light.grupo_luzes_sala']?.state === 'on';
            // const statusColor = salaOn ? 'rgba(0,0,0,0.62)' : '#fbbf24'; // ORIGINAL (comentado)
            const statusColor = salaOn ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.4)';
            const label = count === 1 ? '1 light' : `${count} lights`;
            return `<div style="display:flex;align-items:center;gap:4px;">
              <ha-icon icon="mdi:lightbulb-on" style="width:11px;height:11px;color:#fbbf24;display:flex;"></ha-icon>
              <span style="font-size:11px;font-weight:500;color:${statusColor};">${label}${elapsed ? ' · ' + elapsed : ''}</span>
            </div>`;
          ]]]
        right: >
          [[[
            const tvOn  = ['on','playing','paused','idle'].includes(states['media_player.android_tv_192_168_3_17']?.state ?? '');
            const acOn  = !['off','unavailable','unknown',''].includes(states['climate.sl_ar_condicionado']?.state ?? 'off');
            const alexa = ['playing','on','paused'].includes(states['media_player.echo_show']?.state ?? '');
            const home  = states['person.bruno_helasio']?.state === 'home';
            const salaOn = states['light.grupo_luzes_sala']?.state === 'on';
            const offBg = salaOn ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.08)';
            const offBorder = salaOn ? 'rgba(0,0,0,0.14)' : 'rgba(255,255,255,0.12)';
            const offIcon = salaOn ? 'rgba(0,0,0,0.42)' : 'rgba(255,255,255,0.35)';
            const dot = (icon, active, color) =>
              `<div style="width:26px;height:26px;border-radius:50%;box-sizing:border-box;background:${active?color+'22':offBg};border:1px solid ${active?color+'55':offBorder};display:flex;align-items:center;justify-content:center;">` +
              `<ha-icon icon="${icon}" style="width:14px;height:14px;color:${active?color:offIcon};display:flex;"></ha-icon></div>`;
            return `<div style="display:flex;flex-direction:column;gap:5px;padding-top:2px;">
              ${dot('mdi:account',          home,  '#60a5fa')}
              ${dot('mdi:television-classic', tvOn,  '#a78bfa')}
              ${dot('mdi:snowflake',          acOn,  '#4facfe')}
              ${dot('mdi:speaker-wireless',   alexa, '#ff9900')}
            </div>`;
          ]]]
        corredor:
          card:
            type: custom:button-card
            entity: light.corredor_switch_1
            icon: mdi:door-closed
            name: Corredor
            show_icon: true
            show_name: true
            show_state: false
            tap_action:
              action: toggle
            hold_action:
              action: more-info
            styles:
              card:
                - height: 30px
                - min-width: 94px
                - border-radius: 999px
                - padding: 0 10px
                - background: >
                    [[[
                      return entity?.state === 'on'
                        ? 'linear-gradient(180deg, rgba(96,165,250,0.24) 0%, rgba(96,165,250,0.16) 100%)'
                        : (states['light.grupo_luzes_sala']?.state === 'on'
                          ? 'rgba(0,0,0,0.08)'
                          : 'rgba(255,255,255,0.10)');
                    ]]]
                - border: >
                    [[[
                      return entity?.state === 'on'
                        ? '1px solid rgba(96,165,250,0.44)'
                        : (states['light.grupo_luzes_sala']?.state === 'on'
                          ? '1px solid rgba(0,0,0,0.14)'
                          : '1px solid rgba(255,255,255,0.14)');
                    ]]]
                - box-shadow: none
              grid:
                - grid-template-areas: '"i n"'
                - grid-template-columns: auto 1fr
                - column-gap: 6px
              icon:
                - width: 13px
                - color: >
                    [[[
                      return entity?.state === 'on'
                        ? '#60a5fa'
                        : (states['light.grupo_luzes_sala']?.state === 'on'
                          ? 'rgba(0,0,0,0.62)'
                          : 'rgba(255,255,255,0.78)');
                    ]]]
              name:
                - font-size: 11px
                - font-weight: 600
                - color: >
                    [[[
                      return states['light.grupo_luzes_sala']?.state === 'on'
                        ? 'rgba(0,0,0,0.76)'
                        : 'rgba(255,255,255,0.86)';
                    ]]]
      styles:
        card:
          # - background: transparent  # ORIGINAL — mantido para rollback rapido
          # - background: >
          #     [[[
          #       return variables.state_on
          #         ? 'rgba(250, 250, 250, 0.75)'
          #         : 'transparent';
          #     ]]] # ORIGINAL Opcao A (comentado)
          - background: >
              [[[
                // AJUSTE 2026-04-23 (feedback): hero nao deve acender isolado.
                // O acendimento passa a ocorrer no bloco completo (wrapper stack-in-card).
                // Mantemos o hero transparente nos dois estados.
                return 'transparent';
              ]]]
          - border: none
          - box-shadow: none
          - padding: 0
          - margin: 0
          - height: 100%
        grid:
          # LEGADO (fallback rapido): '"icon temp right" "n n right" "lights lights right"'
          - grid-template-areas: '"icon temp corredor right" "n n corredor right" "lights lights corredor right"'
          - grid-template-columns: auto 1fr auto auto
          - grid-template-rows: auto auto 1fr
        name:
          - justify-self: start
          - align-self: end
          - font-size: 15px
          - font-weight: 700
          # - color: white # ORIGINAL — mantido para rollback rapido
          # - color: >
          #     [[[
          #       return variables.state_on ? 'black' : 'white';
          #     ]]] # ORIGINAL Opcao A (comentado)
          - color: >
              [[[
                return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.9)' : 'white';
              ]]]
          - margin-bottom: 2px
        custom_fields:
          icon:
            - justify-self: start
            - align-self: start
            - padding-bottom: 10px
          temp:
            - justify-self: start
            - align-self: start
            - margin-left: 10px
            - margin-top: 4px
          lights:
            - justify-self: start
            - align-self: start
          right:
            - justify-self: end
            - align-self: start
            - margin-right: 2px
          corredor:
            - justify-self: end
            - align-self: start
            - margin-right: 12px

    # ── TV (container com controles independentes) ──────────────────────────
    - type: custom:stack-in-card
      view_layout:
        grid-area: tv
      card_mod:
        style: |
          ha-card {
            background: {% if is_state('light.grupo_luzes_sala','on') %}linear-gradient(180deg, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.06) 55%, rgba(0,0,0,0.04) 100%){% else %}linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.10) 55%, rgba(255,255,255,0.08) 100%){% endif %} !important;
            border: {% if is_state('light.grupo_luzes_sala','on') %}1px solid rgba(0,0,0,0.16){% else %}1px solid rgba(255,255,255,0.14){% endif %} !important;
            border-radius: 18px !important;
            box-shadow: none !important;
            padding: 10px 12px 8px 12px !important;
            height: auto !important;
            min-height: 112px !important;
            box-sizing: border-box;
          }
      cards:
        - type: custom:layout-card
          layout_type: custom:grid-layout
          layout:
            grid-template-columns: 1fr 42px
            grid-template-rows: auto auto
            grid-template-areas: |
              "info power"
              "subtitle power"
            column-gap: 10px
            row-gap: 2px
            margin: 0
            padding: 0
          cards:
            - type: custom:button-card
              view_layout:
                grid-area: info
              entity: media_player.android_tv_192_168_3_17
              icon: mdi:television-classic
              name: TV
              show_icon: true
              show_name: true
              show_state: false
              tap_action:
                action: none
              hold_action:
                action: none
              styles:
                card:
                  - background: transparent
                  - border: none
                  - box-shadow: none
                  - padding: 0
                  - margin: 0
                grid:
                  - grid-template-areas: '"i n"'
                  - grid-template-columns: auto 1fr
                  - column-gap: 8px
                icon:
                  - width: 18px
                  - color: >
                      [[[
                        return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.82)';
                      ]]]
                name:
                  - justify-self: start
                  - align-self: center
                  - font-size: 18px
                  - font-weight: 700
                  - color: >
                      [[[
                        return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.90)' : 'white';
                      ]]]
            - type: custom:button-card
              view_layout:
                grid-area: subtitle
              entity: media_player.android_tv_192_168_3_17
              name: >
                [[[
                  const v = entity?.attributes?.friendly_name;
                  return v && v !== '' ? v : 'Samsung SmartTV';
                ]]]
              show_icon: false
              show_name: true
              show_state: false
              tap_action:
                action: none
              hold_action:
                action: none
              styles:
                card:
                  - background: transparent
                  - border: none
                  - box-shadow: none
                  - padding: 0 0 0 26px
                  - margin: 0
                name:
                  - justify-self: start
                  - font-size: 12px
                  - font-weight: 500
                  - color: >
                      [[[
                        return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.58)' : 'rgba(255,255,255,0.70)';
                      ]]]
            - type: custom:button-card
              view_layout:
                grid-area: power
              entity: media_player.android_tv_192_168_3_17
              icon: mdi:power
              show_name: false
              show_state: false
              tap_action:
                action: toggle
              hold_action:
                action: more-info
              styles:
                card:
                  - width: 34px
                  - height: 34px
                  - border-radius: 12px
                  - background: >
                      [[[
                        const on = entity && entity.state !== 'off';
                        if (on) return 'rgba(239,68,68,0.20)';
                        return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.10)' : 'rgba(255,255,255,0.10)';
                      ]]]
                  - border: >
                      [[[
                        const on = entity && entity.state !== 'off';
                        if (on) return '1px solid rgba(239,68,68,0.40)';
                        return states['light.grupo_luzes_sala']?.state === 'on' ? '1px solid rgba(0,0,0,0.16)' : '1px solid rgba(255,255,255,0.14)';
                      ]]]
                  - box-shadow: none
                  - padding: 0
                icon:
                  - width: 19px
                  - color: >
                      [[[
                        const on = entity && entity.state !== 'off';
                        return on ? '#ef4444' : (states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.52)' : 'rgba(255,255,255,0.65)');
                      ]]]

        - type: conditional
          conditions:
            - entity: input_boolean.sala_tv_controls_expanded
              state_not: 'on'
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: script.sala_tv_open_netflix
                show_icon: false
                show_name: true
                name: 'N'
                tap_action:
                  action: perform-action
                  perform_action: >
                    [[[
                      return states['script.sala_tv_open_netflix'] ? 'script.turn_on' : 'media_player.select_source';
                    ]]]
                  target:
                    entity_id: >
                      [[[
                        return states['script.sala_tv_open_netflix'] ? 'script.sala_tv_open_netflix' : 'media_player.android_tv_192_168_3_17';
                      ]]]
                  data:
                    source: Netflix
                styles:
                  card:
                    - height: 42px
                    - min-width: 40px
                    - border-radius: 10px
                    - border: 1px solid rgba(255,255,255,0.10)
                    - background: center / cover no-repeat url('/local/images/netflix_bg.jpg'), linear-gradient(180deg, rgba(229,9,20,0.62) 0%, rgba(116,8,16,0.72) 100%)
                    - box-shadow: none
                  name:
                    - color: rgba(255,255,255,0.92)
                    - font-weight: 700
                    - font-size: 13px
              - type: custom:button-card
                entity: script.sala_tv_open_disney
                show_icon: false
                show_name: true
                name: 'D'
                tap_action:
                  action: perform-action
                  perform_action: >
                    [[[
                      return states['script.sala_tv_open_disney'] ? 'script.turn_on' : 'media_player.select_source';
                    ]]]
                  target:
                    entity_id: >
                      [[[
                        return states['script.sala_tv_open_disney'] ? 'script.sala_tv_open_disney' : 'media_player.android_tv_192_168_3_17';
                      ]]]
                  data:
                    source: Disney+
                styles:
                  card:
                    - height: 42px
                    - min-width: 40px
                    - border-radius: 10px
                    - border: 1px solid rgba(255,255,255,0.10)
                    - background: center / cover no-repeat url('/local/images/dp_bg.jpg'), linear-gradient(180deg, rgba(53,122,209,0.78) 0%, rgba(38,95,168,0.80) 100%)
                    - box-shadow: none
                  name:
                    - color: rgba(255,255,255,0.92)
                    - font-weight: 700
                    - font-size: 13px
              - type: custom:button-card
                entity: script.sala_tv_open_hbo
                show_icon: false
                show_name: true
                name: HBO
                tap_action:
                  action: perform-action
                  perform_action: >
                    [[[
                      return states['script.sala_tv_open_hbo'] ? 'script.turn_on' : 'media_player.select_source';
                    ]]]
                  target:
                    entity_id: >
                      [[[
                        return states['script.sala_tv_open_hbo'] ? 'script.sala_tv_open_hbo' : 'media_player.android_tv_192_168_3_17';
                      ]]]
                  data:
                    source: HBO Max
                styles:
                  card:
                    - height: 42px
                    - min-width: 40px
                    - border-radius: 10px
                    - border: 1px solid rgba(255,255,255,0.10)
                    - background: center / cover no-repeat url('/local/images/HBOMax_bg.jpg'), linear-gradient(180deg, rgba(88,61,140,0.66) 0%, rgba(58,39,97,0.78) 100%)
                    - box-shadow: none
                  name:
                    - color: rgba(255,255,255,0.92)
                    - font-weight: 700
                    - font-size: 11px
              - type: custom:button-card
                entity: script.sala_tv_open_prime
                show_icon: false
                show_name: true
                name: 'P'
                tap_action:
                  action: perform-action
                  perform_action: >
                    [[[
                      return states['script.sala_tv_open_prime'] ? 'script.turn_on' : 'media_player.select_source';
                    ]]]
                  target:
                    entity_id: >
                      [[[
                        return states['script.sala_tv_open_prime'] ? 'script.sala_tv_open_prime' : 'media_player.android_tv_192_168_3_17';
                      ]]]
                  data:
                    source: Prime Video
                styles:
                  card:
                    - height: 42px
                    - min-width: 40px
                    - border-radius: 10px
                    - border: 1px solid rgba(255,255,255,0.10)
                    - background: center / cover no-repeat url('/local/images/prime_bg.jpg'), linear-gradient(180deg, rgba(53,122,209,0.78) 0%, rgba(38,95,168,0.80) 100%)
                    - box-shadow: none
                  name:
                    - color: rgba(255,255,255,0.92)
                    - font-weight: 700
                    - font-size: 13px
              - type: custom:button-card
                icon: mdi:plus
                show_name: false
                tap_action:
                  action: call-service
                  service: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.sala_tv_controls_expanded
                styles:
                  card:
                    - height: 32px
                    - width: 32px
                    - border-radius: 10px
                    - border: 1px solid rgba(255,255,255,0.10)
                    - background: >
                        [[[
                          return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.08)';
                        ]]]
                    - box-shadow: none
                  icon:
                    - width: 16px
                    - color: >
                        [[[
                          return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.70)' : 'rgba(255,255,255,0.72)';
                        ]]]

        - type: conditional
          conditions:
            - entity: input_boolean.sala_tv_controls_expanded
              state: 'on'
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                icon: mdi:play-pause
                show_name: false
                tap_action:
                  action: call-service
                  service: media_player.media_play_pause
                  target:
                    entity_id: media_player.android_tv_192_168_3_17
                styles: &tv_mini_btn
                  card:
                    - height: 32px
                    - border-radius: 10px
                    - border: 1px solid rgba(255,255,255,0.10)
                    - background: >
                        [[[
                          return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.08)';
                        ]]]
                    - box-shadow: none
                  icon:
                    - width: 16px
                    - color: >
                        [[[
                          return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.78)' : 'rgba(255,255,255,0.85)';
                        ]]]
              - type: custom:button-card
                icon: mdi:stop
                show_name: false
                tap_action:
                  action: call-service
                  service: media_player.media_stop
                  target:
                    entity_id: media_player.android_tv_192_168_3_17
                styles: *tv_mini_btn
              - type: custom:button-card
                icon: mdi:volume-minus
                show_name: false
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.tv_sala_volume_down
                styles: *tv_mini_btn
              - type: custom:button-card
                icon: mdi:volume-plus
                show_name: false
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.tv_sala_volume_up
                styles: *tv_mini_btn
              - type: custom:button-card
                icon: mdi:apps
                show_name: false
                tap_action:
                  action: call-service
                  service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.sala_tv_controls_expanded
                styles: *tv_mini_btn

    # ── A/C ──────────────────────────────────────────────────────────
    - type: custom:stack-in-card
      view_layout:
        grid-area: ac
      card_mod:
        style: |
          ha-card {
            background: {% if is_state('light.grupo_luzes_sala','on') %}linear-gradient(180deg, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.06) 55%, rgba(0,0,0,0.04) 100%){% else %}linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.10) 55%, rgba(255,255,255,0.08) 100%){% endif %} !important;
            border: {% if is_state('light.grupo_luzes_sala','on') %}1px solid rgba(0,0,0,0.16){% else %}1px solid rgba(255,255,255,0.14){% endif %} !important;
            border-radius: 18px !important;
            box-shadow: none !important;
            padding: 8px 10px 8px 10px !important;
            height: auto !important;
            box-sizing: border-box;
            margin: 0 !important;
          }
      cards:
        - type: custom:layout-card
          layout_type: custom:grid-layout
          layout:
            grid-template-columns: 1fr 38px
            grid-template-rows: minmax(36px, max-content)
            grid-template-areas: |
              "info power"
              "controls power"
            column-gap: 10px
            row-gap: 8px
            margin: 0
            padding: 0
          cards:
            - type: custom:button-card
              view_layout:
                grid-area: info
              entity: climate.sl_ar_condicionado
              icon: mdi:snowflake
              name: A/C
              show_icon: true
              show_name: true
              show_state: false
              tap_action:
                action: more-info
              styles:
                card:
                  - background: transparent
                  - border: none
                  - box-shadow: none
                  - padding: 0
                  - margin: 0
                grid:
                  - grid-template-areas: '"i n"'
                  - grid-template-columns: auto 1fr
                  - column-gap: 8px
                icon:
                  - width: 18px
                  - color: >
                      [[[
                        return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.82)';
                      ]]]
                name:
                  - justify-self: start
                  - align-self: center
                  - font-size: 18px
                  - font-weight: 700
                  - color: >
                      [[[
                        return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.90)' : 'white';
                      ]]]

            - type: custom:button-card
              view_layout:
                grid-area: power
              entity: climate.sl_ar_condicionado
              icon: mdi:power
              show_name: false
              show_state: false
              tap_action:
                action: perform-action
                perform_action: "[[[ const on=['cool','heat','fan_only','dry','heat_cool','auto'].includes(entity?.state); return on?'climate.turn_off':'climate.turn_on'; ]]]"
                target:
                  entity_id: climate.sl_ar_condicionado
              hold_action:
                action: more-info
              styles:
                card:
                  - width: 34px
                  - height: 34px
                  - border-radius: 12px
                  - background: >
                      [[[
                        const on = ['cool','heat','fan_only','dry','heat_cool','auto'].includes(entity?.state);
                        if (on) return 'rgba(79,172,254,0.20)';
                        return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.10)' : 'rgba(255,255,255,0.10)';
                      ]]]
                  - border: >
                      [[[
                        const on = ['cool','heat','fan_only','dry','heat_cool','auto'].includes(entity?.state);
                        if (on) return '1px solid rgba(79,172,254,0.45)';
                        return states['light.grupo_luzes_sala']?.state === 'on' ? '1px solid rgba(0,0,0,0.16)' : '1px solid rgba(255,255,255,0.14)';
                      ]]]
                  - box-shadow: none
                  - padding: 0
                icon:
                  - width: 18px
                  - color: >
                      [[[
                        const on = ['cool','heat','fan_only','dry','heat_cool','auto'].includes(entity?.state);
                        return on ? '#4facfe' : (states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.52)' : 'rgba(255,255,255,0.65)');
                      ]]]

            - type: custom:layout-card
              view_layout:
                grid-area: controls
              layout_type: custom:grid-layout
              layout:
                grid-template-columns: 30px minmax(34px, max-content) 30px
                column-gap: 8px
                row-gap: 0
                margin: 0
                padding: 0
                justify-content: start
                align-items: center
              cards:
                - type: custom:button-card
                  entity: climate.sl_ar_condicionado
                  icon: mdi:minus
                  show_name: false
                  tap_action:
                    action: perform-action
                    perform_action: climate.set_temperature
                    target:
                      entity_id: climate.sl_ar_condicionado
                    data:
                      temperature: >
                        [[[
                          const curr = Number(entity?.attributes?.temperature ?? 22);
                          return Math.max(16, curr - 1);
                        ]]]
                  styles: &ac_step_btn
                    card:
                      - width: 30px
                      - height: 30px
                      - border-radius: 9px
                      - border: 1px solid rgba(255,255,255,0.12)
                      - background: >
                          [[[
                            return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.08)';
                          ]]]
                      - box-shadow: none
                      - padding: 0
                    icon:
                      - width: 16px
                      - color: >
                          [[[
                            return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.78)' : 'rgba(255,255,255,0.85)';
                          ]]]
                - type: custom:button-card
                  entity: climate.sl_ar_condicionado
                  name: >
                    [[[
                      const t = Number(entity?.attributes?.temperature);
                      return Number.isFinite(t) ? `${t}°` : '—';
                    ]]]
                  show_icon: false
                  show_name: true
                  tap_action:
                    action: none
                  styles:
                    card:
                      - min-width: 34px
                      - height: 30px
                      - border-radius: 9px
                      - border: 1px solid rgba(255,255,255,0.10)
                      - background: >
                          [[[
                            return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.06)';
                          ]]]
                      - box-shadow: none
                      - padding: 0 4px
                    name:
                      - font-size: 12px
                      - font-weight: 700
                      - justify-self: center
                      - color: >
                          [[[
                            return states['light.grupo_luzes_sala']?.state === 'on' ? 'rgba(0,0,0,0.80)' : 'rgba(255,255,255,0.90)';
                          ]]]
                - type: custom:button-card
                  entity: climate.sl_ar_condicionado
                  icon: mdi:plus
                  show_name: false
                  tap_action:
                    action: perform-action
                    perform_action: climate.set_temperature
                    target:
                      entity_id: climate.sl_ar_condicionado
                    data:
                      temperature: >
                        [[[
                          const curr = Number(entity?.attributes?.temperature ?? 22);
                          return Math.min(30, curr + 1);
                        ]]]
                  styles: *ac_step_btn

