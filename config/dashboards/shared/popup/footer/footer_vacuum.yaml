# ANTERIOR: Estrutura original ngocjohn com !include snippets (causava configuration error).
# Problemas identificados:
#   1. custom:hui-element com card_type: custom:xiaomi-vacuum-map-card dentro de entities
#      nao renderiza confiavelmente.
#   2. Botoes de controle usavam tap_action: '[[[ return variables.vacuum_action ]]]'
#      que nao e YAML valido — button-card nao suporta JS template em tap_action.
#   3. !include snippets (popup_footer_layout.yaml, style_popup_footer.yaml) com CSS
#      shadow-DOM piercing nao funciona em versoes recentes do HA.
#
# action: fire-dom-event
# browser_mod:
#   service: browser_mod.popup
#   data:
#     title: Roborock S7
#     style: >
#       --max-popup-column: 3;
#     card_mod: !include ../../snippets/style_popup_center.yaml
#     content:
#       type: custom:mod-card
#       card_mod: !include ../../snippets/style_popup_footer.yaml
#       card:
#         type: custom:layout-card
#         layout_type: custom:grid-layout
#         layout: !include ../../snippets/popup_footer_layout.yaml
#         cards:
#           - type: entities
#             title: Summary
#             ...
#           - type: entities
#             title: Map
#             entities:
#               - type: custom:hui-element  # <-- PROBLEMATICO: map dentro de entities
#                 card_type: custom:xiaomi-vacuum-map-card
#                 ...
#           - type: entities
#             title: Settings
#             ...
# --- FIM ANTERIOR ---

# ==============================================================================
# NOVO: Popup reescrito do zero — self-contained, sem !include snippets.
# Segue o padrao visual do dashboard (mesmo estilo de livingroom.yaml e demais popups).
# Estrutura: 3 colunas via layout-card
#   Coluna 1 (300px): Status + Botoes de controle + Config do mop
#   Coluna 2 (1fr): Mapa (custom:xiaomi-vacuum-map-card como card de 1o nivel)
#   Coluna 3 (260px): Configuracoes + Estatisticas
# Botoes de controle: custom:button-card com tap_action YAML valido (sem JS em tap_action)
# Pipeline de sizing: --popup-width via uix-dialog do tema tablet.yaml
# ==============================================================================
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Roborock S7
    tag: vacuum_popup
    size: wide
    style: >
      --popup-width: 1000px;
      --popup-background-color: rgba(15, 20, 35, 0.75);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.56);
      --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 300px 1fr 260px
        grid-gap: 8px
        margin: 0
        padding: 0.5rem
        mediaquery:
          '(max-width: 800px)':
            grid-template-columns: 1fr
      cards:

        # ================================================================
        # COLUNA 1 — STATUS + CONTROLES + MOP
        # ================================================================
        - type: vertical-stack
          cards:
            - type: entities
              title: Status
              show_header_toggle: false
              entities:
                - entity: vacuum.roborock_s7
                  name: Roborock S7
                - entity: sensor.roborock_s7_status
                  name: Estado
                - entity: sensor.roborock_s7_comodo_atual
                  name: Cômodo Atual
                - entity: sensor.roborock_s7_bateria
                  name: Bateria
                - entity: binary_sensor.roborock_s7_mop_attached
                  name: Mop Acoplado
                - entity: binary_sensor.roborock_s7_water_box_attached
                  name: Caixa d'Água
                - entity: binary_sensor.roborock_s7_water_shortage
                  name: Falta de Água
                - entity: sensor.roborock_s7_vacuum_error
                  name: Erro

            - type: horizontal-stack
              cards:
                - type: custom:button-card
                  entity: vacuum.roborock_s7
                  name: Iniciar
                  icon: mdi:play
                  tap_action:
                    action: call-service
                    service: vacuum.start
                    service_data:
                      entity_id: vacuum.roborock_s7
                  template:
                    - base
                - type: custom:button-card
                  entity: vacuum.roborock_s7
                  name: Pausar
                  icon: mdi:pause
                  tap_action:
                    action: call-service
                    service: vacuum.pause
                    service_data:
                      entity_id: vacuum.roborock_s7
                  template:
                    - base
                - type: custom:button-card
                  entity: vacuum.roborock_s7
                  name: Base
                  icon: mdi:home-map-marker
                  tap_action:
                    action: call-service
                    service: vacuum.return_to_base
                    service_data:
                      entity_id: vacuum.roborock_s7
                  template:
                    - base

            - type: entities
              title: Mop
              show_header_toggle: false
              entities:
                - entity: select.roborock_s7_intensidade_do_mop
                  name: Intensidade
                - entity: select.roborock_s7_modo_mop
                  name: Modo

        # ================================================================
        # COLUNA 2 — MAPA
        # Card de primeiro nivel (nao dentro de entities) para renderizacao confiavel
        # ================================================================
        - type: custom:xiaomi-vacuum-map-card
          entity: vacuum.roborock_s7
          vacuum_platform: Roborock
          map_source:
            camera: image.roborock_s7_map_0
          calibration_source:
            camera: true
          map_locked: false

        # ================================================================
        # COLUNA 3 — CONFIGURACOES + ESTATISTICAS
        # ================================================================
        - type: vertical-stack
          cards:
            - type: entities
              title: Configurações
              show_header_toggle: false
              entities:
                - entity: number.roborock_s7_volume
                  name: Volume
                - entity: switch.roborock_s7_nao_perturbe
                  name: Não Perturbe
                - entity: time.roborock_s7_comecar_nao_perturbe
                  name: Início NP
                - entity: time.roborock_s7_terminar_nao_perturbe
                  name: Fim NP
                - entity: switch.roborock_s7_dock_luz_indicadora_de_status
                  name: Luz Indicadora
                - entity: switch.roborock_s7_dock_bloqueio_infantil
                  name: Bloqueio Infantil

            - type: entities
              title: Estatísticas
              show_header_toggle: false
              entities:
                - entity: sensor.roborock_s7_area_de_limpeza
                  name: Área (Última)
                - entity: sensor.roborock_s7_tempo_de_limpeza
                  name: Tempo (Última)
                - type: divider
                - entity: sensor.roborock_s7_area_total_de_limpeza
                  name: Área Total
                - entity: sensor.roborock_s7_tempo_total_de_limpeza
                  name: Tempo Total
                - entity: sensor.roborock_s7_contagem_total_de_limpeza
                  name: Nº de Limpezas
