# ── Linha 3: TV (placeholder) + Spotify + AC placeholder + 2 blanks ──
# ANTERIOR: Linha 3 tinha 5 colunas com Spotify + AC + 3 blanks (sem TV)
# - type: grid
#   columns: 5
#   square: false
#   card_mod:
#     style: |
#       #root {
#         gap: 4px !important;
#       }
#   cards:
#     # SPOTIFY — (sem TV)
#     ...
#     # AC — placeholder
#     ...
#     # BLANK 1-3

# NOVO: Linha 3 com TV placeholder adicionado + padrao 98px
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
        grid-template-columns: repeat(5, 98px) !important;
      }
  cards:
    # TV — placeholder (entidade a definir futuramente)
    - type: custom:button-card
      name: TV
      template:
        - base
      icon: mdi:television
      show_icon: true
      tap_action:
        action: none
      hold_action:
        action: none
      double_tap_action:
        action: none
      styles:
        card:
          - opacity: "0.45"
          - cursor: "default"
    # SPOTIFY — compartilhado, mesma entidade em todos os comodos
    # FIX C3: hold_action agora abre popup Spotify dedicado da Q.Marina (com default_device: Echo Pop Marina).
    # ANTERIOR: hold_action: !include ../popup/media_spotify.yaml (popup compartilhado sem device targeting)
    - type: custom:button-card
      entity: media_player.spotifyplus_bruno_helasio
      name: Spotify
      template:
        - base
        - circle
        - loader
        - icon_spotify_color
      state_display: >
        [[[
          return entity && entity.state === 'off' ? ' ' : null;
        ]]]
      variables:
        state_on: >
          [[[ return entity && ['on', 'idle', 'playing', 'paused', 'standby'].indexOf(entity.state) !== -1; ]]]
        circle_input: >
          [[[
            if (entity && entity.attributes.volume_level !== undefined) {
              let volume = Math.round(entity.attributes.volume_level * 100)
              return volume === 0 && entity.state !== 'off'
                ? 1
                : volume
            }
          ]]]
        circle_input_unit: '%'
      tap_action:
        action: perform-action
        perform_action: media_player.media_play_pause
        target:
          entity_id: media_player.spotifyplus_bruno_helasio
        haptic: success
      double_tap_action:
        action: more-info
      hold_action: !include ../popup/media_spotify_quarto_marina.yaml
    # AC — Quarto Marina nao possui AC (placeholder desabilitado)
    - type: custom:button-card
      name: Ar Cond.
      template:
        - base
        - icon_climate
      show_icon: false
      tap_action:
        action: none
      hold_action:
        action: none
      double_tap_action:
        action: none
      styles:
        card:
          - opacity: "0.35"
          - cursor: "default"
    # BLANK 1-2
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'
    - type: custom:button-card
      color_type: blank-card
      styles:
        card:
          - background: none
          - border: none
          - box-shadow: none
          - opacity: '0'
