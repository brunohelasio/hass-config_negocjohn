# ─────────────────────────────────────────────────────────────────────────────
# POPUP FULLSCREEN — Sala de Estar
# Etapa 1 / Estrutura base com 6 blocos placeholder
#
# browser_mod 2.8+ usa wa-dialog (WebAwesome), não mdc-dialog.
# O parâmetro nativo `initial_style: fullscreen` cobre toda a tela.
# Background aplicado via --ha-dialog-surface-background no style:.
#
# ANTERIOR (v1) — CSS hacks mdc-dialog, não funciona em 2.8+:
# card_mod com .mdc-dialog__surface / .mdc-dialog__container
# style: --popup-width/--popup-max-width/--mdc-theme-surface
#
# Popup original (65vw) mantido íntegro em livingroom.yaml.
# ─────────────────────────────────────────────────────────────────────────────

action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: " "
    tag: sala_fullscreen
    dismissable: true
    initial_style: fullscreen
    style: >
      --ha-dialog-surface-background: linear-gradient(140deg, #0b1623 0%, #132035 55%, #0b1e30 100%);
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        padding: 12px
        grid-gap: 10px
        grid-template-columns: repeat(12, minmax(0, 1fr))
        grid-template-rows: 44vh 42vh
        grid-template-areas: |
          "hero hero hero hero hero lights lights lights lights ac ac ac"
          "cams cams cams cams media media media media spot spot spot spot"
        mediaquery:
          '(max-width: 800px)':
            padding: 8px
            grid-gap: 8px
            grid-template-columns: 1fr
            grid-template-rows: repeat(6, min-content)
            grid-template-areas: |
              "hero"
              "lights"
              "ac"
              "cams"
              "media"
              "spot"
          '(min-width: 801px) and (max-width: 1440px) and (orientation: portrait)':
            grid-template-columns: repeat(2, minmax(0, 1fr))
            grid-template-rows: repeat(3, min-content)
            grid-template-areas: |
              "hero lights"
              "ac cams"
              "media spot"

      cards:

        # ── BLOCO 1: Hero ────────────────────────────────────────────────────
        - type: custom:button-card
          view_layout:
            grid-area: hero
          entity: light.grupo_luzes_sala
          name: Hero
          label: "Imagem · Pills de status · Cortina"
          show_icon: false
          show_name: true
          show_label: true
          show_state: false
          tap_action:
            action: none
          card_mod:
            style: |
              ha-card {
                background: rgba(255,255,255,0.06) !important;
                backdrop-filter: blur(20px) saturate(1.35) !important;
                -webkit-backdrop-filter: blur(20px) saturate(1.35) !important;
                border: 1px solid rgba(255,255,255,0.10) !important;
                border-radius: 20px !important;
                box-shadow: 0 4px 24px rgba(0,0,0,0.28) !important;
                height: 100% !important;
                overflow: hidden !important;
              }
          styles:
            card:
              - padding: 20px
              - justify-content: flex-end
              - align-items: flex-start
              - flex-direction: column
            name:
              - color: rgba(255,255,255,0.90)
              - font-size: 22px
              - font-weight: "700"
              - justify-self: start
            label:
              - color: rgba(255,255,255,0.35)
              - font-size: 12px
              - justify-self: start

        # ── BLOCO 2: Luzes ───────────────────────────────────────────────────
        - type: custom:button-card
          view_layout:
            grid-area: lights
