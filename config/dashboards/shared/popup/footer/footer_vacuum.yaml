# ==============================================================================
# NOVO: Reescrita do zero (2026-04-01).
# Estrutura self-contained — sem !include snippets problemáticos.
#
# Layout: 3 colunas via custom:layout-card
#   Coluna 1 (Resumo 300px): entities status + botoes controle
#   Coluna 2 (Mapa 1fr): xiaomi-vacuum-map-card como card de PRIMEIRO NIVEL
#   Coluna 3 (Config 280px): entities configuracoes + estatisticas
#
# Popup width: --popup-width: 1100px via pipeline uix-dialog do tema tablet
# Centering: card_mod inline (sem !include style_popup_center.yaml)
# Botoes: custom:button-card com servicos diretos (sem JS condicional em service:)
#
# Para rollback: comentar este bloco e descomentar o bloco ngocjohn acima.
# ==============================================================================
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Roborock S7
    style: >
      --popup-width: 1100px;
    card_mod:
      style:
        ha-dialog$: |
          .mdc-dialog__container {
            align-items: center !important;
            justify-content: center !important;
          }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 300px 1fr 280px
        grid-template-rows: 1fr
        grid-template-areas: '"summary map settings"'
        grid-gap: 16px
        margin: 0
        padding: 16px
        mediaquery:
          "(max-width: 800px)":
            grid-template-columns: 1fr
            grid-template-rows: auto auto auto
            grid-template-areas: |
              "summary"
              "map"
              "settings"
      cards:

        # ================================================================
        # COLUNA 1 — RESUMO (Status + Peças + Controles)
        # ================================================================
        - type: vertical-stack
          view_layout:
            grid-area: summary
          cards:
            - type: entities
              title: Status
              show_header_toggle: false
              entities:
                - entity: vacuum.roborock_s7
                  name: Roborock S7
                - entity: sensor.roborock_s7_status
                  name: Status
                - entity: sensor.roborock_s7_comodo_atual
                  name: Cômodo Atual
                - entity: sensor.roborock_s7_vacuum_error
                  name: Erro
                - entity: sensor.roborock_s7_bateria
                  name: Bateria
                - entity: binary_sensor.roborock_s7_mop_attached
                  name: Mop Acoplado
                - entity: binary_sensor.roborock_s7_water_box_attached
                  name: Caixa de Água
                - entity: binary_sensor.roborock_s7_water_shortage
                  name: Falta de Água
                - type: divider
                - entity: select.roborock_s7_intensidade_do_mop
                  name: Intensidade do Mop
                - entity: select.roborock_s7_modo_mop
                  name: Modo do Mop

            # Botões de controle — horizontal-stack separado (não dentro de entities)
            - type: horizontal-stack
              cards:
                # Botão Iniciar
                - type: custom:button-card
                  entity: vacuum.roborock_s7
                  icon: mdi:play
                  name: Iniciar
                  show_name: true
                  styles:
                    card:
                      - height: 56px
                      - border-radius: 12px
                      - background: rgba(255,255,255,0.07)
                      - box-shadow: none
                      - border: 1px solid rgba(255,255,255,0.12)
                      - aspect-ratio: unset
                    icon:
                      - color: rgba(255,255,255,0.80)
                      - width: 22px
                    name:
                      - font-size: 12px
                      - color: rgba(255,255,255,0.70)
                  tap_action:
                    action: call-service
                    service: vacuum.start
                    service_data:
                      entity_id: vacuum.roborock_s7
                    haptic: success

                # Botão Pausar
                - type: custom:button-card
                  entity: vacuum.roborock_s7
                  icon: mdi:pause
                  name: Pausar
                  show_name: true
                  styles:
                    card:
                      - height: 56px
                      - border-radius: 12px
                      - background: rgba(255,255,255,0.07)
                      - box-shadow: none
                      - border: 1px solid rgba(255,255,255,0.12)
                      - aspect-ratio: unset
                    icon:
                      - color: rgba(255,255,255,0.80)
                      - width: 22px
                    name:
                      - font-size: 12px
                      - color: rgba(255,255,255,0.70)
                  tap_action:
                    action: call-service
                    service: vacuum.pause
                    service_data:
                      entity_id: vacuum.roborock_s7
                    haptic: light

                # Botão Voltar à Base
                - type: custom:button-card
                  entity: vacuum.roborock_s7
                  icon: mdi:home-import-outline
                  name: Base
                  show_name: true
                  styles:
                    card:
                      - height: 56px
                      - border-radius: 12px
                      - background: rgba(255,255,255,0.07)
                      - box-shadow: none
                      - border: 1px solid rgba(255,255,255,0.12)
                      - aspect-ratio: unset
                    icon:
                      - color: rgba(255,255,255,0.80)
                      - width: 22px
                    name:
                      - font-size: 12px
                      - color: rgba(255,255,255,0.70)
                  tap_action:
                    action: call-service
                    service: vacuum.return_to_base
                    service_data:
                      entity_id: vacuum.roborock_s7
                    haptic: medium

        # ================================================================
        # COLUNA 2 — MAPA (card de primeiro nível — NÃO dentro de entities)
        # ================================================================
        - type: custom:xiaomi-vacuum-map-card
          view_layout:
            grid-area: map
          vacuum_platform: Roborock
          entity: vacuum.roborock_s7
          map_source:
            camera: image.roborock_s7_map_0
          calibration_source:
            camera: true
          map_locked: true
          card_mod:
            style: |
              ha-card {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
              }

        # ================================================================
        # COLUNA 3 — CONFIGURAÇÕES + ESTATÍSTICAS
        # ================================================================
        - type: entities
          view_layout:
            grid-area: settings
          title: Configurações
          show_header_toggle: false
          entities:
            - entity: number.roborock_s7_volume
              name: Volume

            - entity: switch.roborock_s7_nao_perturbe
              name: Não Perturbe

            - entity: time.roborock_s7_comecar_nao_perturbe
              name: Início NP

            - entity: time.roborock_s7_terminar_nao_perturbe
              name: Fim NP

            - entity: switch.roborock_s7_dock_luz_indicadora_de_status
              name: Luz Indicadora

            - entity: switch.roborock_s7_dock_bloqueio_infantil
              name: Bloqueio Infantil

            - type: divider

            - entity: sensor.roborock_s7_area_de_limpeza
              name: Área (Última)

            - entity: sensor.roborock_s7_tempo_de_limpeza
              name: Tempo (Última)

            - entity: sensor.roborock_s7_area_total_de_limpeza
              name: Área Total

            - entity: sensor.roborock_s7_tempo_total_de_limpeza
              name: Tempo Total

            - entity: sensor.roborock_s7_contagem_total_de_limpeza
              name: Nº de Limpezas

