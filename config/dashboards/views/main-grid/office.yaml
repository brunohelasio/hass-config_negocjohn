#################################################
#                                               #
#                   OFFICE 1x2                  #
#                                               #
#################################################
- type: grid
  title: Office
  view_layout:
    grid-area: office_tall
    show:
      mediaquery: '(min-width: 801px) and (min-height: 463px)'
  columns: 1
  square: false
  cards: !include ../../shared/grid-cards/office-bento.yaml

- type: conditional
  view_layout:
    grid-area: office_tall
  conditions:
    - condition: screen
      media_query: '(max-width: 800px) and (min-height: 463px)'
    - condition: state
      entity: input_select.mobile_dashboard_tab
      state: comodos
  card:
    type: grid
    title: Office
    columns: 1
    square: false
    cards: !include ../../shared/grid-cards/office-bento.yaml
