action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Sala
    tag: sala_popup
    size: wide
    # ANTERIOR (4 colunas): --popup-width: 55vw; --popup-max-width: 850px;
    # Ampliado para 65vw/980px para acomodar layout de 5 colunas nos botoes.
    # Grid ratio mudou de 1.4fr para 1.6fr para dar mais espaco aos botoes.
    style: >
      --popup-width: 65vw;
      --popup-max-width: 980px;
      --popup-background-color: rgba(15, 20, 35, 0.75);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.56);
      --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
      --tablet-popup-content-padding: 0.4em 0.6em 0.6em 0.5em;
