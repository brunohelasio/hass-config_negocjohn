# --- FIM CÓDIGO ORIGINAL ---
# NOVO: custom:spotifyplus-card (thlucas1/spotifyplus_card)
# Oferece player completo com device targeting nativo, artwork, controles, favoritos.
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Spotify — Sala
    tag: spotify_sala
    style: >
      --popup-max-width: min(500px, 90vw);
    card_mod: !include ../snippets/style_popup_complete.yaml
    content:
      type: custom:spotifyplus-card
      # FIX: parametros corretos conforme documentacao thlucas1:
      # entity (nao entity_id), deviceDefaultId (nao playerDefaultDeviceName)
      entity: media_player.spotifyplus_bruno_helasio
      deviceDefaultId: Echo Show
      # FIX: artwork centralizado + device control por nome (resiliente a ID changes)
      playerBackgroundImageSize: "cover"
      deviceControlByName: true
      sections:
        - player
        - devices
        - userpresets
      card_mod:
        style: |
          ha-card {
            --ha-card-border-width: 0;
            background: transparent;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 12px;
          }
          /* FIX: centralizar artwork no popup — imagens do repositorio do card
             mostram arte ocupando todo o popup. Estas regras garantem que a
             arte fique centralizada e cubra todo o background disponivel. */
          .player-background,
          .player-background img,
          .player-section .thumbnail,
          .player-section .thumbnail img {
            object-fit: cover !important;
            object-position: center center !important;
            background-position: center center !important;
            background-size: cover !important;
          }
