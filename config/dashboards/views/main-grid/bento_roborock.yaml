type: custom:stack-in-card
view_layout:
  grid-area: roborock
card_mod:
  style: |
    /* 1. Faz o "envelope" do cartão esticar até o fundo da célula do grid */
    :host {
      height: 100% !important;
    }
    
    ha-card {
      /* 2. Faz o cartão acompanhar o envelope */
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: space-between !important;

      /* 3. Vidro Premium — mesmo azul do bloco welcome */
      background: linear-gradient(160deg, rgba(96,165,250,0.22), rgba(59,130,246,0.08)) !important;
      backdrop-filter: blur(20px) saturate(1.35) !important;
      -webkit-backdrop-filter: blur(20px) saturate(1.35) !important;
      border: 1px solid rgba(147,197,253,0.34) !important;
      box-shadow: 0 0 32px rgba(59,130,246,0.12), inset 0 1px 0 rgba(191,219,254,0.15), 0 8px 32px rgba(0,0,0,0.2) !important;
      
      /* 4. Força o arredondamento e IMPEDE que o conteúdo vaze e deixe quadrado */
      border-radius: 18px !important;
      overflow: hidden !important;
      
      /* 5. Desliga a interferência do tema nos filhos */
      --ha-card-glass-tint: transparent !important;
      --ha-card-backdrop-filter: none !important;
      --ha-card-glass-inset-shadow: none !important;
      --ha-card-background: transparent !important;
      --ha-card-border-width: 0 !important;
    }
    
    ha-card::before {
      display: none !important;
    }
cards: !include ../../shared/grid-cards/bento_roborock.yaml
