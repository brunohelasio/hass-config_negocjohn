icon: mdi:view-quilt
path: bento-lab
subview: false
theme: tablet
type: custom:grid-layout
card_mod:
  style: |
    hui-grid-layout {
      height: 100vh !important;
      background: linear-gradient(140deg, #0b1623 0%, #132035 55%, #0b1e30 100%);
      padding-bottom: 8px;
      box-sizing: border-box;
    }
layout:
  margin: 0
  padding: 12px
  grid-gap: 10px
  grid-template-columns: 64px repeat(12, minmax(0, 1fr))
  # Composição alinhada ao mock:
  # - Cameras com mesma largura de Welcome
  # - Energia/Agenda/Roborock iniciando no mesmo X de Sala
  # - Midia ocupando faixa direita dedicada (largura dos 2 blocos finais dos comodos)
  # - Energia mais baixa; Agenda/Roborock mais altos
  grid-template-rows: auto 40vh 16vh 24vh 74px
  grid-template-areas: |
    "sidebar top_badges top_badges top_badges top_badges top_badges top_badges top_badges top_badges top_badges top_badges top_badges top_badges"
    "sidebar welcome welcome welcome welcome sala sala comodos comodos comodos comodos comodos comodos"
    "sidebar cameras cameras cameras cameras energy energy energy energy media media media media"
    "sidebar cameras cameras cameras cameras calendar calendar roborock roborock media media media media"
    "sidebar quick_actions quick_actions quick_actions quick_actions quick_actions quick_actions quick_actions quick_actions quick_actions quick_actions quick_actions quick_actions"

  mediaquery:
    '(max-width: 800px)':
      padding: 8px
      grid-gap: 8px
      grid-template-columns: 1fr
      grid-template-rows: repeat(11, min-content)
      grid-template-areas: |
        "sidebar"
        "top_badges"
        "welcome"
        "sala"
        "office"
        "cameras"
        "energy"
        "calendar"
        "roborock"
        "media"
        "quick_actions"

cards:
  - !include main-grid/bento_sidebar.yaml
  - !include main-grid/bento_top_badges.yaml
  - !include main-grid/bento_welcome.yaml
  - !include main-grid/bento_sala.yaml
  - !include main-grid/bento_comodos.yaml
  - !include main-grid/bento_cameras.yaml
  - !include main-grid/bento_energy.yaml
  - !include main-grid/bento_calendar.yaml
  - !include main-grid/bento_roborock.yaml
  - !include main-grid/bento_quick_actions.yaml
  - !include main-grid/bento_media.yaml
