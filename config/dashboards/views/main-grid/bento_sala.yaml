type: custom:stack-in-card
view_layout:
  grid-area: sala
card_mod:
  style: |
    {% set sala_on = is_state('light.grupo_luzes_sala', 'on') %}
    /* 1. Faz o "envelope" do cartão esticar até o fundo da célula do grid */
    :host {
      height: 100% !important;
    }
    
    ha-card {
      /* 2. Faz o cartão acompanhar o envelope */
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: space-between !important;

      /* 3. O SEU Vidro Perfeito (ORIGINAL — mantido comentado para rollback rapido)
      background: linear-gradient(160deg, rgba(15,20,35,0.58), rgba(20,24,33,0.42)) !important;
      backdrop-filter: blur(20px) saturate(1.35) !important;
      -webkit-backdrop-filter: blur(20px) saturate(1.35) !important;
      border: 1px solid rgba(255,255,255,0.28) !important;
      box-shadow: 0 0 32px rgba(59,130,246,0.12), inset 0 1px 0 rgba(191,219,254,0.15), 0 8px 32px rgba(0,0,0,0.2) !important;
      */

      /* 3b. AJUSTE: acendimento no BLOCO COMPLETO da Sala */
      background: {% if sala_on %}rgba(250,250,250,0.75){% else %}linear-gradient(160deg, rgba(15,20,35,0.58), rgba(20,24,33,0.42)){% endif %} !important;
      backdrop-filter: {% if sala_on %}none{% else %}blur(20px) saturate(1.35){% endif %} !important;
      -webkit-backdrop-filter: {% if sala_on %}none{% else %}blur(20px) saturate(1.35){% endif %} !important;
      border: {% if sala_on %}1px solid rgba(255,255,255,0.28){% else %}1px solid rgba(255,255,255,0.28){% endif %} !important;
      box-shadow: {% if sala_on %}0 0 20px rgba(255,255,255,0.10), inset 0 1px 0 rgba(255,255,255,0.28), 0 8px 24px rgba(0,0,0,0.14){% else %}0 0 32px rgba(59,130,246,0.12), inset 0 1px 0 rgba(191,219,254,0.15), 0 8px 32px rgba(0,0,0,0.2){% endif %} !important;
      
      /* 4. Força o arredondamento e IMPEDE que o conteúdo vaze e deixe quadrado */
      border-radius: 18px !important;
      overflow: hidden !important;
      
      /* 5. Desliga a interferência do tema nos filhos */
      --ha-card-glass-tint: transparent !important;
      --ha-card-backdrop-filter: none !important;
      --ha-card-glass-inset-shadow: none !important;
      --ha-card-background: transparent !important;
      --ha-card-border-width: 0 !important;
    }
    
    ha-card::before {
      display: none !important;
    }
cards: !include ../../shared/grid-cards/bento_sala.yaml
