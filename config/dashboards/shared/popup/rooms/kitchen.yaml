action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Cozinha
    size: wide
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 18vw 18vw 36vw
        grid-template-areas: '"col_luzes col_extra col_camera"'
        justify-content: center
        align-content: center
        grid-gap: 1.5vw
        mediaquery:
          "(max-width: 800px)":
            grid-template-columns: 1fr
            grid-template-areas: |
              "col_luzes"
              "col_extra"
              "col_camera"
      cards:
        - type: vertical-stack
          view_layout:
            grid-area: col_luzes
          cards:
            - type: grid
              columns: 2
              square: true
              cards:
                - type: custom:button-card
                  entity: light.cz_luz_principal
                  name: Luz principal
                  template:
                    - tpl_popup_light
                    - icon_light_flush
                - type: custom:button-card
                  entity: light.cozinha_switch_2
                  name: Luz principal 1
                  template:
                    - tpl_popup_light
                    - icon_light_flush
                - type: custom:button-card
                  entity: light.cozinha_switch_3
                  name: Luz principal 2
                  template:
                    - tpl_popup_light
                    - icon_light_flush
                - type: custom:button-card
                  entity: light.cozinha_switch_1
                  name: Lavanderia
                  template:
                    - tpl_popup_light
                    - icon_light_flush
        - type: vertical-stack
          view_layout:
            grid-area: col_extra
          cards:
            - type: entities
              title: Eletrodomésticos
              show_header_toggle: false
              entities:
                - entity: switch.washer_dryer_power
                  name: Máquina de lavar
                - entity: switch.mycka_nadobi_power
                  name: Lava-louças
                - entity: switch.air_fryer_power
                  name: Air Fryer
        - type: vertical-stack
          view_layout:
            grid-area: col_camera
          cards:
            - type: picture-entity
              entity: camera.cz_camera
              camera_view: live
              show_name: false
              show_state: false
            - type: picture-entity
              entity: camera.as_camera
              camera_view: live
              show_name: false
              show_state: false
