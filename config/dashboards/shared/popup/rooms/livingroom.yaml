# ──────────────────────────────────────────────────────────────
#  POPUP — SALA  (Living Room)
#  Responsivo: Desktop / Tablet (landscape+portrait) / Mobile
# ──────────────────────────────────────────────────────────────
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Sala
    style: |
      --popup-max-width: 95vw;
      --popup-min-width: 400px;
      --tablet-popup-content-padding: 1.2em 1.6em 1.4em 1.2em;
      --ha-dialog-surface-background: rgba(22, 24, 29, 0.78);
      --dialog-box-shadow: 0 0 30px 6px rgba(60, 130, 220, 0.25),
                           0 0 80px 20px rgba(60, 130, 220, 0.12),
                           0 8px 32px 8px rgba(0, 0, 0, 0.4);
      --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.6);
    card_mod:
      style:
        .: |
          :host {
            --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.6) !important;
          }
        ha-dialog$: |
          .mdc-dialog__scrim {
            backdrop-filter: blur(10px) saturate(120%) !important;
            -webkit-backdrop-filter: blur(10px) saturate(120%) !important;
          }
          .mdc-dialog__container {
            filter: drop-shadow(0 0 40px rgba(60, 130, 220, 0.20));
          }
          .mdc-dialog__surface {
            max-width: 95vw !important;
            min-width: 320px !important;
          }
          @media screen and (min-width: 1024px) {
            .mdc-dialog__surface {
              max-width: 85vw !important;
              min-width: 780px !important;
            }
          }
          @media screen and (max-width: 599px) {
            .mdc-dialog__surface {
              max-width: 98vw !important;
              min-width: unset !important;
              margin: 4px !important;
              max-height: 96vh !important;
            }
          }
          @media screen and (min-width: 600px) and (max-width: 1023px) {
            .mdc-dialog__surface {
              max-width: 94vw !important;
              min-width: 560px !important;
            }
          }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        # ── Desktop (>= 1024px): 3 colunas lado a lado ──
        grid-template-columns: 18vw 18vw 28vw
        grid-template-areas: '"col_luzes col_extra col_camera"'
        justify-content: center
        align-content: center
        grid-gap: 1.5vw
        mediaquery:
          # ── Tablet portrait / landscape (600–1023px): 2 colunas + camera embaixo ──
          "(min-width: 600px) and (max-width: 1023px)":
            grid-template-columns: 1fr 1fr
            grid-template-areas: |
              "col_luzes col_extra"
              "col_camera col_camera"
            grid-gap: 12px
            padding: 8px
          # ── Mobile (<600px): tudo empilhado ──
          "(max-width: 599px)":
            grid-template-columns: 1fr
            grid-template-areas: |
              "col_luzes"
              "col_extra"
              "col_camera"
            grid-gap: 8px
            padding: 4px
      cards:
        # ======================================================================
        # COLUNA 1 — ILUMINACAO
        # ======================================================================
        - type: vertical-stack
          view_layout:
            grid-area: col_luzes
          cards:
            - type: grid
              columns: 2
              square: true
              cards:
                - type: custom:button-card
                  entity: light.sala_switch_2
                  name: Luz Principal
                  template:
                    - tpl_popup_light
                    - icon_light_flush
                - type: custom:button-card
                  entity: light.sala_switch_1
                  name: LED Direito
                  template:
                    - tpl_popup_light
                    - icon_ledstrip
                - type: custom:button-card
                  entity: light.sala_switch_3
                  name: LED Esquerdo
                  template:
                    - tpl_popup_light
                    - icon_ledstrip
                - type: custom:button-card
                  entity: light.sala_2_switch_2
                  name: VR Principal
                  template:
                    - tpl_popup_light
                    - icon_light_flush
                - type: custom:button-card
                  entity: light.sala_2_switch_3
                  name: VR Cristaleira
                  template:
                    - tpl_popup_light
                    - icon_ledstrip
                - type: custom:button-card
                  entity: light.varanda_switch_1
                  name: VR Gourmet
                  template:
                    - tpl_popup_light
                    - icon_ledstrip
                - type: custom:button-card
                  entity: light.varanda_switch_2
                  name: VR Pendente
                  template:
                    - tpl_popup_light
                    - icon_pendant

        # ======================================================================
        # COLUNA 2 — MIDIA + EXTRAS
        # ======================================================================
        - type: vertical-stack
          view_layout:
            grid-area: col_extra
          cards:
            - type: grid
              columns: 2
              square: true
              cards:
                # TV — placeholder (sem entidade real ainda)
                - type: custom:button-card
                  name: Smart TV
                  template:
                    - base
                    - icon_tv
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.60"
                      - cursor: "default"
                  # Quando tiver entidade real, descomente:
                  # entity: media_player.SUA_TV_DA_SALA

                # Spotify — placeholder
                - type: custom:button-card
                  name: Spotify
                  template:
                    - base
                    - icon_spotify_color
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.60"
                      - cursor: "default"
                  # Quando tiver entidade real, descomente:
                  # entity: media_player.SEU_SPOTIFY

                # PS5 — placeholder
                - type: custom:button-card
                  name: PS5
                  template:
                    - base
                    - icon_ps5
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.45"
                      - cursor: "default"

                # Pioneer — placeholder (com icone generico)
                - type: custom:button-card
                  name: Pioneer
                  icon: mdi:speaker
                  template:
                    - base
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.45"
                      - cursor: "default"

            # Separador visual
            - type: custom:button-card
              color_type: blank-card
              styles:
                card:
                  - height: 1px
                  - margin: 8px 12px
                  - background: >
                      linear-gradient(90deg,rgba(255,255,255,0) 0%,rgba(255,255,255,0.15) 50%,rgba(255,255,255,0) 100%)

            # Linha de sensores / extras
            - type: grid
              columns: 2
              square: true
              cards:
                # Cortina / Cover — placeholder
                - type: custom:button-card
                  name: Cortina
                  template:
                    - base
                    - icon_cover
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.35"
                      - cursor: "default"
                  # Quando tiver entidade real, descomente:
                  # entity: cover.SUA_CORTINA_DA_SALA

                # Ar-condicionado / Climate — placeholder
                - type: custom:button-card
                  name: Ar-condicionado
                  template:
                    - base
                    - icon_climate
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.35"
                      - cursor: "default"
                  # Quando tiver entidade real, descomente:
                  # entity: climate.SEU_AR_DA_SALA

        # ======================================================================
        # COLUNA 3 — CAMERAS
        # ======================================================================
        - type: vertical-stack
          view_layout:
            grid-area: col_camera
          cards:
            - type: picture-entity
              entity: camera.sl_camera
              camera_view: live
              show_name: false
              show_state: false
            - type: picture-entity
              entity: camera.vr_camera
              camera_view: live
              show_name: false
              show_state: false
