- type: custom:swipe-card
  card_mod:
    style: |
      :host {
        height: 100% !important;
        min-height: 0 !important;
        display: block !important;
      }
      .swiper,
      .swiper-container,
      .swiper-wrapper,
      .swiper-slide {
        height: 100% !important;
        min-height: 0 !important;
      }
      .swiper-slide {
        display: flex !important;
        align-items: stretch !important;
      }
  parameters:
    pagination:
      type: bullets
      clickable: true
    roundLengths: true
    effect: slide
    speed: 600
    spaceBetween: 12
    threshold: 7
    autoHeight: false
    observer: true
    followFinger: true
    grabCursor: true
  cards:
    ########## SLIDE 1: ARTWORK + CONTROL BAR ##########
    # ANTERIOR: !include ../snippets/media-slide-focus.yaml
    # Bento precisa de versão retangular sem assumir aspect_ratio 1/1.
    - !include ../snippets/media-slide-focus-bento.yaml

    ########## SLIDE 2: GRID 2x2 ##########
    - type: custom:mod-card
      card_mod:
        style: |
          :host {
            height: 100% !important;
            min-height: 0 !important;
            display: block !important;
          }
          ha-card {
            height: 100% !important;
            min-height: 0 !important;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            overflow: hidden !important;
            display: flex !important;
          }
          hui-grid-card {
            flex: 1 1 auto !important;
            min-height: 0 !important;
          }
          #root {
            height: 100% !important;
            min-height: 0 !important;
            align-content: stretch !important;
          }
      card:
        type: grid
        columns: 2
        square: false
        cards:
        # Slot 1: Smart TV
        - type: custom:button-card
          entity: media_player.android_tv_192_168_3_17
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.android_tv_192_168_3_17
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml
          styles:
            card:
              - height: 100%
              - min-height: 0
              - aspect-ratio: auto

        # Slot 2: Echo Show
        - type: custom:button-card
          entity: media_player.echo_show
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.echo_show
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml
          # Esconde duplicidade DE MODO SEGURO (preserva o template nativo se retornar undefined)
          styles:
            card:
              - background-image: >
                  [[[ 
                    if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                      return 'none !important';
                    }
                    return undefined;
                  ]]]
              - height: 100%
              - min-height: 0
              - aspect-ratio: auto
            custom_fields:
              artwork:
                - display: >
                    [[[ 
                      if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                        return 'none !important';
                      }
                      return undefined;
                    ]]]

        # Slot 3: Spotify
        - type: custom:button-card
          entity: media_player.spotifyplus_bruno_helasio
          template:
            - base
            - media_premium
            - icon_spotify
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.spotifyplus_bruno_helasio
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml
          styles:
            card:
              - height: 100%
              - min-height: 0
              - aspect-ratio: auto

        # Slot 4: Echo Pop Office
        - type: custom:button-card
          entity: media_player.echo_pop_office
          template:
            - base
            - media_premium
            - icon_tv
          tap_action:
            action: call-service
            service: input_select.select_option
            service_data:
              entity_id: input_select.media_focus_player
              option: media_player.echo_pop_office
            haptic: light
          hold_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data: !include ../popup/media_all_players.yaml
          # Esconde duplicidade DE MODO SEGURO (preserva o template nativo se retornar undefined)
          styles:
            card:
              - background-image: >
                  [[[ 
                    if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                      return 'none !important';
                    }
                    return undefined;
                  ]]]
              - height: 100%
              - min-height: 0
              - aspect-ratio: auto
            custom_fields:
              artwork:
                - display: >
                    [[[ 
                      if (states['media_player.spotifyplus_bruno_helasio'] && states['media_player.spotifyplus_bruno_helasio'].state === 'playing') {
                        return 'none !important';
                      }
                      return undefined;
                    ]]]
