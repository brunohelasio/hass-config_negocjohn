      card:
        - width: max-content
        - height: 48px
        - border-radius: 999px
        - padding: 0 12px
        - position: relative
        - overflow: visible
        - z-index: >
            [[[ return variables?.s?.exp === 'media' ? '4' : '1'; ]]]
        - display: >
            [[[ return states['input_select.hemma_expanded_row']?.state === 'lights' ? 'none' : 'inline-flex'; ]]]
        - background: >
            [[[ return variables?.s?.is_on ? 'rgba(255,255,255,0.90)' : 'rgba(36,33,30,0.82)'; ]]]
        - border: >
            [[[ return variables?.s?.is_on ? '1px solid rgba(255,255,255,0.42)' : '1px solid rgba(255,255,255,0.12)'; ]]]
        - box-shadow: none
        - --badge-title-color: >
            [[[ return variables?.s?.is_on ? 'rgba(0,0,0,0.86)' : 'rgba(255,255,255,0.92)'; ]]]
        - --badge-sub-color: >
            [[[ return variables?.s?.is_on ? 'rgba(0,0,0,0.58)' : 'rgba(255,255,255,0.72)'; ]]]
      custom_fields:
        badge: [display: flex, align-items: center, height: 100%]
        rail:
          - position: absolute
          - left: calc(100% + 8px)
          - top: 50%
          - transform: translateY(-50%)
          - z-index: 9
          - display: >
              [[[ return variables?.s?.exp === 'media' ? 'inline-flex' : 'none'; ]]]
      grid: [grid-template-areas: '"badge"', grid-template-columns: 1fr, grid-template-rows: 1fr]

  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    triggers_update:
      - input_select.hemma_expanded_row
      - climate.sl_ar_condicionado
      - climate.ac_office
      - climate.ac_quarto_miguel
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.hemma_expanded_row
        option: >
          [[[ return states['input_select.hemma_expanded_row']?.state === 'climate' ? 'none' : 'climate'; ]]]
    hold_action: { action: none }
    variables:
      s: >
        [[[
          const e = ['climate.sl_ar_condicionado','climate.ac_office','climate.ac_quarto_miguel'];
          const onE = e.filter(id => !['off','unavailable','unknown',''].includes(states[id]?.state ?? 'unknown'));
          const exp = states['input_select.hemma_expanded_row']?.state || 'none';
          const chips = onE.map(id => ({ id, name: states[id]?.attributes?.friendly_name || id }));
          return { is_on: onE.length > 0, sub: onE.length === 0 ? 'Off' : `${onE.length} On`, exp, chips };
        ]]]
    custom_fields:
      badge: >
        [[[
          const sub = variables?.s?.sub || 'Off';
          return `<div class="badge-row">
            <ha-icon class="badge-icon" icon="mdi:fan" style="color:#56d89b"></ha-icon>
            <div class="badge-texts">
              <div class="badge-title">Climate</div>
              <div class="badge-sub">${sub}</div>
            </div>
          </div>`;
        ]]]
      rail: >
        [[[
          if (variables?.s?.exp !== 'climate') return '';
          const chips = variables?.s?.chips || [];
          if (!chips.length) return `<div class="exp-rail"><div class="exp-chip exp-empty">No climate on</div></div>`;
          return `<div class="exp-rail">${chips.map(c => `<div class="exp-chip"><ha-icon icon="mdi:air-conditioner" style="--mdc-icon-size:12px;color:#56d89b"></ha-icon><span>${c.name}</span></div>`).join('')}</div>`;
        ]]]
    extra_styles: *badge_css
    styles:
      <<: *badge_visual
      card:
        - width: max-content
        - height: 48px
        - border-radius: 999px
        - padding: 0 12px
        - position: relative
        - overflow: visible
        - z-index: >
            [[[ return variables?.s?.exp === 'climate' ? '4' : '1'; ]]]
        - display: >
            [[[
              const e = states['input_select.hemma_expanded_row']?.state;
              return (e === 'lights' || e === 'media') ? 'none' : 'inline-flex';
            ]]]
        - background: >
            [[[ return variables?.s?.is_on ? 'rgba(255,255,255,0.90)' : 'rgba(36,33,30,0.82)'; ]]]
        - border: >
            [[[ return variables?.s?.is_on ? '1px solid rgba(255,255,255,0.42)' : '1px solid rgba(255,255,255,0.12)'; ]]]
        - box-shadow: none
        - --badge-title-color: >
            [[[ return variables?.s?.is_on ? 'rgba(0,0,0,0.86)' : 'rgba(255,255,255,0.92)'; ]]]
        - --badge-sub-color: >
            [[[ return variables?.s?.is_on ? 'rgba(0,0,0,0.58)' : 'rgba(255,255,255,0.72)'; ]]]
      custom_fields:
        badge: [display: flex, align-items: center, height: 100%]
        rail:
          - position: absolute
          - left: calc(100% + 8px)
          - top: 50%
          - transform: translateY(-50%)
          - z-index: 9
          - display: >
              [[[ return variables?.s?.exp === 'climate' ? 'inline-flex' : 'none'; ]]]
      grid: [grid-template-areas: '"badge"', grid-template-columns: 1fr, grid-template-rows: 1fr]

  - type: custom:button-card
    show_name: false
    show_state: false
    show_icon: false
    tap_action: { action: none }
    hold_action: { action: none }
    styles:
      card: [background: transparent, border: none, box-shadow: none, width: 1px, height: 1px, padding: 0]

  - type: custom:button-card
    view_layout:
      justify-self: end
    entity: person.bruno_helasio
    show_name: false
    show_state: false
    show_icon: false
    tap_action: { action: none }
    hold_action: { action: none }
    triggers_update:
      - person.bruno_helasio
    custom_fields:
      avatar: >
        [[[
          const pic = entity?.attributes?.entity_picture || '';
          return pic
            ? '<img src="' + pic + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>'
            : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;background:rgba(255,255,255,0.15);border-radius:50%;">B</div>';
        ]]]
    styles:
      card:
        - width: 40px
        - height: 40px
        - border-radius: 50%
        - background: rgba(255,255,255,0.12)
        - border: 1px solid rgba(255,255,255,0.24)
        - padding: 0
        - box-shadow: none
      custom_fields:
        avatar: [width: 100%, height: 100%, overflow: hidden, border-radius: 50%]
      grid: [grid-template-areas: '"avatar"', grid-template-columns: 1fr, grid-template-rows: 1fr]
