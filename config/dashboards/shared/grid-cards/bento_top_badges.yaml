    &nbsp;
    <span style="display:inline-block;padding:6px 14px;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.20),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.25);">🔵 CLIMA&nbsp;&nbsp;<b>22°C</b></span>
    &nbsp;
    <span style="display:inline-block;padding:6px 14px;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.20),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.25);">🟣 MÍDIA&nbsp;&nbsp;<b>Tocando</b></span>
