- type: custom:layout-card
  layout_type: custom:grid-layout
  layout:
    grid-template-columns: repeat(3, minmax(0, 1fr))
    grid-template-rows: repeat(2, minmax(160px, 1fr))
    grid-gap: 10px
  cards:
    - type: markdown
      content: "## 🍽️ Cozinha\n2 luzes"
      card_mod:
        style: |
          ha-card {height:100%;border-radius:24px;border:1px solid rgba(173,214,255,.30);background:linear-gradient(180deg, rgba(116,164,214,.24), rgba(33,64,108,.40));backdrop-filter:blur(34px) saturate(165%);-webkit-backdrop-filter:blur(34px) saturate(165%);box-shadow: inset 0 1px 0 rgba(255,255,255,.30), inset 0 -1px 0 rgba(255,255,255,.05), 0 18px 35px rgba(0,0,0,.30);color:rgba(255,255,255,.95);} 
