- type: vertical-stack
  view_layout:
    grid-area: cams
  cards:
    - type: custom:button-card
      show_icon: false
      show_name: false
      show_label: false
      show_state: false
      tap_action:
        action: none
      card_mod:
        style: |
          ha-card {
            background: linear-gradient(180deg, rgba(15,20,35,0.78) 0%, rgba(20,24,33,0.88) 100%) !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            border-radius: 20px !important;
            box-shadow: 0 0 24px rgba(62,132,255,0.18), 0 0 60px rgba(62,132,255,0.10) !important;
            height: 100% !important;
            overflow: hidden !important;
          }
      styles:
        grid:
          - grid-template-areas: |
              "eyebrow live"
              "title live"
              "cam1 cam1"
              "cam2 cam2"
          - grid-template-columns: 1fr auto
          - grid-template-rows: min-content min-content minmax(150px, 1fr) minmax(150px, 1fr)
          - row-gap: 8px
          - column-gap: 8px
        card:
          - padding: 12px
          - height: 100%
        custom_fields:
          eyebrow:
            - justify-self: start
            - align-self: start
          title:
            - justify-self: start
            - align-self: start
          live:
            - justify-self: end
            - align-self: start
          cam1:
            - align-self: stretch
            - min-height: 0
          cam2:
            - align-self: stretch
            - min-height: 0
      custom_fields:
        eyebrow: >
          [[[
            return `<div style="font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:rgba(255,255,255,0.55);">Câmeras</div>`;
          ]]]
        title: >
          [[[
            return `<div style="font-size:20px;font-weight:700;line-height:1.1;color:rgba(255,255,255,0.96);">Sala e varanda</div>`;
          ]]]
        live:
          card:
            type: custom:button-card
            name: Live
            show_icon: false
            styles:
              card:
                - padding: 8px 12px
                - border-radius: 999px
                - background: rgba(12,90,132,0.42)
                - border: 1px solid rgba(102,211,255,0.45)
              name:
                - color: rgba(255,255,255,0.95)
                - font-size: 14px
                - font-weight: 700
        cam1:
          card:
            type: picture-entity
            entity: camera.sl_camera_2
            camera_view: live
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px !important;
                  border: 1px solid rgba(255,255,255,0.12) !important;
                  overflow: hidden !important;
                  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02) !important;
                  height: 156px !important;
                }
                hui-image, img, .image {
                  width: 100% !important;
                  height: 100% !important;
                  object-fit: cover !important;
                  object-position: center center !important;
                }
                .name {
                  display: none !important;
                }
                :host {
                  position: relative;
                }
                :host::after {
                  content: "Sala";
                  position: absolute;
                  z-index: 2;
                  bottom: 10px;
                  left: 12px;
                  font-size: 18px;
                  font-weight: 700;
                  line-height: 1.1;
                  color: rgba(255,255,255,0.95);
                  text-shadow: 0 1px 10px rgba(0,0,0,0.55);
                }
        cam2:
          card:
            type: picture-entity
            entity: camera.vr_camera_2
            camera_view: live
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px !important;
                  border: 1px solid rgba(255,255,255,0.12) !important;
                  overflow: hidden !important;
                  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02) !important;
                  height: 156px !important;
                }
                hui-image, img, .image {
                  width: 100% !important;
                  height: 100% !important;
                  object-fit: cover !important;
                  object-position: center center !important;
                }
                .name {
                  display: none !important;
                }
                :host {
                  position: relative;
                }
                :host::after {
                  content: "Varanda";
                  position: absolute;
                  z-index: 2;
                  bottom: 10px;
                  left: 12px;
                  font-size: 18px;
                  font-weight: 700;
                  line-height: 1.1;
                  color: rgba(255,255,255,0.95);
                  text-shadow: 0 1px 10px rgba(0,0,0,0.55);
                }

