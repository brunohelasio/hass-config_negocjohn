# NOVO — Popup PEQUENO estilo Sala (apenas col_buttons, sem camera)
# Replicado de livingroom.yaml — Fase 2.6
# Lavabo: popup pequeno (~450px) com apenas 3 botoes de luzes
# Sem midia, sem camera, sem clima
# ══════════════════════════════════════════════════════════════════════════
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Lavabo
    tag: lavabo_popup
    size: normal
    style: >
      --popup-width: 450px;
      --popup-max-width: 450px;
      --popup-background-color: rgba(15, 20, 35, 0.75);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.56);
      --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
      --tablet-popup-content-padding: 0.4em 0.6em 0.6em 0.5em;
    card_mod:
      style:
        .: |
          ha-dialog {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
          }
          ha-dialog::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(80, 150, 255, 0.12);
          }
        ha-dialog$: |
          .mdc-dialog__scrim {
            background-color: rgba(0, 0, 0, 0.56) !important;
          }
          .mdc-dialog__container {
            align-items: center !important;
            justify-content: center !important;
          }
          .mdc-dialog__surface {
            width: 450px !important;
            max-width: 450px !important;
            max-height: 88vh !important;
            overflow-y: auto !important;
          }
    content:
      type: vertical-stack
      cards:
        # ── Titulo: Luzes + toggle all lights ──
        # ANTERIOR: sem entity, tap_action: none (nao fazia nada ao clicar)
        # FIX C1.1: Adicionado entity + tap_action toggle + cor dinamica do icone
        - type: custom:button-card
          entity: light.grupo_luzes_lavabo
          name: Luzes
          show_state: false
          show_icon: true
          icon: mdi:lightbulb-group-outline
          tap_action:
            action: toggle
            haptic: success
          styles:
            card:
              - background: none
              - box-shadow: none
              - border: none
              - padding: 0 4px
              - height: 30px
              - min-height: 30px
            grid:
              - grid-template-areas: '"n i"'
              - grid-template-columns: 1fr auto
            name:
              - font-size: 11px
              - color: rgba(255,255,255,0.5)
              - text-transform: uppercase
              - letter-spacing: 1.5px
              - justify-self: start
              - font-weight: 500
            img_cell:
              - justify-self: end
              - width: 24px
            icon:
              - width: 24px
              - color: >
                  [[[
                    return entity.state === 'on' ? '#f0c040' : 'rgba(255,255,255,0.25)';
                  ]]]
        # ── ANTERIOR: Linha 1 com 5 colunas + 2 blanks (comentado, nunca deletar) ──
        # - type: grid
        #   columns: 5
        #   square: false
        #   card_mod:
        #     style: |
        #       #root {
        #         gap: 4px !important;
        #       }
        #   cards:
        #     - type: custom:button-card
        #       entity: light.lavabo_switch_2
        #       name: Luz Principal
        #       template: [tpl_popup_light, icon_light_flush]
        #       tap_action: { action: toggle, haptic: success }
        #     - type: custom:button-card
        #       entity: light.lavabo_switch_1
        #       name: Luz Parede
        #       template: [tpl_popup_light, icon_light_flush]
        #       tap_action: { action: toggle, haptic: success }
        #     - type: custom:button-card
        #       entity: light.lavabo_switch_3
        #       name: Luz Espelho
        #       template: [tpl_popup_light, icon_light_flush]
        #       tap_action: { action: toggle, haptic: success }
        #     # BLANK 1-2
        #     - type: custom:button-card
        #       color_type: blank-card
        #     - type: custom:button-card
        #       color_type: blank-card

        # ── NOVO: Linha 1 com 3 colunas e botoes padrao 98px ──
        - type: grid
          columns: 3
          square: false
          card_mod:
            style: |
              #root {
                gap: 4px !important;
                grid-template-columns: repeat(3, 98px) !important;
              }
          cards:
            - type: custom:button-card
              entity: light.lavabo_switch_2
              name: Luz Principal
              template:
                - tpl_popup_light
                - icon_light_flush
              tap_action:
                action: toggle
                haptic: success
            - type: custom:button-card
              entity: light.lavabo_switch_1
              name: Luz Parede
              template:
                - tpl_popup_light
                - icon_light_flush
              tap_action:
                action: toggle
                haptic: success
            - type: custom:button-card
              entity: light.lavabo_switch_3
              name: Luz Espelho
              template:
                - tpl_popup_light
                - icon_light_flush
              tap_action:
                action: toggle
                haptic: success
