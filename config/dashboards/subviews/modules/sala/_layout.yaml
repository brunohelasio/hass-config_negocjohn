# Note o padding: aumentamos apenas o primeiro valor (topo)
padding: 75px 12px 12px 12px 
grid-gap: 10px
grid-template-columns: repeat(12, minmax(0, 1fr))
grid-template-rows: minmax(auto, 42vh) minmax(auto, 40vh)
align-content: center
height: 100%
grid-template-areas: |
  "hero hero hero hero hero lights lights lights lights ac ac ac"
  "cams cams cams cams media media media media spot spot spot spot"
mediaquery:
  '(max-width: 800px)':
    # Mobile: adicionado espaço no topo também
    padding: 40px 8px 8px 8px 
    grid-gap: 8px
    grid-template-columns: 1fr
    grid-template-rows: repeat(6, min-content)
    grid-template-areas: |
      "hero"
      "lights"
      "ac"
      "cams"
      "media"
      "spot"
  '(min-width: 801px) and (max-width: 1440px) and (orientation: portrait)':
    # Tablet: adicionado espaço no topo também
    padding: 50px 12px 12px 12px 
    grid-template-columns: repeat(2, minmax(0, 1fr))
    grid-template-rows: repeat(3, min-content)
    grid-template-areas: |
      "hero lights"
      "ac cams"
      "media spot"
