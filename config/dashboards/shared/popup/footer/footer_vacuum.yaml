# NOVO: Layout 3 colunas estilo ngocjohn (2026-04-02)
# Reproduz o layout visual do screenshot de referencia (Roidmi EVE Plus do ngocjohn).
# Usa custom:mod-card → custom:layout-card com !include snippets para:
#   - style_popup_center.yaml: centraliza o dialog verticalmente
#   - style_popup_footer.yaml: separadores entre colunas + estilos de entities cards
# Sizing: --popup-width: 1100px via pipeline uix-dialog do tema tablet.yaml
# Hardware de referencia: Galaxy Tab S6 Lite (2000x1200 landscape) — sem scroll vertical.
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Roborock S7
    tag: vacuum_popup
    style: >
      --popup-width: 1100px;
    card_mod: !include ../../snippets/style_popup_center.yaml  # centraliza o dialog verticalmente
    content:
      type: custom:mod-card
      card_mod: !include ../../snippets/style_popup_footer.yaml  # separadores entre colunas + estilos entities cards
      card:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 320px 1fr 340px
          grid-template-rows: 1fr
          grid-template-areas: '"summary map settings"'
          margin: 0
          padding: 0
          mediaquery:
            '(max-width: 800px)':
              grid-template-columns: 1fr
              grid-template-rows: auto auto auto
              grid-template-areas: |
                "summary"
                "map"
                "settings"
        cards:

          # ================================================================
          # COLUNA 1 — STATUS + CONTROLES
          # ================================================================
          - type: entities
            title: Status
            show_header_toggle: false
            card_mod:
              class: header
            entities:
              - entity: vacuum.roborock_s7
                name: Roborock S7
                secondary_info: last-changed

              - entity: sensor.roborock_s7_status
                name: Status

              - entity: sensor.roborock_s7_comodo_atual
                name: Cômodo Atual

              - entity: sensor.roborock_s7_vacuum_error
                name: Erro

              - entity: sensor.roborock_s7_bateria
                name: Bateria

              - entity: binary_sensor.roborock_s7_mop_attached
                name: Mop Acoplado

              - entity: binary_sensor.roborock_s7_water_box_attached
                name: Caixa de Água

              - entity: binary_sensor.roborock_s7_water_shortage
                name: Falta de Água

              - type: divider

              - entity: select.roborock_s7_intensidade_do_mop
                name: Intensidade do Mop

              - entity: select.roborock_s7_modo_mop
                name: Modo do Mop

              - type: section

              # Botoes de controle — mesmo padrao do footer_system.yaml
              # (custom:hui-horizontal-stack-card dentro de entities)
              - type: custom:hui-horizontal-stack-card
                cards:
                  - type: custom:button-card
                    entity: vacuum.roborock_s7
                    name: Iniciar
                    icon: mdi:play
                    tap_action:
                      action: call-service
                      service: vacuum.start
                      service_data:
                        entity_id: vacuum.roborock_s7
                      haptic: success
                    template: icon_name

                  - type: custom:button-card
                    entity: vacuum.roborock_s7
                    name: Pausar
                    icon: mdi:pause
                    tap_action:
                      action: call-service
                      service: vacuum.pause
                      service_data:
                        entity_id: vacuum.roborock_s7
                      haptic: light
                    template: icon_name

                  - type: custom:button-card
                    entity: vacuum.roborock_s7
                    name: Base
                    icon: mdi:home-import-outline
                    tap_action:
                      action: call-service
                      service: vacuum.return_to_base
                      service_data:
                        entity_id: vacuum.roborock_s7
                      haptic: medium
                    template: icon_name

          # ================================================================
          # COLUNA 2 — MAPA
          # Card direto no grid (nao dentro de entities via hui-element).
          # O style_popup_footer.yaml estiliza hui-entities-card$, nao
          # afeta este card — resultado: mapa sem borda lateral (OK).
          # ================================================================
          - type: custom:xiaomi-vacuum-map-card
            entity: vacuum.roborock_s7
            vacuum_platform: Roborock
            map_source:
              camera: image.roborock_s7_map_0
            calibration_source:
              camera: true
            map_locked: true
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  border: none !important;
                  box-shadow: none !important;
                }

          # ================================================================
          # COLUNA 3 — CONFIGURAÇÕES + ESTATÍSTICAS
          # ================================================================
          - type: entities
            title: Configurações
            show_header_toggle: false
            card_mod:
              class: header
            entities:
              - entity: number.roborock_s7_volume
                name: Volume
              - entity: switch.roborock_s7_nao_perturbe
                name: Não Perturbe
              - entity: switch.roborock_s7_dock_luz_indicadora_de_status
                name: Luz Indicadora
              - entity: switch.roborock_s7_dock_bloqueio_infantil
                name: Bloqueio Infantil
              - type: divider
                style:
                  padding: 4px 0
              - entity: sensor.roborock_s7_area_de_limpeza
                name: Área Última
              - entity: sensor.roborock_s7_tempo_de_limpeza
                name: Tempo Última
              - entity: sensor.roborock_s7_area_total_de_limpeza
                name: Área Total
              - entity: sensor.roborock_s7_tempo_total_de_limpeza
                name: Tempo Total
              - entity: sensor.roborock_s7_contagem_total_de_limpeza
                name: Nº de Limpezas

