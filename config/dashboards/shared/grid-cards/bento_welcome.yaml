#  BENTO WELCOME — v7
#  Arquivo: config/dashboards/shared/grid-cards/bento_welcome.yaml
#
#  Mudanças v7:
#    [1] Porta Serviço: type:markdown (sem button-card, sem grid bug)
#        → alinhamento correto garantido pelo flexbox do HTML
#    [2] Weather: substituído por button-card compacto
#        → sem overflow, sem corte, controle total de altura
#        → temperatura grande + vento + curva SVG decorativa
#        → ocupa toda a base do bloco, sangra nas bordas
