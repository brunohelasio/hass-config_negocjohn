- type: grid
  title: Media
  view_layout:
    grid-area: media
    show:
      mediaquery: '(min-height: 463px) and (max-width: 1440px)'
  columns: 1
  cards:
    # TV SALA
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: TV Sala
      card: *TVSALA
    # SPOTIFY
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: Spotify
      card: *SPOTIFY
    # ECHO SHOW (Sala)
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: Echo Show
      card: *ECHOSHOW
    # ECHO POP OFFICE
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: Echo Pop Office
      card: *ECHOPOPOFFICE
    # ECHO POP QUARTO CASAL
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: Echo Pop Quarto Casal
      card: *ECHOPOPQCASAL
    # ECHO POP MARINA
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: Echo Pop Marina
      card: *ECHOPOPMARINA
