action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: "Roborock S7"
    size: wide
    popup_styles:
      - style: all
        styles: |
          ha-dialog {
            --popup-max-height: 1176px;
            /* ANTERIOR (para restore): sem --popup-background-color e sem blur */
            --popup-background-color: rgba(15, 20, 35, 0.75);
            --mdc-theme-surface: rgba(20, 24, 33, 0.88);
            --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.56);
            --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
            --dialog-content-padding: 8px 8px 4px 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
          }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 320px 1fr 280px
        grid-template-rows: 1fr
        grid-template-areas: '"summary map settings"'
      cards:

        # ==================================================================
        # COLUNA 1 — SUMMARY
        # ==================================================================
        - type: vertical-stack
          view_layout:
            grid-area: summary
          cards:
            - type: entities
              title: Summary
              show_header_toggle: false
              entities:
                - entity: vacuum.roborock_s7
                  name: Roborock S7
                  secondary_info: last-changed
                - entity: sensor.roborock_s7_vacuum_error
                  name: Erro
                - entity: sensor.roborock_s7_comodo_atual
                  name: Cômodo Atual
                - entity: binary_sensor.roborock_s7_mop_attached
                  name: Mop Acoplado
                - entity: sensor.roborock_s7_bateria
                  name: Bateria
                - type: attribute
                  entity: vacuum.roborock_s7
                  attribute: fan_speed
                  name: Fan Speed
                - type: divider
                - entity: select.roborock_s7_intensidade_do_mop
                  name: Intensidade do Mop
                - entity: select.roborock_s7_modo_mop
                  name: Modo do Mop
            - type: horizontal-stack
              cards:
                - type: custom:button-card
                  entity: vacuum.roborock_s7
                  icon: mdi:play-pause
                  show_name: false
                  styles:
                    card:
                      - height: 42px
                      - border-radius: 10px
                      - background: rgba(255,255,255,0.07)
                      - box-shadow: none
                      - border: none
                    icon:
                      - color: rgba(255,255,255,0.70)
                      - width: 22px
                  tap_action:
                    action: call-service
                    service: vacuum.start
                    service_data:
                      entity_id: vacuum.roborock_s7
                - type: custom:button-card
                  entity: vacuum.roborock_s7
                  icon: mdi:home
                  show_name: false
                  styles:
                    card:
                      - height: 42px
                      - border-radius: 10px
                      - background: rgba(255,255,255,0.07)
                      - box-shadow: none
                      - border: none
                    icon:
                      - color: rgba(255,255,255,0.70)
                      - width: 22px
                  tap_action:
                    action: call-service
                    service: vacuum.return_to_base
                    service_data:
                      entity_id: vacuum.roborock_s7
                - type: custom:button-card
                  entity: vacuum.roborock_s7
                  icon: mdi:map-marker
                  show_name: false
                  styles:
                    card:
                      - height: 42px
                      - border-radius: 10px
                      - background: rgba(255,255,255,0.07)
                      - box-shadow: none
                      - border: none
                    icon:
                      - color: rgba(255,255,255,0.70)
                      - width: 22px
                  tap_action:
                    action: call-service
                    service: vacuum.locate
                    service_data:
                      entity_id: vacuum.roborock_s7

        # ==================================================================
        # COLUNA 2 — MAPA
        # tiles: [] remove tiles autogenerated (README L191)
        # icons: [] remove icons autogenerated (README L189)
        # ==================================================================
        - type: custom:xiaomi-vacuum-map-card
          view_layout:
            grid-area: map
          vacuum_platform: Roborock
          entity: vacuum.roborock_s7
          map_source:
            camera: image.roborock_s7_map_0_custom
          calibration_source:
            camera: true
          map_locked: true
          tiles: []
          icons: []
          card_mod:
            style: |
              ha-card {
                --map-card-primary-color: #FFFFFF30;
                --map-card-secondary-color: #FFFFFF10;
                --map-card-secondary-text-color: #9da0a2;
                --map-card-zoomer-background: none;
                --map-card-internal-big-radius: 0.6em !important;
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
              }
              div.map-wrapper {
                padding: 2vw 0px 0.6vw !important;
              }
              div.controls-wrapper {
                padding-top: 0;
                padding-bottom: 0;
                margin: 0;
              }
              div.map-controls-wrapper {
                padding: 4px 8px;
              }
              xvmc-zoom-buttons {
                display: none !important;
              }
              paper-button {
                --mdc-icon-size: 1.5em;
                color: #9da0a2 !important;
                padding: 0.42em;
              }
              #map-image {
                filter: brightness(0.7);
              }

        # ==================================================================
        # COLUNA 3 — SETTINGS
        # ==================================================================
        - type: entities
          view_layout:
            grid-area: settings
          title: Settings
          show_header_toggle: false
          entities:
            - entity: number.roborock_s7_volume
              name: Volume
            - entity: switch.roborock_s7_nao_perturbe
              name: Não Perturbe
            - entity: time.roborock_s7_comecar_nao_perturbe
              name: Início NP
            - entity: time.roborock_s7_terminar_nao_perturbe
              name: Fim NP
            - entity: switch.roborock_s7_dock_luz_indicadora_de_status
              name: Luz Indicadora
            - entity: switch.roborock_s7_dock_bloqueio_infantil
              name: Bloqueio Infantil
            - type: divider
            - entity: sensor.roborock_s7_area_de_limpeza
              name: Área (Última)
            - entity: sensor.roborock_s7_tempo_de_limpeza
              name: Tempo (Última)
            - entity: sensor.roborock_s7_area_total_de_limpeza
              name: Área Total
            - entity: sensor.roborock_s7_tempo_total_de_limpeza
              name: Tempo Total
            - entity: sensor.roborock_s7_contagem_total_de_limpeza
              name: Nº de Limpezas
