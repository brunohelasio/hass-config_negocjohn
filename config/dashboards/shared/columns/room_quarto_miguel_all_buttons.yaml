# ══════════════════════════════════════════════════════════════════════════
# LAYOUT 5 COLUNAS — Quarto Miguel (popup)
# Replicado do modelo base: room_living_all_buttons.yaml (Sala)
# Secao 1: Luzes (titulo + toggle all + 8 switches em 5 colunas)
# Secao 2: Midia & Clima (titulo + Spotify + AC + 3 blanks)
#
# Entidades confirmadas (atualizado: switch.* → light.*):
#   - light.quarto_miguel_switch_2
#   - light.quarto_miguel_2_switch_1
#   - light.quarto_miguel_2_switch_2
#   - light.quarto_miguel_2_switch_3
#   - light.quarto_miguel_switch_1
#   - light.quarto_miguel_switch_3
#   - light.suite_miguel_switch_1
#   - light.suite_miguel_switch_2
#   - Grupo: light.grupo_luzes_quarto_miguel
#   - Camera: camera.qmi_camera
#   - AC: climate.ac_quarto_miguel
#   - Spotify: media_player.spotifyplus_bruno_helasio (compartilhado)
# ══════════════════════════════════════════════════════════════════════════

# ── Titulo: Luzes + toggle all lights ──
# FIX C4.1: Adicionado indicador visual ON/OFF (custom_field)
- type: custom:button-card
  entity: light.grupo_luzes_quarto_miguel
  triggers_update:
    - light.grupo_luzes_quarto_miguel
  name: Luzes
  show_state: false
  show_icon: false
  # show_icon: true
  # icon: mdi:lightbulb-group-outline
  tap_action:
    action: toggle
    haptic: success
  # ANTERIOR: custom_fields com JS template para ON/OFF badge (nao atualizava em browser_mod popup)
  # FIX: state: section nativa do button-card com HTML estatico — mais reativo
  custom_fields:
    on_off: |
      <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:8px;margin-right:4px">OFF</span>
  state:
    - value: 'on'
      custom_fields:
        on_off: |
          <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:#fff;background:#3b82f6;padding:1px 6px;border-radius:8px;margin-right:4px">ON</span>
      styles:
        icon:
          - color: '#f0c040'
    - value: 'off'
      custom_fields:
        on_off: |
          <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:8px;margin-right:4px">OFF</span>
      styles:
        icon:
          - color: 'rgba(255,255,255,0.25)'
  styles:
    card:
      - background: none
      - box-shadow: none
      - border: none
      - padding: 0 4px
      - height: 30px
      - min-height: 30px
    grid:
      - grid-template-areas: '"n on_off i"'
      - grid-template-columns: 1fr auto auto
    name:
      - font-size: 11px
      - color: rgba(255,255,255,0.5)
      - text-transform: uppercase
      - letter-spacing: 1.5px
      - justify-self: start
      - font-weight: 500
    custom_fields:
      on_off:
        - justify-self: end
        - align-self: center
    img_cell:
      - justify-self: end
      - width: 24px
    icon:
      - width: 24px
      - color: 'rgba(255,255,255,0.25)'

# ── Linha 1: 5 switches de iluminacao ──
- type: grid
  columns: 5
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
        grid-template-columns: repeat(5, 98px) !important;
      }
  cards:
    - type: custom:button-card
      # --- CÓDIGO ORIGINAL COMENTADO PARA REFERÊNCIA ---
      # entity: switch.quarto_miguel_switch_2
      entity: light.quarto_miguel_switch_2
      name: "QMI - Luz principal"
      template:
        - tpl_popup_light
        # - icon_light_flush
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      # --- CÓDIGO ORIGINAL COMENTADO PARA REFERÊNCIA ---
      # entity: switch.quarto_miguel_2_switch_1
      entity: light.quarto_miguel_2_switch_1
      name: "QMI - Luzes armário"
      template:
        - tpl_popup_light
        # - icon_light_flush
        - icon_light_recessed
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      # --- CÓDIGO ORIGINAL COMENTADO PARA REFERÊNCIA ---
      # entity: switch.quarto_miguel_2_switch_2
      entity: light.quarto_miguel_2_switch_2
      name: "QMI - Arandela poltrona"
      template:
        - tpl_popup_light
        # - icon_light_flush
      show_icon: false
      custom_fields:
        icon: >
          <svg viewBox="0 0 50 50">
            <rect x="20" y="4" width="10" height="6" rx="1" fill="var(--state-icon-color)" opacity="0.5"/>
            <path d="M15 12 h20 l4 18 H11 z" fill="var(--state-icon-color)" opacity="0.3"/>
            <ellipse cx="25" cy="32" rx="16" ry="3" fill="var(--state-icon-color)" opacity="0.6"/>
            <line x1="25" y1="10" x2="25" y2="4" stroke="var(--state-icon-color)" stroke-width="2"/>
          </svg>
      styles:
        custom_fields:
          icon:
            - width: 80%
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      # --- CÓDIGO ORIGINAL COMENTADO PARA REFERÊNCIA ---
      # entity: switch.quarto_miguel_2_switch_3
      entity: light.quarto_miguel_2_switch_3
      name: "QMI - Arandela berço"
      template:
        - tpl_popup_light
        # - icon_light_flush
      show_icon: false
      custom_fields:
        icon: >
          <svg viewBox="0 0 50 50">
            <rect x="20" y="4" width="10" height="6" rx="1" fill="var(--state-icon-color)" opacity="0.5"/>
            <path d="M15 12 h20 l4 18 H11 z" fill="var(--state-icon-color)" opacity="0.3"/>
            <ellipse cx="25" cy="32" rx="16" ry="3" fill="var(--state-icon-color)" opacity="0.6"/>
            <line x1="25" y1="10" x2="25" y2="4" stroke="var(--state-icon-color)" stroke-width="2"/>
          </svg>
      styles:
        custom_fields:
          icon:
            - width: 80%
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      # --- CÓDIGO ORIGINAL COMENTADO PARA REFERÊNCIA ---
      # entity: switch.quarto_miguel_switch_1
      entity: light.quarto_miguel_switch_1
      name: "QMI - Luz prateleiras"
      template:
        - tpl_popup_light
        # - icon_light_flush
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success

