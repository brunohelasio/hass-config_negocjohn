# SPOTIFY POPUP — QUARTO MARINA (per-room)
# C3: Popup Spotify dedicado para Quarto Marina com playerDefaultDeviceName: Echo Pop Marina
# Direciona playback para o dispositivo Alexa do Quarto Marina via Spotify Connect.
# Usa custom:spotifyplus-card (thlucas1) — confirmado instalado pelo usuario.
#
# NOTA: O nome do playerDefaultDeviceName deve corresponder EXATAMENTE ao nome do
# dispositivo no Spotify Connect (verificar no app Spotify > Dispositivos).
# Se o nome nao corresponder, ajustar manualmente.
