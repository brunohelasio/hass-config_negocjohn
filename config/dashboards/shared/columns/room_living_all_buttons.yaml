# Layout combinado de botoes — Sala (popup)
# Disposicao: 4-3-4-2 (linhas com quantidades diferentes de botoes)
# Linha 1: 4 botoes de iluminacao principal
# Linha 2: 3 botoes de iluminacao varanda
# Divisor glassmorphism
# Linha 3: 4 botoes de midia/dispositivos
# Linha 4: 2 botoes de clima/cortina

# ── Linha 1: 4 botoes de iluminacao ──
- type: grid
  columns: 4
  square: false
  cards:
    - type: custom:button-card
      entity: light.sala_switch_2
      name: Luz Principal
      template:
        - tpl_popup_light
        - icon_light_flush
      # FIX: tap_action explicito para garantir toggle (nao depender apenas do template)
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.sala_switch_1
      name: LED Direito
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.sala_switch_3
      name: LED Esquerdo
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.sala_2_switch_2
      name: VR Principal
      template:
        - tpl_popup_light
        - icon_light_flush
      tap_action:
        action: toggle
        haptic: success

# ── Linha 2: 3 botoes de iluminacao varanda ──
- type: grid
  columns: 3
  square: false
  cards:
    - type: custom:button-card
      entity: light.sala_2_switch_3
      name: VR Cristaleira
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.varanda_switch_1
      name: VR Gourmet
      template:
        - tpl_popup_light
        - icon_ledstrip
      tap_action:
        action: toggle
        haptic: success
    - type: custom:button-card
      entity: light.varanda_switch_2
      name: VR Pendente
      template:
        - tpl_popup_light
        - icon_pendant
      tap_action:
        action: toggle
        haptic: success

# ── Divisor Glassmorphism ──
- type: custom:button-card
  color_type: blank-card
  styles:
    card:
      - height: 2px
      - margin: 4px 8px
      - background: >-
          linear-gradient(90deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.12) 15%,
          rgba(255,255,255,0.20) 50%,
          rgba(255,255,255,0.12) 85%,
          rgba(255,255,255,0) 100%)
      - backdrop-filter: blur(8px)
      - -webkit-backdrop-filter: blur(8px)
      - border: none
      - box-shadow: 0 0 6px rgba(62, 132, 255, 0.10)
      - border-radius: 2px
      - padding: 0
      - min-height: auto

# ── Linha 3: 4 botoes de midia/dispositivos ──
- type: grid
  columns: 4
  square: false
  cards:
    # TV — usa template mediaplayer (original ngocjohn)
    # mediaplayer ja inclui base+circle+loader+icon_tv com state_on correto
    - type: custom:button-card
      entity: media_player.smart_tv_pro_2
      name: Smart TV
      template:
        - mediaplayer
      # VERSAO ANTERIOR: call-service nao estava executando (botao animava mas TV nao ligava)
      # tap_action:
      #   action: call-service
      #   service: homeassistant.toggle
      #   service_data:
      #     entity_id: media_player.smart_tv_pro_2
      #   haptic: success
      # FIX: usar action: toggle — button-card envia toggle nativo para o dominio da entity
      tap_action:
        action: toggle
        haptic: success
      double_tap_action:
        action: more-info
      hold_action: !include ../popup/rooms/smart_tv_remote.yaml
    # SPOTIFY — entity = spotifyplus_bruno_helasio (integracao SpotifyPlus)
    - type: custom:button-card
      entity: media_player.spotifyplus_bruno_helasio
      name: Spotify
      template:
        - base
        - circle
        - loader
        - icon_spotify_color
      state_display: >
        [[[
          return entity && entity.state === 'off' ? ' ' : null;
        ]]]
      variables:
        state_on: >
          [[[ return entity && ['on', 'idle', 'playing', 'paused', 'standby'].indexOf(entity.state) !== -1; ]]]
        circle_input: >
          [[[
            if (entity && entity.attributes.volume_level !== undefined) {
              let volume = Math.round(entity.attributes.volume_level * 100)
              return volume === 0 && entity.state !== 'off'
                ? 1
                : volume
            }
          ]]]
        circle_input_unit: '%'
      # VERSAO ANTERIOR: call-service nao executava (botao animava mas Spotify nao respondia)
      # tap_action:
      #   action: call-service
      #   service: media_player.media_play_pause
      #   service_data:
      #     entity_id: media_player.spotifyplus_bruno_helasio
      #   haptic: success
      # FIX: usar perform-action (sintaxe moderna do button-card v4+)
      tap_action:
        action: perform-action
        perform_action: media_player.media_play_pause
        target:
          entity_id: media_player.spotifyplus_bruno_helasio
        haptic: success
      double_tap_action:
        action: more-info
      hold_action: !include ../popup/media_spotify.yaml
    # PS5
    - type: custom:button-card
      name: PS5
      template:
        - base
        - icon_playstation
      show_icon: false
      tap_action:
        action: none
      hold_action:
        action: none
      double_tap_action:
        action: none
      styles:
        card:
          - opacity: "0.45"
          - cursor: "default"
    # PIONEER — SVG inline de receiver
    - type: custom:button-card
      name: Pioneer
      template:
        - base
      show_icon: false
      tap_action:
        action: none
      hold_action:
        action: none
      double_tap_action:
        action: none
      styles:
        card:
          - opacity: "0.45"
          - cursor: "default"
        custom_fields:
          icon:
            - width: 80%
            - fill: '#9da0a2'
      custom_fields:
        icon: >
          <svg viewBox="0 0 50 50">
            <rect x="1" y="10" width="48" height="30" rx="2.5"/>
            <rect x="5" y="14" width="22" height="10" rx="1.5" fill="#202628" opacity="0.9"/>
            <circle cx="39" cy="19" r="5" fill="#202628" opacity="0.9"/>
            <rect x="5" y="28" width="40" height="1.5" rx=".75" opacity=".3"/>
            <rect x="5" y="31.5" width="40" height="1.5" rx=".75" opacity=".3"/>
            <rect x="5" y="35" width="40" height="1.5" rx=".75" opacity=".3"/>
          </svg>

