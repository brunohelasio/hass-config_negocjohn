# NOVO: Entidades do usuario (TV Sala, Spotify, Alexa por comodo)
# select.conditional_media deve ser atualizado no HA com as novas opcoes:
#   TV Sala, Spotify, Echo Show, Echo Pop Office, Echo Pop Quarto Casal, Echo Pop Marina
# PS5 (switch.ps5_015_power) AGUARDANDO — entidade ficando indisponivel
- type: grid
  title: Media
  view_layout:
    grid-area: media
    show:
      mediaquery: '(min-width: 1441px)'
  columns: 1
  square: true
  cards:
    # TV SALA — Smart TV Pro 2
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: TV Sala
      card: &TVSALA
        type: custom:button-card
        entity: media_player.smart_tv_pro_2
        name: ' '
        template:
          - conditional_media
          - icon_tv
    # SPOTIFY
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: Spotify
      card: &SPOTIFY
        type: custom:button-card
        entity: media_player.spotifyplus_bruno_helasio
        name: ' '
        double_tap_action: !include ../../shared/popup/media_spotify_sala.yaml
        template:
          - currently_playing
    # ECHO SHOW (Sala)
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: Echo Show
      card: &ECHOSHOW
        type: custom:button-card
        entity: media_player.echo_show
        name: 'Echo Show'
        template:
          - conditional_media
          - icon_homepod
    # ECHO POP OFFICE
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: Echo Pop Office
      card: &ECHOPOPOFFICE
        type: custom:button-card
        entity: media_player.echo_pop_office
        name: 'Echo Office'
        template:
          - conditional_media
          - icon_homepod
    # ECHO POP QUARTO CASAL
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: Echo Pop Quarto Casal
      card: &ECHOPOPQCASAL
        type: custom:button-card
        entity: media_player.echo_pop_quarto_casal
        name: 'Echo Q.Casal'
        template:
          - conditional_media
          - icon_homepod
    # ECHO POP MARINA
    - type: conditional
      conditions:
        - entity: select.conditional_media
          state: Echo Pop Marina
      card: &ECHOPOPMARINA
        type: custom:button-card
        entity: media_player.echo_pop_marina
        name: 'Echo Marina'
        template:
          - conditional_media
          - icon_homepod

