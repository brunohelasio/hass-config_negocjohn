# NOVO — Popup estilo Sala (2 colunas: col_buttons + col_camera)
# Replicado de livingroom.yaml — Fase 2.5
# ══════════════════════════════════════════════════════════════════════════
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Cozinha
    tag: cozinha_popup
    size: wide
    # ANTERIOR: --popup-width: 680px; --popup-max-width: 680px; (fixo)
    # FIX: fit-content — popup se ajusta ao conteúdo real (botões + câmera)
    # Em vez de forçar 680px, o popup encolhe/cresce conforme o conteúdo interno.
    # max-width: 90vw impede que exceda a tela em tablets.
    style: >
      --popup-background-color: rgba(15, 20, 35, 0.75);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.56);
      --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
      --tablet-popup-content-padding: 0.4em 0.6em 0.6em 0.5em;
    # ANTERIOR: card_mod com width: 680px !important (fixo)
    # FIX: fit-content — .mdc-dialog__surface ajusta ao conteúdo
    card_mod:
      style:
        .: |
          ha-dialog {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
          }
          ha-dialog::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(80, 150, 255, 0.12);
          }
        ha-dialog$: |
          .mdc-dialog__scrim {
            background-color: rgba(0, 0, 0, 0.56) !important;
          }
          .mdc-dialog__container {
            align-items: center !important;
            justify-content: center !important;
          }
          .mdc-dialog__surface {
            width: fit-content !important;
            max-width: 90vw !important;
            max-height: 88vh !important;
            overflow-y: auto !important;
          }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        # ANTERIOR: grid-template-columns: 1.4fr 1.0fr (muito espaco para 3-col)
        # FIX C2.3: 1.2fr 1.0fr — melhor proporcao para 3 colunas de botoes 98px
        # ANTERIOR: grid-template-columns: 1.2fr 1.0fr (coluna botoes ainda sobrava espaco)
        # FIX: 340px fixo para coluna de botoes (3x98px + gaps + padding), camera preenche o resto
        grid-template-columns: 340px 1fr
        grid-template-areas: '"col_buttons col_camera"'
        grid-gap: 10px
        margin: 0
        padding: 0.5rem
        mediaquery:
          "(max-width: 800px)":
            grid-template-columns: 1fr
            grid-template-areas: |
              "col_buttons"
              "col_camera"
            padding: 0
      cards:
        # ── Coluna 1: Todos os botoes ──
        - type: vertical-stack
          view_layout:
            grid-area: col_buttons
          cards: !include ../../columns/room_cozinha_all_buttons.yaml

        # ── Coluna 2: Cameras ──
        - type: custom:layout-card
          layout_type: custom:grid-layout
          view_layout:
            grid-area: col_camera
          layout:
            grid-template-columns: 1fr
            margin: 0
          cards: !include ../../columns/room_cozinha_cameras.yaml
