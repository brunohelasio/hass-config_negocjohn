- type: horizontal-stack
  cards:
    - type: custom:button-card
      entity: group.light_all
      icon: mdi:lightbulb-group
      name: Luzes
      tap_action: { action: none }
      hold_action: { action: none }
      state_display: >
        [[[
          const n = states['sensor.lights_count']?.state;
          return (n && n !== 'unknown') ? `${n} ligadas` : (entity?.state === 'on' ? 'Ativas' : 'Desligadas');
        ]]]
      styles:
        card: [height: 42px, border-radius: 999px, padding: 0 12px, background: rgba(255,255,255,0.14), border: 1px solid rgba(255,255,255,0.22)]
        grid: [grid-template-areas: 'i n s', grid-template-columns: 18px auto auto, column-gap: 8px]
        name: [font-size: 11px, color: rgba(255,255,255,0.62), text-transform: uppercase, letter-spacing: 0.12em]
        state: [font-size: 12px, font-weight: 700, color: white]
        icon: [color: '#fbbf24', width: 14px]
    - type: custom:button-card
      entity: weather.forecast_casa
      icon: mdi:thermometer
      name: Clima
      tap_action: { action: none }
      hold_action: { action: none }
      state_display: >
        [[[
          const t = states['weather.forecast_casa']?.attributes?.temperature;
          return (t !== undefined && t !== null) ? `${Math.round(t)}°C` : '—';
        ]]]
      styles:
        card: [height: 42px, border-radius: 999px, padding: 0 12px, background: rgba(255,255,255,0.14), border: 1px solid rgba(255,255,255,0.22)]
        grid: [grid-template-areas: 'i n s', grid-template-columns: 18px auto auto, column-gap: 8px]
        name: [font-size: 11px, color: rgba(255,255,255,0.62), text-transform: uppercase, letter-spacing: 0.12em]
        state: [font-size: 12px, font-weight: 700, color: white]
        icon: [color: '#60a5fa', width: 14px]
    - type: custom:button-card
      entity: sensor.currently_playing
      icon: mdi:music-circle
      name: Mídia
      tap_action: { action: none }
      hold_action: { action: none }
      state_display: >
        [[[
          return states['sensor.currently_playing']?.attributes?.device_playing || 'Parada';
        ]]]
      styles:
        card: [height: 42px, border-radius: 999px, padding: 0 12px, background: rgba(255,255,255,0.14), border: 1px solid rgba(255,255,255,0.22)]
        grid: [grid-template-areas: 'i n s', grid-template-columns: 18px auto auto, column-gap: 8px]
        name: [font-size: 11px, color: rgba(255,255,255,0.62), text-transform: uppercase, letter-spacing: 0.12em]
        state: [font-size: 12px, font-weight: 700, color: white]
        icon: [color: '#a78bfa', width: 14px]
