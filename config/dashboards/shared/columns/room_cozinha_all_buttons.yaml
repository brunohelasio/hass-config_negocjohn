# ── NOVO: Linha 3 com 3 colunas e botoes padrao 98px ──
- type: grid
  columns: 3
  square: false
  card_mod:
    style: |
      #root {
        gap: 4px !important;
        grid-template-columns: repeat(3, 98px) !important;
      }
  cards:
    # MAQUINA DE LAVAR — placeholder sem entidade
    - type: custom:button-card
      name: Lava-Roupa
      template:
        - base
        - icon_washer
      show_icon: false
      tap_action:
        action: none
      hold_action:
        action: none
      double_tap_action:
        action: none
      styles:
        card:
          - opacity: "0.45"
          - cursor: "default"
    # LAVA-LOUCAS — placeholder sem entidade
    - type: custom:button-card
      name: Lava-Louças
      template:
