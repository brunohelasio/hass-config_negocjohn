# NOVO — Popup estilo Sala (2 colunas: col_buttons + col_camera)
# Replicado de livingroom.yaml — Fase 2.4
# ══════════════════════════════════════════════════════════════════════════
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Office
    tag: office_popup
    size: wide
    style: >
      --popup-width: 65vw;
      --popup-max-width: 980px;
      --popup-background-color: rgba(15, 20, 35, 0.75);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.56);
      --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
      --tablet-popup-content-padding: 0.4em 0.6em 0.6em 0.5em;
    # --- CÓDIGO ORIGINAL COMENTADO (card_mod inline com .mdc-dialog__surface hack) ---
    # Removido porque o tema tablet.yaml agora tem uix-dialog com --ha-dialog-width-md
    # que le --popup-width do style: e dimensiona o popup nativamente via HA.
    # card_mod:
    #   style:
    #     .: |
    #       ha-dialog {
    #         backdrop-filter: blur(12px);
    #         -webkit-backdrop-filter: blur(12px);
    #       }
    #       ha-dialog::before {
    #         content: '';
    #         position: absolute;
    #         inset: 0;
    #         border-radius: inherit;
    #         pointer-events: none;
    #         box-shadow: inset 0 0 0 1px rgba(80, 150, 255, 0.12);
    #       }
    #     ha-dialog$: |
    #       .mdc-dialog__scrim {
    #         background-color: rgba(0, 0, 0, 0.56) !important;
    #       }
    #       .mdc-dialog__container {
    #         align-items: center !important;
    #         justify-content: center !important;
    #       }
    #       .mdc-dialog__surface {
    #         width: 65vw !important;
    #         max-width: 980px !important;
    #         max-height: 88vh !important;
    #         overflow-y: auto !important;
    #       }
    # --- FIM CÓDIGO ORIGINAL ---
    card_mod:
      style:
        .: |
          ha-dialog {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
          }
        ha-dialog$: |
          .mdc-dialog__content {
            padding-top: 0 !important;
          }
    content:
      type: vertical-stack
      cards:
        # Header visual de sala (sem nome/icone, pois já existe no título do popup)
        - type: custom:button-card
          show_name: false
          show_icon: false
          show_state: false
          tap_action:
            action: none
          hold_action:
            action: none
          styles:
            card:
              - margin: 0 -0.6em 0.4em -0.5em
              - height: 138px
              - border-radius: 0
              - overflow: hidden
              - border: 0
              - box-shadow: none
              - backdrop-filter: blur(10px)
              - -webkit-backdrop-filter: blur(10px)
              - background-image: "linear-gradient(rgba(8,12,20,0.55), rgba(8,12,20,0.55)), url('/local/images/office_header.jpg')"
              - background-size: cover
              - background-position: center center
              - background-repeat: no-repeat

        # Estrutura original mantida (2 colunas: botoes + camera)
        - type: custom:layout-card
          layout_type: custom:grid-layout
          layout:
            grid-template-columns: 1.4fr 1.0fr
            grid-template-areas: '"col_buttons col_camera"'
            grid-gap: 10px
            margin: 0
            padding: 0.5rem
            mediaquery:
              "(max-width: 800px)":
                grid-template-columns: 1fr
                grid-template-areas: |
                  "col_buttons"
                  "col_camera"
                padding: 0
          cards:
            - type: vertical-stack
              view_layout:
                grid-area: col_buttons
              cards: !include ../../columns/room_office_all_buttons.yaml
            - type: custom:layout-card
              layout_type: custom:grid-layout
              view_layout:
                grid-area: col_camera
              layout:
                grid-template-columns: 1fr
                margin: 0
              cards: !include ../../columns/room_office_cameras.yaml
