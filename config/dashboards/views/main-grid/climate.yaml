#################################################
#                                               #
#                  CLIMATE                      #
#                                               #
#################################################
- type: grid
  view_layout:
    # ANTERIOR: grid-area: climate
    grid-area: sala_feature
    show:
      mediaquery: '(min-width: 801px) and (min-height: 463px)'
  # ANTERIOR: title: Climate
  title: Sala
  columns: 1
  square: false
  cards: !include ../../shared/grid-cards/climate-status.yaml

- type: conditional
  view_layout:
    # ANTERIOR: grid-area: climate
    grid-area: sala_feature
  conditions:
    - condition: screen
      media_query: '(max-width: 800px) and (min-height: 463px)'
    - condition: state
      entity: input_select.mobile_dashboard_tab
      state: clima_midia
  card:
    type: grid
    # ANTERIOR: title: Climate
    title: Sala
    columns: 1
    square: false
    cards: !include ../../shared/grid-cards/climate-status.yaml
