# ══════════════════════════════════════════════════════════════════════════
# POPUP DE CAMERAS — Apartamento do usuario
# 8 cameras em layout 3-3-2 (3 colunas, 3 linhas)
# Entidades: sl_camera_2, vr_camera_2, cz_camera_2, as_camera_2,
#            of_camera_2, camera_quarto_casal_2, qmi_camera_2, qma_camera_2
# Estilo baseado no cameras.yaml original do sagaland93/ngocjohn
# ══════════════════════════════════════════════════════════════════════════
# --- CÓDIGO ANTERIOR COMENTADO PARA REFERÊNCIA ---
# Layout anterior: grid 2x4 (2 colunas, 4 linhas) — fazia scroll no tablet
# grid-template-columns: repeat(2, 1fr)
# Cada camera com picture-entity sem tap_action (sem ampliar)
# --- FIM CÓDIGO ANTERIOR ---
# NOVO: Layout 3-3-2 (3 colunas) — cabe tudo sem scroll
# Cada camera abre popup ampliado ao clicar (more-info nativo do HA)
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Cameras
    tag: cameras_user
    # --- ANTERIOR (size: wide com constraints — causava scroll horizontal e vertical) ---
    # size: wide
    # --- FIM ANTERIOR ---
    # FULLSCREEN — elimina scroll sem alterar conteúdo ou lógica
    fullscreen: true
    style: >
      --popup-border-width: 0;
      /* ANTERIOR: --popup-max-width: 980px; */
      # --popup-background-color: rgba(15, 20, 35, 0.75);
      --popup-background-color: linear-gradient(180deg, rgba(15, 25, 50, 0.92) 0%, rgba(10, 18, 40, 0.96) 100%);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.56);
    card_mod:
      style:
        .: |
          ha-dialog {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
          }
        ha-dialog$: |
          .mdc-dialog__scrim {
            background-color: rgba(0, 0, 0, 0.56) !important;
          }
          .mdc-dialog__container {
            align-items: center !important;
            justify-content: center !important;
          }
          .mdc-dialog__surface {
            /* --- ANTERIOR (causava scroll) ---
            width: 65vw !important;
            max-width: 980px !important;
            max-height: 88vh !important;
            overflow-y: auto !important;
            --- FIM ANTERIOR --- */
            border-radius: 0 !important;
            overflow: hidden !important;
          }
          .mdc-dialog__content {
            padding: 0 !important;
          }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-gap: 6px
        grid-template-columns: repeat(3, 1fr)
        grid-template-rows: auto
        margin: 0
        padding: 0.5rem
        mediaquery:
          '(max-width: 800px)':
            grid-template-columns: 1fr
      cards:
        # ── Linha 1: 3 cameras ──
        # SL - Camera (Sala)
        - type: picture-entity
          entity: camera.sl_camera_2
          camera_view: auto
          show_name: true
          show_state: false
          name: SL - Sala
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card { border-radius: 10px !important; overflow: hidden; }
        # VR - Camera (Varanda)
        - type: picture-entity
          entity: camera.vr_camera_2
          camera_view: auto
          show_name: true
          show_state: false
          name: VR - Varanda
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card { border-radius: 10px !important; overflow: hidden; }
        # CZ - Camera (Cozinha)
        - type: picture-entity
          entity: camera.cz_camera_2
          camera_view: auto
          show_name: true
          show_state: false
          name: CZ - Cozinha
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card { border-radius: 10px !important; overflow: hidden; }
        # ── Linha 2: 3 cameras ──
        # AS - Camera (Area de Servico)
        - type: picture-entity
          entity: camera.as_camera_2
          camera_view: auto
          show_name: true
          show_state: false
          name: AS - Area Servico
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card { border-radius: 10px !important; overflow: hidden; }
        # OF - Camera (Office)
        - type: picture-entity
          entity: camera.of_camera_2
          camera_view: auto
          show_name: true
          show_state: false
          name: OF - Office
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card { border-radius: 10px !important; overflow: hidden; }
        # QC - Camera (Quarto Casal)
        - type: picture-entity
          entity: camera.camera_quarto_casal_2
          camera_view: auto
          show_name: true
          show_state: false
          name: QC - Quarto Casal
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card { border-radius: 10px !important; overflow: hidden; }
        # ── Linha 3: 2 cameras (ultima linha incompleta) ──
        # QMI - Camera (Quarto Miguel)
        - type: picture-entity
          entity: camera.qmi_camera_2
          camera_view: auto
          show_name: true
          show_state: false
          name: QMI - Quarto Miguel
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card { border-radius: 10px !important; overflow: hidden; }
        # QMA - Camera (Quarto Marina)
        - type: picture-entity
          entity: camera.qma_camera_2
