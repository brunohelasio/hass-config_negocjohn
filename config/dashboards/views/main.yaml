icon: mdi:home-circle
path: summary
subview: false

# ANTERIOR: theme: Graphite Auto (causou regressao visual — sidebar desaparecia com esse tema)
theme: tablet
type: custom:grid-layout
card_mod:
  style: |
    /* --- CÓDIGO ORIGINAL COMENTADO (radial-gradient Sagaland) ---
    hui-grid-layout {
      background: #2f3342;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100%;
    }
    --- FIM CÓDIGO ORIGINAL --- */
    /* NOVO: fundo preto sólido — contraste com sidebar preta vem dos cards */
    hui-grid-layout {
      background: rgb(0, 0, 0);
      height: 100%;
    }
layout:
  # BENTO GRID (FASE 1)
  # Regra de Ouro aplicada: configuração anterior preservada em comentários abaixo.
  margin: 0
  padding: 0
  grid-gap: 0.9rem
  # ANTERIOR (preservado):
  # grid-template-columns: minmax(260px, 25.5%) repeat(3, minmax(0, 1fr)) 0
  # NOVO: sidebar estreita + conteúdo em 12 colunas.
  grid-template-columns: minmax(72px, 88px) repeat(12, minmax(0, 1fr))
  grid-template-rows: auto minmax(160px, auto) minmax(220px, auto) minmax(220px, auto)
  grid-template-areas: |
    "sidebar top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges"
    "sidebar welcome_locks welcome_locks welcome_locks sala_feature sala_feature sala_feature office_tall rooms_grid rooms_grid rooms_grid rooms_grid rooms_grid"
    "sidebar cameras_big   cameras_big   cameras_big   cameras_big   cameras_big   calendar_card calendar_card calendar_card roborock_tall media media media"
    "sidebar cameras_big   cameras_big   cameras_big   cameras_big   cameras_big   calendar_card calendar_card calendar_card roborock_tall media media media"

  mediaquery:
    '(min-width: 801px) and (max-width: 1440px) and (orientation: portrait)':
      grid-gap: 0.8rem
      grid-template-columns: minmax(64px, 80px) repeat(12, minmax(0, 1fr))
      grid-template-rows: auto minmax(140px, auto) minmax(200px, auto) minmax(200px, auto)
      grid-template-areas: |
        "sidebar top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges   top_badges"
        "sidebar welcome_locks welcome_locks welcome_locks sala_feature sala_feature sala_feature office_tall rooms_grid rooms_grid rooms_grid rooms_grid rooms_grid"
        "sidebar cameras_big   cameras_big   cameras_big   cameras_big   cameras_big   calendar_card calendar_card calendar_card roborock_tall media media media"
        "sidebar cameras_big   cameras_big   cameras_big   cameras_big   cameras_big   calendar_card calendar_card calendar_card roborock_tall media media media"
    # Mobile fallback simples e estável para evitar quebra.
    '(max-width: 800px) and (min-height: 463px)':
      margin: 0
      grid-gap: 0.9rem
      grid-template-columns: 1fr
      grid-template-rows: repeat(10, min-content)
      grid-template-areas: |
        "sidebar"
        "top_badges"
        "welcome_locks"
        "sala_feature"
        "office_tall"
        "rooms_grid"
        "cameras_big"
        "calendar_card"
        "roborock_tall"
        "media"
    # phone cover screen = place horizontal
    '(max-height: 462px)':
      grid-gap: 0.5rem
      grid-template-columns: 0 1fr 1fr 0
      grid-template-rows: min-content 1fr 0 0
      grid-template-areas: |
        ". sidebar sidebar ."
        ". cover  cover  ."
        ". .      .      ."
        ". floorplan .   ."
    # '(max-height: 462px)':
    #   grid-gap: 0.5rem
    #   grid-template-columns: 0 1fr 1fr 0
    #   grid-template-rows: 0 min-content 1fr 0
    #   grid-template-areas: |
    #     ". .      .      ."
    #     ". chips  chips  ."
    #     ". cover  cover  ."
    #     ". .      .      ."

#################################################
#                                               #
#                    DASHBOARD                  #
#                                               #
#################################################
cards: !include_dir_merge_list main-grid/
