#################################################
#                                               #
#             CHIPS MAX 800px                   #
#                                               #
#################################################
- type: custom:layout-card
  view_layout:
    grid-area: chips
    show:
      mediaquery: '(max-width: 800px)'
  layout_type: custom:grid-layout
  layout:
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr))
    margin: 0
    grid-gap: 8px
    padding: 0
  cards:
    - &lights
      type: custom:button-card
      name: Lights
      entity: group.light_all
      tap_action: !include ../../shared/popup/popup_lights.yaml
      icon: mdi:lightbulb-group
      template:
        - chips
      state_display: >
        [[[
            if (variables.state == 'off') return 'All Off';
            else return variables.light_on;
        ]]]
      styles:
        icon:
          - color: >
              [[[
                return variables.state_on
                  ? '#b68752'
                  : '';
              ]]]
    - &media
      type: custom:button-card
      name: Media
      entity: sensor.currently_playing
      icon: custom:ios-hifi-stereo
      template:
        - chips
      state_display: >
        [[[
            if (!variables.state_on) return 'None';
            else return entity.attributes.device_playing;
        ]]]
      styles:
        icon:
          - color: >
              [[[
                return variables.state_on
                  ? '#607D8B'
                  : '';
              ]]]
      tap_action:
        action: fire-dom-event
        browser_mod:
          service: browser_mod.more_info
          data:
            entity: media_player.currently_playing
      hold_action: !include ../../shared/extra-popup/mass-homepods.yaml

    - &presence
      type: custom:button-card
      name: Bruno
      entity: person.bruno_helasio
      template:
        - chips
      styles:
        icon:
          - padding: 3px
          - background-color: null
          - width: 50%

    # - &air
    #   type: custom:button-card
    #   name: Air Quality
    #   entity: sensor.home_climate
    #   template:
    #     - chip_air_new
