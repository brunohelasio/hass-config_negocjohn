type: custom:layout-card
layout_type: custom:grid-layout
layout:
  grid-template-columns: repeat(3, minmax(0, 1fr))
  # Força as duas linhas de cômodos a ocuparem 50% da altura da área cada uma
  grid-template-rows: repeat(2, 1fr) 
  grid-gap: 10px
  margin: 0
  padding: 0
card_mod:
  style: |
    :host { 
      height: 100% !important; 
      display: block !important; 
    }
    #root { 
      height: 100% !important; 
    }
    #root > * { 
      height: 100% !important; 
    }
cards:
  - !include ../../views/main-grid/bento_office.yaml
  - !include ../../views/main-grid/bento_cozinha.yaml
  - !include ../../views/main-grid/bento_lavabo.yaml
  - !include ../../views/main-grid/bento_quarto_casal.yaml
  - !include ../../views/main-grid/bento_quarto_marina.yaml
  - !include ../../views/main-grid/bento_quarto_miguel.yaml