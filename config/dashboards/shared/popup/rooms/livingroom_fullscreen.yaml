# ─────────────────────────────────────────────────────────────────────────────
# POPUP FULLSCREEN — Sala de Estar (modularizado)
# Estrutura visual original preservada; conteúdo fracionado em /rooms/livingroom_fullscreen/
# ─────────────────────────────────────────────────────────────────────────────

action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: " "
    tag: salafullscreen
    dismissable: true
    initial_style: fullscreen
    style: >
      --popup-width: 100vw;
      --popup-max-width: 100vw;
      --popup-background-color: transparent;
      --mdc-theme-surface: transparent;
      --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.92);
    card_mod:
      style:
        ha-dialog$: |
          .mdc-dialog__container {
            padding: 0 !important;
            align-items: stretch !important;
            justify-content: stretch !important;
          }
          .mdc-dialog__surface {
            width: 100vw !important;
            max-width: 100vw !important;
            height: 100vh !important;
            max-height: 100vh !important;
            border-radius: 0 !important;
            background: linear-gradient(140deg, #0b1623 0%, #132035 55%, #0b1e30 100%) !important;
            box-shadow: none !important;
            overflow: hidden !important;
          }
          .mdc-dialog__title {
            display: none !important;
          }
          .mdc-dialog__content {
            padding: 0 !important;
            height: 100vh !important;
            max-height: 100vh !important;
            overflow: hidden !important;
          }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout: !include ./livingroom_fullscreen/_layout.yaml
      cards: !include ./livingroom_fullscreen/_cards.yaml


